        : '⏳ Pendiente · runs ' + k.runs30d + '/10 · approval ' + (k.approvalRate * 100).toFixed(0) + '%/80% · fail ' + (k.failRate * 100).toFixed(0) + '%/10%' };
    };
    const ready = checkReady();
    const promoteCta = '<section class="card ac-promote-cta" style="border-left:3px solid ' + (ready.ready ? 'var(--status-success)' : 'var(--status-warning)') + ';">' +
      '<div class="row-between"><h3 class="t-heading-md" style="margin:0;">' + (ready.ready ? '🚀 Listo para promover' : '⏳ Onboarding en progreso') + '</h3>' +
      (ready.ready ? '<button class="btn btn-primary btn-sm" data-act="promote-agent">Solicitar promoción a CEO</button>' : '') +
      '</div>' +
      '<p class="t-body-sm" style="margin:var(--space-2) 0 0;">' + ready.msg + '</p>' +
      '<p class="t-body-sm muted" style="margin:var(--space-1) 0 0;">Aprobación final: <strong>Tenant Owner (CEO)</strong> per A4 P4.</p>' +
      '</section>';

    /* [V4-PATCH 2026-04-22] Position + Authority cards (D12 + SPEC_AGENT §6) */
    const positionCatalog = FL.mock.positionCatalog || [];
    const currentPositionId = agent.positionId || 'sales_rep';
    const currentPosition = positionCatalog.find(p => p.id === currentPositionId) || positionCatalog[0] || {};
    const positionOpts = positionCatalog.map(p =>
      '<option value="' + p.id + '"' + (p.id === currentPositionId ? ' selected' : '') + '>' + p.title + '</option>'
    ).join('');
    const positionCard = (
      '<section class="card ac-position">' +
        '<header class="row-between"><h3 class="t-heading-sm">Position · D12</h3>' +
          '<span class="chip chip-neutral">position_id owns skills/memory (no user_id)</span></header>' +
        '<div class="ac-position__grid">' +
          '<label><span class="t-label-sm muted">Posición en la organización</span>' +
            '<select class="select" data-field="position">' + positionOpts + '</select>' +
          '</label>' +
          '<div><span class="t-label-sm muted">Efectos</span>' +
            '<p class="t-body-sm" style="margin:2px 0 0;">' + (currentPosition.influence || '—') + '</p>' +
          '</div>' +
        '</div>' +

  function renderSkills(agent) {

  function renderMemory(agent) {

  }

  /* [V2-PATCH 2026-04-19] Conversation tab content
     [V3-PATCH 2026-04-19] embed chatThread primitive for live debug */
  function renderConversation(agent) {
    const convs = FL.mock.conversations.filter(c => c.agentId === agent.id);
    const lastConv = convs[0];
    const convList = convs.length
      ? '<ul class="ac-list">' + convs.slice(0, 5).map(c => (
          '<li class="ac-sk"><a href="#/chat/' + c.id + '"><strong>' + c.title + '</strong></a>' +

        )).join('') + '</ul>'
      : '<p class="muted t-body-sm">Sin conversaciones todavía.</p>';
    /* embed thread primitive for the most recent conversation, scope=debug */
    const debugThread = lastConv ? W.chatThread({
      conversationId: lastConv.id,
      contextLabel: 'Debug · ' + agent.name + ' · última conversación',
      scope: 'debug',
      placeholder: 'Mensaje al agente para debug…'
    }) : '';

      '<div class="ac-conv">' +
        '<a class="btn btn-primary" href="#/chat/new?agent=' + agent.id + '">' +

  /* [V3.5-PATCH 2026-04-19] Versionado tab — AgentSpec lineage */
  function renderVersioning(agent) {
    const versions = (FL.mock.agentSpecVersions || []).filter(v => v.agentId === agent.id).sort((a, b) => Date.parse(b.publishedAt) - Date.parse(a.publishedAt));

        '<div class="t-body-sm muted" style="margin-bottom:var(--space-3);">A4 P1: AgentSpec es estática + versionada + inmutable entre ejecuciones. Cada edit publica nueva versión + supersedes anterior. No se borra (per A5 §7).</div>' +
        '<table class="ac-table">' +
          '<thead><tr><th>Versión</th><th>Publicado</th><th>Por</th><th>Supersedes</th><th>Cambio</th><th>Acción</th></tr></thead>' +

            '<tr' + (v.specVersion === agent.specVersion ? ' style="background:var(--accent-primary-soft);"' : '') + '>' +
              '<td><code>v' + v.specVersion + '</code>' + (v.specVersion === agent.specVersion ? ' <span class="chip chip-success" style="font-size:10px;">current</span>' : '') + '</td>' +

              '<td>' + v.publishedBy + '</td>' +
              '<td class="mono">' + (v.supersedes ? 'v' + v.supersedes : '<span class="muted">—</span>') + '</td>' +
              '<td>' + v.changeNote + '</td>' +
              '<td>' + (v.specVersion !== agent.specVersion ? '<button class="btn btn-sm" data-rollback="' + v.specVersion + '">↩ Rollback</button>' : '<span class="muted">—</span>') + '</td>' +
            '</tr>'
          )).join('') + '</tbody>' +
        '</table>' +
      '</div>'
    );
  }

  function renderLogs(agent) {
    const runs = FL.mock.runs.filter(r => r.agentId === agent.id).slice(0, 20);
    if (!runs.length) return W.emptyState({ title: 'Sin runs', icon: '○' });

  function injectStyles() {

    s.textContent = `

.ac-kpi { padding:var(--space-3); background:var(--bg-surface); border:1px solid var(--stroke-default); border-radius:var(--radius-md); }

.ac-list { list-style:none; padding:0; margin:0; display:flex; flex-direction:column; gap:var(--space-2); }
.ac-sk { padding:var(--space-3); background:var(--bg-subtle); border-radius:var(--radius-md); display:flex; justify-content:space-between; align-items:center; gap:var(--space-3); }
.ac-sk a { color:var(--accent-primary); text-decoration:none; }
.ac-sk a:hover { text-decoration:underline; }
.ac-mem { display:grid; grid-template-columns:repeat(3, 1fr); gap:var(--space-4); }
@media (max-width: 700px) { .ac-mem { grid-template-columns:1fr; } }
.ac-mem__card { padding:var(--space-4); background:var(--bg-surface); border:1px solid var(--stroke-default); border-radius:var(--radius-lg); }

/* [V4-PATCH 2026-04-22] Position + Authority cards */

<script>
(function () {
  const FL = window.__faberloom; if (!FL) return;
  const W = FL.widgets, i18n = FL.i18n;
  let root = null, selected = null;

  const NODES = [
    { id:'n1', type:'trigger',   label:'rfq_received',      x:60,  y:120, detail:'Incoming RFQ via email' },
    { id:'n2', type:'retrieve',  label:'stock_lookup',      x:220, y:60,  detail:'Query stock table (MRP)' },
    { id:'n3', type:'retrieve',  label:'price_table',       x:220, y:180, detail:'Query price_table (2026-04-01)' },

    { id:'n5', type:'validator', label:'provenance_check',  x:560, y:120, detail:'Every claim has evidence_span' },
    { id:'n6', type:'hitl',      label:'awaiting_approval', x:720, y:120, detail:'Human gate (draft-first)' },
    { id:'n7', type:'action',    label:'send_email',        x:880, y:120, detail:'External send via Postmark' }
  ];
  const EDGES = [ ['n1','n2'], ['n1','n3'], ['n2','n4'], ['n3','n4'], ['n4','n5'], ['n5','n6'], ['n6','n7'] ];

  function mount(slot) {
    root = slot; injectStyles();
    render();
    return { unmount: () => { if (root) root.innerHTML = ''; } };
  }

  function render() {
    const t = k => i18n.t(k);
    root.innerHTML =
      '<div class="wf-wrap">' +
        '<header class="wf-head"><h1 class="t-display-md">' + t('workflow.title') + '</h1>' +
        '<button class="btn btn-primary" data-act="exec">▶ ' + t('workflow.execute') + '</button></header>' +
        '<div class="wf-layout">' +
          '<aside class="wf-palette card"><h3 class="t-label-md">' + t('workflow.palette') + '</h3>' +
          ['trigger','retrieve','llm','validator','hitl','action','branch'].map(k =>
            '<button class="wf-p-item" data-add-node="' + k + '" style="background:var(--node-' + k + '-soft, transparent); border-left: 3px solid var(--node-' + k + ');" title="Click para agregar nodo">' + t('workflow.node_' + k) + ' +</button>'
          ).join('') + '</aside>' +
          '<div class="wf-canvas card">' + svg() + '</div>' +
          '<aside class="wf-inspector card" id="wf-insp"><h3 class="t-label-md">' + t('workflow.inspector') + '</h3><p class="muted">' + t('workflow.select_node') + '</p></aside>' +
        '</div>' +
      '</div>';

    root.querySelectorAll('[data-node]').forEach(el => {
      el.addEventListener('click', () => selectNode(el.getAttribute('data-node')));
    });
    /* [V3-PATCH 2026-04-19] Run with animated node highlighting */
    const ex = root.querySelector('[data-act="exec"]');
    if (ex) ex.addEventListener('click', () => animateRun());
    /* [V3-PATCH 2026-04-19] Add node from palette */
    root.querySelectorAll('[data-add-node]').forEach(b => {
      b.addEventListener('click', () => addNodeFromPalette(b.getAttribute('data-add-node')));
    });
  }

  function animateRun() {
    FL.bus.emit('toast', { kind:'info', message:'▶ Ejecutando workflow · ' + NODES.length + ' nodos secuenciales' });
    NODES.forEach((n, i) => {
      setTimeout(() => {
        const el = root.querySelector('[data-node="' + n.id + '"] rect');
        if (el) {
          el.setAttribute('fill', 'var(--node-' + n.type + ')');
          el.setAttribute('opacity', '0.85');
          setTimeout(() => { el.setAttribute('fill', 'var(--bg-surface)'); el.setAttribute('opacity', '1'); }, 600);
        }
        if (i === NODES.length - 1) {
          setTimeout(() => FL.bus.emit('toast', { kind:'success', message:'✓ Workflow completado · 7/7 nodos OK' }), 700);
        }
      }, i * 400);
    });
  }

  function addNodeFromPalette(type) {
    const newId = 'n' + (NODES.length + 1);
    NODES.push({ id:newId, type:type, label:type + '_new', x:60 + (NODES.length * 30), y:240, detail:'Nuevo nodo · editar en inspector' });
    FL.bus.emit('toast', { kind:'success', message:'+ Nodo ' + type + ' agregado · arrastrar en futuro' });
    render();
  }

  function svg() {
    const edges = EDGES.map(([a, b]) => {
      const na = NODES.find(n => n.id === a), nb = NODES.find(n => n.id === b);
      const x1 = na.x + 60, y1 = na.y + 25, x2 = nb.x, y2 = nb.y + 25;
      const cx = (x1 + x2) / 2;
      return '<path class="wf-edge" d="M' + x1 + ' ' + y1 + ' C ' + cx + ' ' + y1 + ', ' + cx + ' ' + y2 + ', ' + x2 + ' ' + y2 + '"/>';
    }).join('');
    const nodes = NODES.map(n =>
      '<g class="wf-node" data-node="' + n.id + '" style="cursor:pointer;">' +
        '<rect x="' + n.x + '" y="' + n.y + '" width="120" height="50" rx="10" fill="var(--bg-surface)" stroke="var(--node-' + n.type + ')" stroke-width="2"/>' +
        '<circle cx="' + (n.x + 14) + '" cy="' + (n.y + 25) + '" r="5" fill="var(--node-' + n.type + ')"/>' +
        '<text x="' + (n.x + 28) + '" y="' + (n.y + 22) + '" font-size="11" fill="var(--text-muted)" font-family="var(--font-mono)">' + n.type + '</text>' +
        '<text x="' + (n.x + 28) + '" y="' + (n.y + 38) + '" font-size="12" fill="var(--text-primary)" font-weight="500">' + n.label + '</text>' +
      '</g>'
    ).join('');
    return '<svg viewBox="0 0 1040 320" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Workflow canvas">' + edges + nodes + '</svg>';
  }

  function selectNode(id) {
    selected = NODES.find(n => n.id === id);
    if (!selected) return;
    const box = document.getElementById('wf-insp');
    if (!box) return;
    box.innerHTML = '<h3 class="t-label-md">' + i18n.t('workflow.inspector') + '</h3>' +
      '<dl class="wf-insp__dl">' +
        '<dt>id</dt><dd><code>' + selected.id + '</code></dd>' +
        '<dt>type</dt><dd><span class="chip" style="color:var(--node-' + selected.type + ');border-color:var(--node-' + selected.type + ');">' + selected.type + '</span></dd>' +
        '<dt>label</dt><dd>' + selected.label + '</dd>' +
        '<dt>detail</dt><dd class="t-body-sm">' + selected.detail + '</dd>' +
        '<dt>coords</dt><dd><code>(' + selected.x + ', ' + selected.y + ')</code></dd>' +
      '</dl>';
  }

  function injectStyles() {
    if (document.getElementById('wf-styles')) return;
    const s = document.createElement('style'); s.id = 'wf-styles';
    s.textContent = `
.wf-wrap { display:flex; flex-direction:column; gap:var(--space-4); }
.wf-head { display:flex; justify-content:space-between; align-items:center; }
.wf-head h1 { margin:0; }
.wf-layout { display:grid; grid-template-columns:180px 1fr 240px; gap:var(--space-3); align-items:flex-start; }
@media (max-width: 980px) { .wf-layout { grid-template-columns:1fr; } }
.wf-palette, .wf-inspector { padding:var(--space-3); }
.wf-palette h3, .wf-inspector h3 { margin:0 0 var(--space-2) 0; color:var(--text-muted); }
.wf-p-item { display:block; width:100%; text-align:left; padding:var(--space-1) var(--space-2); margin:var(--space-1) 0; border-radius:var(--radius-sm); font-size:12px; cursor:pointer; border:0; font:inherit; color:inherit; transition:filter var(--dur-fast); }
.wf-p-item:hover { filter:brightness(0.95); }
.wf-canvas { padding:var(--space-3); min-height:360px; background-image: radial-gradient(circle, var(--stroke-default) 1px, transparent 1px); background-size: 20px 20px; }
.wf-canvas svg { width:100%; height:auto; display:block; }
.wf-edge { fill:none; stroke:var(--stroke-strong); stroke-width:1.8; }
.wf-node:hover rect { filter: brightness(0.97); }
.wf-insp__dl { display:grid; grid-template-columns:auto 1fr; gap:var(--space-1) var(--space-2); margin:0; font-size:12px; }
.wf-insp__dl dt { color:var(--text-muted); }
.wf-insp__dl dd { margin:0; }
    `;
    document.head.appendChild(s);
  }

  FL.modules['workflows-canvas'] = { mount, meta: { route: '/workflows' } };
})();
</script>

      b.addEventListener('click', () => {
        const id = b.getAttribute('data-id');
        const c = FL.mock.consolidations.find(x => x.id === id);
        if (c) W.openConsolidationModal(Object.assign({ thermometer: 'hot', patternCount: 6, accumulatedSince: c.triggeredAt }, c));
      });
    });
    /* [V3-PATCH 2026-04-19] promote-to-base + archive */
    root.querySelectorAll('[data-act="promote-base"]').forEach(b => {
      b.addEventListener('click', () => promoteToBase(b.getAttribute('data-id')));
    });
    root.querySelectorAll('[data-act="archive"]').forEach(b => {
      b.addEventListener('click', () => archiveConsolidation(b.getAttribute('data-id')));
    });
  }

  function renderCard(c) {
    const skill = FL.mock.skills[c.skillId] || { name: c.skillId };
    return (
      '<article class="cn-card">' +
        '<div class="cn-card__head"><strong>' + skill.name + '</strong></div>' +
        '<div class="cn-card__rule t-body-sm">' + (c.suggestedRule || '—') + '</div>' +
        '<div class="cn-card__meta t-body-sm muted">' +
          (c.triggeredBy ? 'Triggered by ' + c.triggeredBy + ' · ' : '') +
          (c.patternCount ? c.patternCount + ' patrones · ' : '') +
          (c.triggeredAt ? c.triggeredAt.slice(0, 10) : '') +
        '</div>' +
        (c.status === 'candidate'
          ? '<button class="btn btn-sm btn-primary" data-act="review" data-id="' + c.id + '">' + i18n.t('consolidation.approve') + ' →</button>'
          : c.status === 'active'
          /* [V3-PATCH 2026-04-19] Active → Promote to base loop visible */
          ? '<button class="btn btn-sm btn-primary" data-act="promote-base" data-id="' + c.id + '">↑ Promover a base</button>' +
            ' <button class="btn btn-sm btn-ghost" data-act="archive" data-id="' + c.id + '">Archivar</button>'
          : c.status === 'archived'
          ? '<button class="btn btn-sm" disabled>Archived</button>'
          : '<button class="btn btn-sm" disabled>Reverted</button>') +
      '</article>'
    );
  }

  /* [V3-PATCH 2026-04-19] Promote Active consolidation to skill base */
  function promoteToBase(consId) {
    const c = FL.mock.consolidations.find(x => x.id === consId);
    if (!c) return;
    const skill = FL.mock.skills[c.skillId];
    if (!skill) return;
    const newVersion = bumpVersion(skill.base.version || '1.0.0');
    W.openModal(
      '<h2 id="fl-modal-title" class="t-heading-lg" style="margin:0 0 var(--space-3);">↑ Promover a base sellada</h2>' +
      '<p class="t-body-md">Vas a integrar el patrón consolidado al base layer del skill <code>' + c.skillId + '</code>.</p>' +
      '<dl class="bd-risk-grid" style="margin:var(--space-3) 0;">' +
        '<dt>Skill</dt><dd><strong>' + skill.name + '</strong></dd>' +
        '<dt>Base actual</dt><dd>v' + skill.base.version + '</dd>' +
        '<dt>Nueva versión</dt><dd><strong style="color:var(--accent-primary);">v' + newVersion + '</strong></dd>' +
        '<dt>Patrón</dt><dd>' + (c.suggestedRule || '—') + '</dd>' +
        '<dt>Audit verb</dt><dd><code>agent_spec.published</code></dd>' +
        '<dt>supersedes</dt><dd>v' + skill.base.version + ' (queda como superseded, no se borra)</dd>' +
      '</dl>' +
      '<p class="t-body-sm muted">Per A5 §7: "no borrar chunks promovidos, versionarlos". El base anterior queda con status superseded.</p>' +
      '<div style="display:flex;gap:var(--space-2);justify-content:flex-end;margin-top:var(--space-4);">' +
        '<button class="btn" data-promo-act="cancel">Cancelar</button>' +
        '<button class="btn btn-primary" data-promo-act="confirm">Confirmar promoción</button>' +
      '</div>',
      { width: 600 }
    );
    document.querySelector('[data-promo-act="cancel"]').addEventListener('click', () => W.closeModal());
    document.querySelector('[data-promo-act="confirm"]').addEventListener('click', () => {
      /* simulate the loop closing: skill.base version bump + consolidation archived */
      skill.base.version = newVersion;
      c.status = 'archived';
      c.promotedAt = new Date().toISOString();
      c.supersedesVersion = skill.base.version;
      FL.mock.auditEvents.unshift({
        id:'ae_' + Date.now(), ts:new Date().toISOString(), tenantId:FL.session.tenantId,
        actor:FL.session.userId, action:'agent_spec.published', target:c.skillId,
        severity:'INFO', ip:'10.0.0.1', userAgent:'FaberLoom/1.0',
        beforeState:JSON.stringify({ version: skill.base.version, source:'consolidation' }),
        afterState:JSON.stringify({ version: newVersion, supersedes: skill.base.version, includes_pattern: c.suggestedRule })
      });
      W.closeModal();
      FL.bus.emit('toast', { kind:'success', message:'✓ Promovido a base · ' + skill.name + ' ahora v' + newVersion + ' · audit_event publicado' });
      render();
    });
  }
  function bumpVersion(v) {
    const parts = v.split('.');
    parts[parts.length - 1] = String(parseInt(parts[parts.length - 1] || '0', 10) + 1);
    return parts.join('.');
  }
  function archiveConsolidation(consId) {
    const c = FL.mock.consolidations.find(x => x.id === consId);
    if (!c) return;
    c.status = 'archived';
    c.archivedAt = new Date().toISOString();
    FL.bus.emit('toast', { kind:'info', message:'Archivado · disponible para rollback en histórico' });
    render();
  }

  function injectStyles() {
    if (document.getElementById('cn-styles')) return;
    const s = document.createElement('style'); s.id = 'cn-styles';
    s.textContent = `
.cn-wrap { display:flex; flex-direction:column; gap:var(--space-4); }
.cn-wrap h1 { margin:0; }
.cn-kanban { display:grid; grid-template-columns:repeat(4, 1fr); gap:var(--space-3); align-items:flex-start; }
@media (max-width: 980px) { .cn-kanban { grid-template-columns:1fr 1fr; } }
@media (max-width: 680px) { .cn-kanban { grid-template-columns:1fr; } }
.cn-col { background:var(--bg-subtle); border-radius:var(--radius-lg); padding:var(--space-3); min-height:180px; }
.cn-col__head { display:flex; justify-content:space-between; align-items:center; margin-bottom:var(--space-2); }
.cn-col__head h2 { margin:0; }
.cn-col__body { display:flex; flex-direction:column; gap:var(--space-2); }
.cn-card { background:var(--bg-surface); padding:var(--space-3); border-radius:var(--radius-md); border:1px solid var(--stroke-default); display:flex; flex-direction:column; gap:var(--space-1); }
.cn-card__head { font-size:13px; }
.cn-card__rule { color:var(--text-primary); }
    `;
    document.head.appendChild(s);
  }

  FL.modules['consolidation'] = { mount, meta: { route: '/consolidaciones' } };
})();
</script>

<script>
/* ═══════════════════════════════════════════════════════════════
   [V2-PATCH 2026-04-19] · 17_module_chat.html.fragment
   Chat module · 3-column layout with Always-on, conversation,
   GroundedInBlock + SLA + handoffs. Default route on boot.
   ═══════════════════════════════════════════════════════════════ */
(function () {
  const FL = window.__faberloom;
  if (!FL) return;
  const W = FL.widgets, i18n = FL.i18n, bus = FL.bus;

  let root = null;
  let state = null;
  let unsubs = [];

  function mount(slot, ctx) {
    root = slot;
    injectStyles();

    const convIdParam = ctx.params && ctx.params.id;
    const qry         = ctx.query || {};
    state = {
      convId: convIdParam || resolveFromQuery(qry),
      activeSkills: new Set(),
      activeAgent: qry.agent || null,
      pinnedAgent: qry.agent || null, // if opened from agent-console, pin the agent
      iterating: null,
      skillSearch: ''
    };
    if (qry.skill) state.activeSkills.add(qry.skill);
    // If pinned agent, pre-activate their skills
    if (state.pinnedAgent) {
      const ag = FL.mock.agents.find(a => a.id === state.pinnedAgent);
      if (ag && ag.skills) ag.skills.forEach(s => state.activeSkills.add(s));
    }

    render();

    unsubs.push(bus.on('chat:iterate-last',       iterateLastAgentMessage));
    unsubs.push(bus.on('chat:toggle-skill-search', focusSkillSearch));
    unsubs.push(bus.on('lang:change',              render));
    unsubs.push(bus.on('theme:change',             render));

    return {
      unmount() {
        unsubs.forEach(u => { try { u && u(); } catch {} });
        unsubs = [];
        if (root) root.innerHTML = '';
      }
    };
  }

  function resolveFromQuery(qry) {
    // /chat/new?agent=ag_xxx → pick the most recent conv for that agent (or empty)
    if (qry.agent) {
      const recent = FL.mock.conversations.find(c => c.agentId === qry.agent && c.state === 'active');
      if (recent) return recent.id;
    }
    // No query → no conversation yet (empty state)
    return null;
  }

  /* ─── Render ─────────────────────────────────────── */
  function render() {
    if (!root) return;
    /* [V4-PATCH 2026-04-22] Cold Start Banner on main chat dashboard (dismissable session-only) */
    const cs = FL.mock.coldStart;
    const csDismissed = FL.store.get('chat_cold_start_dismissed', false);
    const csBanner = (cs && cs.enabled && !csDismissed)
      ? '<div class="fl-chat-coldstart-wrap">' + W.coldStartBanner(cs) +
        '<button type="button" class="btn btn-ghost btn-sm fl-chat-coldstart__dismiss" data-action="cs-dismiss" aria-label="Ocultar banner cold start">×</button>' +
        '</div>'
      : '';
    root.innerHTML =
      csBanner +
      '<div class="fl-chat-app">' +
        '<aside class="fl-chat-left" aria-label="Agents and skills">' + renderLeft() + '</aside>' +
        '<main class="fl-chat-center">' + renderCenter() + '</main>' +
        '<aside class="fl-chat-right" aria-label="Grounding, SLA, handoffs">' + renderRight() + '</aside>' +
      '</div>';
    wireAll();
    /* [V4-PATCH 2026-04-22] wire dismiss */
    const dismissBtn = root.querySelector('[data-action="cs-dismiss"]');
    if (dismissBtn) dismissBtn.addEventListener('click', () => {
      FL.store.set('chat_cold_start_dismissed', true);
      const wrap = root.querySelector('.fl-chat-coldstart-wrap');
      if (wrap) wrap.remove();
    });
    i18n.applyToDom(root);
  }

  function renderLeft() {
    const tenant = FL.mock.tenants.find(t => t.id === FL.session.tenantId) || FL.mock.tenants[0];
    const agents = FL.mock.availableAgents;
    const skills = FL.mock.availableSkillsForChat.filter(s => {
      if (!state.skillSearch) return true;
      const q = state.skillSearch.toLowerCase();
      return s.name.toLowerCase().includes(q) || (s.description || '').toLowerCase().includes(q);
    });
    const recentConvs = FL.mock.conversations.filter(c => c.state === 'active').slice(0, 5);

    return (
      // Always-on (Personal + Org, not deactivable)
      '<section class="fl-ch-section">' +
        '<h3 class="t-label-md">' + i18n.t('chat.always_on_title') + '</h3>' +
        '<div class="fl-ch-always" title="' + i18n.t('chat.always_on_hint') + '">' +
          '<span class="chip fl-ch-always__chip"><span aria-hidden="true">🔒</span> ' + i18n.t('chat.always_on_personal') + '</span>' +
          '<span class="chip fl-ch-always__chip"><span aria-hidden="true">🔒</span> ' + i18n.t('chat.always_on_org') + ' · ' + tenant.name + '</span>' +
        '</div>' +
      '</section>' +

      // Agents
      '<section class="fl-ch-section">' +
        '<h3 class="t-label-md">' + i18n.t('chat.agents_title') + ' <span class="muted">· ' + agents.length + '</span></h3>' +
        '<div class="fl-ch-agents">' +
          agents.map(a => (
            '<button class="fl-ch-agent' + (state.activeAgent === a.id ? ' fl-ch-agent--active' : '') + '" data-agent="' + a.id + '">' +
              '<div class="fl-ch-agent__top">' +
                '<strong class="fl-ch-agent__name">' + a.name + '</strong>' +
                '<span class="fl-ch-agent__lvl" style="background:var(--autonomy-' + a.autonomy.toLowerCase() + ');">' + a.autonomy + '</span>' +
              '</div>' +
              '<div class="fl-ch-agent__meta">' +
                '<span class="t-body-sm muted">' + a.runsLast7d + ' runs 7d</span>' +
                W.sparkline(a.sparklineData) +
              '</div>' +
            '</button>'
          )).join('') +
        '</div>' +
      '</section>' +

      // Skills
      '<section class="fl-ch-section">' +
        '<h3 class="t-label-md">' + i18n.t('chat.skills_title') + ' <span class="muted">· ' + FL.mock.availableSkillsForChat.length + '</span></h3>' +
        '<input class="input input-sm fl-ch-skill-search" placeholder="' + i18n.t('chat.skill_filter') + '" value="' + (state.skillSearch || '') + '"/>' +
        '<div class="fl-ch-skills">' +
          skills.map(s => W.skillPill(s, state.activeSkills.has(s.id))).join(' ') +
          (skills.length === 0 ? '<p class="muted t-body-sm">Sin resultados</p>' : '') +
        '</div>' +
      '</section>' +

      // Recent conversations
      '<section class="fl-ch-section">' +
        '<h3 class="t-label-md">' + i18n.t('chat.recent_conversations') + '</h3>' +
        '<div class="fl-ch-recent">' +
          recentConvs.map(c => (
            '<a class="fl-ch-recent__item' + (state.convId === c.id ? ' fl-ch-recent__item--active' : '') + '" href="#/chat/' + c.id + '" title="' + c.title.replace(/"/g, '&quot;') + '">' +
              '<div class="fl-ch-recent__title">' + c.title.slice(0, 48) + (c.title.length > 48 ? '…' : '') + '</div>' +
              '<div class="t-body-sm muted">' + c.messageCount + ' msgs · ' + (c.lastMessageAt || '').slice(11, 16) + '</div>' +
            '</a>'
          )).join('') +
        '</div>' +
        '<a class="btn btn-sm" href="#/chat" style="margin-top:var(--space-2);">＋ ' + i18n.t('chat.new_conversation') + '</a>' +
      '</section>'
    );
  }

  function renderCenter() {
    if (!state.convId) return renderEmptyCenter();
    const conv     = FL.mock.conversations.find(c => c.id === state.convId);
    if (!conv)       return renderEmptyCenter();
    const agent    = FL.mock.agents.find(a => a.id === conv.agentId);
    const messages = FL.mock.messages.filter(m => m.conversationId === state.convId);
    const activeSkillsArr = Array.from(state.activeSkills).map(id => FL.mock.availableSkillsForChat.find(s => s.id === id)).filter(Boolean);
    const activeAgentObj = state.activeAgent ? FL.mock.availableAgents.find(a => a.id === state.activeAgent) : null;

    return (
      '<header class="fl-ch-header">' +
        '<div class="fl-ch-header__title">' +
          '<h2 class="t-heading-md">' + conv.title + '</h2>' +
          (agent ? (
            '<div class="fl-ch-header__agent">' +
              '<span class="t-body-sm muted">' + i18n.t('chat.agent_header_prefix') + '</span> ' +
              '<strong>' + agent.name + '</strong> ' +
              '<span class="chip fl-ch-agent__lvl" style="background:var(--autonomy-' + (agent.autonomy || 'L0').toLowerCase() + ');">' + agent.autonomy + '</span>' +
            '</div>'
          ) : '') +
        '</div>' +
        '<div class="fl-ch-header__meta">' +
          '<span class="muted t-body-sm">' + messages.length + ' msgs · ' + conv.state + '</span>' +
        '</div>' +
      '</header>' +

      '<div class="fl-ch-messages" id="fl-ch-msgs">' +
        messages.map(m => renderMessage(m, conv, agent)).join('') +
      '</div>' +

      '<div class="fl-ch-composer-wrap">' +
        W.chatComposer({
          conversationId: state.convId,
          activeSkills:  activeSkillsArr,
          activeAgent:   activeAgentObj,
          placeholder:   i18n.t('chat.composer_placeholder_1')
        }) +
      '</div>'
    );
  }

  function renderEmptyCenter() {
    const suggestions = [
      { id: 'sug1', icon: '💼', title: i18n.t('chat.suggest_1_title'), hint: i18n.t('chat.suggest_1_hint') },
      { id: 'sug2', icon: '◈',  title: i18n.t('chat.suggest_2_title'), hint: i18n.t('chat.suggest_2_hint') },
      { id: 'sug3', icon: '📝', title: i18n.t('chat.suggest_3_title'), hint: i18n.t('chat.suggest_3_hint') },
      { id: 'sug4', icon: '⚖',  title: i18n.t('chat.suggest_4_title'), hint: i18n.t('chat.suggest_4_hint') }
    ];
    const activeSkillsArr = Array.from(state.activeSkills).map(id => FL.mock.availableSkillsForChat.find(s => s.id === id)).filter(Boolean);
    const activeAgentObj = state.activeAgent ? FL.mock.availableAgents.find(a => a.id === state.activeAgent) : null;
    return (
      '<section class="fl-ch-empty">' +
        '<h1 class="t-display-md">' + i18n.t('chat.empty_title') + '</h1>' +
        '<p class="t-body-md muted">' + i18n.t('chat.empty_subtitle') + '</p>' +
        '<div class="fl-ch-empty__suggest">' + W.suggestGrid(suggestions) + '</div>' +
      '</section>' +
      '<div class="fl-ch-composer-wrap">' +
        W.chatComposer({
          conversationId: null,
          activeSkills:  activeSkillsArr,
          activeAgent:   activeAgentObj,
          placeholder:   i18n.t('chat.composer_placeholder_3')
        }) +
      '</div>'
    );
  }

  function renderMessage(m, conv, agent) {
    const isUser = m.role === 'user';
    const isAgent = m.role === 'agent';
    const isIter = !!m.iterationOf;
    const body = renderMessageBody(m);
    const menu = isAgent ? W.messageActionsMenu({ messageId: m.id }) : '';
    const badge = isAgent && m.patternBadge ? W.patternBadge(m.patternBadge) : '';
    const draftPills = isAgent && m.draftIds && m.draftIds.length ? renderDraftPills(m.draftIds) : '';
    const iterBadge = isIter ? '<span class="chip chip-accent fl-ch-msg__iter-badge">' + i18n.t('chat.iterate_n') + '</span>' : '';
    const senderName = isUser ? i18n.t('chat.message_from_user') : (agent ? agent.name : 'Agent');
    const ts = (m.timestamp || '').slice(11, 16);

    return (
      '<article class="fl-ch-msg ' + (isUser ? 'fl-ch-msg--user' : 'fl-ch-msg--agent') + (isIter ? ' fl-ch-msg--iter' : '') + '" data-msg="' + m.id + '">' +
        '<div class="fl-ch-msg__head">' +
          '<strong class="fl-ch-msg__sender">' + senderName + '</strong>' +
          '<span class="t-body-sm muted fl-ch-msg__ts">' + ts + '</span>' +
          iterBadge +
          (isAgent ? '<div class="fl-ch-msg__head-right">' + menu + '</div>' : '') +
        '</div>' +
        '<div class="fl-ch-msg__body">' + body + '</div>' +
        draftPills +
        (badge ? '<div class="fl-ch-msg__badge">' + badge + '</div>' : '') +
      '</article>'
    );
  }

  function renderMessageBody(m) {
    let html = String(m.content || '').replace(/\n/g, '<br>');
    // Replace [E1]..[En] tokens with provenance superscripts matching evidenceSpans in order
    (m.evidenceSpans || []).forEach((ev, i) => {
      const label  = 'E' + (i + 1);
      const marker = '\\[' + label + '\\]';
      const sup    = W.provenanceSup('c_' + m.id + '_' + i, ev.id, label);
      html = html.replace(new RegExp(marker, 'g'), sup);
    });
    return html;
  }

  function renderDraftPills(ids) {
    return '<div class="fl-ch-msg__drafts">' + ids.map(did => {
      const d = FL.mock.drafts.find(x => x.id === did) || { id: did, state: 'awaiting_approval' };
      return (
        '<a class="fl-draft-pill" href="#/bandeja/' + did + '">' +
          '<strong>' + i18n.t('chat.draft_pill_prefix') + '</strong> <code>' + did + '</code> ' +
          W.draftStateBadge(d.state) +
        '</a>'
      );
    }).join('') + '</div>';
  }

  function renderRight() {
    const sources = resolveGroundedInSources();
    const handoffs = state.convId ? collectConversationHandoffs(state.convId) : [];
    return (
      '<section class="fl-ch-section">' +
        W.groundedInBlock({ sources, title: i18n.t('chat.grounded_in_title') }) +
      '</section>' +
      '<section class="fl-ch-section">' +
        W.slaBar({ target: 300, current: 310, label: i18n.t('chat.sla_p95_label') }) +
      '</section>' +
      '<section class="fl-ch-section">' +
        '<h3 class="t-label-md">' + i18n.t('chat.active_handoffs') + '</h3>' +
        '<div class="fl-ch-handoffs">' +
          (handoffs.length
            ? handoffs.map(d => (
                '<a class="fl-draft-pill" href="#/bandeja/' + d.id + '">' +
                  '<strong>' + i18n.t('chat.draft_pill_prefix') + '</strong> <code>' + d.id + '</code> ' +
                  W.draftStateBadge(d.state) +
                '</a>'
              )).join('')
            : '<p class="muted t-body-sm">Sin handoffs todavía.</p>') +
        '</div>' +
      '</section>' +
      // Voice of customer sample (rotating based on conv)
      (state.convId ? (
        '<section class="fl-ch-section">' +
          W.voiceOfCustomerCard(pickVocForConversation(state.convId)) +
        '</section>'
      ) : '')
    );
  }

  function resolveGroundedInSources() {
    if (!state.convId) return [];
    const conv = FL.mock.conversations.find(c => c.id === state.convId);
    if (!conv) return [];
    // Match by title keyword against knowledgeHeatSamples queryPattern
    const title = (conv.title || '').toLowerCase();
    let matched = null;
    FL.mock.knowledgeHeatSamples.forEach(p => {
      const key = p.queryPattern.toLowerCase().split(' ')[0];
      if (title.includes(key) && !matched) matched = p;
    });
    if (matched) return matched.sources;
    // Fallback: aggregate distinct sources from conversation messages
    const seen = new Set();
    const acc  = [];
    FL.mock.messages.filter(m => m.conversationId === state.convId).forEach(m => {
      (m.evidenceSpans || []).forEach(ev => {
        const key = ev.source + '|' + (ev.sourceVersion || '');
        if (!seen.has(key) && acc.length < 5) {
          seen.add(key);
          acc.push({
            sourceId:  ev.source,
            title:     ev.title || ev.source,
            version:   ev.sourceVersion,
            lineRange: ev.line,
            score:     ev.score == null ? 0.8 : ev.score
          });
        }
      });
    });
    return acc;
  }

  function collectConversationHandoffs(convId) {
    const msgs = FL.mock.messages.filter(m => m.conversationId === convId);
    const seen = new Set();
    const out  = [];
    msgs.forEach(m => (m.draftIds || []).forEach(id => {
      if (seen.has(id)) return;
      seen.add(id);
      out.push(FL.mock.drafts.find(d => d.id === id) || { id, state: 'awaiting_approval' });
    }));
    return out;
  }

  function pickVocForConversation(convId) {
    const voc = FL.mock.voiceOfCustomerSamples;
    if (!voc || !voc.length) return null;
    const idx = hashIdx(convId, voc.length);
    return voc[idx];
  }
  function hashIdx(str, mod) { let h = 0; for (let i = 0; i < str.length; i++) h = (h * 31 + str.charCodeAt(i)) >>> 0; return h % mod; }

  /* ─── Wire interactions ─────────────────────────── */
  function wireAll() {
    // Agent click → activate handoff
    root.querySelectorAll('[data-agent]').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = btn.getAttribute('data-agent');
        state.activeAgent = (state.activeAgent === id) ? null : id;
        // If activating, pre-load skills from that agent
        if (state.activeAgent) {
          const ag = FL.mock.agents.find(a => a.id === id);
          if (ag && ag.skills) ag.skills.forEach(s => state.activeSkills.add(s));
        }
        render();
      });
    });

    // Skill pill click → toggle active
    root.querySelectorAll('[data-skill]').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = btn.getAttribute('data-skill');
        if (state.activeSkills.has(id)) state.activeSkills.delete(id);
        else state.activeSkills.add(id);
        render();
      });
    });

    // Skill search input
    const search = root.querySelector('.fl-ch-skill-search');
    if (search) {
      search.addEventListener('input', e => { state.skillSearch = e.target.value; render(); });
    }

    // Suggest grid picks → populate composer
    root.querySelectorAll('[data-suggest]').forEach(btn => {
      btn.addEventListener('click', () => {
        const titleEl = btn.querySelector('.fl-sg__title');
        const text = titleEl ? titleEl.textContent : '';
        const ta = root.querySelector('.fl-composer__input');
        if (ta) { ta.value = text; ta.focus(); ta.dispatchEvent(new Event('input')); }
      });
    });

    // Composer
    const composer = root.querySelector('.fl-composer');
    if (composer) {
      W.wireChatComposer(composer, {
        onSend: text => handleSend(text),
        onSkillRemove: id => { state.activeSkills.delete(id); render(); },
        onAgentRemove: () => { state.activeAgent = null; render(); }
      });
    }

    // Message actions menu
    const msgsRoot = root.querySelector('.fl-ch-messages');
    if (msgsRoot) {
      W.wireMessageActionsMenu(msgsRoot, {
        onAction: (msgId, action) => handleMessageAction(msgId, action)
      });
    }

    // Provenance superscripts ↔ GroundedInBlock cross-highlight
    root.querySelectorAll('.fl-prov-sup').forEach(sup => {
      const evId = sup.getAttribute('data-evidence');
      const activate = () => {
        const matchingMsg = FL.mock.messages.find(m => (m.evidenceSpans || []).some(e => e.id === evId));
        const ev = matchingMsg && matchingMsg.evidenceSpans.find(e => e.id === evId);
        if (!ev) return;
        root.querySelectorAll('.fl-gin__row').forEach(r => {
          const id = r.getAttribute('data-evidence');
          r.classList.toggle('highlighted', id === ev.source);
        });
      };
      sup.addEventListener('mouseenter', activate);
      sup.addEventListener('focus', activate);
      sup.addEventListener('click', activate);
    });
  }

  /* ─── Handlers ──────────────────────────────────── */
  function handleSend(text) {
    const nowIso = new Date().toISOString();
    if (!state.convId) {
      // Create synthetic conversation
      const newId = 'cv_live_' + Date.now();
      const agentId = state.activeAgent || 'ag_cotizador';
      FL.mock.conversations.unshift({
        id: newId, tenantId: FL.session.tenantId, agentId,
        title: text.slice(0, 80) + (text.length > 80 ? '…' : ''),
        activeSkills: Array.from(state.activeSkills),
        startedAt: nowIso, lastMessageAt: nowIso, messageCount: 1, state: 'active'
      });
      FL.mock.messages.push({ id: 'msg_live_' + Date.now(), conversationId: newId, role: 'user', content: text, timestamp: nowIso });
      state.convId = newId;
      if (location.hash !== '#/chat/' + newId) {
        location.hash = '#/chat/' + newId; // triggers navigate
        return;
      }
      render();
      queueAgentReply(newId);
      return;
    }
    FL.mock.messages.push({ id: 'msg_live_' + Date.now(), conversationId: state.convId, role: 'user', content: text, timestamp: nowIso });
    render();
    queueAgentReply(state.convId);
  }

  function queueAgentReply(convId) {
    const replyDelay = 500;
    setTimeout(() => {
      const ts = new Date().toISOString();
      const msgId = 'msg_live_' + Date.now();
      FL.mock.messages.push({
        id: msgId, conversationId: convId, role: 'agent',
        content: 'Recibido (simulación). El agente procesaría el pedido con sus skills activos [E1], aplicaría policy checks y retornaría con un draft + provenance chain.',
        timestamp: ts,
        evidenceSpans: [{ id:'e_sim_' + Date.now(), source:'simulation', sourceVersion:ts.slice(0,10), line:'prototype_response', retrievalRunId:'r_sim', score:0.5, title:'Simulation placeholder' }],
        patternBadge: { kind: 'none' }
      });
      render();
      bus.emit('toast', { kind: 'info', message: 'Respuesta simulada · en producto real el agente aplica el skill + draft-first' });
    }, replyDelay);
  }

  function handleMessageAction(msgId, action) {
    const msg = FL.mock.messages.find(m => m.id === msgId);
    if (!msg) return;
    switch (action) {
      case 'copy':
        if (navigator.clipboard) navigator.clipboard.writeText((msg.content || '').replace(/<[^>]+>/g, ''));
        bus.emit('toast', { kind: 'success', message: 'Copiado al portapapeles' });
        break;
      case 'iterate':
        state.iterating = msgId;
        showIterationComposer(msgId, msg.content || '');
        break;
      case 'handoff':
        bus.emit('toast', { kind: 'info', message: 'Handoff · abrir panel de agentes en left column' });
        break;
      case 'open_draft':
        if (msg.draftIds && msg.draftIds.length) location.hash = '#/bandeja/' + msg.draftIds[0];
        else bus.emit('toast', { kind: 'warn', message: 'Este mensaje no generó draft' });
        break;
      case 'explain_evidence':
        bus.emit('toast', { kind: 'info', message: 'Evidencia detallada · panel derecho (Grounded in)' });
        break;
      case 'consolidate':
        location.hash = '#/consolidaciones';
        break;
      case 'feedback':
        W.openFeedbackModal(msg.id);
        break;
      case 'rerun':
        bus.emit('toast', { kind: 'info', message: 'Rerun simulado · produciría nueva agent message' });
        break;
    }
  }

  function showIterationComposer(msgId, original) {
    const article = root.querySelector('[data-msg="' + msgId + '"]');
    if (!article) return;
    // Remove previously mounted iteration composer
    root.querySelectorAll('.fl-iter').forEach(e => e.remove());
    const html = W.iterationComposer({ messageId: msgId, originalText: stripHtml(original) });
    article.insertAdjacentHTML('afterend', html);
    const iter = root.querySelector('.fl-iter');
    W.wireIterationComposer(iter, {
      onIterate: text => {
        const orig = FL.mock.messages.find(m => m.id === msgId);
        if (!orig) return;
        FL.mock.messages.push({
          id: 'msg_live_' + Date.now(), conversationId: orig.conversationId, role: 'agent',
          content: text, timestamp: new Date().toISOString(),
          iterationOf: msgId, patternBadge: { kind: 'none' }
        });
        state.iterating = null;
        render();
        bus.emit('toast', { kind: 'success', message: i18n.t('chat.iterate_n') + ' registrada' });
      },
      onCancel: () => { state.iterating = null; if (iter && iter.parentNode) iter.remove(); }
    });
  }

  function stripHtml(s) { return String(s || '').replace(/<[^>]+>/g, ''); }

  function iterateLastAgentMessage() {
    if (!state || !state.convId) return;
    const msgs = FL.mock.messages.filter(m => m.conversationId === state.convId && m.role === 'agent');
    if (!msgs.length) return;
    handleMessageAction(msgs[msgs.length - 1].id, 'iterate');
  }

  function focusSkillSearch() {
    const el = root && root.querySelector('.fl-ch-skill-search');
    if (el) el.focus();
  }

  /* ─── Styles ───────────────────────────────────── */
  function injectStyles() {
    if (document.getElementById('ch-styles')) return;
    const s = document.createElement('style'); s.id = 'ch-styles';
    s.textContent = `
/* [V4-PATCH 2026-04-22] Cold Start banner positioning */
.fl-chat-coldstart-wrap { position:relative; max-width:1600px; margin:0 auto var(--space-3); }
.fl-chat-coldstart__dismiss { position:absolute; top:var(--space-2); right:var(--space-3); font-size:18px; line-height:1; min-height:24px; padding:0 8px; }
.fl-chat-app { display:grid; grid-template-columns:280px 1fr 320px; gap:var(--space-4); max-width:1600px; height:calc(100vh - var(--topbar-h) - var(--space-8)); }
@media (max-width: 1180px) { .fl-chat-app { grid-template-columns:240px 1fr; } .fl-chat-right { display:none; } }
@media (max-width: 820px)  { .fl-chat-app { grid-template-columns:1fr; } .fl-chat-left { display:none; } }
.fl-chat-left, .fl-chat-right { display:flex; flex-direction:column; gap:var(--space-4); overflow-y:auto; padding-right:var(--space-2); }
.fl-chat-center { display:flex; flex-direction:column; background:var(--bg-surface); border:1px solid var(--stroke-default); border-radius:var(--radius-lg); overflow:hidden; min-width:0; }

.fl-ch-section { background:var(--bg-surface); border:1px solid var(--stroke-default); border-radius:var(--radius-lg); padding:var(--space-3); display:flex; flex-direction:column; gap:var(--space-2); }

.fl-ch-agent:hover { background:var(--bg-surface); border-color:var(--stroke-default); }
.fl-ch-agent--active { background:var(--status-info-soft); border-color:var(--status-info); }

.fl-ch-recent__item:hover { background:var(--bg-surface); border-color:var(--stroke-default); }
.fl-ch-recent__item--active { background:var(--accent-primary-soft); border-color:var(--accent-primary); }
.fl-ch-recent__title { font-weight:500; }

.fl-ch-header { padding:var(--space-4) var(--space-5); border-bottom:1px solid var(--stroke-default); display:flex; justify-content:space-between; align-items:flex-start; gap:var(--space-3); }
.fl-ch-header__title h2 { margin:0 0 var(--space-1); }
.fl-ch-header__agent { display:flex; align-items:center; gap:var(--space-1); flex-wrap:wrap; }

.fl-ch-messages { flex:1; overflow-y:auto; padding:var(--space-4) var(--space-5); display:flex; flex-direction:column; gap:var(--space-4); }
.fl-ch-msg { display:flex; flex-direction:column; gap:var(--space-2); max-width:720px; }

.fl-ch-msg--agent .fl-ch-msg__body { background:var(--bg-subtle); border:1px solid var(--stroke-default); color:var(--text-primary); padding:var(--space-3); border-radius:var(--radius-lg); border-bottom-left-radius:2px; }
.fl-ch-msg--iter .fl-ch-msg__body { border-left:3px solid var(--accent-primary); }
.fl-ch-msg__head { display:flex; align-items:center; gap:var(--space-2); font-size:12px; }

.fl-ch-msg__iter-badge { font-size:10px; }

.fl-draft-pill:hover { background:var(--bg-subtle); }

.fl-ch-composer-wrap { padding:var(--space-3) var(--space-4); border-top:1px solid var(--stroke-default); background:var(--bg-surface-raised, var(--bg-subtle)); }

.fl-ch-empty { flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center; padding:var(--space-8) var(--space-5); gap:var(--space-3); text-align:center; }
.fl-ch-empty h1 { margin:0; }
.fl-ch-empty__suggest { margin-top:var(--space-5); width:100%; max-width:780px; }

    `;
    document.head.appendChild(s);
  }

  FL.modules['chat'] = { mount, meta: { route: '/chat', needsRole: ['operator','admin','owner'] } };
})();

<script>
/* ═══════════════════════════════════════════════════════════════
   [V3.5-PATCH 2026-04-19] · 19_module_agent_list.html.fragment
   Lista de agentes + CTA Crear (cierre B1 gap #5 · génesis)
   ═══════════════════════════════════════════════════════════════ */
(function () {
  const FL = window.__faberloom; if (!FL) return;
  const W = FL.widgets, i18n = FL.i18n, bus = FL.bus;
  let root = null;
  let state = { filterTier: 'all', filterStatus: 'all' };

  function mount(slot) {
    root = slot;
    injectStyles();
    render();
    return { unmount: () => { if (root) root.innerHTML = ''; } };
  }

  function render() {
    const t = k => i18n.t(k);
    const agents = (FL.mock.agents || []).filter(a => {
      if (state.filterTier !== 'all' && a.tier !== state.filterTier) return false;
      if (state.filterStatus !== 'all' && (a.lifecycleStatus || 'active') !== state.filterStatus) return false;
      return true;
    });

    const tierOpts = ['all','demo-critical','hot','cold','internal','experimental'].map(o => '<option value="' + o + '"' + (state.filterTier === o ? ' selected' : '') + '>' + o + '</option>').join('');
    const statusOpts = ['all','active','shadow','paused','retired'].map(o => '<option value="' + o + '"' + (state.filterStatus === o ? ' selected' : '') + '>' + o + '</option>').join('');

    const canCreate = FL.session.role === 'owner' || FL.session.role === 'admin';

    root.innerHTML =
      '<div class="al-wrap">' +
      '<header class="al-head">' +
        '<div><h1 class="t-display-md">' + t('nav.agentes') + '</h1>' +
        '<p class="t-body-md muted">' + agents.length + ' agentes · A4 P1 (AgentSpec / AgentRuntime / AgentMemory) · 7 fields per spec</p></div>' +
        (canCreate ? '<button class="btn btn-primary" data-act="create">＋ ' + t('agents.create_btn', 'Crear agente') + '</button>' : '<span class="muted t-body-sm">Sin permiso para crear (' + FL.session.role + ')</span>') +
      '</header>' +
      '<div class="al-filters card">' +
        '<label><span class="t-label-sm">Tier</span><select class="select" data-f="filterTier">' + tierOpts + '</select></label>' +
        '<label><span class="t-label-sm">Estado</span><select class="select" data-f="filterStatus">' + statusOpts + '</select></label>' +
      '</div>' +
      (agents.length === 0
        ? W.emptyState({ title:'Sin agentes con esos filtros', icon:'○' })
        : '<table class="al-table">' +
          '<thead><tr>' +
            /* [V4-PATCH 2026-04-22] Origin column (Sealed/Open) */
            '<th>Nombre</th><th>Origen</th><th>Spec</th><th>Tier</th><th>Autonomía</th><th>Termómetro</th><th>Runs 7d</th><th>Estado</th><th>Acciones</th>' +
          '</tr></thead>' +
          '<tbody>' + agents.map(a => {
            const statusClass = a.lifecycleStatus === 'active' ? 'chip-success' : a.lifecycleStatus === 'shadow' ? 'chip-info' : a.lifecycleStatus === 'paused' ? 'chip-warning' : '';
            const therm = a.thermometer && a.thermometer.state ? W.thermometer(a.thermometer.state, a.thermometer.value) : '<span class="muted">—</span>';
            const sparkD = (FL.mock.availableAgents || []).find(x => x.id === a.id);
            const spark = sparkD && sparkD.sparklineData ? W.sparkline(sparkD.sparklineData) : '';
            /* [V4-PATCH 2026-04-22] Sealed/Open badge + Fork-to-Open CTA */
            const flags = (FL.mock.sealedOpenFlags && FL.mock.sealedOpenFlags.agents && FL.mock.sealedOpenFlags.agents[a.id]) || { origin:'open' };
            const sealedBadge = W.sealedOpenBadge(flags.origin, { compact:true });
            const forkCta = flags.origin === 'sealed' ? W.forkToOpenCta(a.id, 'agent') : '';
            return '<tr data-id="' + a.id + '">' +
              '<td><a href="#/agentes/' + a.id + '" class="al-name">' + a.name + '</a><div class="t-body-sm muted">' + (a.triggerWord || '—') + ' · <span class="chip" style="font-size:10px;">' + (a.triggerKind || 'word') + '</span></div></td>' +
              '<td>' + sealedBadge + '</td>' +
              '<td class="mono"><code>v' + (a.specVersion || '?') + '</code></td>' +
              '<td><span class="chip">' + (a.tier || '—') + '</span></td>' +
              '<td><span class="chip" style="background:var(--autonomy-' + (a.autonomy || 'l0').toLowerCase() + ');color:#fff;">' + (a.autonomy || 'L0') + '</span> <span class="muted t-body-sm">/ ceiling ' + (a.autonomyCeiling || 'L1') + '</span></td>' +
              '<td>' + therm + '</td>' +
              '<td>' + (sparkD ? sparkD.runsLast7d : 0) + ' ' + spark + '</td>' +
              '<td><span class="chip ' + statusClass + '">' + (a.lifecycleStatus || 'active') + '</span></td>' +
              '<td>' +
                '<a class="btn btn-sm" href="#/agentes/' + a.id + '">Ver</a> ' +
                (forkCta ? forkCta + ' ' : '') +
                (canCreate ? '<button class="btn btn-sm" data-act="clone" data-id="' + a.id + '" title="Clonar">⎘</button> ' +
                             '<button class="btn btn-sm" data-act="lifecycle" data-id="' + a.id + '" title="Lifecycle">⋯</button>' : '') +
              '</td>' +
            '</tr>';
          }).join('') + '</tbody></table>') +
      '</div>';

    /* wire */
    root.querySelectorAll('[data-f]').forEach(sel => {
      sel.addEventListener('change', e => { state[sel.getAttribute('data-f')] = e.target.value; render(); });
    });
    const create = root.querySelector('[data-act="create"]');
    if (create) create.addEventListener('click', () => openCreateWizard());
    root.querySelectorAll('[data-act="clone"]').forEach(b => {
      b.addEventListener('click', () => openCloneWizard(b.getAttribute('data-id')));
    });
    root.querySelectorAll('[data-act="lifecycle"]').forEach(b => {
      b.addEventListener('click', () => openLifecycleMenu(b, b.getAttribute('data-id')));
    });
    /* [V4-PATCH 2026-04-22] Fork-to-Open wiring */
    W.wireForkCta && W.wireForkCta(root, (entityId) => {
      FL.mock.auditEvents && FL.mock.auditEvents.unshift({
        id:'ae_' + Date.now(), ts:new Date().toISOString(), actorId:FL.session.userId,
        kind:'agent_fork_to_open', level:'INFO', resourceType:'agent_spec', resourceId:entityId,
        summary:'Agent ' + entityId + ' forkeado a Open desde lista · reset L0 Shadow · memoria aislada'
      });
      render();
    });
  }

  function openCreateWizard() {
    W.openAgentSpecWizard({
      mode: 'create',
      onSubmit: spec => {
        const newId = 'ag_' + (spec.name || 'nuevo').toLowerCase().replace(/[^a-z0-9]+/g, '_').slice(0, 20) + '_' + Date.now().toString(36);
        const newAgent = Object.assign({}, spec, {
          id: newId, tenantId: FL.session.tenantId,
          autonomy: 'L0',
          state: 'shadow', lifecycleStatus: 'shadow',
          kpis: { runs30d: 0, approvalRate: 0, avgLatencyMin: 0, failRate: 0, costUSD30d: 0 },
          memory: { runSession: 0, orgAccount: 0, curated: 0 },
          thermometer: { value: 0, state: 'cold' },
          unlockCriterion: 'Pendiente ≥3 runs SHADOW + >70% approval (A4)',
          specVersion: '1.0.0',
          specSupersedes: null,
          createdAt: new Date().toISOString().slice(0, 10),
          createdBy: FL.session.userId
        });
        FL.mock.agents.push(newAgent);
        FL.mock.agentSpecVersions.push({
          id: 'asv_' + Date.now(), agentId: newId, specVersion: '1.0.0',
          publishedAt: new Date().toISOString(), publishedBy: FL.session.userId,
          supersedes: null, changeNote: 'Initial spec creation via wizard'
        });
        FL.mock.auditEvents.unshift({
          id:'ae_' + Date.now(), ts:new Date().toISOString(), tenantId:FL.session.tenantId,
          actor:FL.session.userId, action:'agent_spec.created', target:newId,
          severity:'INFO', ip:'10.0.0.1', userAgent:'FaberLoom/1.0',
          afterState: JSON.stringify({ name: spec.name, autonomy: 'L0', autonomyCeiling: spec.autonomyCeiling })
        });
        bus.emit('toast', { kind:'success', message:'✓ Agente "' + spec.name + '" creado · L0 SHADOW · audit_event agent_spec.created' });
        render();
      }
    });
  }

  function openCloneWizard(agentId) {
    const orig = FL.mock.agents.find(a => a.id === agentId);
    if (!orig) return;
    W.openAgentSpecWizard({
      mode: 'clone',
      initial: Object.assign({}, orig, { id: null }),
      onSubmit: spec => openCreateWizard.call(null) /* re-route through create flow */
    });
  }

  function openLifecycleMenu(btn, agentId) {
    const a = FL.mock.agents.find(x => x.id === agentId);
    if (!a) return;
    const status = a.lifecycleStatus || 'active';
    const choices = [];
    if (status === 'active') choices.push({ k:'pause',  label:'⏸ Pausar' });
    if (status === 'paused' || status === 'shadow') choices.push({ k:'resume', label:'▶ Reactivar' });
    choices.push({ k:'edit',   label:'✎ Editar AgentSpec' });
    choices.push({ k:'clone',  label:'⎘ Clonar' });
    if (status !== 'retired') choices.push({ k:'retire', label:'🗑 Retirar (soft)' });

    /* Render simple inline dropdown next to button */
    const existing = document.querySelector('.al-lifemenu'); if (existing) existing.remove();
    const menu = document.createElement('div');
    menu.className = 'al-lifemenu';
    menu.style.position = 'absolute';
    const rect = btn.getBoundingClientRect();
    menu.style.top = (rect.bottom + window.scrollY + 4) + 'px';
    menu.style.left = (rect.left + window.scrollX - 100) + 'px';
    menu.innerHTML = choices.map(c => '<button class="al-lifemenu__item" data-life="' + c.k + '">' + c.label + '</button>').join('');
    document.body.appendChild(menu);
    setTimeout(() => {
      const close = () => { menu.remove(); document.removeEventListener('click', close); };
      document.addEventListener('click', close);
    }, 50);
    menu.querySelectorAll('[data-life]').forEach(it => {
      it.addEventListener('click', e => {
        e.stopPropagation();
        handleLifecycle(it.getAttribute('data-life'), agentId);
        menu.remove();
      });
    });
  }

  function handleLifecycle(action, agentId) {
    const a = FL.mock.agents.find(x => x.id === agentId);
    if (!a) return;
    if (action === 'pause') { a.lifecycleStatus = 'paused'; logAudit(agentId, 'agent_spec.paused'); bus.emit('toast', { kind:'info', message:'Agente pausado · no genera nuevos drafts' }); render(); return; }
    if (action === 'resume') { a.lifecycleStatus = 'active'; logAudit(agentId, 'agent_spec.resumed'); bus.emit('toast', { kind:'success', message:'Agente reactivado' }); render(); return; }
    if (action === 'retire') {
      if (!confirm('Retirar agente "' + a.name + '"? Soft retire — no se borra, queda con status retired y audit_event registrado.')) return;
      a.lifecycleStatus = 'retired'; logAudit(agentId, 'agent_spec.retired');
      bus.emit('toast', { kind:'warn', message:'Agente retirado · audit_event agent_spec.retired registrado' });
      render(); return;
    }
    if (action === 'clone') { openCloneWizard(agentId); return; }
    if (action === 'edit') {
      W.openAgentSpecWizard({
        mode: 'edit', initial: a,
        onSubmit: spec => {
          const newVersion = bumpVersion(a.specVersion || '1.0.0');
          a.specSupersedes = a.specVersion;
          a.specVersion = newVersion;
          Object.assign(a, spec);
          FL.mock.agentSpecVersions.push({
            id:'asv_' + Date.now(), agentId, specVersion:newVersion,
            publishedAt:new Date().toISOString(), publishedBy:FL.session.userId,
            supersedes:a.specSupersedes, changeNote:'Edit via wizard (v' + a.specSupersedes + ' → v' + newVersion + ')'
          });
          logAudit(agentId, 'agent_spec.published');
          bus.emit('toast', { kind:'success', message:'✓ AgentSpec publicada v' + newVersion + ' · supersedes v' + a.specSupersedes });
          render();
        }
      });
    }
  }

  function bumpVersion(v) {
    const parts = String(v).split('.');
    parts[parts.length - 1] = String(parseInt(parts[parts.length - 1] || '0', 10) + 1);
    return parts.join('.');
  }

  function logAudit(agentId, action) {
    FL.mock.auditEvents.unshift({
      id:'ae_' + Date.now(), ts:new Date().toISOString(), tenantId:FL.session.tenantId,
      actor:FL.session.userId, action, target:agentId,
      severity:'INFO', ip:'10.0.0.1', userAgent:'FaberLoom/1.0'
    });
  }

  function injectStyles() {
    if (document.getElementById('al-styles')) return;
    const s = document.createElement('style'); s.id = 'al-styles';
    s.textContent = `
.al-wrap { display:flex; flex-direction:column; gap:var(--space-4); max-width:1400px; }
.al-head { display:flex; justify-content:space-between; align-items:flex-end; gap:var(--space-3); flex-wrap:wrap; }
.al-head h1 { margin:0 0 var(--space-1); }
.al-filters { display:flex; gap:var(--space-3); padding:var(--space-3); }
.al-filters label { display:flex; flex-direction:column; gap:var(--space-1); min-width:160px; }
.al-table { width:100%; border-collapse:collapse; background:var(--bg-surface); border:1px solid var(--stroke-default); border-radius:var(--radius-lg); overflow:hidden; font-size:13px; }
.al-table th, .al-table td { padding:var(--space-2) var(--space-3); text-align:left; border-bottom:1px solid var(--stroke-default); vertical-align:middle; }
.al-table th { font-size:11px; text-transform:uppercase; letter-spacing:0.04em; color:var(--text-muted); font-weight:600; background:var(--bg-subtle); }
.al-table tbody tr:hover { background:var(--bg-subtle); }
.al-name { color:var(--accent-primary); text-decoration:none; font-weight:500; }
.al-name:hover { text-decoration:underline; }
.al-lifemenu { background:var(--bg-surface); border:1px solid var(--stroke-default); border-radius:var(--radius-md); box-shadow:var(--shadow-float); padding:var(--space-1); z-index:var(--z-dropdown); min-width:180px; }
.al-lifemenu__item { display:block; width:100%; text-align:left; padding:var(--space-1) var(--space-2); background:transparent; border:0; cursor:pointer; font:inherit; font-size:13px; border-radius:var(--radius-sm); color:var(--text-primary); }
.al-lifemenu__item:hover { background:var(--bg-subtle); }
    `;
    document.head.appendChild(s);
  }

  FL.modules['agent-list'] = { mount, meta: { route: '/agentes' } };
})();

  function openPromoteModal() {
    let step = 1;

    if (!chunk) {

    const t = k => i18n.t(k);

    function renderModal() {
      const body = step === 1 ? renderStep1() : step === 2 ? renderStep2() : renderStep3();

        '</div>',
        { width: 640 }
      );
      wireStep();
    }

        '<div class="t-body-sm muted" style="margin-top:var(--space-2);">Nota: promoviendo NO borra el chunk original (versionado via <code>supersedes_chunk_id</code> per A5 canon).</div>'

    function renderStep2() {
      return (

      if (state.actor !== 'all' && e.actor !== state.actor) return false;
      if (state.action && !e.action.includes(state.action)) return false;
      return true;
    });
  }

  function render() {
    const t = k => i18n.t(k);
    const events = filtered();
    const pageEvents = events.slice(state.page * PAGE_SIZE, (state.page + 1) * PAGE_SIZE);
    const actors = ['all'].concat(Array.from(new Set(FL.mock.auditEvents.map(e => e.actor))));
    const sevOpts = ['all','INFO','WARN','ERROR','POLICY'];

    root.querySelectorAll('[data-f]').forEach(el => {
      el.value = state[el.getAttribute('data-f')] || '';

        state[el.getAttribute('data-f')] = ev.target.value; state.page = 0; render();
      });
    });
    const pv = root.querySelector('[data-p="prev"]'), nx = root.querySelector('[data-p="next"]');
