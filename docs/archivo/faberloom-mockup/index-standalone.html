  const W = FL.widgets, i18n = FL.i18n;
  /* [V3-PATCH 2026-04-19] polymorphic bandeja: 12 item kinds + saved-views */
  let state = { view: 'attention', filterState: 'all', filterAgent: 'all', filterEntity: 'all', selected: new Set() };
  let root = null;

  /* Item kind config: icon, color var, label key, route prefix */
  const KIND_CFG = {
    draft:             { icon:'✎',  color:'var(--draft-pending)',     labelKey:'bandeja.kind.draft',             pfx:'#/bandeja/' },
    inbound_email:     { icon:'✉',  color:'var(--brand-sky)',          labelKey:'bandeja.kind.inbound_email',     pfx:'#/bandeja/' },
    inbound_msg:       { icon:'💬', color:'var(--brand-lilac)',        labelKey:'bandeja.kind.inbound_msg',       pfx:'#/bandeja/' },
    crm_event:         { icon:'⚲',  color:'var(--brand-amber)',        labelKey:'bandeja.kind.crm_event',         pfx:'#/bandeja/' },
    alert:             { icon:'⚠',  color:'var(--status-warning)',     labelKey:'bandeja.kind.alert',             pfx:'#/bandeja/' },
    approval_request:  { icon:'⚏',  color:'var(--brand-coral)',        labelKey:'bandeja.kind.approval_request',  pfx:'#/bandeja/' },
    escalation:        { icon:'↑',  color:'var(--brand-evidence)',     labelKey:'bandeja.kind.escalation',        pfx:'#/bandeja/' },
    feedback_reply:    { icon:'⤷',  color:'var(--brand-sage)',          labelKey:'bandeja.kind.feedback_reply',    pfx:'#/bandeja/' },
    sla_timer:         { icon:'⌚', color:'var(--status-warning)',     labelKey:'bandeja.kind.sla_timer',         pfx:'#/bandeja/' },
    webhook:           { icon:'⚡', color:'var(--brand-mist)',          labelKey:'bandeja.kind.webhook',           pfx:'#/bandeja/' },
    audit_alert:       { icon:'🔒', color:'var(--brand-evidence)',     labelKey:'bandeja.kind.audit_alert',       pfx:'#/bandeja/' },
    task:              { icon:'☐',  color:'var(--brand-sage)',          labelKey:'bandeja.kind.task',              pfx:'#/bandeja/' }
  };

  /* Saved views: filter predicate per view */
  const VIEWS = {
    attention: { labelKey:'bandeja.view.attention', icon:'⚡', pred:i => i.urgency >= 2 },
    triage:    { labelKey:'bandeja.view.triage',    icon:'⊕', pred:i => i._raw.state === 'untriaged' || i.kind === 'inbound_email' || i.kind === 'inbound_msg' },
    approve:   { labelKey:'bandeja.view.approve',   icon:'✓', pred:i => i.kind === 'draft' && (i._raw.state === 'awaiting_approval') },
    mine:      { labelKey:'bandeja.view.mine',      icon:'◎', pred:i => (i._raw.assignedTo === FL.session.userId) || (i.kind === 'draft' && i._raw.tenantId === FL.session.tenantId) },
    team:      { labelKey:'bandeja.view.team',      icon:'⚙', pred:i => true },
    all:       { labelKey:'common.view',            icon:'≡', pred:i => true }
  };

  function mount(slot, ctx) {
    root = slot;
    injectStyles();
    /* parse ?view=X from URL */
    if (ctx && ctx.query && ctx.query.view && VIEWS[ctx.query.view]) state.view = ctx.query.view;
    render();
    return { unmount: () => { if (root) root.innerHTML = ''; } };
  }

  /* Unified item normalizer: drafts + inboxItems → common shape */
  function unifiedItems() {
    const items = [];
    /* drafts as kind='draft' */
    (FL.mock.drafts || []).forEach(d => {
      const ag = FL.mock.agents.find(a => a.id === d.agentId);
      items.push({
        id:        d.id,
        kind:      'draft',
        subject:   d.subject || '—',
        sender:    ag ? ag.name : '—',
        recipient: (d.recipient && d.recipient.name) || '—',
        state:     d.state,
        risk:      d.action,
        createdAt: d.createdAt,
        urgency:   urgencyDraft(d),
        agentId:   d.agentId,
        businessEntityId: d.businessEntityId,
        _raw:      d
      });
    });
    /* inbox items */
    (FL.mock.inboxItems || []).forEach(i => {
      /* visibility filter: audit_alert solo admin/owner */
      if (i.visibleToRoles && i.visibleToRoles.indexOf(FL.session.role) < 0) return;
      items.push({
        id:        i.id,
        kind:      i.kind,
        subject:   i.subject,
        sender:    (i.from && i.from.name) || '—',
        recipient: (i.from && (i.from.email || i.from.phone || i.from.channel)) || '—',
        state:     i.state,
        priority:  i.priority,
        risk:      null,
        createdAt: i.receivedAt || i.createdAt,
        dueAt:     i.dueAt,
        urgency:   urgencyInbox(i),
        agentId:   i.assignedAgentId || (i.from && i.from.agentId) || null,
        businessEntityId: i.businessEntityId,
        _raw:      i
      });
    });
    return items;
  }

  function urgencyDraft(d) {
    if (d.state === 'failed' || d.state === 'escalated' || d.state === 'blocked') return 3;
    if (d.action && String(d.action.reversibility || '').startsWith('irreversible')) return 3;
    if (d.state === 'awaiting_approval') return 2;
    return 1;
  }
  function urgencyInbox(i) {
    if (i.priority === 'high') return 3;
    if (i.priority === 'normal') return 2;
    return 1;
  }

  function render() {
    const t = k => i18n.t(k);
    const all = unifiedItems();
    /* apply saved-view filter first */
    let items = all.filter(VIEWS[state.view].pred);
    /* then secondary filters */
    items = items.filter(i => {
      if (state.filterState !== 'all' && i.state !== state.filterState) return false;
      if (state.filterAgent !== 'all' && i.agentId !== state.filterAgent) return false;
      if (state.filterEntity !== 'all' && i.businessEntityId !== state.filterEntity) return false;
      return true;
    });
    /* sort by urgency desc, then by age desc */
    items.sort((a, b) => (b.urgency - a.urgency) || (Date.parse(b.createdAt || 0) - Date.parse(a.createdAt || 0)));

    /* segments / saved-view tabs */
    const segments = Object.keys(VIEWS).map(v => {
      const cnt = all.filter(VIEWS[v].pred).length;
      return '<button class="bl-seg' + (state.view === v ? ' bl-seg--active' : '') + '" data-view="' + v + '">' +
        '<span aria-hidden="true">' + VIEWS[v].icon + '</span> ' + t(VIEWS[v].labelKey) +
        ' <span class="bl-seg__cnt">' + cnt + '</span></button>';
    }).join('');

    const agentOpts = '<option value="all">— Todos —</option>' + FL.mock.agents.map(a => '<option value="' + a.id + '">' + a.name + '</option>').join('');
    const stateOpts = '<option value="all">— Todos —</option>' + ['drafting','awaiting_approval','approved','executing','waiting_external_signal','blocked','completed','failed','escalated','rejected','untriaged','assigned','pending','pending_my_approval','acknowledged'].map(s => '<option value="' + s + '">' + i18n.t('states.' + s, s) + '</option>').join('');
    const entityOpts = '<option value="all">— Todos —</option>' + FL.mock.businessEntities.map(b => '<option value="' + b.id + '">' + b.name + '</option>').join('');

    root.innerHTML =
      '<div class="bl-wrap">' +
      '<header class="bl-head">' +
        '<h1 class="t-display-md">' + t('bandeja.title') + '</h1>' +
        '<p class="t-body-md muted">' + t('bandeja.subtitle_v3', 'Workspace unificado · 12 tipos de items + saved views') + '</p>' +
      '</header>' +
      '<div class="bl-segments" role="tablist">' + segments + '</div>' +
      '<div class="bl-filters card">' +
        '<label><span class="t-label-sm">' + t('bandeja.filter_state') + '</span><select class="select" data-f="filterState">' + stateOpts + '</select></label>' +
        '<label><span class="t-label-sm">' + t('bandeja.filter_agent') + '</span><select class="select" data-f="filterAgent">' + agentOpts + '</select></label>' +
        '<label><span class="t-label-sm">' + t('bandeja.filter_entity') + '</span><select class="select" data-f="filterEntity">' + entityOpts + '</select></label>' +
      '</div>' +
      (state.selected.size > 0 ? (
        '<div class="bl-bulk">' +
        '<span class="t-label-sm">' + state.selected.size + ' ' + t('bulk.select_all', 'seleccionados') + '</span>' +
        '<button class="btn btn-sm btn-primary" data-bulk="approve">' + t('bulk.approve_selected', 'Aprobar seleccionados') + '</button>' +
        '<button class="btn btn-sm btn-ghost" data-bulk="clear">' + t('common.clear') + '</button>' +
        '</div>'
      ) : '') +
      (items.length === 0
        ? W.emptyState({ title: t('bandeja.empty_filtered'), icon: '○' })
        : '<table class="bl-table">' +
            '<thead><tr>' +
              '<th style="width:28px;"><input type="checkbox" data-check-all aria-label="' + t('bulk.select_all') + '" /></th>' +
              '<th style="width:24px;"></th>' +
              '<th>' + t('bandeja.col_kind', 'Tipo') + '</th>' +
              '<th>' + t('bandeja.col_subject') + '</th>' +
              '<th>' + t('bandeja.col_state') + '</th>' +
              '<th>' + t('bandeja.col_risk') + '</th>' +
              '<th>' + t('bandeja.col_sender', 'Origen') + '</th>' +
              '<th>' + t('bandeja.col_age') + '</th>' +
              '<th>' + t('bandeja.col_actions') + '</th>' +
            '</tr></thead>' +
            '<tbody>' + items.map(it => {
              const cfg = KIND_CFG[it.kind] || KIND_CFG.draft;
              const age = ageMin(it.createdAt);
              const checked = state.selected.has(it.id) ? 'checked' : '';
              const checkable = it.kind === 'draft';
              const stateBadge = (it.kind === 'draft') ? W.draftStateBadge(it.state) : '<span class="chip" style="border-color:' + cfg.color + ';color:' + cfg.color + ';">' + (i18n.t('states.' + it.state, it.state) || '—') + '</span>';
              const urgencyDot = it.urgency >= 3 ? '<span class="bl-urg bl-urg--3" title="Urgencia alta">●</span>' : it.urgency === 2 ? '<span class="bl-urg bl-urg--2" title="Urgencia media">●</span>' : '<span class="bl-urg bl-urg--1" title="Urgencia baja">○</span>';
              return '<tr data-id="' + it.id + '" data-kind="' + it.kind + '" class="' + (state.selected.has(it.id) ? 'bl-row--sel' : '') + '" style="border-left:3px solid ' + cfg.color + ';">' +
                '<td>' + (checkable ? '<input type="checkbox" data-row-check="' + it.id + '" ' + checked + ' aria-label="Seleccionar ' + it.id + '" />' : '') + '</td>' +
                '<td>' + urgencyDot + '</td>' +
                '<td><span class="bl-kind" style="color:' + cfg.color + ';">' + cfg.icon + ' ' + t(cfg.labelKey) + '</span></td>' +
                '<td class="bl-subject">' + it.subject + '</td>' +
                '<td>' + stateBadge + '</td>' +
                '<td>' + (it.risk ? W.riskBadge(it.risk) : '<span class="muted">—</span>') + '</td>' +
                '<td class="bl-recipient muted">' + it.sender + '</td>' +
                '<td class="mono muted">' + age + '</td>' +
                '<td><a class="btn btn-sm" href="' + cfg.pfx + it.id + '">' + t('common.view') + '</a></td>' +
              '</tr>';
            }).join('') + '</tbody>' +
          '</table>') +
      '</div>';

    /* segment clicks */
    root.querySelectorAll('[data-view]').forEach(b => {
      b.addEventListener('click', () => {
        state.view = b.getAttribute('data-view');
        /* update URL hash query */
        const newHash = '#/bandeja?view=' + state.view;
        if (location.hash !== newHash) { location.hash = newHash; }
        render();
      });
    });

    root.querySelectorAll('[data-f]').forEach(sel => {
      sel.value = state[sel.getAttribute('data-f')];
      sel.addEventListener('change', e => { state[sel.getAttribute('data-f')] = e.target.value; render(); });
    });

    /* checkbox wiring (drafts only) */
    root.querySelectorAll('[data-row-check]').forEach(cb => {
      cb.addEventListener('change', e => {
        const id = cb.getAttribute('data-row-check');
        if (e.target.checked) state.selected.add(id); else state.selected.delete(id);
        render();
      });
    });
    const checkAll = root.querySelector('[data-check-all]');
    if (checkAll) {
      const visibleDraftIds = items.filter(i => i.kind === 'draft').map(i => i.id);
      checkAll.checked = visibleDraftIds.length > 0 && visibleDraftIds.every(id => state.selected.has(id));
      checkAll.addEventListener('change', e => {
        if (e.target.checked) visibleDraftIds.forEach(id => state.selected.add(id));
        else visibleDraftIds.forEach(id => state.selected.delete(id));
        render();
      });
    }
    const bulkApprove = root.querySelector('[data-bulk="approve"]');
    if (bulkApprove) bulkApprove.addEventListener('click', () => handleBulkApprove());
    const bulkClear = root.querySelector('[data-bulk="clear"]');
    if (bulkClear) bulkClear.addEventListener('click', () => { state.selected.clear(); render(); });
  }

  /* [V2-PATCH 2026-04-19] bulk approve handler */
  function handleBulkApprove() {
    const ids = Array.from(state.selected);
    if (!ids.length) return;
    const selectedDrafts = ids.map(id => FL.mock.drafts.find(d => d.id === id)).filter(Boolean);
    const hasIrrev = selectedDrafts.some(d => d.action && String(d.action.reversibility || '').startsWith('irreversible'));
    const n = ids.length;
    const msg = hasIrrev
      ? i18n.t('bulk.confirm_bulk_irreversible', 'Drafts con acciones irreversibles. Confirmá.').replace('{n}', n)
      : i18n.t('bulk.confirm_bulk', 'Se aprobarán drafts. ¿Continuar?').replace('{n}', n);
    if (hasIrrev) {
      if (!confirm('⚠ ' + msg)) return;
      if (!confirm('Última confirmación para acciones irreversibles. Aprobar ' + n + ' drafts?')) return;
    } else {
      if (!confirm(msg)) return;
    }
    FL.bus.emit('drafts:bulk-approve', { ids });
    FL.bus.emit('toast', { kind: 'success', message: i18n.t('bulk.done', '{n} drafts aprobados').replace('{n}', n) });
    state.selected.clear();
    render();
  }

  function ageMin(iso) {
    if (!iso) return '—';
    const diffMs = Date.now() - Date.parse(iso);
    const min = Math.floor(diffMs / 60000);
    if (min < 60) return min + 'm';
    const h = Math.floor(min / 60);
    if (h < 24) return h + 'h';
    return Math.floor(h / 24) + 'd';
  }

  function injectStyles() {
    if (document.getElementById('bl-styles')) return;
    const s = document.createElement('style'); s.id = 'bl-styles';
    s.textContent = `
.bl-wrap { display:flex; flex-direction:column; gap:var(--space-4); max-width:1280px; }
.bl-head h1 { margin:0 0 var(--space-1) 0; }
.bl-filters { display:flex; gap:var(--space-4); flex-wrap:wrap; padding:var(--space-4); }
.bl-filters label { display:flex; flex-direction:column; gap:var(--space-1); min-width:180px; }
.bl-table { width:100%; border-collapse:collapse; background:var(--bg-surface); border:1px solid var(--stroke-default); border-radius:var(--radius-lg); overflow:hidden; }
.bl-table th, .bl-table td { padding:var(--space-3); text-align:left; border-bottom:1px solid var(--stroke-default); font-size:13px; }
.bl-table thead { background:var(--bg-subtle); }
.bl-table th { font-size:11px; letter-spacing:0.04em; text-transform:uppercase; color:var(--text-muted); font-weight:600; }
.bl-table tbody tr:hover { background:var(--bg-subtle); }
.bl-subject { font-weight:500; max-width:360px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.bl-recipient { max-width:180px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
/* [V2-PATCH 2026-04-19] bulk toolbar + selected row */
.bl-bulk { position:sticky; top:0; z-index:5; display:flex; align-items:center; gap:var(--space-2); padding:var(--space-2) var(--space-3); background:var(--accent-primary-soft); border:1px solid var(--accent-primary); border-radius:var(--radius-md); }
.bl-bulk .t-label-sm { color:var(--accent-primary); }
.bl-row--sel { background:var(--accent-primary-soft); }
.bl-row--sel td { border-bottom-color:var(--accent-primary); }
/* [V3-PATCH 2026-04-19] segments + polymorphic kind + urgency dot */
.bl-segments { display:flex; flex-wrap:wrap; gap:var(--space-1); padding:var(--space-1); background:var(--bg-subtle); border-radius:var(--radius-md); }
.bl-seg { display:inline-flex; align-items:center; gap:var(--space-1); padding:var(--space-1) var(--space-3); background:transparent; border:0; color:var(--text-secondary); cursor:pointer; border-radius:var(--radius-sm); font:inherit; font-size:13px; transition:background var(--dur-fast); }
.bl-seg:hover { background:var(--bg-surface); color:var(--text-primary); }
.bl-seg--active { background:var(--accent-primary); color:#fff; }
.bl-seg__cnt { background:rgba(0,0,0,0.12); padding:0 6px; border-radius:var(--radius-pill); font-size:11px; font-family:var(--font-mono); }
.bl-seg--active .bl-seg__cnt { background:rgba(255,255,255,0.22); }
.bl-kind { display:inline-flex; align-items:center; gap:var(--space-1); font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.04em; }
.bl-urg { font-size:10px; color:var(--text-muted); }
.bl-urg--3 { color:var(--status-danger); }
.bl-urg--2 { color:var(--status-warning); }
    `;
    document.head.appendChild(s);
  }

  FL.modules['bandeja-lista'] = { mount, meta: { route: '/bandeja' } };
})();
</script>

<script>
(function () {
  const FL = window.__faberloom;
  if (!FL) return;
  const W = FL.widgets, i18n = FL.i18n, bus = FL.bus;

  const MODULE_ID = 'bandeja-detail';
  let root = null;
  let unsubs = [];

  function mount(slot, ctx) {
    root = slot;
    injectStyles();
    const id = ctx.params.id || 'dr_001';
    /* [V3-PATCH 2026-04-19] polymorphic dispatch: draft or inbox item */
    const inbox = (FL.mock.inboxItems || []).find(i => i.id === id);
    if (inbox) {
      renderInboxItem(inbox);
      return { unmount };
    }
    const draft = FL.mock.drafts.find(d => d.id === id) || FL.mock.drafts[0];
    const agent = FL.mock.agents.find(a => a.id === draft.agentId) || { name: '—' };
    const action = FL.mock.actions.find(a => a.actionId === (draft.action && draft.action.actionId)) || draft.action || {};
    render(draft, agent, action);
    return { unmount };
  }

  /* [V3-PATCH 2026-04-19] Approval chain visualization (multi-actor) */
  function renderApprovalChain(draft) {
    const chain = (FL.mock.approvalChains || []).find(c => c.draftId === draft.id);
    if (!chain) return '';
    return (
      '<section class="bd-panel card" style="border-left:3px solid var(--brand-coral);">' +
      '<h3 class="t-heading-md">⚏ Approval chain (multi-actor)</h3>' +
      '<ol class="bd-chain">' + chain.steps.map(s => (
        '<li class="bd-chain-step bd-chain-step--' + s.state + '">' +
        '<span class="bd-chain-dot">' + (s.state === 'approved' ? '✓' : s.state === 'pending' ? '⏳' : '◯') + '</span>' +
        ' Paso ' + s.stepIdx + ': <strong>' + s.requiredRole + '</strong>' +
        (s.requiredUserId ? ' (<code>' + s.requiredUserId + '</code>)' : '') +
        ' · <span class="muted">' + s.state + '</span>' +
        (s.dueAt ? ' · due ' + s.dueAt.slice(11, 16) : '') +
        (s.approvedAt ? ' · ✓ ' + s.approvedAt.slice(11, 16) : '') +
        '</li>'
      )).join('') + '</ol>' +
      '<p class="muted t-body-sm" style="margin-top:var(--space-2);"><em>Razón: ' + chain.reason + '</em></p>' +
      '</section>'
    );
  }

  /* [V3-PATCH 2026-04-19] Action bundle preview (multi-output) */
  function renderActionBundle(draft) {
    const bundle = (FL.mock.actionBundles || []).find(b => b.draftId === draft.id);
    if (!bundle) return '';
    const irrev = String(bundle.aggregateRisk.reversibility || '').startsWith('irreversible');
    return (
      '<section class="bd-panel card" style="border-left:3px solid ' + (irrev ? 'var(--risk-irreversible)' : 'var(--risk-low)') + ';">' +
      '<h3 class="t-heading-md">📦 Action bundle · 1 aprobación → ' + bundle.actions.length + ' acciones atómicas</h3>' +
      '<div class="muted t-body-sm" style="margin-bottom:var(--space-3);">Riesgo agregado: <strong>' + bundle.aggregateRisk.reversibility + '</strong> · efectos: ' + bundle.aggregateRisk.side_effects.join(', ') + '</div>' +
      '<ol class="bd-bundle">' + bundle.actions.map((a, i) => (
        '<li class="bd-bundle-step">' +
        '<span class="bd-bundle-num">' + (i + 1) + '</span>' +
        '<div class="bd-bundle-body">' +
          '<div class="t-body-md"><code>' + a.actionId + '</code></div>' +
          '<div class="t-body-sm muted">' + a.description + ' · target: <code>' + a.target + '</code></div>' +
        '</div></li>'
      )).join('') + '</ol>' +
      (irrev ? '<p class="t-body-sm" style="color:var(--risk-irreversible);margin-top:var(--space-2);">⚠ Bundle con acción irreversible. Aprobación requiere doble confirmación.</p>' : '') +
      '</section>'
    );
  }

  /* [V3-PATCH 2026-04-19] Comments thread per draft */
  function renderComments(draft) {
    const cs = (FL.mock.comments || []).filter(c => c.parentItemId === draft.id);
    return (
      '<section class="bd-panel card">' +
      '<h3 class="t-heading-md">💬 Comments · ' + cs.length + '</h3>' +
      (cs.length
        ? '<ul class="bd-comments">' + cs.map(c => {
            const u = (FL.mock.users || []).find(x => x.id === c.authorUserId) || { name:'?' };
            return '<li class="bd-comment"><div class="bd-comment-head"><strong>' + u.name + '</strong> <span class="muted t-body-sm">· ' + c.createdAt.slice(11, 16) + '</span></div><div class="bd-comment-body">' + c.body + '</div></li>';
          }).join('') + '</ul>'
        : '<p class="muted t-body-sm">Sin comentarios. Sé el primero.</p>') +
      '<form class="bd-comment-add" data-bd-comment-add>' +
        '<input class="input" placeholder="Agregá un comentario… (@mention soportado)" />' +
        '<button class="btn btn-sm btn-primary" type="submit">Comentar</button>' +
      '</form>' +
      '</section>'
    );
  }

  /* [V3-PATCH 2026-04-19] Inbox-item renderer for non-draft kinds */
  function renderInboxItem(item) {
    const t = k => i18n.t(k);
    const KIND_CFG = {
      inbound_email:    { icon:'✉',  color:'var(--brand-sky)',       labelKey:'bandeja.kind.inbound_email' },
      inbound_msg:      { icon:'💬', color:'var(--brand-lilac)',     labelKey:'bandeja.kind.inbound_msg' },
      crm_event:        { icon:'⚲',  color:'var(--brand-amber)',     labelKey:'bandeja.kind.crm_event' },
      alert:            { icon:'⚠',  color:'var(--status-warning)',  labelKey:'bandeja.kind.alert' },
      approval_request: { icon:'⚏',  color:'var(--brand-coral)',     labelKey:'bandeja.kind.approval_request' },
      escalation:       { icon:'↑',  color:'var(--brand-evidence)',  labelKey:'bandeja.kind.escalation' },
      feedback_reply:   { icon:'⤷',  color:'var(--brand-sage)',       labelKey:'bandeja.kind.feedback_reply' },
      sla_timer:        { icon:'⌚', color:'var(--status-warning)',  labelKey:'bandeja.kind.sla_timer' },
      webhook:          { icon:'⚡', color:'var(--brand-mist)',       labelKey:'bandeja.kind.webhook' },
      audit_alert:      { icon:'🔒', color:'var(--brand-evidence)',  labelKey:'bandeja.kind.audit_alert' },
      task:             { icon:'☐',  color:'var(--brand-sage)',       labelKey:'bandeja.kind.task' }
    };
    const cfg = KIND_CFG[item.kind] || { icon:'•', color:'var(--text-muted)', labelKey:'common.view' };
    const attachments = (FL.mock.attachments || []).filter(a => a.parentItemId === item.id);
    const actions = inboxItemActions(item);
    const meta = renderInboxMeta(item);

    root.innerHTML =
      '<div class="bd-wrap">' +
      '<header class="bd-head">' +
        '<nav class="bd-crumbs"><a href="#/bandeja">' + t('bandeja.title') + '</a><span aria-hidden="true">/</span>' +
        '<code>' + item.id + '</code></nav>' +
        '<div class="bd-meta">' +
          '<span class="chip" style="background:transparent;border-color:' + cfg.color + ';color:' + cfg.color + ';">' + cfg.icon + ' ' + t(cfg.labelKey) + '</span> ' +
          '<span class="chip">' + (i18n.t('states.' + item.state, item.state) || '—') + '</span> ' +
          (item.priority ? '<span class="chip chip-' + (item.priority === 'high' ? 'danger' : item.priority === 'normal' ? 'info' : '') + '">' + item.priority + '</span>' : '') +
        '</div>' +
      '</header>' +
      '<section class="bd-envelope card" style="border-left:3px solid ' + cfg.color + ';">' +
        '<div class="bd-env-row"><span class="t-label-sm">Origen</span><span><strong>' + (item.from && item.from.name || '—') + '</strong>' + (item.from && item.from.email ? ' &lt;' + item.from.email + '&gt;' : '') + (item.from && item.from.channel ? ' · <span class="chip">' + item.from.channel + '</span>' : '') + '</span></div>' +
        '<h2 class="bd-subject t-display-sm">' + item.subject + '</h2>' +
        '<p class="bd-body t-body-md" style="margin-top:var(--space-3);">' + (item.preview || '—') + '</p>' +
        (attachments.length ? '<div class="bd-att">' +
          '<div class="t-label-sm muted">Adjuntos · ' + attachments.length + '</div>' +
          attachments.map(a => '<div class="bd-att-row"><span aria-hidden="true">📎</span> <code>' + a.filename + '</code> <span class="muted">' + a.sizeKB + ' KB · ' + a.kind + '</span></div>').join('') +
        '</div>' : '') +
      '</section>' +
      meta +
      '<footer class="bd-actions">' + actions + '</footer>' +
      '</div>';

    /* wire actions */
    root.querySelectorAll('[data-iact]').forEach(b => {
      b.addEventListener('click', () => handleInboxAction(b.getAttribute('data-iact'), item));
    });
  }

  function renderInboxMeta(item) {
    if (item.kind === 'sla_timer' && item.metadata) {
      return '<section class="bd-panel card"><h3 class="t-heading-md">SLA detail</h3>' +
        '<dl class="bd-risk-grid">' +
        '<dt>draft target</dt><dd><a href="#/bandeja/' + item.metadata.draftId + '">' + item.metadata.draftId + '</a></dd>' +
        '<dt>hours left</dt><dd><strong style="color:var(--status-warning);">' + item.metadata.hoursLeft + 'h</strong></dd>' +
        '<dt>due at</dt><dd class="mono">' + (item.dueAt || '—') + '</dd>' +
        '</dl></section>';
    }
    if (item.kind === 'approval_request' && item.metadata) {
      const chain = (FL.mock.approvalChains || []).find(c => c.draftId === item.metadata.parentDraftId);
      return '<section class="bd-panel card"><h3 class="t-heading-md">Approval chain</h3>' +
        (chain ? '<ol class="bd-chain">' + chain.steps.map(s => (
          '<li class="bd-chain-step bd-chain-step--' + s.state + '"><span class="bd-chain-dot">' + (s.state === 'approved' ? '✓' : s.state === 'pending' ? '⏳' : '◯') + '</span>' +
          ' Paso ' + s.stepIdx + ': <strong>' + s.requiredRole + '</strong>' +
          (s.requiredUserId ? ' (<code>' + s.requiredUserId + '</code>)' : '') +
          ' · <span class="muted">' + s.state + '</span>' +
          (s.dueAt ? ' · due ' + s.dueAt.slice(11,16) : '') +
          '</li>'
        )).join('') + '</ol>' +
        '<p class="muted t-body-sm" style="margin-top:var(--space-2);"><em>' + chain.reason + '</em></p>'
        : '<p class="muted">Cadena de aprobación no encontrada.</p>') +
        '</section>';
    }
    if (item.kind === 'crm_event' && item.metadata) {
      return '<section class="bd-panel card"><h3 class="t-heading-md">CRM event</h3>' +
        '<dl class="bd-risk-grid">' +
        Object.keys(item.metadata).map(k => '<dt>' + k + '</dt><dd><code>' + item.metadata[k] + '</code></dd>').join('') +
        '</dl></section>';
    }
    if (item.kind === 'webhook' && item.metadata) {
      return '<section class="bd-panel card"><h3 class="t-heading-md">Webhook payload</h3>' +
        '<pre class="bd-trace" style="background:var(--bg-sunken);padding:var(--space-3);border-radius:var(--radius-sm);font-family:var(--font-mono);font-size:12px;overflow:auto;">' + JSON.stringify(item.metadata, null, 2) + '</pre>' +
        '</section>';
    }
    if (item.kind === 'task' && item.metadata) {
      return '<section class="bd-panel card"><h3 class="t-heading-md">Task detail</h3>' +
        '<dl class="bd-risk-grid">' +
        '<dt>asignado a</dt><dd><code>' + (item.assignedTo || '—') + '</code></dd>' +
        '<dt>due</dt><dd class="mono">' + (item.dueAt || '—') + '</dd>' +
        Object.keys(item.metadata).map(k => '<dt>' + k + '</dt><dd><code>' + item.metadata[k] + '</code></dd>').join('') +
        '</dl></section>';
    }
    if (item.kind === 'audit_alert' && item.metadata) {
      return '<section class="bd-panel card" style="border-left:3px solid var(--brand-evidence);"><h3 class="t-heading-md">Audit alert</h3>' +
        '<dl class="bd-risk-grid">' +
        Object.keys(item.metadata).map(k => '<dt>' + k + '</dt><dd><code>' + item.metadata[k] + '</code></dd>').join('') +
        '</dl></section>';
    }
    return '';
  }

  function inboxItemActions(item) {
    const t = k => i18n.t(k);
    if (item.kind === 'inbound_email' || item.kind === 'inbound_msg') {
      const sa = item.suggestedAgent ? '<button class="btn btn-primary" data-iact="assign-suggested">→ Asignar a ' + (FL.mock.agents.find(a => a.id === item.suggestedAgent) || {}).name + '</button>' : '';
      return sa + '<button class="btn" data-iact="reply-myself">✎ Responder yo</button>' +
        '<button class="btn" data-iact="snooze">⌚ Snooze 4h</button>' +
        '<button class="btn btn-ghost" data-iact="archive">Archivar</button>';
    }
    if (item.kind === 'approval_request') {
      return '<button class="btn btn-primary" data-iact="approve">✓ Aprobar</button>' +
        '<button class="btn" data-iact="reject">✕ Rechazar</button>' +
        '<button class="btn" data-iact="open-parent">→ Ver draft padre</button>';
    }
    if (item.kind === 'sla_timer') {
      return '<button class="btn btn-primary" data-iact="open-target">→ Ir al draft</button>' +
        '<button class="btn" data-iact="snooze">⌚ Snooze 1h</button>';
    }
    if (item.kind === 'task') {
      return '<button class="btn btn-primary" data-iact="complete-task">✓ Marcar completa</button>' +
        '<button class="btn" data-iact="reassign">→ Reasignar</button>';
    }
    if (item.kind === 'escalation') {
      return '<button class="btn btn-primary" data-iact="resolve-escalation">Resolver yo</button>' +
        '<button class="btn" data-iact="reassign">→ Reasignar</button>';
    }
    if (item.kind === 'alert' || item.kind === 'crm_event' || item.kind === 'webhook' || item.kind === 'audit_alert' || item.kind === 'feedback_reply') {
      return '<button class="btn" data-iact="ack">✓ Acknowledge</button>' +
        '<button class="btn btn-ghost" data-iact="archive">Archivar</button>';
    }
    return '<button class="btn" data-iact="ack">✓ Acknowledge</button>';
  }

  function handleInboxAction(action, item) {
    switch (action) {
      case 'assign-suggested':
        FL.bus.emit('toast', { kind:'success', message:'Asignado a ' + item.suggestedAgent + ' · agente generará draft' });
        location.hash = '#/chat/new?agent=' + item.suggestedAgent;
        break;
      case 'reply-myself':
        FL.bus.emit('toast', { kind:'info', message:'Editor inline · pendiente' });
        break;
      case 'snooze':
        FL.bus.emit('toast', { kind:'info', message:'Snoozed · vuelve a aparecer en 1-4h' });
        location.hash = '#/bandeja';
        break;
      case 'archive':
        FL.bus.emit('toast', { kind:'success', message:'Archivado · audit_event registrado' });
        location.hash = '#/bandeja';
        break;
      case 'approve':
        FL.bus.emit('toast', { kind:'success', message:'Aprobado · approval chain avanza al siguiente paso' });
        location.hash = '#/bandeja';
        break;
      case 'reject':
        FL.bus.emit('toast', { kind:'warn', message:'Rechazado · originador notificado' });
        location.hash = '#/bandeja';
        break;
      case 'open-parent':
        if (item.metadata && item.metadata.parentDraftId) location.hash = '#/bandeja/' + item.metadata.parentDraftId;
        break;
      case 'open-target':
        if (item.metadata && item.metadata.draftId) location.hash = '#/bandeja/' + item.metadata.draftId;
        break;
      case 'complete-task':
        FL.bus.emit('toast', { kind:'success', message:'Tarea marcada completa' });
        location.hash = '#/bandeja';
        break;
      case 'reassign':
        FL.bus.emit('toast', { kind:'info', message:'Reasignar · UI pendiente' });
        break;
      case 'resolve-escalation':
        FL.bus.emit('toast', { kind:'success', message:'Escalación resuelta · agente notificado' });
        location.hash = '#/bandeja';
        break;
      case 'ack':
        FL.bus.emit('toast', { kind:'success', message:'Acknowledged · audit_event registrado' });
        break;
    }
  }
  function unmount() {
    unsubs.forEach(u => typeof u === 'function' && u());
    unsubs = [];
    if (root) root.innerHTML = '';
  }

  function claimBody(draft) {
    if (!draft.body) return '';
    let html = draft.body.replace(/\n/g, '<br>');
    (draft.claims || []).forEach((c, i) => {
      const label = 'E' + (i + 1);
      const marker = '[' + c.id + ']';
      const firstEv = (c.evidence || [])[0] || { id: 'e0' };
      const replacement = '<mark class="bd-claim" data-claim="' + c.id + '" data-evidence="' + firstEv.id + '">' + c.text + '</mark>' +
        W.provenanceSup(c.id, firstEv.id, label);
      html = html.replace(marker, replacement);
    });
    return html;
  }

  function renderEvidenceTab(draft) {
    if (!(draft.claims || []).length) return W.emptyState({ title: i18n.t('common.empty'), subtitle: 'Sin evidencia en este draft', icon: '○' });
    return '<ol class="bd-evlist">' + draft.claims.map((c, i) => (
      '<li class="bd-ev" data-claim="' + c.id + '">' +
        '<div class="bd-ev__head"><span class="bd-ev__badge">E' + (i + 1) + '</span>' +
        '<code>' + c.id + '</code></div>' +
        '<div class="bd-ev__claim">' + c.text + '</div>' +
        '<div class="bd-ev__spans">' +
        (c.evidence || []).map(e => (
          '<div class="bd-ev__span">' +
            '<div><span class="t-label-sm muted">source</span> <code>' + e.source + '</code></div>' +
            '<div><span class="t-label-sm muted">source_version</span> <code>' + (e.sourceVersion || '—') + '</code></div>' +
            '<div><span class="t-label-sm muted">line</span> <code>' + (e.line || '—') + '</code></div>' +
            '<div><span class="t-label-sm muted">retrieval_run_id</span> <code>' + (e.retrievalRunId || '—') + '</code></div>' +
          '</div>'
        )).join('') +
        '</div></li>'
    )).join('') + '</ol>';
  }

  function renderRiskTab(draft, action) {
    const a = action || {};
    const rows = [
      ['action_id',      '<code>' + (a.actionId || draft.action && draft.action.actionId || '—') + '</code>'],
      ['reversibility',  W.riskBadge({ reversibility: a.reversibility || 'reversible_24h' })],
      ['side_effects',   (a.side_effects || draft.action && draft.action.side_effects || []).map(s => '<span class="chip">' + s + '</span>').join(' ') || '<span class="muted">—</span>'],
      ['min_autonomy',   '<span class="chip chip-info">' + (a.min_autonomy || 'L1') + '</span>'],
      ['required_role',  '<span class="chip chip-accent">' + (a.required_role || 'operator') + '</span>'],
      ['audit_class',    '<span class="chip">' + (a.audit_class || 'operational') + '</span>']
    ];
    const table = '<dl class="bd-risk-grid">' + rows.map(([k, v]) => '<dt class="t-label-sm">' + k + '</dt><dd>' + v + '</dd>').join('') + '</dl>';
    const fp = draft.modelFingerprint ? (
      '<section class="bd-fp">' +
        '<h4 class="t-label-md" style="margin:0 0 var(--space-2) 0;">' + i18n.t('bandeja.fingerprint', 'Model fingerprint') + '</h4>' +
        '<dl class="bd-risk-grid">' +
          '<dt>provider</dt><dd><code>' + draft.modelFingerprint.provider + '</code></dd>' +
          '<dt>model_family</dt><dd><code>' + draft.modelFingerprint.model_family + '</code></dd>' +
          '<dt>model_version</dt><dd><code>' + draft.modelFingerprint.model_version + '</code></dd>' +
          '<dt>system_prompt_hash</dt><dd><code>' + draft.modelFingerprint.system_prompt_hash + '</code></dd>' +
          '<dt>tools_manifest_hash</dt><dd><code>' + draft.modelFingerprint.tools_manifest_hash + '</code></dd>' +
          '<dt>policy_version</dt><dd><code>' + draft.modelFingerprint.policy_version + '</code></dd>' +
          '<dt>retrieval_index_version</dt><dd><code>' + draft.modelFingerprint.retrieval_index_version + '</code></dd>' +
        '</dl>' +
      '</section>'
    ) : '';
    return table + fp;
  }

  function renderTraceTab(draft) {
    const entries = (draft.workflowTrace || []).map(s => ({
      ts: s.ts || '—',
      actor: s.actor || '—',
      action: s.node,
      detail: 'step ' + s.step + ' · ' + s.status,
      status: s.status
    }));
    if (!entries.length) return W.emptyState({ title: 'Sin trace', icon: '○' });
    return W.timeline(entries);
  }

  function render(draft, agent, action) {
    const t = k => i18n.t(k);
    const isIrreversible = (draft.action && (draft.action.reversibility || '').startsWith('irreversible'));
    const approveLabel = t('bandeja.detail.actions.approve', 'Aprobar') + (isIrreversible ? ' ⚠' : '');
    const tabs = W.tabs([
      { id: 'content',  label: t('bandeja.tab_content',  'Contenido'), panel: '<div class="bd-body t-body-lg">' + claimBody(draft) + '</div>' },
      { id: 'evidence', label: t('bandeja.tab_evidence', 'Evidencia'), panel: renderEvidenceTab(draft) },
      { id: 'risk',     label: t('bandeja.tab_risk',     'Riesgo'),    panel: renderRiskTab(draft, action) },
      { id: 'trace',    label: t('bandeja.tab_trace',    'Trace'),     panel: renderTraceTab(draft) }
    ], { active: 'content' });

    /* [V2-PATCH 2026-04-19] Top-3 grounded-in sources for this draft */
    const topSources = (draft.claims || []).flatMap(c =>
      (c.evidence || []).map(ev => ({
        sourceId:  ev.source,
        title:     ev.source,
        version:   ev.sourceVersion,
        lineRange: ev.line,
        score:     ev.retrievalRunId ? 0.95 : 0.8
      }))
    ).slice(0, 3);

    root.innerHTML =
      '<div class="bd-wrap">' +
      '<header class="bd-head">' +
        '<nav class="bd-crumbs"><a href="#/bandeja">' + t('bandeja.title') + '</a><span aria-hidden="true">/</span>' +
        '<code>' + draft.id + '</code></nav>' +
        '<div class="bd-meta">' +
          '<span class="chip" title="Agent">' + agent.name + '</span> ' +
          W.draftStateBadge(draft.state || 'awaiting_approval') + ' ' +
          (draft.action ? W.riskBadge(draft.action) : '') +
          (draft.businessEntityId ? ' <span class="chip">' + draft.businessEntityId + '</span>' : '') +
        '</div>' +
      '</header>' +
      '<section class="bd-envelope card">' +
        (draft.recipient ? '<div class="bd-env-row"><span class="t-label-sm">' + t('bandeja.recipient') + '</span><span>' + draft.recipient.name + ' &lt;' + (draft.recipient.email || '—') + '&gt;</span></div>' : '') +
        '<h2 class="bd-subject t-display-sm">' + (draft.subject || '—') + '</h2>' +
      '</section>' +
      /* [V2-PATCH 2026-04-19] GroundedInBlock compacto (top-3) con link a tab Evidencia */
      '<section class="bd-grounded card">' +
        W.groundedInBlock({ sources: topSources, title: i18n.t('chat.grounded_in_title', 'Grounded in') + ' · top 3' }) +
        '<button class="btn btn-sm btn-ghost" data-jump-evidence style="margin-top:var(--space-2);">' + t('common.view') + ' ' + t('bandeja.tab_evidence') + ' →</button>' +
      '</section>' +
      '<section class="bd-panel card">' + tabs + '</section>' +
      /* [V3-PATCH 2026-04-19] AI assist + chat thread embed slots + chain/bundle/comments */
      renderApprovalChain(draft) +
      renderActionBundle(draft) +
      renderComments(draft) +
      '<div id="bd-edit-slot"></div>' +
      '<div id="bd-thread-slot"></div>' +
      '<footer class="bd-actions">' +
        '<button class="btn btn-primary" data-act="approve"><span aria-hidden="true">✓</span> ' + approveLabel + '</button>' +
        '<button class="btn" data-act="edit">✎ ' + t('common.edit') + '</button>' +
        '<button class="btn" data-act="reject">' + t('common.reject') + '</button>' +
        '<button class="btn" data-act="handoff">→ Handoff</button>' +
        '<button class="btn" data-act="thread">💬 Thread agente</button>' +
        '<button class="btn" data-act="feedback">' + t('common.feedback') + '</button>' +
        '<button class="btn btn-ghost" data-act="consolidate" style="margin-left:auto;">' + t('skill.consolidate') + '</button>' +
      '</footer>' +
      '</div>';

    W.wireTabs(root.querySelector('[data-widget="tabs"]'));

    /* [V2-PATCH 2026-04-19] wire "Ver Evidencia" jump button */
    const jumpBtn = root.querySelector('[data-jump-evidence]');
    if (jumpBtn) jumpBtn.addEventListener('click', () => {
      const evTab = root.querySelector('.fl-tab[data-tab="evidence"]');
      if (evTab) { evTab.click(); root.querySelector('[data-widget="tabs"]').scrollIntoView({ behavior: 'smooth', block: 'start' }); }
    });

    /* Provenance superscript ↔ claim ↔ evidence cross-highlight */
    root.querySelectorAll('.fl-prov-sup').forEach(sup => {
      const cid = sup.getAttribute('data-claim');
      const activate = () => {
        root.querySelectorAll('.bd-claim').forEach(m => m.classList.toggle('highlighted', m.getAttribute('data-claim') === cid));
        root.querySelectorAll('.bd-ev').forEach(li => li.classList.toggle('highlighted', li.getAttribute('data-claim') === cid));
        // switch to evidence tab
        const evBtn = root.querySelector('.fl-tab[data-tab="evidence"]');
        if (evBtn) evBtn.click();
      };
      sup.addEventListener('mouseenter', activate);
      sup.addEventListener('click', activate);
      sup.addEventListener('focus', activate);
    });

    /* Actions */
    const ap = root.querySelector('[data-act="approve"]');
    if (ap) ap.addEventListener('click', () => {
      if (isIrreversible) {
        if (!confirm(i18n.t('bandeja.confirm_approve_irreversible', 'Acción irreversible. ¿Confirmás?'))) return;
      }
      bus.emit('draft:approve', { id: draft.id });
      bus.emit('toast', { kind: 'success', message: i18n.t('bandeja.approve_done', 'Draft aprobado') });
    });
    const rj = root.querySelector('[data-act="reject"]');
    if (rj) rj.addEventListener('click', () => W.openFeedbackModal(draft.id));
    /* [V3-PATCH 2026-04-19] wire comment add form */
    const cf = root.querySelector('[data-bd-comment-add]');
    if (cf) cf.addEventListener('submit', e => {
      e.preventDefault();
      const inp = cf.querySelector('input');
      if (!inp || !inp.value.trim()) return;
      FL.mock.comments.unshift({ id:'cm_live_' + Date.now(), parentItemId: draft.id, authorUserId: FL.session.userId, body: inp.value.trim(), createdAt: new Date().toISOString() });
      inp.value = '';
      bus.emit('toast', { kind:'success', message:'Comentario agregado · audit_event registrado' });
      mount(root, { params:{ id:draft.id } });
    });

    /* [V3-PATCH 2026-04-19] Edit → AI assist toolbar embedded inline */
    const ed = root.querySelector('[data-act="edit"]');
    if (ed) ed.addEventListener('click', () => {
      const slot = document.getElementById('bd-edit-slot');
      if (!slot) return;
      if (slot.innerHTML) { slot.innerHTML = ''; return; }
      slot.innerHTML = W.aiAssistToolbar({ draftId: draft.id });
      W.wireAiAssistToolbar(slot.querySelector('.fl-aia'), {
        onPreset: action => {
          const proposals = {
            rephrase:   'Reformulación propuesta:\n\n"' + (draft.subject || 'asunto') + '" — versión más natural sin cambiar contenido.',
            shorten:    'Versión acortada (-30%): mantiene los 6 claims pero elimina párrafos de cortesía.',
            formalize:  'Tono formal · "Estimado/a" · cierre con "Quedo a su disposición".',
            translate:  'Traducción PT-BR del cuerpo (preserva claims [E1]..[E6]).',
            factcheck:  '✓ 5/6 claims con evidencia vigente. ⚠ [E3] referencia a policy_playbook v1.2.0 — chequear si v1.3.0 ya disponible.',
            compliance: '✓ POL_MX_001: 3/4 checks pasan (ver C16 análisis). Pendiente: factura post-approval (esperable).'
          };
          return proposals[action] || '(simulación) propuesta para "' + action + '"';
        },
        onOpenChat: () => {
          slot.innerHTML = W.aiAssistChat({ contextLabel: 'Draft ' + draft.id });
          W.wireAiAssistChat(slot.querySelector('.fl-aiac'), {
            onPrompt: text => '(simulación) procesando: "' + text + '" — respuesta del agente con propuesta de cambio embebida.',
            onClose: () => { slot.innerHTML = ''; }
          });
        }
      });
    });

    /* [V3-PATCH 2026-04-19] Thread agente: embed chat thread primitive */
    const thr = root.querySelector('[data-act="thread"]');
    if (thr) thr.addEventListener('click', () => {
      const slot = document.getElementById('bd-thread-slot');
      if (!slot) return;
      if (slot.innerHTML) { slot.innerHTML = ''; return; }
      const conv = (FL.mock.conversations || []).find(c => c.agentId === draft.agentId) || { id: 'cv_' + draft.id };
      slot.innerHTML = W.chatThread({ conversationId: conv.id, contextLabel: 'Draft ' + draft.id + ' · agente ' + (agent.name || draft.agentId), scope: 'item' });
      W.wireChatThread(slot.querySelector('.fl-cthread'), {
        onSend: text => bus.emit('toast', { kind:'info', message:'Thread embed · mensaje enviado: "' + text.slice(0, 40) + '..."' })
      });
    });

    /* [V3-PATCH 2026-04-19] Handoff packet modal (P10 8 fields) */
    const ho = root.querySelector('[data-act="handoff"]');
    if (ho) ho.addEventListener('click', () => {
      const t = k => i18n.t(k);
      W.openModal(
        '<h2 id="fl-modal-title" class="t-heading-lg" style="margin:0 0 var(--space-3);">→ Handoff packet (P10)</h2>' +
        '<form class="bd-ho-form">' +
          '<label><span class="t-label-sm">to_agent</span><select class="select" name="to">' +
            FL.mock.agents.filter(a => a.id !== draft.agentId).map(a => '<option value="' + a.id + '">' + a.name + '</option>').join('') +
          '</select></label>' +
          '<label><span class="t-label-sm">task</span><input class="input" name="task" value="Verificar cumplimiento POL_MX_001 sobre ' + draft.id + '"/></label>' +
          '<label><span class="t-label-sm">goal</span><input class="input" name="goal" value="Confirmar fiscal + norma técnica antes de aprobación"/></label>' +
          '<label><span class="t-label-sm">context</span><textarea class="textarea" name="context">' + (draft.subject || '') + ' · monto MXN 1.13M · ACME MX</textarea></label>' +
          '<label><span class="t-label-sm">constraints</span><input class="input" name="constraints" value="Plazo respuesta &lt;24h"/></label>' +
          '<label><span class="t-label-sm">deadline</span><input class="input" name="deadline" type="datetime-local" value="2026-04-19T13:00"/></label>' +
          '<label><span class="t-label-sm">requested_output_format</span><select class="select" name="format"><option>compliance_check_report</option><option>risk_brief</option><option>diff_proposal</option></select></label>' +
        '</form>' +
        '<div style="display:flex;gap:var(--space-2);justify-content:flex-end;margin-top:var(--space-4);">' +
          '<button class="btn" data-ho-act="cancel">Cancelar</button>' +
          '<button class="btn btn-primary" data-ho-act="send">Enviar handoff</button>' +
        '</div>',
        { width: 560 }
      );
      document.querySelector('[data-ho-act="cancel"]').addEventListener('click', () => W.closeModal());
      document.querySelector('[data-ho-act="send"]').addEventListener('click', () => {
        bus.emit('toast', { kind:'success', message:'Handoff enviado · resultado volverá como nuevo item en bandeja' });
        W.closeModal();
      });
    });
    const fb = root.querySelector('[data-act="feedback"]');
    if (fb) fb.addEventListener('click', () => W.openFeedbackModal(draft.id));
    const cn = root.querySelector('[data-act="consolidate"]');
    if (cn) cn.addEventListener('click', () => { location.hash = '#/skills/sk_cotizar'; });
  }

  function injectStyles() {
    if (document.getElementById('bd-styles')) return;
    const s = document.createElement('style');
    s.id = 'bd-styles';
    s.textContent = `
.bd-wrap { max-width:1280px; margin:0 auto; display:flex; flex-direction:column; gap:var(--space-5); }
.bd-head { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:var(--space-3); }
.bd-crumbs { display:flex; align-items:center; gap:var(--space-2); color:var(--text-muted); }
.bd-crumbs a { color:var(--text-secondary); text-decoration:none; }
.bd-crumbs a:hover { color:var(--accent-primary); text-decoration:underline; }
.bd-meta { display:flex; align-items:center; gap:var(--space-2); flex-wrap:wrap; }
.bd-envelope { padding:var(--space-5); display:flex; flex-direction:column; gap:var(--space-3); }
.bd-env-row { display:grid; grid-template-columns:100px 1fr; align-items:baseline; gap:var(--space-3); }
.bd-subject { margin:0; line-height:1.25; }
.bd-panel { padding:var(--space-5); }
.bd-body { line-height:1.75; }
.bd-claim { background:transparent; color:var(--text-primary); border-bottom:1px dashed var(--text-evidence); padding:0; }
.bd-claim.highlighted { background:var(--accent-primary-soft); }
.bd-actions { display:flex; gap:var(--space-2); flex-wrap:wrap; }
.bd-evlist { list-style:none; padding:0; margin:0; display:flex; flex-direction:column; gap:var(--space-3); }
.bd-ev { padding:var(--space-3); border:1px solid var(--stroke-default); border-radius:var(--radius-md); background:var(--bg-surface); transition:border-color var(--dur-fast), background var(--dur-fast); }
.bd-ev.highlighted { border-color:var(--accent-primary); background:var(--accent-primary-soft); }
.bd-ev__head { display:flex; align-items:center; gap:var(--space-2); margin-bottom:var(--space-1); }
.bd-ev__badge { display:inline-flex; align-items:center; justify-content:center; min-width:26px; height:20px; padding:0 6px; background:var(--text-evidence); color:#fff; border-radius:var(--radius-sm); font-family:var(--font-mono); font-size:11px; }
.bd-ev__claim { font-style:italic; color:var(--text-secondary); margin-bottom:var(--space-2); }
.bd-ev__spans { display:flex; flex-direction:column; gap:var(--space-2); }
.bd-ev__span { display:grid; grid-template-columns:1fr 1fr; gap:var(--space-2) var(--space-4); padding:var(--space-2); background:var(--bg-subtle); border-radius:var(--radius-sm); font-size:12px; }
.bd-ev__span code { background:transparent; padding:0; font-size:11.5px; color:var(--text-primary); }
.bd-risk-grid { display:grid; grid-template-columns:auto 1fr; gap:var(--space-2) var(--space-4); margin:0; }
.bd-risk-grid dt { color:var(--text-muted); font-size:11px; letter-spacing:0.04em; text-transform:uppercase; font-weight:600; padding-top:4px; }
.bd-risk-grid dd { margin:0; }
.bd-fp { margin-top:var(--space-4); padding-top:var(--space-4); border-top:1px dashed var(--stroke-default); }
/* [V3-PATCH 2026-04-19] inbox item polymorphic styles */
.bd-att { margin-top:var(--space-3); padding-top:var(--space-3); border-top:1px dashed var(--stroke-default); display:flex; flex-direction:column; gap:var(--space-1); }
.bd-att-row { font-size:13px; padding:var(--space-1) 0; }
.bd-chain { list-style:none; padding:0; margin:var(--space-2) 0; display:flex; flex-direction:column; gap:var(--space-2); }
.bd-chain-step { display:flex; align-items:center; gap:var(--space-2); padding:var(--space-2); background:var(--bg-subtle); border-radius:var(--radius-sm); border-left:2px solid var(--stroke-default); }
.bd-chain-step--approved { border-left-color:var(--status-success); }
.bd-chain-step--pending { border-left-color:var(--status-warning); }
.bd-chain-step--waiting_previous { opacity:0.55; }
.bd-chain-dot { display:inline-flex; align-items:center; justify-content:center; width:20px; height:20px; border-radius:50%; background:var(--bg-surface); border:1px solid var(--stroke-default); font-size:10px; }
/* [V3-PATCH] handoff form */
.bd-ho-form { display:flex; flex-direction:column; gap:var(--space-2); }
.bd-ho-form label { display:flex; flex-direction:column; gap:var(--space-1); }
/* [V3-PATCH] action bundle + comments */
.bd-bundle { list-style:none; padding:0; margin:0; display:flex; flex-direction:column; gap:var(--space-2); }
.bd-bundle-step { display:flex; gap:var(--space-3); padding:var(--space-2); background:var(--bg-subtle); border-radius:var(--radius-sm); }
.bd-bundle-num { display:inline-flex; align-items:center; justify-content:center; width:24px; height:24px; border-radius:50%; background:var(--accent-primary); color:#fff; font-size:11px; font-weight:700; flex-shrink:0; }
.bd-bundle-body { flex:1; min-width:0; }
.bd-comments { list-style:none; padding:0; margin:var(--space-2) 0; display:flex; flex-direction:column; gap:var(--space-2); }
.bd-comment { padding:var(--space-2); background:var(--bg-subtle); border-radius:var(--radius-sm); border-left:2px solid var(--accent-primary); }
.bd-comment-head { margin-bottom:var(--space-1); }
.bd-comment-body { font-size:13px; line-height:1.5; }
.bd-comment-add { display:flex; gap:var(--space-2); margin-top:var(--space-2); }
.bd-comment-add input { flex:1; }
    `;
    document.head.appendChild(s);
  }

  FL.modules[MODULE_ID] = { mount, meta: { route: '/bandeja/:id', needsRole: ['operator','admin','owner'] } };
})();
</script>

<script>
(function () {
  const FL = window.__faberloom; if (!FL) return;
  const W = FL.widgets, i18n = FL.i18n;
  let root = null;

  function mount(slot, ctx) {
    root = slot; injectStyles();
    const id = ctx.params.id || 'sk_cotizar';
    const skill = FL.mock.skills[id] || FL.mock.skills.sk_cotizar;
    render(skill);
    return { unmount: () => { if (root) root.innerHTML = ''; } };
  }

  function render(skill) {
    const t = k => i18n.t(k);
    const therm = W.thermometer(skill.temperatureState || 'cold', skill.temperature || 0);
    const canConsolidate = skill.temperatureState === 'hot';
    /* [V4-PATCH 2026-04-22] Sealed/Open origin + Fork-to-Open CTA */
    const flags = (FL.mock.sealedOpenFlags && FL.mock.sealedOpenFlags.skills && FL.mock.sealedOpenFlags.skills[skill.id]) || { origin:'open' };
    const sealedBadge = W.sealedOpenBadge(flags.origin);
    const forkCta = flags.origin === 'sealed' ? W.forkToOpenCta(skill.id, 'skill') : '';
    root.innerHTML =
      '<div class="ss-wrap">' +
      '<header class="ss-head">' +
        '<div><h1 class="t-display-md">' + skill.name + ' ' + sealedBadge + '</h1>' +
        '<p class="t-body-sm muted">' + (skill.base.version ? 'v' + skill.base.version : '') + ' · <code>' + skill.id + '</code>' +
        (flags.base_sealed_hash ? ' · sealed hash <code class="t-mono" style="font-size:10px;">' + flags.base_sealed_hash + '</code>' : '') +
        (flags.forkedFrom ? ' · forked from <code>' + flags.forkedFrom + '</code>' : '') +
        '</p></div>' +
        '<div class="ss-head-actions">' + therm +
          (forkCta ? ' ' + forkCta : '') +
          (canConsolidate
            ? ' <button class="btn btn-primary" data-act="consolidate">◈ ' + t('skill.consolidate') + '</button>'
            : '') +
        '</div>' +
      '</header>' +
      /* [V4-PATCH 2026-04-22] Voice Profile (6th Add-on · tenant-level) cross-link */
      voiceProfileCrossLink(flags.origin) +
      '<div class="ss-cols">' +
        colBase(skill) + colManual(skill) + colLearned(skill) +
      '</div>' +
      (skill.goldSamples && skill.goldSamples.length ? goldSection(skill) : '') +
      /* [V3-PATCH 2026-04-19] sandbox embed via chatThread primitive */
      '<section class="ss-sandbox card">' +
        '<header class="row-between"><h3 class="t-heading-md">🧪 Sandbox · probá esta versión del skill</h3>' +
        '<button class="btn btn-sm" data-act="toggle-sandbox">Toggle</button></header>' +
        '<div id="ss-sandbox-slot" hidden></div>' +
      '</section>' +
      '</div>';

    /* [V3-PATCH 2026-04-19] sandbox toggle */
    const tg = root.querySelector('[data-act="toggle-sandbox"]');
    if (tg) tg.addEventListener('click', () => {
      const slot = document.getElementById('ss-sandbox-slot');
      if (!slot) return;
      if (!slot.hidden) { slot.hidden = true; slot.innerHTML = ''; return; }
      slot.hidden = false;
      slot.innerHTML = W.chatThread({
        conversationId: 'ss_sandbox_' + skill.id,
        contextLabel: 'Sandbox · ' + skill.name + ' v' + (skill.base.version || '?'),
        scope: 'sandbox',
        messages: [{ role:'agent', content:'Hola, soy el skill <code>' + skill.id + '</code> en modo sandbox. Probame con un caso real para ver si el output cambia con la última versión del overlay aprendido.', timestamp: new Date().toISOString() }],
        placeholder: 'Probá el skill con un caso real…'
      });
      W.wireChatThread(slot.querySelector('.fl-cthread'), {
        onSend: text => FL.bus.emit('toast', { kind:'info', message:'Sandbox · respuesta simulada para "' + text.slice(0, 50) + '..."' })
      });
    });

    const cb = root.querySelector('[data-act="consolidate"]');
    if (cb) cb.addEventListener('click', () => {
      W.openConsolidationModal({
        id: 'cons_live', skillId: skill.id, thermometer: skill.temperatureState, patternCount: skill.temperature,
        accumulatedSince: (skill.learnedPatterns[0] && skill.learnedPatterns[0].firstSeen) || '',
        scope: 'skill', learnType: 'skill_refinement', crossSkill: false,
        suggestedRule: (skill.learnedPatterns[0] && skill.learnedPatterns[0].pattern) || '',
        impactPreview: { before: 'Draft sin patrón consolidado', after: 'Draft aplica patrón aprobado automáticamente' }
      });
    });

    /* [V4-PATCH 2026-04-22] wire fork-to-open CTA */
    W.wireForkCta && W.wireForkCta(root, (entityId) => {
      FL.mock.auditEvents && FL.mock.auditEvents.unshift({
        id:'ae_' + Date.now(), ts:new Date().toISOString(), actorId:FL.session.userId,
        kind:'skill_fork_to_open', level:'INFO', resourceType:'skill', resourceId:entityId,
        summary:'Skill ' + entityId + ' forkeado a Open (editable · sin canal updates)'
      });
    });
  }

  /* [V4-PATCH 2026-04-22] Voice Profile 6th Add-on cross-link card */
  function voiceProfileCrossLink(origin) {
    const vp = FL.mock.voiceProfile || {};
    if (!vp.enabled) return '';
    const overlayNote = origin === 'sealed' ? vp.sealedBehavior : vp.openBehavior;
    return (
      '<section class="ss-voice-profile card" aria-label="Voice Profile add-on">' +
        '<header class="row-between">' +
          '<div>' +
            '<h3 class="t-heading-sm">🎙 Voice Profile · 6º Add-on ' + W.pendingCeoFlag('Q1', 'per-tenant F1 o per-user F2', 'per-tenant F1') + '</h3>' +
            '<p class="t-body-sm muted">Reemplaza Arena (descartado · DEC-007) · tenant-level · ' + overlayNote + '</p>' +
          '</div>' +
          '<a class="btn btn-sm" href="#/admin/llm-orchestration/voice">Editar voice profile ↗</a>' +
        '</header>' +
        '<div class="ss-voice-summary">' +
          '<span class="chip">tono: <strong>' + (vp.tone || '—') + '</strong></span>' +
          '<span class="chip">lang: <strong>' + (vp.primaryLanguage || '—') + '</strong></span>' +
          '<span class="chip chip-danger">blocked: ' + (vp.blockedTerms || []).length + '</span>' +
          '<span class="chip">preferred: ' + (vp.preferredTerms || []).length + '</span>' +
        '</div>' +
      '</section>'
    );
  }

  function colBase(s) {
    const b = s.base;
    return (
      '<section class="ss-col ss-col--base">' +
      '<header class="ss-col__head"><h2 class="t-heading-md">' + i18n.t('skill.col_base') + '</h2>' +
        /* [V2-PATCH 2026-04-19] sealed pattern badge */
        W.patternBadge({ kind: 'sealed' }) + '</header>' +
        '<dl class="ss-meta"><dt>Version</dt><dd><code>' + b.version + '</code></dd>' +
        '<dt>Author</dt><dd>' + b.author + '</dd></dl>' +
        '<div class="t-label-sm muted" style="margin-top:var(--space-3)">System prompt</div>' +
        '<pre class="ss-prompt">' + escape(b.systemPrompt) + '</pre>' +
        '<div class="t-label-sm muted">Policies</div>' +
        '<div>' + (b.policies || []).map(p => '<span class="chip chip-accent">' + p + '</span>').join(' ') + '</div>' +
        '<div class="t-label-sm muted" style="margin-top:var(--space-3)">Tools</div>' +
        '<div>' + (b.tools || []).map(p => '<span class="chip chip-info">' + p + '</span>').join(' ') + '</div>' +
      '</section>'
    );
  }

  function colManual(s) {
    const overlays = s.manualOverlays || [];
    const rows = overlays.length
      ? overlays.map(o => '<li class="ss-rule"><div class="ss-rule__text">' + o.rule + '</div><div class="t-body-sm muted">' + o.author + ' · ' + o.createdAt + '</div></li>').join('')
      : '<li class="muted">' + i18n.t('skill.manual_empty') + '</li>';
    return (
      '<section class="ss-col">' +
      '<header class="ss-col__head"><h2 class="t-heading-md">' + i18n.t('skill.col_manual') + '</h2>' +
        '<span class="chip chip-accent">' + overlays.length + '</span></header>' +
        '<ul class="ss-rules">' + rows + '</ul>' +
        '<button class="btn btn-sm btn-primary" data-act="add-rule">＋ ' + i18n.t('skill.add_rule') + '</button>' +
      '</section>'
    );
  }

  function colLearned(s) {
    const pats = s.learnedPatterns || [];
    /* [V2-PATCH 2026-04-19] PatternBadge in each row */
    const rows = pats.length
      ? pats.map(p => '<li class="ss-learn"><div class="row-between"><div class="ss-rule__text">' + p.pattern + '</div>' + W.patternBadge({ kind: 'learned', count: p.evidenceCount }) + '</div><div class="t-body-sm muted">' + p.firstSeen + ' → ' + p.lastSeen + ' · TTL ' + p.ttlDays + 'd · <span class="chip chip-warning">' + i18n.t('skill.pending_consolidation') + '</span></div></li>').join('')
      : '<li class="muted">' + i18n.t('skill.learned_empty') + '</li>';
    return (
      '<section class="ss-col">' +
      '<header class="ss-col__head"><h2 class="t-heading-md">' + i18n.t('skill.col_learned') + '</h2>' +
        '<span class="chip chip-warning">' + pats.length + '</span></header>' +
        '<ul class="ss-rules">' + rows + '</ul>' +
        '<div class="t-body-sm muted" style="margin-top:var(--space-3)">' + i18n.t('skill.ttl_label') + ': <strong>90d</strong> (configurable 30-180)</div>' +
      '</section>'
    );
  }

  function goldSection(s) {
    return (
      '<section class="ss-gold card">' +
      '<h3 class="t-heading-md">' + i18n.t('skill.gold_samples') + '</h3>' +
      '<ul class="ss-rules">' + s.goldSamples.map(g => '<li>★ <strong>' + g.label + '</strong> <span class="muted">· ' + g.createdBy + ' · ' + g.approvedAt + '</span></li>').join('') + '</ul>' +
      '</section>'
    );
  }

  function escape(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function injectStyles() {
    if (document.getElementById('ss-styles')) return;
    const s = document.createElement('style'); s.id = 'ss-styles';
    s.textContent = `
.ss-wrap { display:flex; flex-direction:column; gap:var(--space-5); max-width:1400px; }
.ss-head { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:var(--space-3); }
.ss-head h1 { margin:0; }
.ss-head-actions { display:flex; align-items:center; gap:var(--space-2); }
.ss-cols { display:grid; grid-template-columns:1fr 1fr 1fr; gap:var(--space-4); }
@media (max-width: 1100px) { .ss-cols { grid-template-columns:1fr; } }
.ss-col { background:var(--bg-surface); border:1px solid var(--stroke-default); border-radius:var(--radius-lg); padding:var(--space-4); display:flex; flex-direction:column; gap:var(--space-2); }
.ss-col--base { background:var(--bg-subtle); }
.ss-col__head { display:flex; justify-content:space-between; align-items:center; margin-bottom:var(--space-1); }
.ss-col__head h2 { margin:0; }
.ss-meta { display:grid; grid-template-columns:auto 1fr; gap:var(--space-1) var(--space-3); margin:0; font-size:12px; }
.ss-meta dt { color:var(--text-muted); }
.ss-meta dd { margin:0; }
.ss-prompt { background:var(--bg-sunken); padding:var(--space-2) var(--space-3); border-radius:var(--radius-sm); font-family:var(--font-mono); font-size:11.5px; max-height:180px; overflow:auto; white-space:pre-wrap; margin:var(--space-1) 0; color:var(--text-secondary); }
.ss-rules { list-style:none; padding:0; margin:0; display:flex; flex-direction:column; gap:var(--space-2); }
.ss-rule, .ss-learn { padding:var(--space-2) var(--space-3); background:var(--bg-subtle); border-radius:var(--radius-md); border-left:3px solid var(--stroke-default); }
.ss-col--base .ss-rule { background:var(--bg-surface); }
.ss-learn { border-left-color: var(--thermo-warm); }
.ss-rule__text { font-size:13px; color:var(--text-primary); }
.ss-gold { padding:var(--space-5); }
.ss-gold h3 { margin:0 0 var(--space-3) 0; }
/* [V3-PATCH] sandbox */
.ss-sandbox { padding:var(--space-4); }
.ss-sandbox h3 { margin:0; }
/* [V4-PATCH 2026-04-22] Voice Profile card */
.ss-voice-profile { padding:var(--space-3) var(--space-4); border-left:3px solid var(--brand-coral); background:var(--accent-primary-soft); }
.ss-voice-profile h3 { margin:0 0 var(--space-1) 0; }
.ss-voice-summary { display:flex; gap:var(--space-2); flex-wrap:wrap; margin-top:var(--space-2); }
    `;
    document.head.appendChild(s);
  }

  FL.modules['skill-studio'] = { mount, meta: { route: '/skills/:id' } };
})();
</script>

<script>
(function () {
  const FL = window.__faberloom; if (!FL) return;
  const W = FL.widgets, i18n = FL.i18n;
  let root = null;

  function mount(slot, ctx) {
    root = slot; injectStyles();
    const id = ctx.params.id || 'ag_cotizador';
    const agent = FL.mock.agents.find(a => a.id === id) || FL.mock.agents[0];
    render(agent);
    return { unmount: () => { if (root) root.innerHTML = ''; } };
  }

  function levelIdx(code) {
    const m = { L0:0, L1:1, L2:2, L3:3, L4:4 };
    return m[code] != null ? m[code] : 0;
  }

  function render(agent) {
    const t = k => i18n.t(k);
    const idx = levelIdx(agent.autonomy);
    const therm = W.thermometer(agent.thermometer && agent.thermometer.state || 'cold', agent.thermometer && agent.thermometer.value || 0);
    const ladder = W.autonomyLadder(idx, { unlock: agent.unlockCriterion });

    /* [V2-PATCH 2026-04-19] 5th tab Conversación
       [V3.5-PATCH 2026-04-19] 6th tab Versionado */
    const tabs = W.tabs([
      { id: 'summary',      label: t('agent.tab_summary'),      panel: renderSummary(agent, ladder) },
      { id: 'conversation', label: t('nav.chat', 'Conversación'), panel: renderConversation(agent) },
      { id: 'skills',       label: t('agent.tab_skills'),        panel: renderSkills(agent) },
      { id: 'memory',       label: t('agent.tab_memory'),        panel: renderMemory(agent) },
      { id: 'logs',         label: t('agent.tab_logs'),          panel: renderLogs(agent) },
      { id: 'versioning',   label: t('agent.tab_versioning', 'Versionado'), panel: renderVersioning(agent) }
    ], { active: 'summary' });

    /* [V3.5-PATCH 2026-04-19] lifecycle controls + spec version */
    const canManage = FL.session.role === 'owner' || FL.session.role === 'admin';
    const status = agent.lifecycleStatus || 'active';
    /* [V4-PATCH 2026-04-22] Sealed/Open origin + Fork CTA */
    const flags = (FL.mock.sealedOpenFlags && FL.mock.sealedOpenFlags.agents && FL.mock.sealedOpenFlags.agents[agent.id]) || { origin:'open' };
    const sealedBadge = W.sealedOpenBadge(flags.origin);
    const forkCta = flags.origin === 'sealed' ? W.forkToOpenCta(agent.id, 'agent') : '';
    root.innerHTML =
      '<div class="ac-wrap">' +
        '<header class="ac-head">' +
          '<div><h1 class="t-display-md">' + agent.name + ' ' + sealedBadge + '</h1>' +
          '<p class="t-body-sm muted">Trigger: <code>' + (agent.triggerWord || '—') + '</code> ' +
          '<span class="chip" style="font-size:10px;">' + (agent.triggerKind || (agent.triggerWord && agent.triggerWord.startsWith('/') ? 'word' : agent.triggerWord === '(auto)' ? 'event' : agent.triggerWord === '(interno)' ? 'schedule' : 'word')) + '</span> · ' +
          'State: <strong>' + status + '</strong> · Tier: <span class="chip">' + agent.tier + '</span> · ' +
          'Spec: <code>v' + (agent.specVersion || '?') + '</code>' +
          (flags.spec_sealed_hash ? ' · sealed hash <code class="t-mono" style="font-size:10px;">' + flags.spec_sealed_hash + '</code>' : '') +
          (flags.forkedFrom ? ' · forked from <code>' + flags.forkedFrom + '</code>' : '') +
          '</p>' +
          '<p class="t-body-sm muted"><a href="#/agentes" style="color:var(--accent-primary);">← Lista de agentes</a></p></div>' +
          '<div class="ac-head-side">' + therm +
            (forkCta ? ' ' + forkCta : '') +
            (canManage ? ' <button class="btn btn-sm" data-life="edit">✎ Editar Spec</button>' +
                         ' <button class="btn btn-sm" data-life="clone">⎘ Clonar</button>' +
                         (status === 'active' ? ' <button class="btn btn-sm" data-life="pause">⏸ Pausar</button>' : status === 'paused' || status === 'shadow' ? ' <button class="btn btn-sm" data-life="resume">▶ Reactivar</button>' : '') +
                         (status !== 'retired' ? ' <button class="btn btn-sm btn-ghost" data-life="retire">🗑 Retirar</button>' : '')
              : '') +
          '</div>' +
        '</header>' +
        tabs +
      '</div>';
    W.wireTabs(root.querySelector('[data-widget="tabs"]'));
    /* [V3-PATCH 2026-04-19] wire embedded chatThread inside conversation tab */
    const dbgThread = root.querySelector('.fl-cthread');
    if (dbgThread) W.wireChatThread(dbgThread, {
      onSend: text => FL.bus.emit('toast', { kind:'info', message:'Debug thread · enviado: "' + text.slice(0, 40) + '..."' })
    });
    /* [V4-PATCH 2026-04-22] Authority slider + Position + Fork-to-Open wiring */
    W.wireForkCta && W.wireForkCta(root, (entityId) => {
      FL.mock.auditEvents && FL.mock.auditEvents.unshift({
        id:'ae_' + Date.now(), ts:new Date().toISOString(), actorId:FL.session.userId,
        kind:'agent_fork_to_open', level:'INFO', resourceType:'agent_spec', resourceId:entityId,
        summary:'Agent ' + entityId + ' forkeado a Open · reset to L0 Shadow · memoria aislada · sin canal updates'
      });
    });
    W.wireAuthoritySlider && W.wireAuthoritySlider(root, (newMode) => {
      agent.authorityMode = newMode;
      FL.mock.auditEvents && FL.mock.auditEvents.unshift({
        id:'ae_' + Date.now(), ts:new Date().toISOString(), actorId:FL.session.userId,
        kind:'agent_authority_change', level:'INFO', resourceType:'agent_spec', resourceId:agent.id,
        summary:'Authority mode → ' + newMode + ' (ladder=' + agent.autonomy + ')'
      });
      FL.bus.emit('toast', { kind:'info', message:'Authority mode: ' + newMode + ' · canales externos siempre draft-first.' });
    });
    /* Position field change */
    const posSel = root.querySelector('[data-field="position"]');
    if (posSel) posSel.addEventListener('change', () => {
      agent.positionId = posSel.value;
      FL.mock.auditEvents && FL.mock.auditEvents.unshift({
        id:'ae_' + Date.now(), ts:new Date().toISOString(), actorId:FL.session.userId,
        kind:'agent_position_change', level:'INFO', resourceType:'agent_spec', resourceId:agent.id,
        summary:'Position → ' + posSel.value + ' (D12 · position_id owns skills/memory, not user_id)'
      });
      FL.bus.emit('toast', { kind:'info', message:'Position actualizada · skills/memoria pertenecen a la posición, no al usuario.' });
    });
    /* [V3-PATCH 2026-04-19] promote button → modal con evidencia + CEO approval */
    const pb = root.querySelector('[data-act="promote-agent"]');
    if (pb) pb.addEventListener('click', () => openPromoteModal(agent));

    /* [V3.5-PATCH 2026-04-19] lifecycle controls in header */
    root.querySelectorAll('[data-life]').forEach(b => {
      b.addEventListener('click', () => handleLifecycle(b.getAttribute('data-life'), agent));
    });
    /* [V3.5-PATCH 2026-04-19] rollback buttons in versioning tab */
    root.querySelectorAll('[data-rollback]').forEach(b => {
      b.addEventListener('click', () => handleRollback(agent, b.getAttribute('data-rollback')));
    });
  }

  function handleLifecycle(action, agent) {
    if (action === 'pause') { agent.lifecycleStatus = 'paused'; logAudit(agent.id, 'agent_spec.paused'); FL.bus.emit('toast', { kind:'info', message:'Agente pausado' }); render(agent); return; }
    if (action === 'resume') { agent.lifecycleStatus = 'active'; logAudit(agent.id, 'agent_spec.resumed'); FL.bus.emit('toast', { kind:'success', message:'Agente reactivado' }); render(agent); return; }
    if (action === 'retire') {
      if (!confirm('Retirar agente "' + agent.name + '"? Soft retire (no se borra).')) return;
      agent.lifecycleStatus = 'retired'; logAudit(agent.id, 'agent_spec.retired');
      FL.bus.emit('toast', { kind:'warn', message:'Agente retirado · audit_event registrado' });
      render(agent); return;
    }
    if (action === 'edit') {
      W.openAgentSpecWizard({
        mode:'edit', initial:agent,
        onSubmit: spec => {
          const newV = bumpVersion(agent.specVersion || '1.0.0');
          agent.specSupersedes = agent.specVersion;
          agent.specVersion = newV;
          Object.assign(agent, spec);
          FL.mock.agentSpecVersions.push({ id:'asv_' + Date.now(), agentId:agent.id, specVersion:newV, publishedAt:new Date().toISOString(), publishedBy:FL.session.userId, supersedes:agent.specSupersedes, changeNote:'Edit via wizard' });
          logAudit(agent.id, 'agent_spec.published');
          FL.bus.emit('toast', { kind:'success', message:'✓ AgentSpec v' + newV + ' publicada · supersedes v' + agent.specSupersedes });
          render(agent);
        }
      });
    }
    if (action === 'clone') {
      W.openAgentSpecWizard({
        mode:'clone', initial:Object.assign({}, agent, { id:null }),
        onSubmit: spec => {
          FL.bus.emit('toast', { kind:'success', message:'✓ Clon configurado · ir a /agentes para verlo en lista' });
          location.hash = '#/agentes';
        }
      });
    }
  }

  function handleRollback(agent, targetVersion) {
    if (!confirm('Rollback de v' + agent.specVersion + ' a v' + targetVersion + '? Esto crea una NUEVA versión que copia el contenido de v' + targetVersion + ' (no rebobina histórico).')) return;
    const newV = bumpVersion(agent.specVersion);
    const prev = agent.specVersion;
    agent.specSupersedes = prev;
    agent.specVersion = newV;
    FL.mock.agentSpecVersions.push({ id:'asv_' + Date.now(), agentId:agent.id, specVersion:newV, publishedAt:new Date().toISOString(), publishedBy:FL.session.userId, supersedes:prev, changeNote:'Rollback to v' + targetVersion + ' content (forward-only via new version)' });
    logAudit(agent.id, 'agent_spec.published');
    FL.bus.emit('toast', { kind:'success', message:'✓ Rollback completado · v' + newV + ' clona contenido de v' + targetVersion });
    render(agent);
  }

  function bumpVersion(v) {
    const parts = String(v).split('.');
    parts[parts.length - 1] = String(parseInt(parts[parts.length - 1] || '0', 10) + 1);
    return parts.join('.');
  }
  function logAudit(agentId, action) {
    FL.mock.auditEvents.unshift({ id:'ae_' + Date.now(), ts:new Date().toISOString(), tenantId:FL.session.tenantId, actor:FL.session.userId, action, target:agentId, severity:'INFO', ip:'10.0.0.1', userAgent:'FaberLoom/1.0' });
  }

  function openPromoteModal(agent) {
    const k = agent.kpis;
    const idx = levelIdx(agent.autonomy);
    const targetLevel = 'L' + (idx + 1);
    W.openModal(
      '<h2 id="fl-modal-title" class="t-heading-lg" style="margin:0 0 var(--space-3);">🚀 Promover ' + agent.name + ' a ' + targetLevel + '</h2>' +
      '<div class="t-body-sm muted" style="margin-bottom:var(--space-3);">Esto envía un evento al Tenant Owner (CEO) para revisión final.</div>' +
      '<dl class="bd-risk-grid">' +
      '<dt>Nivel actual</dt><dd>' + agent.autonomy + '</dd>' +
      '<dt>Nivel propuesto</dt><dd><strong style="color:var(--accent-primary);">' + targetLevel + '</strong></dd>' +
      '<dt>Runs 30d</dt><dd><code>' + k.runs30d + '</code></dd>' +
      '<dt>Approval rate</dt><dd><code>' + (k.approvalRate * 100).toFixed(1) + '%</code></dd>' +
      '<dt>Fail rate</dt><dd><code>' + (k.failRate * 100).toFixed(1) + '%</code></dd>' +
      '<dt>Costo USD 30d</dt><dd><code>$' + k.costUSD30d + '</code></dd>' +
      '<dt>Approval thresholds</dt><dd class="muted">≥10 runs · ≥80% approval · ≤10% rejection · ≥14d estables · CEO required (A4 P4)</dd>' +
      '</dl>' +
      '<div style="display:flex;gap:var(--space-2);justify-content:flex-end;margin-top:var(--space-4);">' +
        '<button class="btn" data-promo-act="cancel">Cancelar</button>' +
        '<button class="btn btn-primary" data-promo-act="send">Enviar al CEO</button>' +
      '</div>',
      { width: 540 }
    );
    document.querySelector('[data-promo-act="cancel"]').addEventListener('click', () => W.closeModal());
    document.querySelector('[data-promo-act="send"]').addEventListener('click', () => {
      /* push an inbox item for the owner */
      FL.mock.inboxItems.unshift({
        id:'in_promo_' + Date.now(), kind:'approval_request', tenantId:FL.session.tenantId,
        from:{ name:'Sistema', email:'system@faberloom', channel:'system' },
        subject:'Aprobación promoción ' + agent.name + ' → ' + targetLevel,
        preview:'Solicitud de promoción a ' + targetLevel + ' basada en evidencia (≥10 runs, ' + (k.approvalRate*100).toFixed(0) + '% approval). CEO requerido per A4 P4.',
        receivedAt: new Date().toISOString(), state:'pending_my_approval', priority:'high',
        assignedTo:'u_alvaro',
        metadata:{ agentId:agent.id, fromLevel:agent.autonomy, toLevel:targetLevel, evidence:{ runs:k.runs30d, approval:k.approvalRate, fail:k.failRate } }
      });
      W.closeModal();
      FL.bus.emit('toast', { kind:'success', message:'Solicitud enviada al CEO · visible en bandeja como approval_request' });
    });
  }

  function renderSummary(agent, ladder) {
    const k = agent.kpis;
    const kpiHtml = (label, val) => '<div class="ac-kpi"><div class="t-label-sm muted">' + label + '</div><div class="t-display-sm">' + val + '</div></div>';
    const kpiRow =
      kpiHtml(i18n.t('agent.kpi_runs'), k.runs30d) +
      kpiHtml(i18n.t('agent.kpi_approval'), (k.approvalRate * 100).toFixed(0) + '%') +
      kpiHtml(i18n.t('agent.kpi_latency'), k.avgLatencyMin + 'min') +
      kpiHtml(i18n.t('agent.kpi_fail'), (k.failRate * 100).toFixed(0) + '%') +
      kpiHtml(i18n.t('agent.kpi_cost'), '$' + k.costUSD30d);

    /* [V3-PATCH 2026-04-19] Ready-to-promote CTA per A4 thresholds */
    const checkReady = () => {
      const idx = levelIdx(agent.autonomy);
      if (idx >= 4) return { ready:false, msg:'Nivel máximo alcanzado.' };
      // SHADOW→L1 exception: ≥3 runs + >70% approval
      if (idx === 0) {
        const ok = k.runs30d >= 3 && k.approvalRate > 0.70;
        return { ready: ok, msg: ok
          ? '✓ Listo para subir a L1 PROPONE (≥3 runs SHADOW + >70% approval cumplido).'
          : '⏳ ' + k.runs30d + '/3 runs · ' + (k.approvalRate * 100).toFixed(0) + '%/70% approval. Falta evidencia para SHADOW→L1.' };
      }
      // global thresholds: ≥10 runs · ≥80% · ≤10% reject · ≥14 días estables
      const ok = k.runs30d >= 10 && k.approvalRate >= 0.80 && k.failRate <= 0.10;
      return { ready: ok, msg: ok
        ? '✓ Listo para subir a L' + (idx + 1) + '. Cumple thresholds globales A4.'
