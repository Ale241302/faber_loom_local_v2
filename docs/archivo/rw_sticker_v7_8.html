*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0f2f5;min-height:100vh}
button{cursor:pointer;transition:all .2s}
.row{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:center}
.swatch{display:flex;align-items:center;gap:6px}
.swatch-box{width:24px;height:24px;border-radius:4px;border:1px solid rgba(0,0,0,.15);display:flex;align-items:center;justify-content:center}
.swatch-box span{font-size:7px;font-weight:700}
.swatch-info{font-size:9px;font-weight:600;color:#013A57}
.swatch-hex{font-size:8px;color:#999;font-family:monospace}

/* ═══ FICHA DE PRODUCTO — dynamic color via CSS vars ═══ */
.ficha-wrapper{max-width:100%;margin:0 20px 16px;border-radius:12px;overflow:hidden;border:1.5px solid var(--fc-accent,#ddd);background:#fff;box-shadow:0 2px 12px color-mix(in srgb,var(--fc-main,#013A57) 8%,transparent)}
.ficha-hdr{padding:16px 20px;display:flex;align-items:center;gap:16px;background:color-mix(in srgb,var(--fc-main,#013A57) 4%,#fff)}
.ficha-badge{font-family:'Arial Black',sans-serif;font-size:28px;font-weight:900;letter-spacing:2px;color:#fff;padding:10px 18px;border-radius:8px;line-height:1;box-shadow:0 2px 8px color-mix(in srgb,var(--fc-main) 30%,transparent)}
.ficha-info{flex:1}
.ficha-title{font-size:12px;font-weight:800;letter-spacing:1.5px;color:var(--fc-main,#013A57)}
.ficha-sub{font-size:10px;color:color-mix(in srgb,var(--fc-main) 40%,#888);margin-top:2px}
.ficha-section-title{font-size:10px;font-weight:800;color:var(--fc-main,#013A57);letter-spacing:1.5px;text-transform:uppercase;padding:0 20px;margin:14px 0 8px;display:flex;align-items:center;gap:6px}
.ficha-section-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,color-mix(in srgb,var(--fc-accent) 30%,transparent),transparent)}
.spec-row-grid{display:grid;grid-template-columns:90px 1fr 90px;align-items:center;gap:8px;padding:0 20px;margin-bottom:8px}
.spec-lbl{font-size:9px;font-weight:700;color:var(--fc-main,#013A57);opacity:.8}
.spec-lbl-l{text-align:right}
.spec-lbl-r{text-align:left}
.spec-track{position:relative;height:22px;background:color-mix(in srgb,var(--fc-main,#013A57) 6%,#f4f5f7);border-radius:11px;border:1px solid color-mix(in srgb,var(--fc-main) 8%,transparent)}
.spec-dot{position:absolute;top:50%;transform:translate(-50%,-50%);width:22px;height:22px;border-radius:50%;border:2px solid #fff;box-shadow:0 1px 6px color-mix(in srgb,var(--fc-main) 35%,transparent);display:flex;align-items:center;justify-content:center;z-index:2}
.spec-dot span{font-size:8px;font-weight:900;color:#fff}
.spec-fill{position:absolute;top:0;left:0;height:100%;border-radius:11px;opacity:0.12}
.spec-ticks-inner{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:space-between;padding:0 4px}
.spec-tk{width:1px;height:5px;background:color-mix(in srgb,var(--fc-main) 12%,transparent)}
.spec-tk.mid{height:10px;background:color-mix(in srgb,var(--fc-main) 20%,transparent)}
.uni-row-grid{display:grid;grid-template-columns:140px 1fr 36px;align-items:center;gap:8px;padding:0 20px;margin-bottom:6px}
.uni-lbl{font-size:9px;font-weight:700;color:var(--fc-main,#013A57);text-align:right;opacity:.8}
.uni-track{position:relative;height:16px;background:color-mix(in srgb,var(--fc-main) 6%,#f4f5f7);border-radius:8px;overflow:hidden;border:1px solid color-mix(in srgb,var(--fc-main) 8%,transparent)}
.uni-fill{height:100%;border-radius:8px}
.uni-val{font-size:10px;font-weight:800;color:var(--fc-main,#013A57);text-align:center}
.cmp-grid{display:grid;grid-template-columns:minmax(120px,auto) repeat(7,1fr) minmax(120px,auto);gap:0;font-size:9px;padding:0 12px 12px}
.cmp-hdr{font-weight:800;color:var(--fc-main,#013A57);padding:5px 3px;text-align:center;border-bottom:2px solid var(--fc-accent,#013A57)}
.cmp-hdr.lc{text-align:right;padding-right:8px;color:#1a1a1a}
.cmp-hdr.rc{text-align:left;padding-left:8px;color:#1a1a1a}
.cmp-cell{padding:4px 3px;text-align:center;border-bottom:1px solid color-mix(in srgb,var(--fc-main) 8%,#eee)}
.cmp-cell.lc{font-weight:900;color:#1a1a1a;text-align:right;padding-right:8px;font-size:9.5px;letter-spacing:.3px}
.cmp-cell.rc{font-weight:900;color:#1a1a1a;text-align:left;padding-left:8px;font-size:9.5px;letter-spacing:.3px}
.cmp-dot{display:inline-block;width:20px;height:20px;border-radius:50%;line-height:20px;text-align:center;font-weight:800;font-size:8px;color:#fff;border:1.5px solid rgba(0,0,0,.12)}
</style>

const PROD_SPECS={
  GOLIATH:  {thickness:8, firmness:8, rigidity:6, impact:9, energy:7, moisture:7},
  VELOX:    {thickness:3, firmness:6, rigidity:2, impact:5, energy:9, moisture:7},

  LEOPARD:  {thickness:7, firmness:6, rigidity:4, impact:7, energy:6, moisture:7},
  BISON:    {thickness:7, firmness:6, rigidity:4, impact:9, energy:6, moisture:7},
  MANTA:    {thickness:4, firmness:9, rigidity:7, impact:9, energy:4, moisture:7},
  ORCA:     {thickness:5, firmness:6, rigidity:4, impact:9, energy:6, moisture:7},
};
const BIPOLAR_AXES=[
  {leftKey:"thin",rightKey:"thick",key:"thickness"},
  {leftKey:"soft",rightKey:"firm",key:"firmness"},
  {leftKey:"flex",rightKey:"rigid",key:"rigidity"},
];
const UNIPOLAR_AXES=[
  {leftKey:"impactLow",rightKey:"impactHigh",key:"impact",icon:"\ud83d\udee1\ufe0f"},
  {leftKey:"energyLow",rightKey:"energyHigh",key:"energy",icon:"\u26a1"},
  {leftKey:"moistureLow",rightKey:"moistureHigh",key:"moisture",icon:"\ud83d\udca7"},
];

function fichaPanel(prod){
  const p=P[prod];
  const sp=PROD_SPECS[prod];
  const mc=p.hdr.bg;
  const ac=p.ac;
  const mcTx=isDark(mc)?'#fff':'#1a1a1a';
  const t=MK[state.market].i18n;

  function specBar(val){
    const pct=5+((val-1)/9)*90;
    let tks='';
    for(let i=0;i<10;i++) tks+='<div class="spec-tk'+(i===4?' mid':'')+'"></div>';
    return '<div class="spec-track"><div class="spec-fill" style="width:'+pct+'%;background:'+mc+'"></div><div class="spec-ticks-inner">'+tks+'</div><div class="spec-dot" style="left:'+pct+'%;background:'+mc+'"><span>'+val+'</span></div></div>';
  }

  function uniBarF(val){
    return '<div class="uni-track"><div class="uni-fill" style="width:'+(val*10)+'%;background:linear-gradient(90deg,'+ac+' 0%,'+mc+' 100%)"></div></div>';
  }

  let h='<div class="ficha-wrapper" style="--fc-main:'+mc+';--fc-accent:'+ac+'">';

  h+='<div style="background:linear-gradient(135deg,'+mc+' 60%,'+ac+');padding:4px 20px;display:flex;align-items:center;justify-content:space-between">';
  h+='<span style="font-size:10px;font-weight:800;color:'+mcTx+';letter-spacing:1.5px;opacity:.85">'+t.fichaTitle+'</span>';
  h+='<span style="font-size:7px;font-weight:700;color:'+mcTx+';opacity:.4;letter-spacing:1px">'+p.sku+'</span>';
  h+='</div>';

  h+='<div class="ficha-hdr">';
  h+='<div class="ficha-badge" style="background:linear-gradient(135deg,'+mc+',color-mix(in srgb,'+mc+' 80%,'+ac+'))">'+p.name.charAt(0)+'</div>';
  h+='<div class="ficha-info"><div class="ficha-title" style="color:'+mc+'">'+p.name+'</div><div class="ficha-sub">'+p.archOpts.join(" / ")+' \u00b7 '+p.label+'</div></div>';
  h+='</div>';

  h+='<div class="ficha-section-title" style="color:'+mc+'"><span style="color:'+ac+'">\u25cf</span> '+t.sensationTitle+'</div>';
  BIPOLAR_AXES.forEach(function(ax){
    h+='<div class="spec-row-grid"><div class="spec-lbl spec-lbl-l" style="color:'+mc+'">'+t[ax.leftKey]+'</div>'+specBar(sp[ax.key])+'<div class="spec-lbl spec-lbl-r" style="color:'+mc+'">'+t[ax.rightKey]+'</div></div>';
  });

  h+='<div class="ficha-section-title" style="margin-top:16px;color:'+mc+'"><span style="color:'+ac+'">\u25cf</span> '+t.perfTitle+'</div>';
  UNIPOLAR_AXES.forEach(function(ax){
    h+='<div class="uni-row-grid"><div class="uni-lbl" style="color:'+mc+'">'+ax.icon+' '+t[ax.key]+'</div>'+uniBarF(sp[ax.key])+'<div class="uni-val" style="color:'+mc+'">'+sp[ax.key]+'/10</div></div>';
  });

  h+='<div style="margin-top:16px;padding:8px 0;background:color-mix(in srgb,'+mc+' 3%,#fafbfc);border-top:1.5px solid color-mix(in srgb,'+ac+' 20%,#eee)">';
  h+='<div class="ficha-section-title" style="color:'+mc+'"><span style="color:'+ac+'">\u25cf</span> '+t.cmpTitle+'</div>';
  h+='<div class="cmp-grid">';
  // Header row: left label | 7 models | right label
  h+='<div class="cmp-hdr lc" style="color:'+mc+';border-color:'+ac+'"></div>';
  Object.keys(P).forEach(function(k){
    var cur=k===prod;
    h+='<div class="cmp-hdr" style="color:'+(cur?P[k].hdr.bg:'#999')+';border-color:'+(cur?ac:'#ddd')+';'+(cur?'font-size:10px':'font-size:8px')+';cursor:pointer" onclick="sel(\'prod\',\''+k+'\')">'+k.slice(0,3)+'</div>';
  });
  h+='<div class="cmp-hdr rc" style="color:#999;border-color:#ddd"></div>';
  var allAxes=[].concat(BIPOLAR_AXES,UNIPOLAR_AXES);
  allAxes.forEach(function(ax){
    var lblL=t[ax.leftKey];
    var lblR=t[ax.rightKey];
    h+='<div class="cmp-cell lc" style="color:'+mc+'">'+lblL+'</div>';
    var vals=Object.keys(P).map(function(k){return PROD_SPECS[k][ax.key]});
    var mx=Math.max.apply(null,vals);
    Object.keys(P).forEach(function(k){
      var v=PROD_SPECS[k][ax.key];
      var cur=k===prod;
      var bg2=cur?mc:(v===mx?ac:'#d5d5d5');
      h+='<div class="cmp-cell" style="border-color:color-mix(in srgb,'+mc+' 6%,#eee)"><span class="cmp-dot" style="background:'+bg2+';'+(cur?'box-shadow:0 0 0 2.5px '+ac+',0 1px 4px rgba(0,0,0,.2)':'')+'">'+v+'</span></div>';
    });
    h+='<div class="cmp-cell rc" style="color:'+ac+'">'+lblR+'</div>';
  });
  h+='</div></div>';

  // ── COLOR SPEC (4ta sección dentro de la ficha) ──
  var ic=INSOLE_COLORS[prod];
  if(ic){
    var acTx=isDark(ac)?'#fff':'#1a1a1a';
    function _chip(hex,sz){
      sz=sz||14;
      return '<div style="display:inline-block;width:'+sz+'px;height:'+sz+'px;border-radius:3px;background:'+hex+';border:1px solid rgba(0,0,0,.15);vertical-align:middle"></div>';
    }
    function _stripe(base,pats){
      var g='repeating-linear-gradient(-55deg,'+base+','+base+' 5px';
      for(var i=0;i<pats.length;i++){g+=','+pats[i]+' 5px,'+pats[i]+' 8px'}
      g+=','+base+' 8px,'+base+' 13px)';
      return g;
    }
    function _layerRow(hex,label){
      var tx=isDark(hex)?'#fff':'#1a1a1a';
      return '<div style="display:flex;align-items:center;gap:8px;padding:4px 8px;background:'+hex+';border-radius:4px;border:1px solid rgba(0,0,0,.12)">'+
        '<span style="font-size:8px;font-weight:800;color:'+tx+';letter-spacing:.5px">'+label+'</span>'+
        '<span style="font-size:7px;color:'+tx+';opacity:.7;font-family:monospace;margin-left:auto">'+_cn(hex)+' '+hex+'</span>'+
        '<span style="font-size:7px;color:'+tx+';opacity:.6;font-weight:600">'+_pms(hex)+'</span></div>';
    }
    function _texLayer(base,pats){
      var tx=isDark(base)?'#fff':'#1a1a1a';
      return '<div style="display:flex;align-items:center;gap:8px;padding:4px 8px;background:'+_stripe(base,pats)+';border-radius:4px;border:1px solid rgba(0,0,0,.12)">'+
        '<span style="font-size:8px;font-weight:800;color:'+tx+';letter-spacing:.5px;text-shadow:0 0 3px '+base+'">'+t.texLabel+'</span>'+
        '<span style="font-size:7px;color:'+tx+';opacity:.8;font-family:monospace;margin-left:auto;text-shadow:0 0 3px '+base+'">'+_cn(base)+' '+t.stripes+'</span></div>';
    }
    function _sideCol(side,label){
      var s='<div style="flex:1;display:flex;flex-direction:column;gap:4px">';
      s+='<div style="font-size:7px;font-weight:800;letter-spacing:1px;color:#94a3b8;text-align:center;text-transform:uppercase">'+label+'</div>';
      s+=_texLayer(side.tex,side.pat);
      s+=_layerRow(side.pu,t.puLabel);
      s+='<div style="display:flex;flex-direction:column;gap:3px;margin-top:4px">';
      s+='<div style="display:flex;align-items:center;gap:6px">'+_chip(side.pu)+'<div style="line-height:1.1"><div style="font-size:7px;font-weight:800;color:#94a3b8">'+t.puRole+'</div><div style="font-size:9px;font-weight:700">'+_cn(side.pu)+'</div><div style="font-size:7px;color:#64748b">'+_pms(side.pu)+'</div></div></div>';
      s+='<div style="display:flex;align-items:center;gap:6px">'+_chip(side.tex)+'<div style="line-height:1.1"><div style="font-size:7px;font-weight:800;color:#94a3b8">'+t.texBase+'</div><div style="font-size:9px;font-weight:700">'+_cn(side.tex)+'</div><div style="font-size:7px;color:#64748b">'+_pms(side.tex)+'</div></div></div>';
      for(var i=0;i<side.pat.length;i++){
        s+='<div style="display:flex;align-items:center;gap:6px">'+_chip(side.pat[i])+'<div style="line-height:1.1"><div style="font-size:7px;font-weight:800;color:#94a3b8">'+t.patLabel+'</div><div style="font-size:9px;font-weight:700">'+_cn(side.pat[i])+'</div><div style="font-size:7px;color:#64748b">'+_pms(side.pat[i])+'</div></div></div>';
      }
      s+='</div></div>';
      return s;
    }

    h+='<div style="margin-top:16px;padding:8px 0 0;border-top:1.5px solid color-mix(in srgb,'+ac+' 20%,#eee)">';
    h+='<div class="ficha-section-title" style="color:'+mc+'"><span style="color:'+ac+'">\u25cf</span> '+t.colorTitle+'</div>';
    h+='<div style="padding:0 20px 4px;font-size:9px;color:#475569;line-height:1.5">';
    h+='<span style="display:inline-block;font-size:7px;font-weight:900;padding:1px 4px;border-radius:2px;background:'+mc+';color:'+mcTx+';vertical-align:middle">PU</span> '+t.colorPU+' + ';
    h+='<span style="display:inline-block;font-size:7px;font-weight:900;padding:1px 4px;border-radius:2px;background:'+ac+';color:'+acTx+';vertical-align:middle">'+t.texLabel+'</span> '+t.colorTex;
    if(ic.excKey&&t[ic.excKey]) h+='<br><span style="font-size:8px;color:#854d0e;background:#fefce8;padding:1px 4px;border-radius:2px">\u26a0 '+t[ic.excKey]+'</span>';
    h+='</div>';
    h+='<div style="display:flex;gap:12px;padding:8px 20px 16px">';
    h+=_sideCol(ic.L,'\u2190 '+t.left);
    h+=_sideCol(ic.R,t.right+' \u2192');
    h+='</div>';
    h+='</div>';
  }

  h+='</div>';
  return h;
}

function frontSticker(sz,data,mkt,prod,arch){
  const p=P[prod];
  const t=mkt.i18n;
  const rows=mkt.fr.filter(r=>has(data[r.k]));
  const isMany=rows.length>5;
  const fl=isMany?10:12;
  const fv=isMany?11:13;
  const rp=isMany?"2px 0":"3px 0";
  const extraLbl=mkt.extra==="inch"?"INCH":"CM";
  const extraV=mkt.extra==="inch"?data.inch:data.cm+" cm";
  const szc=SIZE_COLORS[sz]||{bg:'#ccc',tx:'#333'};

  if(p.variant==="A"){
    // Variant A FRONT: navy bg, S# badge = SIZE_COLORS bg/tx
    const w=isMany?260:240;
    const archLabel=arch==="LOW"?t.low:arch==="HIGH"?t.high:t.med;
    const ac_=ARCH_COLORS[arch]||ARCH_COLORS.MED;
    let h=`<div style="width:${w}px;border-radius:10px;overflow:hidden;background:${p.hdr.bg}">`;
    h+=`<div style="padding:3px 0;text-align:center;background:${ac_.bg}"><span style="font-size:9px;font-weight:800;color:${ac_.tx};letter-spacing:1.5px;text-transform:uppercase">${t.archProfile}: ${archLabel}</span></div>`;
    h+=`<div style="padding:${isMany?'10px 12px':'14px 14px'};display:flex;align-items:center;gap:10px">`;
    // Badge S#: fondo=SIZE_COLORS.bg, texto=SIZE_COLORS.tx
    h+=`<div style="background:${szc.bg};padding:8px 14px;border-radius:6px"><span style="font-family:'Arial Black',sans-serif;font-size:${isMany?32:42}px;font-weight:900;color:${szc.tx};letter-spacing:2px;line-height:1">${sz}</span></div>`;
    h+=`<div style="flex:1">`;
    rows.forEach(r=>{const v=rng(data[r.k]);if(v){
      h+=`<div style="display:flex;justify-content:space-between;padding:${rp}"><span style="font-size:${fl}px;font-weight:700;color:#fff">${r.l}</span><span style="font-size:${fv}px;font-weight:800;color:#fff">${v}</span></div>`;
    }});
    h+=`<div style="display:flex;justify-content:space-between;padding:${rp}"><span style="font-size:${fl}px;font-weight:700;color:#fff">${extraLbl}</span><span style="font-size:${fv}px;font-weight:800;color:#fff">${extraV}</span></div>`;
    h+=`</div></div>`;
    h+=`<div style="padding:4px 12px 6px;display:flex;align-items:center;gap:4px"><span style="font-size:14px;color:${p.ac}">\u2702</span><span style="font-size:9px;font-weight:700;color:${p.ac};letter-spacing:0.5px">${t.trimTag}</span></div>`;
    h+=`</div>`;
    return h;
  }

  // Variant B FRONT: zona superior con cuadro S# + zona inferior navy con datos
  // Zona superior: fondo = p.hdr.bg (color header producto)
  // Cuadro S#: fondo = SIZE_COLORS.bg, texto = p.hdr.bg si claro, blanco si oscuro
  const frontBadgeTx=isDark(szc.bg)?'#FFFFFF':p.hdr.bg;
  const w=isMany?260:240;
  const archLabel=arch==="LOW"?t.low:arch==="HIGH"?t.high:t.med;
  const ac2_=ARCH_COLORS[arch]||ARCH_COLORS.MED;
  let h=`<div style="width:${w}px;border-radius:8px;overflow:hidden">`;
  h+=`<div style="background:${p.hdr.bg};padding:${isMany?'10px':'16px'} 12px;text-align:center">`;
  h+=`<div style="display:inline-block;background:${szc.bg};padding:${isMany?'8px 20px':'12px 28px'};border-radius:6px">`;
  h+=`<span style="font-family:'Arial Black',sans-serif;font-size:${isMany?42:58}px;font-weight:900;color:${frontBadgeTx};letter-spacing:2px;line-height:1">${sz}</span>`;
  h+=`</div></div>`;
  h+=`<div style="background:${NAVY};padding:${isMany?'10px 14px':'14px 16px'}">`;
  h+=`<div style="text-align:center;margin-bottom:8px"><span style="font-size:${isMany?10:11}px;font-weight:800;color:${ac2_.bg};letter-spacing:1px;text-transform:uppercase;background:rgba(255,255,255,0.15);padding:2px 8px;border-radius:3px">${t.archProfile}: ${archLabel}</span></div>`;
  rows.forEach(r=>{const v=rng(data[r.k]);if(v){
    h+=`<div style="display:flex;justify-content:space-between;padding:${rp}"><span style="font-size:${fl}px;font-weight:700;color:#fff">${r.l}</span><span style="font-size:${fv}px;font-weight:800;color:#fff">${v}</span></div>`;
  }});
  h+=`<div style="display:flex;justify-content:space-between;padding:${rp}"><span style="font-size:${fl}px;font-weight:700;color:#fff">${extraLbl}</span><span style="font-size:${fv}px;font-weight:800;color:#fff">${extraV}</span></div>`;
  h+=`<div style="margin-top:6px;display:flex;align-items:center;gap:4px"><span style="font-size:14px;color:${p.ac}">\u2702</span><span style="font-size:9px;font-weight:700;color:${p.ac};letter-spacing:0.5px">${t.trimTag}</span></div>`;
  h+=`</div></div>`;
  return h;
}

// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
// BACK PANEL (reescrito)
// Variant A: tabla sola (barcode = 3er cuerpo via barcodePanel)
// Variant B: barcode + badge + tabla
// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
function backPanel(sz,data,mkt,prod,arch){
  const p=P[prod];
  const t=mkt.i18n;
  const rows=mkt.lat.filter(r=>has(data[r.k]));
  const isMany=rows.length>5;
  const lw=isMany?100:90;
  const extraLabel=mkt.extra==="inch"?"INCH":"CM";
  const extraVal=mkt.extra==="inch"?data.inch:data.cm+(mkt.extra==="cm"?" cm":"");
  const archCode=arch==="LOW"?"LOW":arch==="HIGH"?"HGH":"MED";
  const skuCode=`${p.sku}-${archCode}-${sz}`;
  const skuObj=(SKUS[prod]||[]).find(s=>s.sz===sz&&s.arch===archCode);
  const gtinCode=skuObj&&skuObj.gtin?skuObj.gtin:null;
  const szc=SIZE_COLORS[sz]||{bg:'#ccc',tx:'#333'};

  if(p.variant==="A"){
    // Variant A SIDE+BACK: solo tabla. S# badge = SIZE_COLORS bg/tx
    const w=isMany?340:300;
    const bg=p.tr.bg;
    const tx=p.tr.dc;
    let h=`<div style="width:${w}px;border-radius:8px;overflow:hidden;background:${bg};padding:8px 12px">`;
    h+=`<div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:6px">`;
    // S# badge pequeno: fondo=SIZE_COLORS.bg, texto=SIZE_COLORS.tx
    h+=`<div style="display:inline-block;background:${szc.bg};padding:2px 8px;border-radius:4px"><span style="font-family:'Arial Black',sans-serif;font-size:${isMany?20:26}px;font-weight:900;color:${szc.tx};letter-spacing:1px">${sz}</span></div>`;
    h+=`<div style="display:flex;gap:12px"><div style="text-align:center"><div style="font-size:8px;font-weight:700;color:${tx};opacity:0.6">${t.trimH.replace(/[\u2702\u2713]\s*/,'')}</div></div>`;
    h+=`<div style="text-align:center"><div style="font-size:8px;font-weight:700;color:${tx};opacity:0.6">${t.exactH.replace(/[\u2702\u2713]\s*/,'')}</div></div></div></div>`;
    rows.forEach(r=>{const d=data[r.k];
      h+=`<div style="display:grid;grid-template-columns:${lw}px 1fr 1fr;border-bottom:1px solid rgba(0,0,0,0.08)">`;
      h+=`<div style="padding:${isMany?'2px':'3px'} 0;font-size:${isMany?9:10}px;font-weight:700;color:${tx}">${r.l}</div>`;
      h+=`<div style="padding:${isMany?'2px':'3px'} 4px;text-align:center;font-size:${isMany?10:11}px;color:${tx}">${d.t.length?d.t.join(", "):"\u2014"}</div>`;
      h+=`<div style="padding:${isMany?'2px':'3px'} 4px;text-align:center;font-size:${isMany?10:11}px;font-weight:700;color:${tx}">${d.e||"\u2014"}</div></div>`;
    });
    h+=`<div style="display:grid;grid-template-columns:${lw}px 1fr;border-bottom:1px solid rgba(0,0,0,0.08)"><div style="padding:3px 0;font-size:11px;font-weight:700;color:${tx}">${extraLabel}</div><div style="padding:3px 4px;text-align:center;font-size:11px;color:${tx};opacity:0.7">${extraVal}</div></div>`;
    h+=`</div>`;
    return h;
  }

  // Variant B BACK: barcode + badge + tabla
  const bg=p.tr.bg;
  const tx=p.tr.tx;
  const w=isMany?260:240;
  // Leopard = unico sin recuadro blanco
  const needsWhiteBarcode=(prod!=="LEOPARD");
  let h=`<div style="width:${w}px;border-radius:8px;overflow:hidden;background:${bg}">`;
  h+=`<div style="padding:8px 14px 4px;display:flex;flex-direction:column;align-items:center">`;
  if(needsWhiteBarcode){
    h+=`<div style="background:#fff;padding:8px 12px 4px;border-radius:8px;display:flex;flex-direction:column;align-items:center">`;
    h+=renderEAN13(gtinCode||'0000000000000','#000','#333','#fff');
    h+=`</div>`;
  } else {
    h+=renderEAN13(gtinCode||'0000000000000','#000','#333');
  }
  h+=`<div style="font-family:monospace;font-size:7px;color:${tx};margin-top:2px;opacity:0.7">${gtinCode||'\u2014'}</div>`;
  h+=`<div style="font-family:'Arial Black',sans-serif;font-size:8px;font-weight:900;color:${tx};margin-top:2px;letter-spacing:0.5px">${skuCode}</div>`;
  h+=`</div>`;
  // Badge S# + TRIM/EXACT
  h+=`<div style="padding:4px 14px;display:flex;align-items:center;gap:8px">`;
  h+=`<div style="background:${szc.bg};padding:3px 10px;border-radius:4px"><span style="font-family:'Arial Black',sans-serif;font-size:22px;font-weight:900;color:${szc.tx}">${sz}</span></div>`;
  h+=`<div style="flex:1;display:flex;gap:1px">`;
  h+=`<div style="flex:1;text-align:center;border-bottom:1px solid ${tx}30;padding-bottom:2px"><span style="font-size:8px;font-weight:700;color:${tx}">\u2702 ${t.trimH.replace(/[\u2702\u2713]\s*/,'')}</span></div>`;
  h+=`<div style="width:1px;background:${tx}30"></div>`;
  h+=`<div style="flex:1;text-align:center;border-bottom:1px solid ${tx}30;padding-bottom:2px"><span style="font-size:8px;font-weight:700;color:${tx}">\u2713 ${t.exactH.replace(/[\u2702\u2713]\s*/,'')}</span></div>`;
  h+=`</div></div>`;
  h+=`<div style="padding:2px 14px 8px">`;
  rows.forEach(r=>{const d=data[r.k];
    h+=`<div style="display:grid;grid-template-columns:${lw}px 1fr 1fr;border-bottom:1px solid ${tx}15">`;
    h+=`<div style="padding:3px 0;font-size:${isMany?10:11}px;font-weight:700;color:${tx}">${r.l}</div>`;
    h+=`<div style="padding:3px 4px;text-align:center;font-size:${isMany?11:12}px;color:${tx}">${d.t.length?d.t.join(", "):"\u2014"}</div>`;
    h+=`<div style="padding:3px 4px;text-align:center;font-size:${isMany?11:12}px;font-weight:700;color:${tx}">${d.e||"\u2014"}</div></div>`;
  });
  h+=`<div style="display:grid;grid-template-columns:${lw}px 1fr"><div style="padding:3px 0;font-size:11px;font-weight:700;color:${tx}">${extraLabel}</div><div style="padding:3px 4px;text-align:center;font-size:11px;color:${tx};opacity:0.7">${extraVal}</div></div>`;
  h+=`</div></div>`;
  return h;
}

// Barcode panel - 3er cuerpo Variant A
// Goliath: barcode DIRECTO sobre teal mint, SIN recuadro blanco (per PDF reference)
function barcodePanel(sz,prod,arch){
  const p=P[prod];
  const archCode=arch==="LOW"?"LOW":arch==="HIGH"?"HGH":"MED";
  const skuObj=(SKUS[prod]||[]).find(s=>s.sz===sz&&s.arch===archCode);
  const gtinCode=skuObj&&skuObj.gtin?skuObj.gtin:null;
  const skuCode=skuObj?skuObj.sku:`${p.sku}-${archCode}-${sz}`;
  let h=`<div style="width:140px;border-radius:8px;overflow:hidden;background:${p.tr.bg};padding:12px 8px;display:flex;flex-direction:column;align-items:center;justify-content:center">`;
  // Barcode directo sobre teal (sin recuadro blanco per PDF Goliath)
  h+=renderEAN13(gtinCode||'0000000000000','#000','#333');
  h+=`<div style="font-family:monospace;font-size:7px;color:${p.tr.dc};margin-top:4px;opacity:0.7">${gtinCode||'\u2014'}</div>`;
  h+=`<div style="font-family:'Arial Black',sans-serif;font-size:8px;font-weight:900;color:${p.tr.dc};margin-top:2px;letter-spacing:0.5px">${skuCode}</div>`;
  h+=`</div>`;
  return h;
}

function encodeEAN13(gtin){
  if(!gtin||gtin.length!==13) return null;
  let pat='101'; const par=PARITY[gtin[0]];
  for(let i=0;i<6;i++) pat+=(par[i]==='L'?L_CODE:G_CODE)[gtin[i+1]];
  pat+='01010';
  for(let i=7;i<13;i++) pat+=R_CODE[gtin[i]];
  return pat+'101';
}

function renderEAN13(gtin,color,textColor,bgColor){
  if(!gtin||gtin.length!==13) return '';
  const fc=color||'#000', tc=textColor||'#000', bg=bgColor||'transparent';
  if(EAN13_SVG[gtin]){
    let inn=EAN13_SVG[gtin];
    inn=inn.replace('fill="white"',`fill="${bg}"`);
    inn=inn.replace('<g fill="#000"><rect',`<g fill="${fc}"><rect`);
    inn=inn.replace('<g fill="#000" font-family',`<g fill="${tc}" font-family`);
    return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 38 26" width="380" height="100" style="display:block;background:${bg}">${inn}</svg>`;
  }
  // Runtime fallback for GTINs not in pre-computed cache
  const pat=encodeEAN13(gtin);
  if(!pat) return '';
  let rects='',x=3.795,bw=0.33;
  for(let i=0;i<pat.length;){
    if(pat[i]==='1'){let w=0;while(i<pat.length&&pat[i]==='1'){w++;i++}
      const ht=(i-w<3||(i-w>=45&&i-w<50)||i-w>=92)?24.5:22.85;
      rects+=`<rect x="${x.toFixed(4)}" y="0" width="${(w*bw).toFixed(4)}" height="${ht}"/>`;
      x+=w*bw;}else{x+=bw;i++;}
  }
  const ld=gtin.slice(1,7),rd=gtin.slice(7,13);
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 38 26" width="380" height="100" style="display:block;background:${bg}"><rect width="38" height="26" fill="${bg}"/><g fill="${fc}">${rects}</g><g fill="${tc}" font-family="monospace"><text x="0.66" y="25.5" font-size="1.8">${gtin[0]}</text><text x="5.75" y="25.5" font-size="1.8">${ld}</text><text x="20.90" y="25.5" font-size="1.8">${rd}</text></g></svg>`;
}

function barcode(sz,prod,arch){
  const p=P[prod];const ac=arch==="LOW"?"LOW":arch==="HIGH"?"HGH":"MED";
  const skuObj=(SKUS[prod]||[]).find(s=>s.sz===sz&&s.arch===ac);
  const gtin=skuObj&&skuObj.gtin?skuObj.gtin:null;
  const skuCode=skuObj?skuObj.sku:`${p.sku}-${ac}-${sz}`;
  return `<div style="border-radius:8px;overflow:hidden;border:2px solid ${p.hdr.bg};background:#fff;display:inline-block">
    <div style="background:${p.hdr.bg};padding:4px 8px;text-align:center"><span style="color:${p.hdr.tx};font-weight:900;font-size:12px">${sz} · ${ac}</span></div>
    <div style="padding:8px 6px 4px;display:flex;flex-direction:column;align-items:center">
      ${gtin?renderEAN13(gtin,'#000','#333'):'<div style="font-size:9px;color:#999">GTIN no disponible</div>'}
      <div style="margin-top:3px;font-size:7px;font-weight:700;color:${NAVY};background:#f0f2f4;padding:1px 4px;border-radius:3px">${skuCode}</div>
    </div></div>`;
}

function skuTable(prod){
  const p=P[prod];
  const items=SKUS[prod];
  const currentArch=state.arch==="HIGH"?"HGH":state.arch;
  const filtered=(prod==="LEOPARD"||prod==="BISON")?items.filter(s=>s.arch===currentArch):items;
  const total=items.length;

  let h=`<div style="margin:0 20px 16px;border-radius:12px;overflow:hidden;border:1px solid #ddd;background:#fff">`;
  h+=`<div style="background:${p.hdr.bg};padding:8px 14px;display:flex;align-items:center;justify-content:space-between">`;
  h+=`<div><span style="color:${p.hdr.tx};font-weight:900;font-size:14px;letter-spacing:1px">${p.name}</span>`;
  h+=`<span style="color:${p.ac};font-size:11px;margin-left:8px">${total} SKUs</span></div>`;
  h+=`<span style="color:rgba(255,255,255,0.5);font-size:9px">RW-[L\u00cdNEA]-[ARCO]-[TALLA]</span></div>`;

  if(prod==="LEOPARD"||prod==="BISON"){
    const archI18n=currentArch==="LOW"?MK[state.market].i18n.low:currentArch==="HGH"?MK[state.market].i18n.high:MK[state.market].i18n.med;
    const archC2=ARCH_COLORS[currentArch]||ARCH_COLORS.MED;
    h+=`<div style="background:${archC2.bg};padding:3px 14px;font-size:9px;font-weight:700;color:${archC2.tx}">${MK[state.market].i18n.archProfile}: ${archI18n} (${filtered.length} / ${total} SKUs)</div>`;
  }

  h+=`<div style="display:grid;grid-template-columns:2.5fr 0.7fr 0.7fr 1.3fr 2fr;background:#f0f2f4;border-bottom:1px solid #ddd">`;
  ["SKU","Size","Arch","US Men","GTIN (EAN-13)"].forEach(col=>{
    h+=`<div style="padding:5px 8px;font-size:10px;font-weight:800;color:${NAVY};letter-spacing:0.5px">${col}</div>`;
  });
  h+=`</div>`;

  filtered.forEach((item,i)=>{
    const isSelected=item.sz===state.size&&(prod!=="LEOPARD"||item.arch===currentArch);
    const bg=isSelected?p.ac:(i%2?'#fafbfc':'#fff');
    const tx=isSelected?(isDark(p.ac)?'#fff':p.hdr.bg):'#333';
    h+=`<div style="display:grid;grid-template-columns:2.5fr 0.7fr 0.7fr 1.3fr 2fr;border-bottom:1px solid #eee;background:${bg};cursor:pointer" onclick="sel('size','${item.sz}')">`;
    h+=`<div style="padding:4px 8px;font-family:'Courier New',monospace;font-size:11px;font-weight:700;color:${tx}">${item.sku}</div>`;
    h+=`<div style="padding:4px 8px;font-size:11px;font-weight:900;color:${tx}">${item.sz}</div>`;
    h+=`<div style="padding:4px 8px;font-size:10px;font-weight:600;color:${tx}">${item.arch}</div>`;
    h+=`<div style="padding:4px 8px;font-size:11px;color:${tx}">${item.range}</div>`;
    h+=`<div style="padding:4px 8px;font-size:9px;color:${isSelected?tx:'#444'};font-weight:600;font-family:monospace">${item.gtin||'—'}</div>`;
    h+=`</div>`;
  });

  h+=`<div style="background:#f8f9fa;padding:4px 14px;font-size:8px;color:#999">MED = Medium arch \u00b7 LOW = Low arch \u00b7 HGH = High arch \u00b7 GTINs registrados GS1 CR · Prefijo 744303921</div>`;
  h+=`</div>`;
  return h;
}

    h+=`<div style="display:flex;align-items:center;font-size:22px;color:${arF};padding-top:40px;user-select:none">\u25c0</div>`;
    h+=`<div><div style="font-size:8px;font-weight:700;color:${txF};letter-spacing:1px;margin-bottom:4px">\u25b6 FRONT (derecho \u2014 lo ve el cliente)</div>`;
    h+=frontSticker(size,data,mk,prod,arch);
    h+=`</div>`;
  }
  h+=`</div></div>`;
  h+=`<div style="padding:4px 20px"><div style="font-size:9px;color:#888">\u2191 ${p.variant==="A"?"Variant A (caja): 3 cuerpos separados.":"Variant B (bolsa): Back con barcode + tabla, Front con S# grande."}</div></div>`;

  // FICHA DE PRODUCTO (incluye color spec)
  h+='<div style="padding:12px 20px 4px"><div style="font-size:11px;font-weight:700;color:'+p.hdr.bg+'">'+mk.i18n.fichaTitle+' \u2014 '+P[prod].name+'</div><div style="font-size:9px;color:color-mix(in srgb,'+p.hdr.bg+' 35%,#888)">'+mk.i18n.sensationTitle+' + '+mk.i18n.perfTitle+' + '+mk.i18n.cmpTitle+' + '+mk.i18n.colorTitle+'</div></div>';
  h+=fichaPanel(prod);

  // SKU TABLE
  h+=`<div style="padding:12px 20px 4px"><div style="font-size:11px;font-weight:700;color:${NAVY}">${mk.i18n.skuTitle} \u2014 ${P[prod].name}</div>
    <div style="font-size:9px;color:#888">${mk.i18n.skuSub}</div></div>`;
  h+=skuTable(prod);

  // COLOR REF
  h+=`<div style="padding:10px 20px;background:#fff;border-top:1px solid #e0e0e0">
    <div style="font-size:10px;font-weight:700;color:${NAVY};margin-bottom:8px">COLORS ${p.name} \u2014 04B \u00a77.5 (agency aligned)</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:6px">
      ${swatch(p.hdr.bg,"Header")}${swatch(p.tr.bg,"\u2702 TRIM (bg)")}${swatch(p.ex.bg,"\u2713 EXACT FIT (bg)")}
      ${swatch(p.ac,"Accent / Arch")}${swatch(p.bgF,"Pack front")}${swatch(p.bgB,"Pack back")}
    </div></div>`;

  // LEGEND
  h+=`<div style="padding:6px 20px;background:#f8f9fb;display:flex;gap:16px;flex-wrap:wrap">
    <div style="display:flex;align-items:center;gap:4px"><div style="width:12px;height:12px;background:${p.tr.bg};border-radius:2px;border:1px solid rgba(0,0,0,0.1)"></div><span style="font-size:9px;font-weight:700;color:${p.tr.dc}">${mk.i18n.trimH}</span></div>
    <div style="display:flex;align-items:center;gap:4px"><div style="width:12px;height:12px;background:${p.ex.bg};border-radius:2px;border:1px solid rgba(0,0,0,0.1)"></div><span style="font-size:9px;font-weight:700;color:${p.ex.dc}">${mk.i18n.exactH}</span></div>
    <span style="font-size:9px;color:#aaa">\u00b7 ZERO generic orange/green${prod==="LEOPARD"?" \u00b7 Leopard: Arena Dorado front + Charcoal back":""}</span></div>`;

  // FOOTER
  h+=`<div style="padding:8px 20px;background:${NAVY};color:rgba(255,255,255,0.5);font-size:8px;line-height:1.7">
    <span style="color:${MINT};font-weight:700">04B \u00a77 \u00b7 v7.8 \u00b7 </span>
    15 systems: US Men/Women, Big Kid, EU, UK Men/Women, JP, AU Men/Women, MEX, Costa Rica, BRA, KR, CN, IN \u00b7
    66 SKUs: 6 GOL + 6 VEL + 18 LEO + 6 ORB + 18 BIS + 6 MAN + 6 ORC \u00b7
    <span style="color:#1D9E75;font-weight:700">\u2713 GTINs registrados GS1 CR</span></div>`;

  document.getElementById('app').innerHTML=h;
}

function sel(key,val){
  state[key]=val;
  if(key==='prod') state.arch=P[val].defArch;
  render();
}

render();
</script>
</body>
</html>
