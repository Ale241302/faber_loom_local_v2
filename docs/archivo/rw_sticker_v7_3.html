// ══════════════════════════════════════════════════════════
// STICKER FRONTAL
// Variant A (caja): Navy sólido, S# recuadro teal, datos blanco, TRIM teal
// Variant B (bolsa): Verde Lima arriba (S# en color producto) + Dark Teal abajo (datos blanco, TRIM acento)
// ══════════════════════════════════════════════════════════
const LIME="#98E090";
function frontSticker(sz,data,mkt,prod,arch){
  const p=P[prod];
  const t=mkt.i18n;
  const rows=mkt.fr.filter(r=>has(data[r.k]));
  const isMany=rows.length>5;
  const fl=isMany?10:12;
  const fv=isMany?11:13;
  const rp=isMany?"2px 0":"3px 0";
  const extraLbl=mkt.extra==="inch"?"INCH":"CM";
  const extraV=mkt.extra==="inch"?data.inch:data.cm+" cm";

  if(p.variant==="A"){
    const w=isMany?260:240;
    const archLabel=arch==="LOW"?t.low:arch==="HIGH"?t.high:t.med;
    let h=`<div style="width:${w}px;border-radius:10px;overflow:hidden;background:${p.hdr.bg}">`;
    h+=`<div style="padding:2px 0;text-align:center;background:rgba(117,203,179,0.15)"><span style="font-size:9px;font-weight:800;color:${p.ac};letter-spacing:1.5px;text-transform:uppercase">${t.archProfile}: ${archLabel}</span></div>`;
    h+=`<div style="padding:${isMany?'10px 12px':'14px 14px'};display:flex;align-items:center;gap:10px">`;
    h+=`<div style="background:rgba(117,203,179,0.25);padding:8px 14px;border-radius:6px"><span style="font-family:'Arial Black',sans-serif;font-size:${isMany?32:42}px;font-weight:900;color:${p.ac};letter-spacing:2px;line-height:1">${sz}</span></div>`;
    h+=`<div style="flex:1">`;
    rows.forEach(r=>{const v=rng(data[r.k]);if(v){
      h+=`<div style="display:flex;justify-content:space-between;padding:${rp}"><span style="font-size:${fl}px;font-weight:700;color:#fff">${r.l}</span><span style="font-size:${fv}px;font-weight:800;color:#fff">${v}</span></div>`;
    }});
    h+=`<div style="display:flex;justify-content:space-between;padding:${rp}"><span style="font-size:${fl}px;font-weight:700;color:#fff">${extraLbl}</span><span style="font-size:${fv}px;font-weight:800;color:#fff">${extraV}</span></div>`;
    h+=`</div></div>`;
    h+=`<div style="padding:4px 12px 6px;display:flex;align-items:center;gap:4px"><span style="font-size:14px;color:${p.ac}">\u2702</span><span style="font-size:9px;font-weight:700;color:${p.ac};letter-spacing:0.5px">${t.trimTag}</span></div>`;
    h+=`</div>`;
    return h;
  }

  // Variant B (bolsa): Verde Lima top + Dark Teal bottom
  const w=isMany?260:240;
  const archLabel=arch==="LOW"?t.low:arch==="HIGH"?t.high:t.med;
  let h=`<div style="width:${w}px;border-radius:8px;overflow:hidden">`;
  // Verde Lima zone — S# in product color
  h+=`<div style="background:${LIME};padding:${isMany?'14px':'22px'} 12px;text-align:center">`;
  h+=`<span style="font-family:'Arial Black',sans-serif;font-size:${isMany?42:58}px;font-weight:900;color:${p.hdr.bg};letter-spacing:2px;line-height:1">${sz}</span>`;
  h+=`</div>`;
  // Dark Teal zone — data white, TRIM in accent
  h+=`<div style="background:${NAVY};padding:${isMany?'10px 14px':'14px 16px'}">`;
  h+=`<div style="text-align:center;margin-bottom:8px"><span style="font-size:${isMany?10:11}px;font-weight:800;color:#fff;letter-spacing:1px;text-transform:uppercase">${t.archProfile}: ${archLabel}</span></div>`;
  rows.forEach(r=>{const v=rng(data[r.k]);if(v){
    h+=`<div style="display:flex;justify-content:space-between;padding:${rp}"><span style="font-size:${fl}px;font-weight:700;color:#fff">${r.l}</span><span style="font-size:${fv}px;font-weight:800;color:#fff">${v}</span></div>`;
  }});
  h+=`<div style="display:flex;justify-content:space-between;padding:${rp}"><span style="font-size:${fl}px;font-weight:700;color:#fff">${extraLbl}</span><span style="font-size:${fv}px;font-weight:800;color:#fff">${extraV}</span></div>`;
  h+=`<div style="margin-top:6px;display:flex;align-items:center;gap:4px"><span style="font-size:14px;color:${p.ac}">\u2702</span><span style="font-size:9px;font-weight:700;color:${p.ac};letter-spacing:0.5px">${t.trimTag}</span></div>`;
  h+=`</div></div>`;
  return h;
}

  const p=P[prod];
  const t=mkt.i18n;
  const archLabel=arch==="LOW"?t.low:arch==="HIGH"?t.high:t.med;
  const rows=mkt.lat.filter(r=>has(data[r.k]));
  const isMany=rows.length>5;
  const lw=isMany?100:90;
  const extraLabel=mkt.extra==="inch"?"INCH":"CM";
  const extraVal=mkt.extra==="inch"?data.inch:data.cm+(mkt.extra==="cm"?" cm":"");
  const ac=arch==="LOW"?"LOW":arch==="HIGH"?"HGH":"MED";
  const skuCode=`${p.sku}-${ac}-${sz}`;

  if(p.variant==="A"){
    // Caja: Teal Mint solid strip with table left + barcode/QR right
    const w=isMany?420:380;
    const bg=p.tr.bg;
    const tx=p.tr.dc;
    let h=`<div style="width:${w}px;border-radius:8px;overflow:hidden;background:${bg};display:flex;gap:0">`;
    h+=`<div style="flex:1;padding:8px 12px">`;
    h+=`<div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:6px">`;
    h+=`<span style="font-family:'Arial Black',sans-serif;font-size:${isMany?24:30}px;font-weight:900;color:${tx};letter-spacing:2px">${sz}</span>`;
    h+=`<div style="display:flex;gap:12px"><div style="text-align:center"><div style="font-size:8px;font-weight:700;color:${tx};opacity:0.6">TRIM TO FIT</div></div>`;
    h+=`<div style="text-align:center"><div style="font-size:8px;font-weight:700;color:${tx};opacity:0.6">EXACT FIT</div></div></div></div>`;
    rows.forEach((r,i)=>{const d=data[r.k];
      h+=`<div style="display:grid;grid-template-columns:${lw}px 1fr 1fr;border-bottom:1px solid rgba(0,0,0,0.08)">`;
      h+=`<div style="padding:${isMany?'2px':'3px'} 0;font-size:${isMany?9:10}px;font-weight:700;color:${tx}">${r.l}</div>`;
      h+=`<div style="padding:${isMany?'2px':'3px'} 4px;text-align:center;font-size:${isMany?10:11}px;color:${tx}">${d.t.length?d.t.join(", "):"\u2014"}</div>`;
      h+=`<div style="padding:${isMany?'2px':'3px'} 4px;text-align:center;font-size:${isMany?10:11}px;font-weight:700;color:${tx}">${d.e||"\u2014"}</div></div>`;
    });
    h+=`<div style="display:grid;grid-template-columns:${lw}px 1fr;border-bottom:1px solid rgba(0,0,0,0.08)"><div style="padding:3px 0;font-size:11px;font-weight:700;color:${tx}">${extraLabel}</div><div style="padding:3px 4px;text-align:center;font-size:11px;color:${tx};opacity:0.7">${extraVal}</div></div>`;
    h+=`</div>`;
    // Barcode + QR section
    let bars="";for(let i=0;i<26;i++) bars+=`<div style="width:${i%3===0?2:1}px;height:${i%5===0?32:22}px;background:#fff"></div>`;
    h+=`<div style="width:140px;padding:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;border-left:1px solid rgba(0,0,0,0.08)">`;
    h+=`<div style="display:flex;gap:1px;height:32px;align-items:flex-end">${bars}</div>`;
    h+=`<div style="font-family:monospace;font-size:7px;color:${tx};margin-top:3px;opacity:0.5">0 00000 00000 0</div>`;
    h+=`<div style="margin-top:4px;font-size:7px;font-weight:700;color:${tx};opacity:0.6">${skuCode}</div>`;
    h+=`<div style="margin-top:8px;width:40px;height:40px;border:2px solid ${tx};border-radius:3px;display:flex;align-items:center;justify-content:center"><span style="font-size:7px;font-weight:700;color:${tx}">QR</span></div>`;
    h+=`</div></div>`;
    return h;
  }

  // Variant B (bolsa): Solid product color back
  const bg=p.tr.bg;
  const tx=p.tr.tx;
  const barColor=isDark(bg)?"#fff":p.lc;
  const w=isMany?260:240;
  let h=`<div style="width:${w}px;border-radius:8px;overflow:hidden;background:${bg}">`;
  // Barcode top
  let bars="";for(let i=0;i<26;i++) bars+=`<div style="width:${i%3===0?2:1}px;height:${i%5===0?32:22}px;background:${barColor}"></div>`;
  h+=`<div style="padding:10px 14px 6px;display:flex;flex-direction:column;align-items:center">`;
  h+=`<div style="display:flex;gap:1px;height:32px;align-items:flex-end">${bars}</div>`;
  h+=`<div style="font-family:monospace;font-size:7px;color:${tx};margin-top:2px;opacity:0.5">0 00000 00000 0</div></div>`;
  // S# badge (Verde Lima) + TRIM/EXACT header
  h+=`<div style="padding:4px 14px;display:flex;align-items:center;gap:8px">`;
  h+=`<div style="background:${LIME};padding:3px 10px;border-radius:4px"><span style="font-family:'Arial Black',sans-serif;font-size:22px;font-weight:900;color:${p.lc}">${sz}</span></div>`;
  h+=`<div style="flex:1;display:flex;gap:1px">`;
  h+=`<div style="flex:1;text-align:center;border-bottom:1px solid ${tx}30;padding-bottom:2px"><span style="font-size:8px;font-weight:700;color:${tx}">\u2702 ${t.trimH.replace(/[\u2702\u2713]\s*/,'')}</span></div>`;
  h+=`<div style="width:1px;background:${tx}30"></div>`;
  h+=`<div style="flex:1;text-align:center;border-bottom:1px solid ${tx}30;padding-bottom:2px"><span style="font-size:8px;font-weight:700;color:${tx}">\u2713 ${t.exactH.replace(/[\u2702\u2713]\s*/,'')}</span></div>`;
  h+=`</div></div>`;
  // Table rows
  h+=`<div style="padding:2px 14px 8px">`;
  rows.forEach((r,i)=>{const d=data[r.k];
    h+=`<div style="display:grid;grid-template-columns:${lw}px 1fr 1fr;border-bottom:1px solid ${tx}15">`;
    h+=`<div style="padding:3px 0;font-size:${isMany?10:11}px;font-weight:700;color:${tx}">${r.l}</div>`;
    h+=`<div style="padding:3px 4px;text-align:center;font-size:${isMany?11:12}px;color:${tx}">${d.t.length?d.t.join(", "):"\u2014"}</div>`;
    h+=`<div style="padding:3px 4px;text-align:center;font-size:${isMany?11:12}px;font-weight:700;color:${tx}">${d.e||"\u2014"}</div></div>`;
  });
  h+=`<div style="display:grid;grid-template-columns:${lw}px 1fr"><div style="padding:3px 0;font-size:11px;font-weight:700;color:${tx}">${extraLabel}</div><div style="padding:3px 4px;text-align:center;font-size:11px;color:${tx};opacity:0.7">${extraVal}</div></div>`;
  h+=`</div></div>`;
  return h;
}

function barcode(sz,prod,arch){
  const p=P[prod];const ac=arch==="LOW"?"LOW":arch==="HIGH"?"HGH":"MED";
  const skuCode=`${p.sku}-${ac}-${sz}`;
  let bars="";for(let i=0;i<26;i++) bars+=`<div style="width:${i%3===0?2:1}px;height:${i%5===0?36:26}px;background:#000"></div>`;
  return `<div style="width:150px;border-radius:8px;overflow:hidden;border:2px solid ${p.hdr.bg};background:#fff">
    <div style="background:${p.hdr.bg};padding:5px 8px;text-align:center"><span style="color:${p.hdr.tx};font-weight:900;font-size:14px">${sz}</span></div>
    <div style="padding:10px 8px 6px;display:flex;flex-direction:column;align-items:center">
      <div style="display:flex;gap:1px;height:36px;align-items:flex-end">${bars}</div>
      <div style="font-family:monospace;font-size:8px;color:#444;margin-top:3px;letter-spacing:1px">0 00000 00000 0</div>
      <div style="margin-top:4px;font-size:8px;font-weight:700;color:${NAVY};background:#f0f2f4;padding:2px 6px;border-radius:3px">${skuCode}</div>
    </div></div>`;
}

function swatch(hex,label){
  return `<div class="swatch"><div class="swatch-box" style="background:${hex}"><span style="color:${isDark(hex)?'#fff':'#333'}">Aa</span></div><div><div class="swatch-info">${label}</div><div class="swatch-hex">${hex}</div></div></div>`;
}

// ══════════════════════════════════════════════════════════
// SKU TABLE
// ══════════════════════════════════════════════════════════
function skuTable(prod){
  const p=P[prod];
  const items=SKUS[prod];
  const currentArch=state.arch==="HIGH"?"HGH":state.arch;
  const filtered=prod==="LEOPARD"?items.filter(s=>s.arch===currentArch):items;
  const total=items.length;

  let h=`<div style="margin:0 20px 16px;border-radius:12px;overflow:hidden;border:1px solid #ddd;background:#fff">`;
  h+=`<div style="background:${p.hdr.bg};padding:8px 14px;display:flex;align-items:center;justify-content:space-between">`;
  h+=`<div><span style="color:${p.hdr.tx};font-weight:900;font-size:14px;letter-spacing:1px">${p.name}</span>`;
  h+=`<span style="color:${p.ac};font-size:11px;margin-left:8px">${total} SKUs</span></div>`;
  h+=`<span style="color:rgba(255,255,255,0.5);font-size:9px">RW-[L\u00cdNEA]-[ARCO]-[TALLA]</span></div>`;

  if(prod==="LEOPARD"){
    const archI18n=currentArch==="LOW"?MK[state.market].i18n.low:currentArch==="HGH"?MK[state.market].i18n.high:MK[state.market].i18n.med;
    h+=`<div style="background:${p.ac};padding:3px 14px;font-size:9px;font-weight:700;color:${isDark(p.ac)?'#fff':p.hdr.bg}">${MK[state.market].i18n.archProfile}: ${archI18n} (${filtered.length} / ${total} SKUs)</div>`;
  }

  h+=`<div style="display:grid;grid-template-columns:2.5fr 0.7fr 0.7fr 1.3fr 2fr;background:#f0f2f4;border-bottom:1px solid #ddd">`;
  ["SKU","Size","Arch","US Men","GS1/UPC"].forEach(col=>{
    h+=`<div style="padding:5px 8px;font-size:10px;font-weight:800;color:${NAVY};letter-spacing:0.5px">${col}</div>`;
  });
  h+=`</div>`;

  filtered.forEach((item,i)=>{
    const isSelected=item.sz===state.size&&(prod!=="LEOPARD"||item.arch===currentArch);
    const bg=isSelected?p.ac:(i%2?'#fafbfc':'#fff');
    const tx=isSelected?(isDark(p.ac)?'#fff':p.hdr.bg):'#333';
    h+=`<div style="display:grid;grid-template-columns:2.5fr 0.7fr 0.7fr 1.3fr 2fr;border-bottom:1px solid #eee;background:${bg};cursor:pointer" onclick="sel('size','${item.sz}')">`;
    h+=`<div style="padding:4px 8px;font-family:'Courier New',monospace;font-size:11px;font-weight:700;color:${tx}">${item.sku}</div>`;
    h+=`<div style="padding:4px 8px;font-size:11px;font-weight:900;color:${tx}">${item.sz}</div>`;
    h+=`<div style="padding:4px 8px;font-size:10px;font-weight:600;color:${tx}">${item.arch}</div>`;
    h+=`<div style="padding:4px 8px;font-size:11px;color:${tx}">${item.range}</div>`;
    h+=`<div style="padding:4px 8px;font-size:9px;color:${isSelected?tx:'#c62828'};font-weight:600">\u23f3 PENDING \u2014 Create GS1</div>`;
    h+=`</div>`;
  });

  h+=`<div style="background:#f8f9fa;padding:4px 14px;font-size:8px;color:#999">MED = Medium arch \u00b7 LOW = Low arch \u00b7 HGH = High arch \u00b7 GS1 purchase pending (#10)</div>`;
  h+=`</div>`;
  return h;
}

// ══════════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════════
function render(){
  const{prod,market,size,arch}=state;
  const p=P[prod],mk=MK[market],data=SD[size];
  const txF=isDark(p.bgF)?"rgba(255,255,255,0.3)":"rgba(0,0,0,0.2)";
  const txB=isDark(p.bgB)?"rgba(255,255,255,0.3)":"rgba(0,0,0,0.2)";
  const arF=isDark(p.bgF)?p.ac:p.hdr.bg;
  const isWorld=market==="WORLD";

  let h=`<div style="background:${p.hdr.bg};padding:10px 20px;display:flex;align-items:center;gap:8px;transition:background .3s">
    <span style="color:#fff;font-weight:900;font-size:16px;letter-spacing:1px">RANA WALK</span>
    <span style="color:${p.ac};font-size:11px">\u00ae</span>
    <span style="color:rgba(255,255,255,0.4);font-size:11px;margin-left:8px">Sticker de Talla v7.3 \u2014 04B \u00a77</span>
    <span style="color:rgba(255,255,255,0.25);font-size:9px;margin-left:auto">15 systems \u00b7 36 SKUs \u00b7 4 markets</span>
  </div>`;

  // CONTROLS
  h+=`<div style="padding:10px 20px;background:#fff;border-bottom:1px solid #e0e0e0" class="grid2">`;
  h+=`<div class="row"><span style="font-size:10px;font-weight:700;color:${NAVY};letter-spacing:1px;width:70px">PRODUCTO</span>`;
  Object.entries(P).forEach(([k,v])=>{
    const s=prod===k,o=k==="ORBIS";
    h+=btn(v.name,s,s?(o?v.ac:v.hdr.bg):(o?"#f0f0f0":"#fff"),s?"#fff":(o?v.ac:v.hdr.bg),s?(o?v.ac:v.hdr.bg):"#ccc",`sel('prod','${k}')`);
  });
  h+=`</div><div class="row"><span style="font-size:10px;font-weight:700;color:${NAVY};letter-spacing:1px;width:70px">MERCADO</span>`;
  Object.entries(MK).forEach(([k,v])=>{
    h+=btn(v.label,market===k,market===k?NAVY:"#fff",market===k?"#fff":NAVY,market===k?NAVY:"#ccc",`sel('market','${k}')`,"font-family:'Segoe UI',sans-serif;font-weight:600");
  });
  h+=`</div></div>`;

  // SIZE + ARCH
  h+=`<div style="padding:8px 20px;background:#f8f9fb;border-bottom:1px solid #e8e8e8;display:flex;gap:8px;align-items:center;flex-wrap:wrap">`;
  h+=`<span style="font-size:10px;font-weight:700;color:${NAVY};width:70px">TALLA</span>`;
  Object.keys(SD).forEach(s=>{
    h+=`<button onclick="sel('size','${s}')" style="padding:4px 12px;border-radius:5px;font-family:'Arial Black',sans-serif;font-size:14px;font-weight:900;border:${size===s?'2.5px':'1.5px'} solid ${size===s?p.hdr.bg:'#ccc'};background:${size===s?p.hdr.bg:'#fff'};color:${size===s?p.hdr.tx:NAVY}">${s}</button>`;
  });
  h+=`<div style="width:1px;height:20px;background:#ddd;margin:0 4px"></div>`;
  h+=`<span style="font-size:10px;font-weight:700;color:${NAVY}">ARCH</span>`;
  const archMap={LOW:mk.i18n.low,MED:mk.i18n.med,HIGH:mk.i18n.high};
  p.archOpts.forEach(a=>{
    h+=`<button onclick="sel('arch','${a}')" style="padding:4px 12px;border-radius:5px;font-size:11px;font-weight:700;border:${arch===a?'2.5px':'1.5px'} solid ${arch===a?p.ac:'#ccc'};background:${arch===a?p.ac:'#fff'};color:${arch===a?(isDark(p.ac)?'#fff':p.hdr.bg):NAVY}">${archMap[a]||a}</button>`;
  });
  h+=`<div style="margin-left:auto;display:flex;gap:8px;align-items:center">
    <span style="font-family:'Arial Black',sans-serif;font-size:24px;font-weight:900;color:${NAVY}">${size}</span>
    <div style="font-size:10px;color:#666;line-height:1.4">${data.cm} cm</div>
  </div></div>`;

  // FRENTE — layout adjusts for Worldwide (stack vertical if many rows)
  h+=`<div style="padding:12px 20px 4px"><div style="font-size:11px;font-weight:700;color:${NAVY}">${p.variant==="A"?"STICKER CAJA \u2014 3 cuerpos \u25b6 Front \u25b6 Side \u25b6 Back":"STICKER BOLSA \u2014 2 cuerpos \u25c0 Back \u25c0 Front"}</div>
    <div style="font-size:9px;color:#888">${p.variant==="A"?"Fondo caja: "+p.bgF:"Fondo bolsa: "+p.bgF+" (front) / "+p.bgB+" (back)"} \u00b7 ${p.label}</div></div>`;
  h+=`<div style="margin:0 20px 12px;border-radius:12px;overflow:hidden;border:1px solid #ddd">
    <div style="background:${p.bgF};padding:20px;display:flex;gap:14px;align-items:flex-start;flex-wrap:wrap;min-height:${isWorld?'320':'220'}px;position:relative">
      <div style="position:absolute;top:6px;right:10px;font-size:8px;color:${txF};font-weight:600;letter-spacing:1px">${p.variant==="A"?"CAJA \u00b7 Front \u25b6 Side \u25b6 Back":"BOLSA \u00b7 Back \u25c0 Front"}</div>
      <div><div style="font-size:8px;font-weight:700;color:${txF};letter-spacing:1px;margin-bottom:4px">${p.variant==="A"?"\u25b6 FRONT (caja)":"\u25c0 BACK (izquierdo)"}</div>${p.variant==="A"?frontSticker(size,data,mk,prod,arch):backPanel(size,data,mk,prod,arch)}</div>
      <div style="display:flex;align-items:center;font-size:22px;color:${arF};padding-top:40px;user-select:none">${p.variant==="A"?"\u25b6":"\u25c0"}</div>
      <div><div style="font-size:8px;font-weight:700;color:${txF};letter-spacing:1px;margin-bottom:4px">${p.variant==="A"?"\u25b6 SIDE + BACK (franja continua)":"\u25b6 FRONT (derecho \u2014 lo ve el cliente)"}</div>${p.variant==="A"?backPanel(size,data,mk,prod,arch):frontSticker(size,data,mk,prod,arch)}</div>
    </div></div>`;

  // POSTERIOR — now integrated in backPanel() for both variants
  h+=`<div style="padding:4px 20px"><div style="font-size:9px;color:#888">\u2191 ${p.variant==="A"?"Variant A (caja): Side + Back en franja continua Teal Mint.":"Variant B (bolsa): Back panel con barcode + tabla integrados arriba."} Barcode + datos incluidos.</div></div>`;

  // SKU TABLE
  h+=`<div style="padding:12px 20px 4px"><div style="font-size:11px;font-weight:700;color:${NAVY}">SKU CATALOG \u2014 ${P[prod].name}</div>
    <div style="font-size:9px;color:#888">Click any row to switch size \u00b7 GS1/UPC pending</div></div>`;
  h+=skuTable(prod);

  // COLOR REF
  h+=`<div style="padding:10px 20px;background:#fff;border-top:1px solid #e0e0e0">
    <div style="font-size:10px;font-weight:700;color:${NAVY};margin-bottom:8px">COLORS ${p.name} \u2014 04B \u00a77.3 (agency aligned)</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:6px">
      ${swatch(p.hdr.bg,"Header")}${swatch(p.tr.bg,"\u2702 TRIM (bg)")}${swatch(p.ex.bg,"\u2713 EXACT FIT (bg)")}
      ${swatch(p.ac,"Accent / Arch")}${swatch(p.bgF,"Pack front")}${swatch(p.bgB,"Pack back")}
    </div></div>`;

  // LEGEND
  h+=`<div style="padding:6px 20px;background:#f8f9fb;display:flex;gap:16px;flex-wrap:wrap">
    <div style="display:flex;align-items:center;gap:4px"><div style="width:12px;height:12px;background:${p.tr.bg};border-radius:2px;border:1px solid rgba(0,0,0,0.1)"></div><span style="font-size:9px;font-weight:700;color:${p.tr.dc}">${mk.i18n.trimH}</span></div>
    <div style="display:flex;align-items:center;gap:4px"><div style="width:12px;height:12px;background:${p.ex.bg};border-radius:2px;border:1px solid rgba(0,0,0,0.1)"></div><span style="font-size:9px;font-weight:700;color:${p.ex.dc}">${mk.i18n.exactH}</span></div>
    <span style="font-size:9px;color:#aaa">\u00b7 ZERO generic orange/green${prod==="LEOPARD"?" \u00b7 Leopard: Arena Dorado front + Charcoal back":""}</span></div>`;

  // FOOTER
  h+=`<div style="padding:8px 20px;background:${NAVY};color:rgba(255,255,255,0.5);font-size:8px;line-height:1.7">
    <span style="color:${MINT};font-weight:700">04B \u00a77 \u00b7 v7.3 \u00b7 </span>
    15 systems: US Men/Women, Big Kid, EU, UK Men/Women, JP, AU Men/Women, MEX, Costa Rica, BRA, KR, CN, IN \u00b7
    36 SKUs: 6 GOL + 6 VEL + 18 LEO + 6 ORB \u00b7
    <span style="color:#EF4E54;font-weight:700">GS1/UPC pending</span></div>`;

  document.getElementById('app').innerHTML=h;
}

function sel(key,val){
  state[key]=val;
  if(key==='prod') state.arch=P[val].defArch;
  render();
}

render();
</script>
</body>
</html>
