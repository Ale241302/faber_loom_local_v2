edge_cases:
  - description: "Cliente responde con referencia exacta del rodamiento anterior: SKF 6205-2RS1/C3 — sistema debe proponer equivalente exacto o confirmar disponibilidad"
    expected_behavior: "Proforma generada con MRO-SKU-001A exacto. Sin sustitución. STOCK_PARCIAL si disponible < 40."
    variant_data:
      exact_reference: "SKF 6205-2RS1/C3"
      qty: 40
      stock_MRO001A: 80
  - description: "Cliente dice 'cualquiera, lo importante es que aguante 150C' — sistema debe detectar que NINGUNA variante en stock alcanza 150C"
    expected_behavior: "Bloqueo adicional. Draft indicando que máximo stock es 120C (SKF). Requiere especial o proveedor alternativo. NO proponer 120C como 'suficiente' sin confirmación."
    variant_data:
      temperature_required: 150
      max_stock_temperature: 120
  - description: "Solicitud de 40 unidades pero stock SKF es 35 (insuficiente). Añade STOCK_PARCIAL como excepción adicional."
    expected_behavior: "Proforma con STOCK_PARCIAL (35 disponible, 5 backorder) si referencia exacta confirmada. SUSTITUCIÓN_ACEPTABLE sigue presente si se ofrece NSK/FAG como alternativa."
    variant_data:
      exact_reference: "SKF 6205-2RS1/C3"
      stock_MRO001A: 35

pass_criteria:
  must_pass:
    - "output.exceptions_raised contains 'ASTM_AMBIGUO'"
    - "output.exceptions_raised contains 'SUSTITUCIÓN_ACEPTABLE'"
    - "output.primary_output.status == 'BLOCKED_PENDING_CLARIFICATION'"
    - "output.primary_output.proforma_generated == false"
    - "output.hitl_gate_triggered == true"
    - "compliance_checker output.blocking_issues contains 'Código 6205 sin sufijo NO identifica únicamente'"
    - "draft_writer output.body contains '3 variantes en stock'"
    - "draft_writer output.body contains checklist de 5+ items técnicos"
    - "inventory_fetcher output.multiple_skus_found == true"
    - "inventory_fetcher output.sku_list contains 'MRO-SKU-001A'"
    - "inventory_fetcher output.sku_list contains 'MRO-SKU-001B'"
    - "inventory_fetcher output.sku_list contains 'MRO-SKU-001C'"
    - "output.side_effects contains create_open_item with item_type == 'clarification_pending'"
  must_not_do:
    - "output contains proforma con 'rodamiento 6205 genérico' a precio único"
    - "system picks cheapest variant (NSK $10.80) by default"
    - "system picks most stock variant (NSK 120u) by default"
    - "system ignores missing suffix and quotes as if 6205 = one SKU"
    - "system recommends mixing brands in same motor line without justification"
    - "system quotes based on 'alta temperatura' as 100C default without asking"

severity_weight_validation:
  expected_severity: "medium"
  if_misclassified_as_lower: |
    Si clasificado como Low: proforma podría generarse seleccionando
    rodamiento 'estándar' más barato (NSK 100C $10.80) sin verificar
    temperatura real del motor. Si motor opera a 115C, rodamiento
    NSK falla prematuramente. Avería motor línea 3 = parada producción
    + costo reemplazo + reclamo cliente. Sustitución no certificada
    entre SKF/NSK/FAG sin validación técnica puede causar incompatibilidad
    de juego (C3 vs CN) o sello inadecuado para ambiente.

privacy_tier:
  inputs: "TENANT_DERIVED"
  outputs: "TENANT_DERIVED"
  cross_tenant_eligibility: "no"
  promotion_notes: |
    Caso específico MRO cliente Cali. NO promovible. Patrón abstracto
    (código parcial rodamiento + múltiples variantes) valioso para
    training MRO_compatibility. Puede promoverse a GLOBAL_PROMOTABLE
    como ejemplo de bearing_spec_incomplete tras anonimización.

