input:
  channel: email
  from:
    name: "Tec. Luis Gómez"
    email: "l.gomez@mivalle.co"
    role: "Técnico de Mantenimiento"
  to: "cotizaciones@mwt-faberloom.co"
  subject: "Cotización 40 rodamientos 6205 sellados alta temp — motor línea 3"
  body_text: |
    Buenos días,

    Necesitamos cotizar 40 rodamientos código 6205, sellados, para
    alta temperatura. Van en motor de línea 3 de nuestra planta.

    Entrega: Cali, DDP.
    Plazo: esta semana si es posible.

    Gracias.

    Tec. Luis Gómez
    Mantenimiento Industrial del Valle
  attachments: []
  thread_id: null
  timestamp: "2025-04-30T08:00:00-05:00"
  language_detected: "es"

