      total_fulfillable: 130
      freshness: "2025-04-30T07:58:00-05:00"
    latency_ms_max: 1500
    triggered: true
    parallel_group: "A"

  - step: 4
    sub_agent: "AG_SUB_COMPLIANCE_CHECKER"
    inputs:
      profile: "MRO_compatibility"
      items: ["MRO-SKU-001A", "MRO-SKU-001B", "MRO-SKU-001C"]
      customer_country: "CO"
      application: "motor linea 3 alta temperatura"
      specs_provided:
        - "familia: 6205 (25x52x15mm)"
        - "sellados: si"
        - "alta temperatura: si"
      specs_missing:
        - "sufijo SKF/NSK/FAG específico"
        - "tipo de sello (goma 2RS1 / contacto DDU / metal 2Z)"
        - "rango exacto temperatura"
        - "velocidad RPM motor"
        - "carga axial/radial"
        - "lubricación (grasa/aceite)"
        - "motor manufacturer y modelo"
    expected_output:
      pass: false
      warnings:
        - code: "ASTM_AMBIGUO"
          severity: "high"
          message: "Código 6205 es familia insuficiente. Existen 3 variantes en stock con sellos y temperaturas diferentes. Falta especificación completa."
        - code: "SUSTITUCIÓN_ACEPTABLE"
          severity: "medium"
          message: "Múltiples 6205 disponibles (SKF C3 120C vs NSK DDU 100C vs FAG 2Z 110C). Son equivalentes dimensionales pero NO idénticos técnica ni térmicamente."
      blocking_issues:
        - "Código 6205 sin sufijo NO identifica únicamente un rodamiento"
        - "Alta temperatura: ¿cuánto? 100C ≠ 120C ≠ 150C"
        - "Tipo sello: goma 2RS1 (mejor sellado, más fricción) vs metal 2Z (menos fricción, menos sellado) vs contacto DDU (intermedio)"
        - "Motor línea 3: requiere verificar si es reemplazo exacto o upgrade"
      pii_detected: false
      policies_violated: ["MRO_bearing_specification_mandatory", "substitution_requires_tech_approval"]
    latency_ms_max: 1000
    triggered: true

  - step: 5
    sub_agent: "AG_SUB_ESCALATION_ROUTER"
    inputs:
      trigger_source: "AG_SUB_COMPLIANCE_CHECKER"
      exception_codes: ["ASTM_AMBIGUO", "SUSTITUCIÓN_ACEPTABLE"]
      severity: "medium"
      customer_tier: "silver"
    expected_output:
      route_to: "AM_MWT"
      recipients: ["a.velasquez@mwt-faberloom.co"]
      channel: "email"
      urgency_override: "medium"
      fallback_route: "AM_MWT_SUPERVISOR"
      sla_target_minutes: 240
    latency_ms_max: 100
    triggered: true

  - step: 6
    sub_agent: "AG_SUB_DRAFT_WRITER"
    inputs:
      category: "respond"
      recipient_role: "customer"
      context:
        customer: "Mantenimiento Industrial del Valle S.A.S."
        rfq_items: "40 rodamientos 6205 sellados alta temp"
        exception: "ASTM_AMBIGUO"
        severity: "medium"
        clarification_needed: true
        options_available:
          - "SKF 6205-2RS1/C3: sellos goma, C3, 120C, $12.50"
          - "NSK 6205DDU: sellos contacto, normal, 100C, $10.80"
          - "FAG 6205-2Z: escudos metal, normal, 110C, $11.20"
    expected_output:
      draft_type: "customer_clarification"
      subject: "Re: Cotización rodamientos 6205 — aclaración técnica requerida"
      body: |
        Estimado Tec. Gómez,

        Gracias por su solicitud. El código 6205 identifica la familia
        de rodamiento (25x52x15mm) pero existen múltiples variantes
        con características diferentes. Para cotizar el correcto para
        su motor de línea 3, necesitamos completar la especificación:

        DATOS FALTANTES:
        1. ¿Temperatura exacta de operación? (ej: 80C, 100C, 120C)
        2. ¿Tipo de sello preferido? Opciones:
           - Goma (2RS1): mejor protección polvo/agua, más fricción
           - Contacto (DDU): balance sellado/fricción
           - Metal (2Z): menos fricción, protección polvo básica
        3. ¿Velocidad RPM del motor?
        4. ¿Es reemplazo exacto de rodamiento anterior? Si sí, ¿tiene
           la referencia completa del sello/fabricante?
        5. ¿Carga radial/axial aproximada?

        OPCIONES EN STOCK (todas 25x52x15mm, sellados):
        - SKF 6205-2RS1/C3 — sellos goma, juego C3, 120C — $12.50
        - NSK 6205DDU — sellos contacto, juego normal, 100C — $10.80
        - FAG 6205-2Z — escudos metal, juego normal, 110C — $11.20

        Stock disponible: suficiente para 40 unidades en todas las
        variantes. Lead time: 2 días.

        Con la referencia exacta del rodamiento anterior podemos
        proponer equivalente certificado.

        Quedo atento.

        Atentamente,
        Álvaro Velásquez
        MWT — FaberLoom
      internal_note: "Cliente MRO silver. '6205' sin sufijo es incompleto. Tenemos 3 variantes con diferencias técnicas reales (sello/temp/juego). Alta temperatura genérica NO suficiente. Motor línea 3 sugiere aplicación industrial importante. Requiere intervención AM para obtener spec completa."
      tone: "professional_technical"
    latency_ms_max: 4000
    triggered: true

  - step: 7
    sub_agent: "AG_SUB_PROFORMA_BUILDER"
    inputs: ["blocked_by_compliance: true"]
    expected_output:
      status: "NOT_GENERATED"
      reason: "COMPLIANCE_BLOCKING"
    latency_ms_max: 6000
    triggered: false

