    variant_data:
      brand_rejected: "Stanley"
      alternative_brand: "Milwaukee"
      alternative_sku: "FERR-SKU-006B"

pass_criteria:
  must_pass:
    - "output.exceptions_raised contains 'STOCK_PARCIAL'"
    - "output.exceptions_raised contains 'PEDIDO_MIXTO'"
    - "output.primary_output.status == 'PROFORMA_DRAFT'"
    - "output.primary_output.proforma_generated == true"
    - "output.hitl_gate_triggered == true"
    - "inventory_fetcher output.total_items == 5"
    - "inventory_fetcher output.full_stock_items == 3"
    - "inventory_fetcher output.partial_stock_items == 1"
    - "inventory_fetcher output.out_of_stock_items == 1"
    - "compliance_checker output.recommendations contains 'Ofrecer entrega parcial'"
    - "proforma_builder output.items_table contains availability column"
    - "proforma_builder output.terms_block.conditions contains 'Entrega parcial'"
    - "draft_writer output.body contains 'ENTREGA INMEDIATA'"
    - "draft_writer output.body contains 'BACKORDER'"
    - "draft_writer output.body contains 'Opciones de entrega'"
    - "evidence_bundle.per_line[1].excepcion == 'STOCK_PARCIAL'"
    - "evidence_bundle.per_line[3].excepcion == 'STOCK_PARCIAL'"
  must_not_do:
    - "output contains proforma sin indicar disponibilidad por línea"
    - "output promises delivery date that ignores backorder items"
    - "system ignores out_of_stock item and generates proforma without it silently"
    - "system charges extra freight for partial delivery without mentioning it's free"
    - "system recommends substitution without verifying compatibility"
    - "system groups all items into single delivery date ignoring stock reality"

severity_weight_validation:
  expected_severity: "low-medium"
  if_misclassified_as_lower: |
    Si clasificado como Low: podría omitirse opción entrega
    parcial y sistema promete fecha única. Si cliente necesita
    materiales para proyecto con deadline, esperar 7 días por
    tornillos cuando clavos y anclajes están disponibles retrasa
    obra innecesariamente. Sin opción entrega parcial, cliente
    no puede iniciar trabajo parcial. Valor total bajo ($265.97)
    pero impacto operativo para taller es alto si no recibe lo
    disponible rápidamente.

privacy_tier:
  inputs: "TENANT_DERIVED"
  outputs: "TENANT_DERIVED"
  cross_tenant_eligibility: "no"
  promotion_notes: |
    Caso específico ferretería mantenimiento. NO promovible.
    Patrón abstracto (pedido mixto con stock parcial y múltiples
    opciones de entrega) valioso para training. Puede promoverse
    a GLOBAL_PROMOTABLE como ejemplo de mixed_order_partial_stock
    tras anonimización.

