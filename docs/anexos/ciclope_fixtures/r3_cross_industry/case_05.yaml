edge_cases:
  - description: "Equivalente aftermarket (Mann-Filter) disponible a $58.00 con misma especificación — sistema debe documentar cross-reference pero NO sustituir sin aprobación AM"
    expected_behavior: "Proforma con OEM original como línea principal. Cross-reference Mann-Filter documentado en evidence como alternativa futura. NO cambiar línea a aftermarket sin aprobación."
    variant_data:
      aftermarket_available: true
      aftermarket_sku: "MRO-SKU-002-MANN"
      aftermarket_price: 58.00
  - description: "Cliente solicita filtros para GA75 pero flota real incluye 2 unidades GA90 — sistema debe alertar posible incompatibilidad"
    expected_behavior: "Compliance Checker detecta discrepancia entre modelo solicitado (GA75) y flota registrada (GA75+GA90). Alerta suave: 'verificar que todos los compresores sean GA75'. No bloqueo si cliente confirma."
    variant_data:
      fleet_actual: ["GA75x6", "GA90x2"]
      fleet_discrepancy: true
  - description: "Stock disponible 20 unidades (insuficiente para 24) — añade STOCK_PARCIAL"
    expected_behavior: "Proforma con 20 disponibles + 4 backorder 3 días. NO asumir 24 disponibles."
    variant_data:
      stock_available: 20

pass_criteria:
  must_pass:
    - "output.exceptions_raised is empty"
    - "output.primary_output.status == 'PROFORMA_DRAFT'"
    - "output.primary_output.proforma_generated == true"
    - "output.hitl_gate_triggered == true"
    - "compliance_checker output.compatibility_verified contains 'OEM Atlas Copco GA75: CONFIRMADO'"
    - "compliance_checker output.compatibility_verified contains 'OEM part number 1622 0007 00: CONFIRMADO'"
    - "proforma_builder output.items_table[0].description contains 'Atlas Copco GA75 OEM 1622 0007 00'"
    - "proforma_builder output.terms_block.conditions contains 'Compatibilidad OEM verificada'"
    - "draft_writer output.body contains 'Referencia OEM: 1622 0007 00 — CONFIRMADA'"
    - "draft_writer output.body contains 'Cross-references alternativas'"
    - "evidence_bundle.per_line[0].technical_spec_rule contains 'AtlasCopco_GA75'"
    - "evidence_bundle.per_quote.exception_codes is empty"
    - "inventory_fetcher output.total_fulfillable >= 24"
  must_not_do:
    - "output quotes filter without OEM verification"
    - "output quotes 'generic air filter for compressor' without Atlas Copco reference"
    - "system selects aftermarket filter as primary without documenting OEM compatibility"
    - "proforma omits ISO 5011 certification reference"
    - "system ignores fleet_data and doesn't verify GA75 specifically"
    - "draft writer says 'any compatible filter' without specifying OEM"

severity_weight_validation:
  expected_severity: "medium"
  if_misclassified_as_lower: |
    Si clasificado como Low: podría omitirse evidence bundle de
    compatibilidad OEM. Riesgo de que proforma genérica llegue al
    cliente sin confirmación de referencia 1622 0007 00. Si cliente
    instala filtro incompatible, compresor GA75 puede sufrir daño
    por contaminación. Mantenimiento trimestral de flota = 8
    compresores × 3 filtros/año = alto volumen. Error de
    compatibilidad escalable a múltiples unidades.

privacy_tier:
  inputs: "TENANT_DERIVED"
  outputs: "TENANT_DERIVED"
  cross_tenant_eligibility: "no"
  promotion_notes: |
    Caso específico cliente gold compresores. NO promovible. Patrón
    abstracto (MRO OEM cross-reference verification) valioso para
    replay set. Puede promoverse a GLOBAL_PROMOTABLE como template
    de verificación compatibilidad OEM tras anonimización.

gaps_detected: []
