      layer_2: "activo"
      layer_3a_pins: []
      layer_3b_metadata: ["customer_alert:credit_blocked"]
    curator:
      last_freeze: "2025-04-25"
      pending_items: 2
    authority_matrix_level: "AM"

input:
  channel: email
  from:
    name: "Ing. Roberto Castro"
    email: "r.castro@quimicadelcaribe.co"
    role: "Jefe de Mantenimiento"
  to: "cotizaciones@mwt-faberloom.co"
  subject: "Proforma urgente 100 sellos mecánicos — mismo precio anterior"
  body_text: |
    Buenos días Álvaro,

    Necesitamos proforma urgente por 100 sellos mecánicos John Crane
    Type 1, 1.5x2.0, carburo/viton.

    Es el mismo producto que compramos en noviembre — por favor
    mantener el mismo precio que nos dieron en esa ocasión.

    Entrega: Cartagena, EXW bodega de ustedes.
    Plazo: esta semana si es posible.

    Quedamos atentos.

    Ing. Roberto Castro
    Jefe de Mantenimiento
    Química Industrial del Caribe
  attachments: []
  thread_id: "THREAD-CLI004-2024-001"
  timestamp: "2025-04-30T08:45:00-05:00"
  language_detected: "es"

expected_pipeline:
  - step: 1
    sub_agent: "AG_SUB_EMAIL_CLASSIFIER"
    inputs: ["input.email.body_text", "input.email.subject"]
    expected_output:
      primary_intent: "quote_request"
      secondary_intents: ["urgent_request", "price_lock_request"]
      urgency: "high"
      sentiment: "urgent"
      requires_human: false
      confidence: 0.91
      language_detected: "es"
      entities_extracted:
        - type: "product"
          value: "sellos mecánicos John Crane Type 1"
          qty: 100
        - type: "historical_reference"
          value: "noviembre 2024"
        - type: "price_lock_request"
          value: "mismo precio anterior"
        - type: "delivery_location"
          value: "Cartagena"
        - type: "incoterm"
          value: "EXW"
    latency_ms_max: 1200
    triggered: true

  - step: 2
    sub_agent: "AG_SUB_SAP_QUERY"
    inputs: ["customer_id: CLI-004", "parsed_items"]
    expected_output:
      account_credit_status: "blocked"
      credit_block_reason: "morosidad_critica"
      overdue_invoices:
        - invoice_id: "INV-2024-0847"
          amount_usd: 3450
          days_overdue: 136
        - invoice_id: "INV-2024-0923"
          amount_usd: 1870
          days_overdue: 110
      payment_history: "blocked"
      pricing_master_access: true
      historical_price_mro_sku_003: "178.50 USD (nov 2024)"
      customer_terms_ref: "TERMS-QIC-2024-BLOCKED"
      freshness: "2025-04-30T08:40:00-05:00"
    latency_ms_max: 2000
    triggered: true

  - step: 3
    sub_agent: "AG_SUB_COMPLIANCE_CHECKER"
    inputs:
      profile: "MRO_compatibility"
      items: ["MRO-SKU-003"]
      customer_country: "CO"
      credit_status: "blocked"
    expected_output:
      pass: false
      warnings:
        - code: "CREDITO_BLOQUEADO"
          severity: "critical"
          message: "Cliente CLI-004 tiene crédito bloqueado por morosidad crítica. Facturas vencidas: $5,320 USD."
      blocking_issues:
        - "Crédito bloqueado: prohibido emitir proforma o aceptar pedido sin aprobación finance/supervisor"
        - "Solicitud de precio histórico requiere validación de vigencia (48h vencida lista)"
      pii_detected: false
      policies_violated: ["credit_blocked_no_quote", "authority_matrix_credit_authorization"]
    latency_ms_max: 1000
    triggered: true

  - step: 4
    sub_agent: "AG_SUB_ESCALATION_ROUTER"
    inputs:
      trigger_source: "AG_SUB_COMPLIANCE_CHECKER"
      exception_codes: ["CREDITO_BLOQUEADO"]
      severity: "critical"
      customer_tier: "bronze"
      customer_credit: "blocked"
    expected_output:
      route_to: "AM_MWT_SUPERVISOR"
      recipients: ["a.velasquez@mwt-faberloom.co", "finanzas@mwt-faberloom.co"]
      channel: "email_priority"
      urgency_override: "critical"
      fallback_route: "CEO_MWT"
      sla_target_minutes: 60
    latency_ms_max: 100
    triggered: true

  - step: 5
    sub_agent: "AG_SUB_DRAFT_WRITER"
    inputs:
      category: "internal_alert"
      recipient_role: "AM_supervisor"
      context:
        customer: "Química Industrial del Caribe S.A.S."
        rfq_items: "100 sellos mecánicos MRO-SKU-003"
        exception: "CREDITO_BLOQUEADO"
        severity: "critical"
        overdue_amount: "5320 USD"
        days_overdue_max: 136
    expected_output:
      draft_type: "internal_alert"
      subject: "[CRÍTICO — CRÉDITO] RFQ bloqueada / Cliente CLI-004 moroso $5,320 USD"
      body: |
        RFQ bloqueada automáticamente por crédito:

        Cliente: Química Industrial del Caribe S.A.S. (CLI-004, bronze)
        Solicitud: 100 sellos mecánicos John Crane Type 1
        Valor estimado: $18,500 USD

        BLOQUEO: Crédito bloqueado por morosidad crítica.
        Facturas vencidas:
        - INV-2024-0847: $3,450 USD — vencida 136 días
        - INV-2024-0923: $1,870 USD — vencida 110 días
        Total adeudo: $5,320 USD

        Stock disponible: 80 unidades (INSUFICIENTE para 100).
        Precio histórico nov 2024: $178.50 USD (lista vigente $185.00).

        ACCIÓN REQUERIDA:
        1. Contactar finanzas para evaluar plan de pago
        2. Si cliente regulariza → reactivar cotización
        3. Si no regulariza → responder declinando con política clara

        NO emitir proforma sin aprobación explícita de finanzas + supervisor.
      internal_note: "Cliente bronze, historial problemático. Solicita precio histórico sin considerar vencimiento lista. Stock insuficiente además de crédito."
      tone: "urgent_executive"
    latency_ms_max: 4000
    triggered: true

  - step: 6
    sub_agent: "AG_SUB_PROFORMA_BUILDER"
    inputs: ["blocked_by_compliance: true"]
    expected_output:
      status: "NOT_GENERATED"
      reason: "COMPLIANCE_BLOCKING"
    latency_ms_max: 6000
    triggered: false

expected_outputs:
  primary_output:
    type: "alarma"
    content:
      status: "FAIL"
      reason: "CREDITO_BLOQUEADO"
      customer_notified: false
      proforma_generated: false
    glosses_required:
      - "Crédito bloqueado por morosidad crítica"
      - "Total adeudo vencido: $5,320 USD"
      - "NO proforma sin aprobación finanzas + supervisor"
      - "Stock insuficiente adicionalmente (80 vs 100 solicitado)"
  evidence_bundle:
    per_line: []
    per_quote:
      status: "FAIL"
      exception_codes: ["CREDITO_BLOQUEADO"]
      aprobador: "finance+AM+supervisor"
      hash: null
    audit_view:
      source_precio: "lista_comercial"
      version_lista: "2025-04-28"
      timestamp_stock: "2025-04-30T08:38:00-05:00"
      technical_spec_rule: "mechanical_seal"
      margen_calculado: null
      aprobador: "finance+AM+supervisor (credit block)"
      vigencia: null
      fallback_used: false
      source_stock: "3PL"
      source_lead_time: "3PL"
      sku_status: "active"
      cert_doc_version: "CERT-API682-JC-2024"
      country_rule_applied: "CO_commercial_credit_block"
      freight_quote_ref: null
      MOQ_packaging_rule: "MOQ=4, packaging=2/box"
      currency_fx_rate: null
      customer_terms_ref: "TERMS-QIC-2024-BLOCKED"
      exception_codes: ["CREDITO_BLOQUEADO"]
  side_effects:
    - type: "notify_AM"
      details:
        recipients: ["a.velasquez@mwt-faberloom.co", "finanzas@mwt-faberloom.co"]
        channel: "email_priority"
        sla_minutes: 60
    - type: "create_open_item"
      details:
        item_type: "credit_block_review"
        customer_id: "CLI-004"
        priority: "critical"
        due_date: "2025-04-30T17:00:00-05:00"
        note: "Cliente solicita cotización mientras bloqueado. Evaluar plan pago."
    - type: "persist_audit_event"
      details:
        event_type: "QUOTE_BLOCKED_CREDIT"
        severity: "critical"
        trace_id: "TRACE-case17-20250430"
        financial_context:
          overdue_total_usd: 5320
          days_overdue_max: 136
          credit_limit: 5000
          credit_used: 5320
  exceptions_raised:
    - "CREDITO_BLOQUEADO"
  hitl_gate_triggered: true
  output_destination: "blocked"

edge_cases:
  - description: "Cliente con crédito en 'warning' (no bloqueado) pero próximo a límite — diferente resultado: proforma con escalación AM, no bloqueo absoluto"
    expected_behavior: "Genera proforma draft con ALARMA y requiere aprobación AM+supervisor. No bloqueo automático."
    variant_data:
      credit_status: "warning"
      credit_available_usd: 150
  - description: "Solicitud de 'mismo precio anterior' cuando precio histórico está vencido más de 30 días — debe rechazar price lock"
    expected_behavior: "Incluso si crédito estuviera OK, sistema debe marcar PRICE_STALE o PRECIO_VENCIDO para precio histórico. Escalar AM."
    variant_data:
      credit_status: "ok"
      historical_price_date: "2024-11-15"
      days_since_historical_price: 166
  - description: "Cliente ofrece pago adelantado o carta crédito para superar bloqueo"
    expected_behavior: "Crédito bloqueado sigue siendo bloqueo. AM+finanzas deben aprobar reactivación. Sistema NO auto-desbloquea por promesa de pago."
    variant_data:
      payment_offer: "carta_credito_irrevocable"

pass_criteria:
  must_pass:
    - "output.exceptions_raised contains 'CREDITO_BLOQUEADO'"
    - "output.primary_output.status == 'FAIL'"
    - "output.primary_output.proforma_generated == false"
    - "output.hitl_gate_triggered == true"
    - "output.side_effects contains notify_AM with recipients including finanzas"
    - "output.side_effects contains create_open_item with item_type == 'credit_block_review'"
    - "sap_query output.account_credit_status == 'blocked'"
    - "compliance_checker output.blocking_issues contains 'Crédito bloqueado'"
    - "evidence_bundle.per_quote.aprobador contains 'finance'"
  must_not_do:
    - "output contains proforma draft con precio total"
    - "output contains cover_letter email al cliente con cotización"
    - "system generates quote using historical price from nov 2024 without validation"
    - "system overrides credit block because order is 'urgent'"
    - "system checks inventory before credit and proceeds with stock check alone"
    - "output.primary_output.customer_notified == true"

severity_weight_validation:
  expected_severity: "critical"
  if_misclassified_as_lower: |
    Si clasificado como High o menor: proforma podría generarse como draft
    y llegar a revisión AM sin alerta financiera explícita. Riesgo de aceptar
    pedido adicional de cliente moroso, aumentando exposición crediticia.
    Cliente ya adeuda $5,320 USD con facturas vencidas 110-136 días.
    Emitir proforma sin bloqueo = riesgo de pedido sin capacidad de pago,
    posible incobrabilidad adicional, violación de política de crédito MWT.

privacy_tier:
  inputs: "PRIVATE_RAW"
  outputs: "TENANT_DERIVED"
  cross_tenant_eligibility: "no"
  promotion_notes: |
    Datos financieros específicos de cliente (adeudos, facturas vencidas)
    son PRIVATE_RAW. Patrón de bloqueo por crédito puede anonimizarse
    y promoverse a GLOBAL_PROMOTABLE como template de manejo de crédito
    bloqueado, previo privacy review y secret-commercial review.

gaps_detected: []
