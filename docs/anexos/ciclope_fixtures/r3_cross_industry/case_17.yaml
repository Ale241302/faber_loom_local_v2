          amount_usd: 1870
          due_date: "2025-01-10"
          days_overdue: 110
      credit_block_reason: "morosidad_critica"
      credit_limit_usd: 5000
      credit_used_usd: 5320
      credit_available_usd: -320
      preferred_delivery: "Cartagena Industrial"
  agent_state:
    archetype: "AG_AM_MWT"
    sub_agents_active:
      - "AG_SUB_EMAIL_CLASSIFIER"
      - "AG_SUB_SAP_QUERY"
      - "AG_SUB_COMPLIANCE_CHECKER"
