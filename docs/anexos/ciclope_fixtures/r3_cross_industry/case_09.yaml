edge_cases:
  - description: "Cliente insiste en Yale exclusivamente por especificación arquitectónica — sistema debe generar backorder proforma con lead time 14 días"
    expected_behavior: "Proforma alternativa con Yale backorder 14 días. Draft respetando preferencia marca. AM aprueba backorder."
    variant_data:
      brand_mandatory: "Yale"
      backorder_accepted: true
  - description: "Tesa no tiene certificación DIN 18252 vigente en nuestro stock — sistema NO debe ofrecer Tesa"
    expected_behavior: "Compliance detecta cert vencida Tesa. NO sustitución ofrecida. Solo backorder Yale o alternativa con cert vigente."
    variant_data:
      tesa_cert_status: "vencido"
      tesa_cert_expiry: "2024-12-01"
  - description: "Cliente necesita 100 unidades, no 15 — stock Tesa 50 insuficiente. Añade STOCK_PARCIAL + SUSTITUCIÓN_ACEPTABLE"
    expected_behavior: "Proforma 50 Tesa inmediato + 50 Yale backorder 14 días. Draft explicando mix."
    variant_data:
      qty: 100
      stock_tesa: 50

pass_criteria:
  must_pass:
    - "output.exceptions_raised contains 'SUSTITUCIÓN_ACEPTABLE'"
    - "output.primary_output.status == 'PROFORMA_DRAFT'"
    - "output.primary_output.proforma_generated == true"
    - "output.hitl_gate_triggered == true"
    - "inventory_fetcher output.stock_status == 'out_of_stock' for FERR-SKU-002"
    - "inventory_fetcher output.alternative_skus contains 'FERR-SKU-002B'"
    - "compliance_checker output.substitution_justification contains 'Misma norma DIN 18252'"
    - "draft_writer output.body contains 'Yale 40mm agotada'"
    - "draft_writer output.body contains 'Tesa 40mm — equivalente técnica'"
    - "draft_writer output.body contains ambas opciones (Yale backorder + Tesa inmediato)"
    - "proforma_builder output.terms_block.conditions contains 'Sustitución: Yale → Tesa'"
    - "evidence_bundle.per_line[0].excepcion == 'SUSTITUCIÓN_ACEPTABLE'"
  must_not_do:
    - "output contains proforma solo con Yale backorder sin ofrecer alternativa"
    - "output contains proforma con Tesa sin mencionar es sustitución"
    - "system hides price difference ($22 vs $18.50) from customer"
    - "system recommends Tesa without mentioning it's not the requested brand"
    - "system accepts substitution without AM approval"
    - "system ignores DIN 18252 equivalence and just says 'compatible'"

severity_weight_validation:
  expected_severity: "low-medium"
  if_misclassified_as_lower: |
    Si clasificado como Low: podría omitirse la oferta de opción
    Yale backorder. Cliente podría sentirse forzado a Tesa más
    caro sin alternativa. Construcción residencial: especificación
    Yale puede ser requerimiento de diseño arquitectónico o
    contrato. Forzar Tesa sin opción = posible incumplimiento
    especificación. Aunque equivalente técnico, marca diferente
    puede afectar uniformidad edificio.

privacy_tier:
  inputs: "TENANT_DERIVED"
  outputs: "TENANT_DERIVED"
  cross_tenant_eligibility: "no"
  promotion_notes: |
    Caso específico ferretería construcción. NO promovible. Patrón
    abstracto (sustitución hardware equivalente con opción backorder)
    valioso para replay set. Puede promoverse a GLOBAL_PROMOTABLE
    como ejemplo de substitution_with_options tras anonimización.

gaps_detected: []
