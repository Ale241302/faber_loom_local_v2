input:
  channel: email
  from:
    name: "Dra. Carolina Vargas"
    email: "c.vargas@hun.edu.co"
    role: "Directora de Abastecimiento"
  to: "cotizaciones@mwt-faberloom.co"
  subject: "Oferta licitación descartables quirúrgicos — entrega obligatoria 72h con penalidad"
  body_text: |
    Estimados señores MWT,

    Solicitamos presentar oferta formal en licitación pública abierta
    No. LP-2025-0847 del Hospital Universitario Nacional:

    Producto: Kits descartables quirúrgicos estándar
    Cantidad: 2,000 kits
    Entrega: 72 horas hábiles desde orden de compra — OBLIGATORIA
    Penalidad por atraso: 0.5% por día hábil de retraso, tope 10%
    Vigencia oferta: 60 días
    Lugar entrega: Almacén central HUN, Bogotá, DDP
    Documentación: Registro INVIMA vigente, certificado esterilidad por lote

    Oferta debe incluir carta de cumplimiento de entrega firmada.
    Stock comprometido debe estar disponible y no reservado.

    Cierre recepción ofertas: 10 de mayo 2025, 15:00 horas.

    Atentamente,

    Dra. Carolina Vargas
    Directora de Abastecimiento
    Hospital Universitario Nacional de Colombia
  attachments:
    - filename: "PLIEGO_LP_2025_0847_DESCARTABLES.pdf"
      type: "licitation_terms"
      size_kb: 890
    - filename: "FORMATO_CARTA_CUMPLIMIENTO.docx"
      type: "form_template"
      size_kb: 45
  thread_id: null
  timestamp: "2025-04-30T11:00:00-05:00"
  language_detected: "es"

