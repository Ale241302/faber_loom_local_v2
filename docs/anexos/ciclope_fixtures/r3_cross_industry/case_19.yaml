        penalty: "0.5% diario, tope 10%"
        margin_pct: 8.2
        delivery_sla: "72h obligatoria"
        deadline: "2025-05-10"
    expected_output:
      draft_type: "internal_alert"
      subject: "[CRÍTICO — DECISIÓN CEO] Licitación LP-2025-0847 / $26,775 USD / Penalidad + entrega 72h"
      body: |
        DECISIÓN REQUERIDA: Licitación pública con riesgo financiero regulatorio.

        Cliente: Hospital Universitario Nacional (CLI-009, platinum)
        Producto: 2,000 kits descartables quirúrgicos MED-SKU-004
        Valor: $26,775 USD (con IVA)
        Margen neto: 8.2% (UMBRAL: 12%)

        RIESGOS IDENTIFICADOS:
        1. Penalidad por atraso: 0.5% diario, tope 10% ($2,677 USD máx)
        2. Entrega 72h OBLIGATORIA — no solo stock, logística operativa
        3. Carta cumplimiento firmada — firma legal requerida
        4. Stock: 2,100 disponible (suficiente), pero reserva obligatoria

        BLOQUEO ACTUAL:
        - NO proforma final sin aprobación CEO
        - NO carta cumplimiento sin legal
        - NO promesa entrega 72h sin logística

        OPCIONES:
        A) Aprobar participación con contramedidas (seguro, reserva stock, carta)
        B) Declinar participación formalmente antes del 10 mayo
        C) Renegociar términos (improbable en licitación abierta)

        TIEMPO: Cierre 10 mayo, 15:00. Decisión requerida antes del 8 mayo.
      internal_note: "Cliente premium con tasa ganancia 80%. Penalidad máxima $2,677. Si entrega falla, daño reputacional con principal hospital universitario del país."
      tone: "executive_decision"
    latency_ms_max: 4000
    triggered: true

  - step: 8
    sub_agent: "AG_SUB_PROFORMA_BUILDER"
    inputs: ["blocked_by_compliance: true"]
    expected_output:
      status: "NOT_GENERATED"
      reason: "COMPLIANCE_BLOCKING"
    latency_ms_max: 6000
    triggered: false

