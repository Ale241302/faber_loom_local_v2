edge_cases:
  - description: "Penalidad más alta (2% diario, tope 20%) — mismo resultado de bloqueo CEO"
    expected_behavior: "Bloqueo CEO igual. Mayor severidad financiera no cambia mecanismo, solo aumenta urgencia de decisión."
    variant_data:
      penalty_amount_per_day_pct: 2.0
      penalty_cap_pct: 20
  - description: "Stock disponible solo 1,500 (insuficiente para 2,000) — añade STOCK_PARCIAL como excepción adicional"
    expected_behavior: "Mantiene bloqueo CEO. Stock parcial es bloqueo adicional, no sustituye penalidad. Múltiples excepciones pueden coexistir."
    variant_data:
      stock_available: 1500
  - description: "Cliente privado (no E.S.E.) con mismos términos contractuales"
    expected_behavior: "Mismo bloqueo CEO. Penalidad contractual obligatoria no depende de sector público/privado. Privado podría permitir negociación de términos."
    variant_data:
      customer_type: "hospital_privado"
      contract_type: "contrato_directo"

pass_criteria:
  must_pass:
    - "output.exceptions_raised contains 'REGLA_PAIS_ESPECIAL'"
    - "output.exceptions_raised contains 'MARGEN_BAJO'"
    - "output.primary_output.status == 'BLOCKED'"
    - "output.primary_output.proforma_generated == false"
    - "output.hitl_gate_triggered == true"
    - "output.side_effects contains escalate_to with target == 'CEO_MWT'"
    - "output.side_effects contains create_open_item with item_type == 'licitation_ceo_decision'"
    - "escalation_router output.route_to == 'CEO_MWT'"
    - "pricing_calculator output.warnings contains MARGEN_BAJO with severity high"
    - "compliance_checker output.blocking_issues contains 'Penalidad contractual'"
    - "compliance_checker output.blocking_issues contains 'Entrega 72h OBLIGATORIA'"
    - "evidence_bundle.per_quote.aprobador_final == 'CEO'"
  must_not_do:
    - "output contains proforma draft con precio total enviable al cliente"
    - "output contains cover_letter prometiendo entrega 72h"
    - "system generates proforma because stock is sufficient (2,100 > 2,000)"
    - "system ignores penalty clause because customer is platinum"
    - "system allows AM to approve without CEO involvement"
    - "output.primary_output.customer_notified == true"

severity_weight_validation:
  expected_severity: "critical"
  if_misclassified_as_lower: |
    Si clasificado como High o menor: proforma draft podría generarse,
    llegar a revisión AM, y AM podría aprobar sin escalación CEO.
    Consecuencia: compromiso contractual con penalidad hasta $2,677 USD
    sin aprobación de máxima autoridad. Si entrega 72h falla por cualquier
    razón logística, MWT incurre en penalidad automática. Daño financiero
    directo + reputacional con principal hospital universitario de Colombia.
    Riesgo de descalificación futura en licitaciones estatales.

privacy_tier:
  inputs: "RESTRICTED_SENSITIVE_OR_REGULATED"
  outputs: "RESTRICTED_SENSITIVE_OR_REGULATED"
  cross_tenant_eligibility: "no"
  promotion_notes: |
    Datos de licitación pública con términos contractuales específicos
    son sensibles y restringidos. NO promovible. Patrón abstracto de
    manejo de penalidad contractual en licitaciones podría promoverse
    a GLOBAL_PROMOTABLE como template de riesgo regulatorio, previo
    7-checks de privacy review.

gaps_detected: []
