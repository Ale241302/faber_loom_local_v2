input:
  channel: email
  from:
    name: "Ing. Miguel Ríos"
    email: "m.rios@pinturasindnorte.co"
    role: "Jefe de Seguridad Industrial"
  to: "cotizaciones@mwt-faberloom.co"
  subject: "Urgente: 500 respiradores para vapores orgánicos — entrega Bogotá"
  body_text: |
    Estimados,

    Necesitamos cotizar 500 respiradores para protección contra vapores
    orgánicos en nuestra planta de pintura industrial. Entrega en Bogotá,
    DDP.

    El producto que usábamos antes era "similar a N95 industrial" según
    nuestro proveedor anterior. Necesitamos algo equivalente.

    Plazo: 5 días hábiles.

    Quedamos atentos a su proforma.

    Ing. Miguel Ríos
    Jefe de Seguridad Industrial
    Pinturas Industriales del Norte S.A.
  attachments: []
  thread_id: null
  timestamp: "2025-04-30T09:30:00-05:00"
  language_detected: "es"

expected_pipeline:
  - step: 1
    sub_agent: "AG_SUB_EMAIL_CLASSIFIER"
    inputs: ["input.email.body_text", "input.email.subject"]
    expected_output:
      primary_intent: "quote_request"
      secondary_intents: ["chemical_protection", "product_substitution_request"]
      urgency: "high"
      sentiment: "neutral"
      requires_human: false
      confidence: 0.88
      language_detected: "es"
      entities_extracted:
        - type: "product"
          value: "respiradores para vapores orgánicos"
          qty: 500
        - type: "hazard_type"
          value: "vapores orgánicos"
        - type: "reference_product"
          value: "N95 industrial"
        - type: "delivery_location"
          value: "Bogotá"
        - type: "incoterm"
          value: "DDP"
        - type: "use_case"
          value: "planta pintura industrial"
    latency_ms_max: 1200
    triggered: true

  - step: 2
    sub_agent: "AG_SUB_SAP_QUERY"
    inputs: ["customer_id: CLI-010", "parsed_items"]
    expected_output:
      account_credit_status: "ok"
      payment_history: "clean"
      pricing_master_access: true
      customer_terms_ref: "TERMS-PIN-2025-Q1"
      freshness: "2025-04-30T09:25:00-05:00"
    latency_ms_max: 2000
    triggered: true
    parallel_group: "A"

  - step: 3
    sub_agent: "AG_SUB_INVENTORY_FETCHER"
    inputs: ["sku: EPP-SKU-001", "qty: 500"]
    expected_output:
      items:
        - sku: "EPP-SKU-001"
          warehouse: "Bogotá Principal"
          available: 800
          reserved: 150
          in_transit: 0
          fulfillable_qty: 650
      total_fulfillable: 1050
      freshness: "2025-04-30T09:28:00-05:00"
    latency_ms_max: 1500
    triggered: true
    parallel_group: "A"

  - step: 4
    sub_agent: "AG_SUB_COMPLIANCE_CHECKER"
    inputs:
      profile: "chemical_PPE"
      items: ["EPP-SKU-001"]
      hazard_type: "vapores orgánicos"
      customer_country: "CO"
      use_case: "planta pintura industrial"
      reference_request: "similar a N95 industrial"
    expected_output:
      pass: false
      warnings:
        - code: "ASTM_AMBIGUO"
          severity: "high"
          message: "N95 es respirador para partículas, NO para vapores orgánicos. Cliente solicita protección química pero referencia respirador particulado."
        - code: "SUSTITUCIÓN_ACEPTABLE"
          severity: "medium"
          message: "EPP-SKU-001 NO es equivalente técnico para vapores orgánicos. Requiere respirador con cartuchos orgánicos (ej: EPP-SKU-001B con 6001)."
      blocking_issues:
        - "N95 no protege contra vapores orgánicos — riesgo grave de exposición HSE"
        - "Referencia 'similar a N95' es técnicamente incorrecta para el uso declarado"
        - "SKU en stock (EPP-SKU-001) NO es adecuado para aplicación química"
      pii_detected: false
      policies_violated: ["chemical_PPE_specification_mandatory", "safety_first_no_substitution_unverified"]
    latency_ms_max: 1000
    triggered: true

  - step: 5
    sub_agent: "AG_SUB_ESCALATION_ROUTER"
    inputs:
      trigger_source: "AG_SUB_COMPLIANCE_CHECKER"
      exception_codes: ["ASTM_AMBIGUO"]
      severity: "high"
      customer_tier: "silver"
    expected_output:
      route_to: "AM_MWT"
      recipients: ["a.velasquez@mwt-faberloom.co"]
      channel: "email"
      urgency_override: "high"
      fallback_route: "AM_MWT_SUPERVISOR"
      sla_target_minutes: 120
    latency_ms_max: 100
    triggered: true

  - step: 6
    sub_agent: "AG_SUB_DRAFT_WRITER"
    inputs:
      category: "respond"
      recipient_role: "customer"
      context:
        customer: "Pinturas Industriales del Norte S.A."
        rfq_items: "500 respiradores para vapores orgánicos"
        exception: "ASTM_AMBIGUO"
        severity: "high"
        clarification_needed: true
        suggested_product: "Respirador media cara 3M 6200 + cartuchos 6001 (vapores orgánicos)"
        stock_suggested: "0 disponible, 14 días lead time"
    expected_output:
      draft_type: "customer_clarification"
      subject: "Re: Cotización respiradores — aclaración técnica requerida"
      body: |
        Estimado Ing. Ríos,

        Gracias por contactarnos. Revisamos su solicitud de 500 respiradores
        para protección contra vapores orgánicos en planta de pintura.

        ACLARACIÓN TÉCNICA IMPORTANTE:
        El respirador N95 al que hace referencia está diseñado para
        partículas sólidas (polvo, neblinas no aceitosas). NO protege
        contra vapores orgánicos, solventes ni gases.

        Para su aplicación (pintura industrial, vapores orgánicos), el
        equipo adecuado es un respirador con cartuchos específicos para
        vapores orgánicos, como:

        - Respirador media cara 3M 6200 + cartuchos 6001
        - Con pre-filtros 5N11 para partículas adicionales

        Alternativamente, si lo que busca es protección combinada
        (vapores + partículas de pintura), podemos proponer un set
        completo.

        Precio indicativo del respirador con cartuchos: $45.00 USD
        Lead time: 14 días (no tenemos stock inmediato)

        ¿Podría confirmar:
        1. ¿La exposición es solo a vapores orgánicos o también partículas?
        2. ¿Concentración aproximada o tiempo de exposición diaria?
        3. ¿Tienen programa de protección respiratoria implementado?

        Con esa información podemos proponer la solución correcta y segura.

        Quedo atento.

        Atentamente,
        Álvaro Velásquez
        MWT — FaberLoom
      internal_note: "Cliente confunde N95 con protección química. Riesgo HSE grave si se cotiza N95. Stock N95 disponible (1,050) pero INADECUADO. Respirador correcto sin stock (lead 14 días). Requiere intervención AM para educar cliente y evitar incidente."
      tone: "professional_educational"
    latency_ms_max: 4000
    triggered: true

  - step: 7
    sub_agent: "AG_SUB_PROFORMA_BUILDER"
    inputs: ["blocked_by_compliance: true"]
    expected_output:
      status: "NOT_GENERATED"
      reason: "COMPLIANCE_BLOCKING"
    latency_ms_max: 6000
    triggered: false

