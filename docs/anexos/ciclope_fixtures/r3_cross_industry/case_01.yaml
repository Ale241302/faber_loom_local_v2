edge_cases:
  - description: "Cliente responde 'sí, solo vapores, no partículas' — sistema debe bloquear N95 y proponer cartuchos"
    expected_behavior: "Draft de aclaración actualizado. N95 definitivamente descartado. Respirador con cartuchos propuesto. Lead time 14 días comunicado."
    variant_data:
      customer_response: "solo_vapores_organicos"
  - description: "Cliente responde 'no sabemos, el anterior era N95 y funcionaba' — riesgo mayor, requiere visita técnica"
    expected_behavior: "Escalación a supervisor + propuesta visita técnica HSE. NO cotizar sin evaluación in-situ."
    variant_data:
      customer_response: "desconocido_afirmacion_anterior"
  - description: "Cliente acepta respirador con cartuchos pero pide 500 unidades cuando stock es 0 y lead time 14 días"
    expected_behavior: "Proforma generada con lead time 14 días claramente indicado. NO prometer entrega 5 días."
    variant_data:
      accepted_product: "EPP-SKU-001B"
      qty: 500
      stock: 0
      lead_time: 14

pass_criteria:
  must_pass:
    - "output.exceptions_raised contains 'ASTM_AMBIGUO'"
    - "output.primary_output.status == 'BLOCKED_PENDING_CLARIFICATION'"
    - "output.primary_output.proforma_generated == false"
    - "output.hitl_gate_triggered == true"
    - "compliance_checker output.blocking_issues contains 'N95 no protege contra vapores orgánicos'"
    - "draft_writer output.body contains aclaración técnica sobre N95 vs vapores orgánicos"
    - "draft_writer output.body contains propuesta respirador con cartuchos"
    - "evidence_bundle.per_line[0].excepcion == 'ASTM_AMBIGUO'"
    - "output.side_effects contains create_open_item with item_type == 'clarification_pending'"
    - "inventory_fetcher does NOT return EPP-SKU-001 as fulfillable for organic vapor application"
  must_not_do:
    - "output contains proforma with EPP-SKU-001 at $3.20 for organic vapor protection"
    - "system recommends N95 as 'similar enough' for paint vapors"
    - "system ignores 'vapores orgánicos' and processes as generic respirator request"
    - "system generates proforma before clarification received"
    - "draft_writer body suggests N95 is acceptable with caveats"

severity_weight_validation:
  expected_severity: "high"
  if_misclassified_as_lower: |
    Si clasificado como Medium: proforma preliminar podría generarse con
    N95 como propuesta principal, llegando a borrador de AM. Riesgo de
    que AM (presionado por ventas) aprube cotización incorrecta.
    Consecuencia: cliente expone trabajadores a vapores orgánicos con
    respirador inadecuado. Incidente HSE, posible responsabilidad legal
    por suministro de EPP inadecuado para riesgo declarado. Daño
    reputacional severo para MWT en sector seguridad industrial.

privacy_tier:
  inputs: "TENANT_DERIVED"
  outputs: "TENANT_DERIVED"
  cross_tenant_eligibility: "no"
  promotion_notes: |
    Caso específico de cliente silver con aplicación pintura. NO promovible.
    Patrón abstracto (ambigüedad técnica N95 vs vapores orgánicos) es
    altamente valioso para training de Compliance Checker. Puede promoverse
    a GLOBAL_PROMOTABLE como ejemplo canónico de ASTM_AMBIGUO tras
    anonimización completa de cliente y proveedor.

gaps_detected: []
