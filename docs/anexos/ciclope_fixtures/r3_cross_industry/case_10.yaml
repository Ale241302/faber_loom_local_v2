edge_cases:
  - description: "Lote actual tiene solo 16 meses a vencimiento (menor a 18 requeridos) — sistema debe detectar y bloquear"
    expected_behavior: "Compliance bloquea. Draft proponiendo lote nuevo o backorder. NO proforma con lote que no cumple requerimiento."
    variant_data:
      lot_expiry: "2026-10-15"
      months_to_expiry: 16
      requirement_met: false
  - description: "Cliente requiere certificado de análisis con trazabilidad a estándar NIST — lote actual no tiene NIST traceability"
    expected_behavior: "Compliance detecta falta NIST traceability. Bloqueo o propuesta de lote alternativo con NIST. Draft explicando requerimiento adicional."
    variant_data:
      nist_traceability_required: true
      current_lot_nist: false
  - description: "Stock disponible solo en Barranquilla (3 unidades) pero cliente Bogotá — flete ADR clase 3 requiere vehículo especializado"
    expected_behavior: "Proforma posible con flete ADR. Compliance verifica transportista habilitado clase 3. Si no disponible, FLETE_NO_COTIZADO."
    variant_data:
      stock_bogota: 0
      stock_barranquilla: 3
      adr_transport_available: true

pass_criteria:
  must_pass:
    - "output.exceptions_raised is empty"
    - "output.primary_output.status == 'PROFORMA_DRAFT'"
    - "output.primary_output.proforma_generated == true"
    - "output.hitl_gate_triggered == true"
    - "compliance_checker output.lot_verification contains 'Lote LOT-ETOH-2025-03-A: disponible'"
    - "compliance_checker output.lot_verification contains '23 meses desde entrega estimada'"
    - "proforma_builder output.terms_block.conditions contains 'Lote: LOT-ETOH-2025-03-A'"
    - "proforma_builder output.terms_block.conditions contains 'Vencimiento: 2027-03-15'"
    - "proforma_builder output.terms_block.conditions contains 'Certificado de análisis incluido'"
    - "proforma_builder output.terms_block.conditions contains 'Transporte ADR clase 3'"
    - "draft_writer output.body contains 'VERIFICACIÓN DE LOTE'"
    - "draft_writer output.body contains 'LOT-ETOH-2025-03-A'"
    - "evidence_bundle.per_line[0].lot_number == 'LOT-ETOH-2025-03-A'"
    - "evidence_bundle.per_line[0].expiry_date == '2027-03-15'"
    - "evidence_bundle.per_quote.exception_codes is empty"
  must_not_do:
    - "output quotes without lot number"
    - "output quotes without verifying expiry vs 18-month requirement"
    - "system ignores ADR class 3 and quotes standard delivery"
    - "proforma omits certificate of analysis reference"
    - "system generates proforma with placeholder 'lote por confirmar'"
    - "system assumes all HPLC solvents are interchangeable regardless of lot"

severity_weight_validation:
  expected_severity: "medium"
  if_misclassified_as_lower: |
    Si clasificado como Low-Medium: podría omitirse verificación
    lote y vencimiento. Laboratorio ISO 17025 requiere trazabilidad
    completa. Si etanol vencido o de grado inferior llega al
    laboratorio, resultados HPLC inválidos, posible contaminación
    cromatográfica, retrabajo de análisis, posible impacto en
    certificación ISO 17025. Cliente gold recurrente con 4 compras
    YTD — error en lote químico = pérdida de confianza crítica.

privacy_tier:
  inputs: "TENANT_DERIVED"
  outputs: "TENANT_DERIVED"
  cross_tenant_eligibility: "no"
  promotion_notes: |
    Caso específico laboratorio ISO 17025. NO promovible. Patrón
    abstracto (químico regulado con lot traceability y expiry
    verification) es valiosísimo para training medical_regulated.
    Puede promoverse a GLOBAL_PROMOTABLE como template de
    lot_verification_químico tras anonimización completa.

gaps_detected: []
