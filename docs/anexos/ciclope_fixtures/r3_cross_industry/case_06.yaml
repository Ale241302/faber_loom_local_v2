      items: ["LUB-SKU-001", "LUB-SKU-001B"]
      customer_country: "CO"
      use_case: "equipos hidráulicos metalmecánica"
      specs_provided:
        - "viscosidad: ISO VG 46"
      specs_missing:
        - "tipo anti-wear (zinc-based vs ashless/zinc-free)"
        - "base oil (mineral vs sintético)"
        - "aplicación específica (bombas, cilindros, sistema mixto)"
        - "regulación ambiental (zinc-free requerido?)"
        - "intervalo de drenaje deseado"
        - "compatibilidad con sellos existentes"
    expected_output:
      pass: false
      warnings:
        - code: "ASTM_AMBIGUO"
          severity: "medium-high"
          message: "Aceite hidráulico ISO VG 46 especificado sin tipo anti-wear ni base oil. Dos variantes disponibles con diferencias funcionales significativas."
        - code: "SUSTITUCIÓN_ACEPTABLE"
          severity: "medium"
          message: "LUB-SKU-001 (mineral ZDDP $485) vs LUB-SKU-001B (sintético zinc-free $720). Diferente vida útil (4,000h vs 8,000h), diferente compatibilidad ambiental, diferente precio."
      blocking_issues:
        - "Tipo anti-wear desconocido: ZDDP (zinc) puede ser incompatible con regulaciones de vertido en algunos sectores"
        - "Base oil desconocida: sintético permite intervalos 2x más largos pero cuesta 48% más"
        - "Aplicación específica no indicada: bombas de paletas vs cilindros vs sistemas mixtos requieren viscosidades/aditivos específicos"
      pii_detected: false
      policies_violated: ["lubricant_specification_mandatory", "substitution_requires_tech_approval"]
    latency_ms_max: 1000
    triggered: true

  - step: 5
    sub_agent: "AG_SUB_ESCALATION_ROUTER"
    inputs:
      trigger_source: "AG_SUB_COMPLIANCE_CHECKER"
      exception_codes: ["ASTM_AMBIGUO", "SUSTITUCIÓN_ACEPTABLE"]
      severity: "medium"
      customer_tier: "silver"
    expected_output:
      route_to: "AM_MWT"
      recipients: ["a.velasquez@mwt-faberloom.co"]
      channel: "email"
      urgency_override: "medium"
      fallback_route: "AM_MWT_SUPERVISOR"
      sla_target_minutes: 240
    latency_ms_max: 100
    triggered: true

  - step: 6
    sub_agent: "AG_SUB_DRAFT_WRITER"
    inputs:
      category: "respond"
      recipient_role: "customer"
      context:
        customer: "Metalmecánica del Valle S.A.S."
        rfq_items: "10 tambores aceite hidráulico ISO VG 46"
        exception: "ASTM_AMBIGUO + SUSTITUCIÓN_ACEPTABLE"
        severity: "medium"
        clarification_needed: true
        options_available:
          - "Shell Tellus S2 MX 46: mineral, ZDDP anti-wear, 4,000h drenaje, $485"
          - "Shell Tellus S4 ME 46: sintético, zinc-free ashless, 8,000h drenaje, $720"
    expected_output:
      draft_type: "customer_clarification"
      subject: "Re: Cotización aceite hidráulico ISO VG 46 — aclaración técnica"
      body: |
        Estimado Sr. Londoño,

        Gracias por su solicitud. Para cotizar el aceite hidráulico
        correcto para sus equipos, necesitamos completar la
        especificación técnica:

        DATOS FALTANTES:
        1. ¿Tipo de anti-desgaste?
           - ZDDP (zinc-based): estándar, compatible con la mayoría
             de bombas y cilindros
           - Ashless (zinc-free): requerido donde hay restricciones
             ambientales de zinc en aguas residuales; compatible con
             sellos modernos; intervalo de drenaje 2x más largo
        2. ¿Base oil preferida?
           - Mineral ($485/tambor): rendimiento estándar, 4,000h
           - Sintético ($720/tambor): mayor estabilidad térmica,
             intervalo 8,000h, mejor arranque en frío
        3. ¿Equipos a lubricar?
           - Bombas de paletas / engranajes / pistón
           - Cilindros hidráulicos
           - Sistema mixto
        4. ¿Intervalo de cambio de aceite actual?
           - Estándar (4,000-5,000h) vs extendido (8,000h+)

        OPCIONES EN STOCK:
        - Shell Tellus S2 MX 46 (mineral ZDDP): 10 tambores
          disponibles — $485 c/u
        - Shell Tellus S4 ME 46 (sintético zinc-free): 4 tambores
          disponibles — $720 c/u

        Con la especificación completa podemos cotizar el producto
        exacto y aconsejar sobre intervalos de mantenimiento.

        Quedo atento.

        Atentamente,
        Álvaro Velásquez
        MWT — FaberLoom
      internal_note: "Cliente silver metalmecánica. Spec incompleta aceite hidráulico — dos variantes muy diferentes en precio, performance y aplicación. Sustitución sin validación técnica podría causar incompatibilidad con sellos o regulaciones ambientales. Requiere intervención AM."
      tone: "professional_technical"
    latency_ms_max: 4000
    triggered: true

  - step: 7
    sub_agent: "AG_SUB_PROFORMA_BUILDER"
    inputs: ["blocked_by_compliance: true"]
    expected_output:
      status: "NOT_GENERATED"
      reason: "COMPLIANCE_BLOCKING"
    latency_ms_max: 6000
    triggered: false

