edge_cases:
  - description: "Cliente opera fundición de aluminio — regulación exige zinc-free. Sistema debe descartar LUB-SKU-001 automáticamente."
    expected_behavior: "Compliance detecta aplicación fundición aluminio → LUB-SKU-001 descartado. Solo LUB-SKU-001B ofrecido. Si stock insuficiente (4 vs 10), añade STOCK_PARCIAL."
    variant_data:
      application: "fundicion_aluminio"
      zinc_free_required: true
  - description: "Cliente acepta mineral ZDDP pero tiene sellos de caucho NBR viejo — incompatibilidad química ZDDP-NBR degradado"
    expected_behavior: "Compliance alerta: ZDDP puede degradar sellos NBR antiguos. Requiere confirmación estado sellos o upgrade a ashless."
    variant_data:
      seal_type: "NBR_old"
      zinc_based_selected: true
  - description: "Cliente quiere mezclar 5 tambores mineral + 5 sintético en mismo sistema"
    expected_behavior: "Bloqueo AM. Mezclar aceites de diferente base y aditivación en mismo circuito es inaceptable. Draft explicando incompatibilidad."
    variant_data:
      mixed_request: "5_mineral_5_synthetic"
      same_system: true

pass_criteria:
  must_pass:
    - "output.exceptions_raised contains 'ASTM_AMBIGUO'"
    - "output.exceptions_raised contains 'SUSTITUCIÓN_ACEPTABLE'"
    - "output.primary_output.status == 'BLOCKED_PENDING_CLARIFICATION'"
    - "output.primary_output.proforma_generated == false"
    - "output.hitl_gate_triggered == true"
    - "compliance_checker output.blocking_issues contains 'Tipo anti-wear desconocido'"
    - "compliance_checker output.blocking_issues contains 'Base oil desconocida'"
    - "draft_writer output.body contains 'ZDDP (zinc-based)'"
    - "draft_writer output.body contains 'Ashless (zinc-free)'"
    - "draft_writer output.body contains '4,000h vs 8,000h'"
    - "inventory_fetcher output.multiple_skus_found == true"
    - "output.side_effects contains create_open_item with item_type == 'clarification_pending'"
  must_not_do:
    - "output contains proforma con 'aceite hidráulico ISO 46 genérico'"
    - "system selects mineral because it's cheaper ($485 vs $720)"
    - "system selects mineral because more stock (10 vs 4)"
    - "system ignores missing anti-wear spec and proceeds with default"
    - "draft_writer says 'recomendamos el mineral por precio'"
    - "system accepts 'cualquiera de ISO 46' as sufficient specification"

severity_weight_validation:
  expected_severity: "medium"
  if_misclassified_as_lower: |
    Si clasificado como Low-Medium: proforma podría generarse
    seleccionando aceite más barato o más stock sin validar
    aplicación. Si cliente opera en zona con regulación zinc-free
    (p.ej. cerca de río o en fundición aluminio), usar ZDDP genera
    violación ambiental. Si cliente tiene sellos NBR viejos, ZDDP
    acelera degradación → fugas → parada no planificada. Error en
    lubricante de 10 tambores ($4,850-$7,200) con intervalo
    inadecuado = costo doble por cambio prematuro o daño equipo.

privacy_tier:
  inputs: "TENANT_DERIVED"
  outputs: "TENANT_DERIVED"
  cross_tenant_eligibility: "no"
  promotion_notes: |
    Caso específico metalmecánica. NO promovible. Patrón abstracto
    (lubricante especificación incompleta con variantes
    zinc-based/zinc-free) valioso para training MRO_compatibility.
    Puede promoverse a GLOBAL_PROMOTABLE como ejemplo de
    lubricant_spec_ambiguity tras anonimización.

