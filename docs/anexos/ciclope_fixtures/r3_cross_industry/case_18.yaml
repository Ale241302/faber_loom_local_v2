  - step: 7
    sub_agent: "AG_SUB_DRAFT_WRITER"
    inputs:
      category: "internal_alert"
      recipient_role: "AM"
      context:
        customer: "Construsur Andina S.A.S."
        rfq_items: "1,500 cajas tornillos autoperforantes"
        exception: "PRECIO_VENCIDO"
        severity: "high"
        price_stale_hours: 72
        price_version: "2025-04-27"
        next_update: "2025-04-30T06:00:00"
        estimated_increase: "+8%"
        order_value: "20563.20 USD"
        stock: "suficiente"
        urgency: "alta (entrega viernes)"
    expected_output:
      draft_type: "internal_alert"
      subject: "[ALTA] RFQ bloqueada — precio vencido / 1,500 cajas tornillos / Construsur"
      body: |
        RFQ bloqueada por precio vencido:

        Cliente: Construsur Andina S.A.S. (CLI-002, silver)
        Solicitud: 1,500 cajas tornillos autoperforantes FERR-SKU-004
        Valor: $20,563.20 USD (con IVA)
        Urgencia: ALTA — entrega viernes para techo industrial

        BLOQUEO: Precio vencido 72h.
        - Lista vigente: 2025-04-27 (venció 30 abril 6am)
        - Nueva lista programada: +8% por costo acero
        - Precio usado en cálculo: $12.80 → $11.52 con descuento
        - Precio NUEVO estimado: ~$13.82 → ~$12.44 con descuento
        - Diferencia: +$1,728 USD (+10% total)

        STOCK: Suficiente (2,800 disponible vs 1,500 solicitado)
        ENTREGA: Posible esta semana si se reserva hoy

        ACCIÓN REQUERIDA:
        1. Actualizar lista de precios (programada 6am, posiblemente lista)
        2. Recalcular con precio vigente
        3. Evaluar si margen aceptable con nuevo precio
        4. Responder a cliente CON precio confirmado

        NO emitir proforma con precio vencido aunque cliente sea recurrente.
      internal_note: "Cliente recurrente, buen pagador. Urgencia real (obra arranca lunes). Pero 1,500 cajas con precio vencido = riesgo financiero si costo acero subió +8%. Prioridad: actualizar precio, no saltar validación."
      tone: "urgent_but_prudent"
    latency_ms_max: 4000
    triggered: true

  - step: 8
    sub_agent: "AG_SUB_PROFORMA_BUILDER"
    inputs: ["blocked_by_compliance: true"]
    expected_output:
      status: "NOT_GENERATED"
      reason: "COMPLIANCE_BLOCKING"
    latency_ms_max: 6000
    triggered: false

