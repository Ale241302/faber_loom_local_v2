      pass: false
      warnings:
        - code: "PRECIO_VENCIDO"
          severity: "high"
          message: "Precio de lista vencido 72 horas. Umbral máximo 24h. Nueva lista con ajuste +8% programada para hoy 6am."
      blocking_issues:
        - "Precio stale: lista 2025-04-27 vencida. Próxima lista +8% por costo acero."
        - "Cotización con precio vencido = riesgo de margen negativo si costo subió +8%"
        - "Urgencia cliente NO justifica saltar validación de precio vigente"
        - "Orden grande (1,500 cajas = $20,563) con precio dudoso = exposición financiera elevada"
      pii_detected: false
      policies_violated: ["price_freshness_24h_mandatory", "large_order_price_validation", "urgency_does_not_override_compliance"]
    latency_ms_max: 1000
    triggered: true

  - step: 6
    sub_agent: "AG_SUB_ESCALATION_ROUTER"
