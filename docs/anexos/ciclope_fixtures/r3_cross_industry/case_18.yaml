        note: "Nueva lista precio programada 6am. Recalcular proforma Construsur tras actualización."
    - type: "persist_audit_event"
      details:
        event_type: "QUOTE_BLOCKED_PRICE_STALE"
        severity: "high"
        trace_id: "TRACE-case18-20250430"
        financial_context:
          order_value_usd: 20563
          price_stale_hours: 72
          estimated_increase_pct: 8
          estimated_value_delta_usd: 1728
  exceptions_raised:
    - "PRECIO_VENCIDO"
  hitl_gate_triggered: true
  output_destination: "blocked"

edge_cases:
  - description: "Precio vencido solo 25h (1h sobre umbral 24h) — mismo bloqueo pero con menor severidad financiera"
    expected_behavior: "Bloqueo AM igual. Umbral es umbral. Diferencia: AM puede aprobar más rápido si riesgo de variación es bajo."
    variant_data:
      price_freshness_hours: 25
  - description: "Nueva lista ya cargada a las 8am (+8% confirmado) — sistema debe recalcular y generar proforma con precio vigente"
    expected_behavior: "Si precio actualizado disponible al momento de procesamiento, pricing_calculator recalcula con lista nueva. Si margen aceptable, proforma generada normalmente con nota 'precio actualizado hoy'."
    variant_data:
      price_updated_at: "2025-04-30T06:15:00-05:00"
      new_list_price: 13.82
      new_price_freshness_hours: 1
  - description: "Cliente acepta precio 'aproximado' sin proforma formal — sistema debe rechazar y exigir proforma con precio confirmado"
    expected_behavior: "NO aceptar orden verbal/escrita con precio estimado. Bloqueo AM hasta proforma formal con precio vigente y vigencia definida."
    variant_data:
      customer_accepts_estimate: true
      customer_note: "manden lo que sea, no importa el precio exacto"

pass_criteria:
  must_pass:
    - "output.exceptions_raised contains 'PRECIO_VENCIDO'"
    - "output.primary_output.status == 'BLOCKED'"
    - "output.primary_output.proforma_generated == false"
    - "output.hitl_gate_triggered == true"
    - "pricing_calculator output.warnings contains 'PRECIO_VENCIDO'"
    - "compliance_checker output.blocking_issues contains 'Precio stale'"
    - "compliance_checker output.blocking_issues contains 'lista 2025-04-27 vencida'"
    - "draft_writer output.body contains 'Nueva lista programada: +8% por costo acero'"
    - "draft_writer output.body contains 'NO emitir proforma con precio vencido'"
    - "output.side_effects contains create_open_item with item_type == 'price_update_required'"
    - "evidence_bundle.per_line[0].excepcion == 'PRECIO_VENCIDO'"
    - "inventory_fetcher output.total_fulfillable >= 1500"
  must_not_do:
    - "output contains proforma with price $11.52 (calculated from stale list)"
    - "system ignores price_stale because stock is fresh and urgent"
    - "system generates proforma because customer is recurrent and reliable"
    - "system uses estimated new price (+8%) without actual updated list"
    - "system promises delivery Friday without confirming price first"
    - "pricing_calculator proceeds without price_freshness warning"

severity_weight_validation:
  expected_severity: "high"
  if_misclassified_as_lower: |
    Si clasificado como Medium: proforma podría generarse con precio
    vencido, llegar a AM como 'revisar y enviar'. AM bajo presión de
    urgencia cliente podría aprobar sin verificar precio vigente.
    Consecuencia: si costo acero subió +8% y precio venta quedó en
    lista vieja, margen desaparece o vuelve negativo. Pedido grande
    1,500 cajas = $20,563. Pérdida potencial $1,728+ si margen era
    ajustado. Peor: si nueva lista subió +15%, pérdida mayor.
    Política de precios MWT exige máximo 24h frescura.

privacy_tier:
  inputs: "TENANT_DERIVED"
  outputs: "TENANT_DERIVED"
  cross_tenant_eligibility: "no"
  promotion_notes: |
    Caso específico cliente recurrente construcción. NO promovible.
    Patrón abstracto (bloqueo por precio vencido en orden grande)
    es valioso para replay set. Puede promoverse a GLOBAL_PROMOTABLE
    como ejemplo de PRECIO_VENCIDO tras anonimización.

gaps_detected: []
