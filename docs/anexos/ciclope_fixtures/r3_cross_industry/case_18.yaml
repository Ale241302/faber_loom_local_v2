input:
  channel: email
  from:
    name: "Carlos Sarmiento"
    email: "c.sarmiento@construsur.co"
    role: "Jefe de Abastecimiento"
  to: "cotizaciones@mwt-faberloom.co"
  subject: "Cotización urgente 1,500 cajas tornillos autoperforantes — entrega esta semana"
  body_text: |
    Buenos días Álvaro,

    Necesitamos cotizar 1,500 cajas de tornillos autoperforantes
    #8 x 1", cabeza hex con arandela, galvanizados.

    Es para un techo industrial que arrancamos el lunes. Entrega
    esta semana es crítica — si no llega para viernes nos retrasa
    toda la obra.

    Entrega: Medellín, DDP.
    Forma de pago: Net 30 días como siempre.

    Favor enviar proforma hoy mismo.

    Carlos Sarmiento
    Jefe de Abastecimiento
    Construsur Andina S.A.S.
  attachments: []
  thread_id: "THREAD-CLI002-2025-004"
  timestamp: "2025-04-30T07:00:00-05:00"
  language_detected: "es"

