          severity: "high"
          message: "Lista precio vencida 72h (versión 2025-04-27). Nueva lista con +8% programada. Precio calculado puede no ser vigente."
    latency_ms_max: 200
    triggered: true

  - step: 5
    sub_agent: "AG_SUB_COMPLIANCE_CHECKER"
    inputs:
      profile: "construction_supply"
      items: ["FERR-SKU-004"]
      customer_country: "CO"
