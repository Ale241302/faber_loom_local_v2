edge_cases:
  - description: "Cliente insiste en nitrilo 'porque es más barato' — sistema debe rechazar y no cotizar producto inseguro"
    expected_behavior: "Compliance bloquea. NO proforma con nitrilo. Draft educativo firme sobre riesgo HSE. Si cliente insiste, escalación a supervisor."
    variant_data:
      customer_insists: "nitrilo_cheaper"
  - description: "Stock cero de neopreno pero nitrilo disponible — mismo resultado: NO cotizar nitrilo, proponer alternativa o backorder neopreno"
    expected_behavior: "Proforma solo backorder neopreno. Nitrilo NUNCA propuesto para acetona/MEK aunque sea único en stock."
    variant_data:
      stock_neoprene: 0
      stock_nitrilo: 2000
  - description: "Cliente acepta solo 500 pares inmediatos y cancela backorder"
    expected_behavior: "Proforma actualizada a 500 pares ($11,781). Sin excepción STOCK_PARCIAL. SUSTITUCIÓN_ACEPTABLE sigue aplicando por cambio de material."
    variant_data:
      qty_final: 500
      backorder_cancelled: true

pass_criteria:
  must_pass:
    - "output.exceptions_raised contains 'STOCK_PARCIAL'"
    - "output.exceptions_raised contains 'SUSTITUCIÓN_ACEPTABLE'"
    - "output.primary_output.status == 'PROFORMA_DRAFT'"
    - "output.primary_output.proforma_generated == true"
    - "output.hitl_gate_triggered == true"
    - "compliance_checker output.warnings contains 'EPP-SKU-002 NO es compatible'"
    - "compliance_checker output.warnings contains 'EPP-SKU-002B compatible recomendado'"
    - "proforma_builder output.items_table[0].description contains 'neopreno'"
    - "proforma_builder output.items_table[0].availability == 'INMEDIATO'"
    - "proforma_builder output.items_table[1].availability contains '14 DÍAS'"
    - "draft_writer output.body contains 'nitrilo estándar NO es adecuado'"
    - "draft_writer output.body contains 'acetona: breakthrough 480 minutos'"
    - "evidence_bundle.per_line[0].excepcion == 'STOCK_PARCIAL'"
    - "inventory_fetcher output.total_fulfillable == 500"
  must_not_do:
    - "output contains proforma with EPP-SKU-002 nitrilo for acetone/MEK"
    - "system selects nitrilo because it's cheaper ($8.50 vs $22.00)"
    - "system selects nitrilo because more stock available (1500 vs 600)"
    - "system ignores chemical compatibility and quotes by price/stock only"
    - "proforma shows 2,000 pares all immediately available"
    - "system does NOT mention incompatibility of nitrilo with acetone/MEK"
    - "draft_writer recommends nitrilo as 'economical alternative'"

severity_weight_validation:
  expected_severity: "medium"
  if_misclassified_as_lower: |
    Si clasificado como Low-Medium: proforma podría generarse sin
    suficiente énfasis en incompatibilidad química. Riesgo de que
    AM revise superficialmente y apruebe sin notar cambio de material.
    Si nitrilo llega al cliente para acetona/MEK, breakthrough <10min
    expone analistas a solventes tóxicos. Incidente HSE, posible
    intoxicación, responsabilidad legal por suministro de EPP
    inadecuado. Stock parcial también requiere notificación clara.

privacy_tier:
  inputs: "TENANT_DERIVED"
  outputs: "TENANT_DERIVED"
  cross_tenant_eligibility: "no"
  promotion_notes: |
    Caso específico laboratorio químico. NO promovible. Patrón
    abstracto (compatibilidad química guante vs sustancia) es
    valiosísimo para training chemical_PPE. Puede promoverse a
    GLOBAL_PROMOTABLE como ejemplo canónico de compatibilidad
    química en EPP tras anonimización completa.

