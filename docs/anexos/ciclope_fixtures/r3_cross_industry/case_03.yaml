case_id: case_03
industry: epp_quimico
severity: critical
description: RFQ traje Tyvek con certificación salpicadura química faltante — sistema debe bloquear proforma final

setup:
  catalog:
    - sku: "EPP-SKU-003"
      description: "Traje Tyvek 400 blanco desechable, capucha, elásticos, tallas M-3XL"
      vertical_spec:
        type: "chemical_splash_suit"
        material: "Tyvek 400 (polietileno de alta densidad spunbonded)"
        protection_level: "salpicadura leve química / polvo"
        standards:
          - standard: "EN ISO 13982-1"
            status: "vigente"
            cert_doc_ref: "CERT-ISO13982-003-2025"
          - standard: "EN 13034"
            status: "faltante"
            cert_doc_ref: "CERT-EN13034-003-PENDING"
          - standard: "Type 6 (salpicadura limitada)"
            status: "faltante"
            cert_doc_ref: null
        applications: ["protección polvo", "salpicaduras leves no corrosivas"]
        chemical_permeation_data: null
        sizing_chart: "TYVEK-SIZE-001"
      stock:
        available: 450
        warehouses:
          - location: "Bogotá Principal"
            qty: 200
            reserved: 30
          - location: "Barranquilla Norte"
            qty: 250
            reserved: 20
        freshness_seconds: 180
      pricing:
        list_price: 18.50
        currency: "USD"
        version: "2025-04-15"
        freshness_hours: 12
      lead_time:
        days: 3
        source: "3PL"
        freshness_hours: 2
      certifications:
        - type: "EN ISO 13982-1"
          version: "2025-01-20"
          status: "vigente"
        - type: "EN 13034 (Type 6 salpicadura)"
          version: null
          status: "vencido"
        - type: "Registro Sanitario INVIMA"
          version: null
          status: "faltante"
      MOQ: 24
      packaging:
        units_per_box: 25
        boxes_per_pallet: 48
        weight_kg_per_unit: 0.18
      sku_status: "active"
  customer:
    customer_id: "CLI-005"
    name: "Distribuidora Andina S.A.S."
    country: "CO"
    city: "Bogotá"
    tier: "gold"
    credit_status: "ok"
    payment_terms: "Net 30 días"
    incoterm_default: "DDP"
    tax_id: "901.234.567-8"
    vertical: "distribucion_epp_quimico"
    historical_data:
      last_order_date: "2025-03-10"
      avg_order_value_usd: 2850
      orders_ytd: 4
      complaints_12m: 0
      preferred_delivery: "Bogotá Principal"
  agent_state:
    archetype: "AG_AM_MWT"
    sub_agents_active:
      - "AG_SUB_EMAIL_CLASSIFIER"
      - "AG_SUB_SAP_QUERY"
      - "AG_SUB_INVENTORY_FETCHER"
      - "AG_SUB_COMPLIANCE_CHECKER"
      - "AG_SUB_ESCALATION_ROUTER"
      - "AG_SUB_DRAFT_WRITER"
    sub_agents_shadow: []
    template_voice:
      tone: "professional_b2b_latam"
      language: "es_CO"
      formality: "formal_usted"
    routing:
      layer_1: "inactivo"
      layer_2: "activo"
      layer_3a_pins: ["AG_SUB_COMPLIANCE_CHECKER:chemical_PPE"]
      layer_3b_metadata: ["compliance_profile:chemical_PPE"]
    curator:
      last_freeze: "2025-04-25"
      pending_items: 2
    authority_matrix_level: "AM"

input:
  channel: email
  from:
    name: "Carlos Mendoza"
    email: "c.mendoza@distribuidoraandina.co"
    role: "Gerente de Compras"
  to: "cotizaciones@mwt-faberloom.co"
  subject: "Cotización urgente trajes Tyvek certificados — 120 unidades"
  body_text: |
    Buenos días,

    Por favor cotizar 120 trajes Tyvek con certificación para salpicadura química,
    tallas M(40), L(50), XL(20), XXL(10). Entrega en Bogotá, DDP.

    Necesitamos documentación técnica para entregar a nuestro cliente final
    (planta de tratamiento químico en Cartagena). El certificado debe estar vigente.

    Plazo de entrega requerido: máximo 5 días hábiles.

    Quedo atento.

    Carlos Mendoza
    Gerente de Compras
    Distribuidora Andina S.A.S.
  attachments: []
  thread_id: null
  timestamp: "2025-04-30T09:15:00-05:00"
  language_detected: "es"

expected_pipeline:
  - step: 1
    sub_agent: "AG_SUB_EMAIL_CLASSIFIER"
    inputs: ["input.email.body_text", "input.email.subject"]
    expected_output:
      primary_intent: "quote_request"
      secondary_intents: ["certification_request", "urgent_delivery"]
      urgency: "high"
      sentiment: "neutral"
      requires_human: false
      confidence: 0.94
      language_detected: "es"
      entities_extracted:
        - type: "product"
          value: "trajes Tyvek"
          qty: 120
        - type: "certification_requirement"
          value: "salpicadura química"
        - type: "delivery_location"
          value: "Bogotá"
        - type: "incoterm"
          value: "DDP"
    latency_ms_max: 1200
    triggered: true

  - step: 2
    sub_agent: "AG_SUB_SAP_QUERY"
    inputs: ["customer_id", "parsed_items"]
    expected_output:
      account_credit_status: "ok"
      payment_history: "clean"
      pricing_master_access: true
      customer_terms_ref: "TERMS-DAND-2025-Q1"
      freshness: "2025-04-30T09:14:00-05:00"
    latency_ms_max: 2000
    triggered: true
    parallel_group: "A"

  - step: 3
    sub_agent: "AG_SUB_INVENTORY_FETCHER"
    inputs: ["sku: EPP-SKU-003", "qty_breakdown: {M:40, L:50, XL:20, XXL:10}"]
    expected_output:
      items:
        - sku: "EPP-SKU-003"
          warehouse: "Bogotá Principal"
          available: 200
          reserved: 30
          in_transit: 0
          fulfillable_qty: 170
        - sku: "EPP-SKU-003"
          warehouse: "Barranquilla Norte"
          available: 250
          reserved: 20
          in_transit: 0
          fulfillable_qty: 230
      total_fulfillable: 400
      freshness: "2025-04-30T09:12:00-05:00"
    latency_ms_max: 1500
    triggered: true
    parallel_group: "A"

  - step: 4
    sub_agent: "AG_SUB_COMPLIANCE_CHECKER"
    inputs:
      profile: "chemical_PPE"
      items: ["EPP-SKU-003"]
      certifications_required: ["EN 13034", "Registro Sanitario INVIMA"]
      customer_country: "CO"
      use_case: "salpicadura química industrial"
    expected_output:
      pass: false
      warnings:
        - code: "CERT_DOC_MISSING"
          severity: "critical"
          message: "Certificación EN 13034 (Type 6 salpicadura) faltante o vencida para EPP-SKU-003"
        - code: "REGULATORY_DOC_MISSING"
          severity: "critical"
          message: "Registro Sanitario INVIMA no encontrado para producto químico-protectivo importado"
      blocking_issues:
        - "Certificación salpicadura química requerida por cliente NO disponible"
        - "Documento regulatorio CO requerido para importación/uso hospitalario/industrial faltante"
      pii_detected: false
      policies_violated: ["chemical_PPE_certification_mandatory", "CO_regulatory_import_docs"]
    latency_ms_max: 1000
    triggered: true

  - step: 5
    sub_agent: "AG_SUB_ESCALATION_ROUTER"
    inputs:
      trigger_source: "AG_SUB_COMPLIANCE_CHECKER"
      exception_codes: ["CERT_DOC_MISSING", "REGULATORY_DOC_MISSING"]
      severity: "critical"
    expected_output:
      route_to: "AM_MWT_SUPERVISOR"
      recipients: ["a.velasquez@mwt-faberloom.co", "compliance@mwt-faberloom.co"]
      channel: "email_priority"
      urgency_override: "critical"
      fallback_route: "CEO_MWT"
      sla_target_minutes: 30
    latency_ms_max: 100
    triggered: true

  - step: 6
    sub_agent: "AG_SUB_DRAFT_WRITER"
    inputs:
      category: "internal_alert"
      recipient_role: "AM_supervisor"
      context:
        customer: "Distribuidora Andina S.A.S."
        rfq_items: "120 trajes Tyvek certificados salpicadura"
        exception: "CERT_DOC_MISSING + REGULATORY_DOC_MISSING"
        severity: "critical"
    expected_output:
      draft_type: "internal_alert"
      subject: "[CRÍTICO] RFQ bloqueada — certificación faltante EPP-SKU-003 / Cliente CLI-005"
      body: |
        Se detectó RFQ de 120 trajes Tyvek con requerimiento de certificación
        salpicadura química. El producto EPP-SKU-003 NO cuenta con:
        - EN 13034 (Type 6) vigente
        - Registro Sanitario INVIMA

        Stock disponible: 400 unidades (suficiente).
        Proforma: BLOQUEADA por compliance.

        Acción requerida: Validar con proveedor si certificación puede
        obtenerse, o proponer SKU alternativo certificado.
      internal_note: "Cliente gold, sin historial de quejas. Oportunidad de $2,220 USD."
      tone: "urgent_but_professional"
    latency_ms_max: 4000
    triggered: true

  - step: 7
    sub_agent: "AG_SUB_PROFORMA_BUILDER"
    inputs: ["blocked_by_compliance: true"]
    expected_output:
      status: "NOT_GENERATED"
      reason: "COMPLIANCE_BLOCKING"
    latency_ms_max: 6000
    triggered: false

expected_outputs:
  primary_output:
    type: "alarma"
    content:
      status: "BLOCKED"
      reason: "CERT_DOC_MISSING + REGULATORY_DOC_MISSING"
      customer_notified: false
      proforma_generated: false
    glosses_required:
      - "Certificación salpicadura química requerida — NO disponible"
      - "Registro sanitario INVIMA — faltante"
      - "Stock disponible pero NO cotizable sin documentos"
  evidence_bundle:
    per_line: []
    per_quote:
      status: "BLOCKED"
      exception_codes: ["CERT_DOC_MISSING", "REGULATORY_DOC_MISSING"]
      aprobador: "AM+supervisor"
      hash: null
    audit_view:
      source_precio: null
      version_lista: null
      timestamp_stock: "2025-04-30T09:12:00-05:00"
      technical_spec_rule: "chemical_splash_suit"
      margen_calculado: null
      aprobador: "AM+supervisor (compliance block)"
      vigencia: null
      fallback_used: false
      source_stock: "3PL"
      source_lead_time: "3PL"
      sku_status: "active"
      cert_doc_version: "MISSING"
      country_rule_applied: "CO_regulatory_import_docs"
      freight_quote_ref: null
      MOQ_packaging_rule: "MOQ=24, packaging=25/box"
      currency_fx_rate: null
      customer_terms_ref: "TERMS-DAND-2025-Q1"
      exception_codes: ["CERT_DOC_MISSING", "REGULATORY_DOC_MISSING"]
  side_effects:
    - type: "notify_AM"
      details:
        recipients: ["a.velasquez@mwt-faberloom.co"]
        channel: "email_priority"
        sla_minutes: 30
    - type: "create_open_item"
      details:
        item_type: "compliance_cert_missing"
        sku: "EPP-SKU-003"
        priority: "critical"
        due_date: "2025-04-30T18:00:00-05:00"
    - type: "persist_audit_event"
      details:
        event_type: "QUOTE_BLOCKED_COMPLIANCE"
        severity: "critical"
        trace_id: "TRACE-case03-20250430"
  exceptions_raised:
    - "CERT_DOC_MISSING"
    - "REGULATORY_DOC_MISSING"
  hitl_gate_triggered: true
  output_destination: "blocked"

edge_cases:
  - description: "Producto en stock suficiente pero documentación vencida (no faltante) — mismo resultado de bloqueo"
    expected_behavior: "Bloquea igualmente. Vigencia de certificación es tan crítica como existencia."
    variant_data:
      certifications:
        - type: "EN 13034"
          version: "2023-01-15"
          status: "vencido"
  - description: "Cliente solicita Tyvek 500 (mismo material, SKU diferente) con certificación completa — debería permitirse"
    expected_behavior: "Si SKU alternativo tiene certificación vigente, sistema propone sustitución con escalación AM (no bloqueo absoluto)."
    variant_data:
      alternative_sku: "EPP-SKU-003A"
      alternative_cert_status: "vigente"
  - description: "RFQ con entrega en México (no Colombia) — cambia regulatoria a COFEPRIS"
    expected_behavior: "Compliance Checker debe detectar país destino MX y requerir COFEPRIS en lugar de INVIMA. Bloqueo equivalente."

pass_criteria:
  must_pass:
    - "output.exceptions_raised contains 'CERT_DOC_MISSING'"
    - "output.exceptions_raised contains 'REGULATORY_DOC_MISSING'"
    - "output.primary_output.proforma_generated == false"
    - "output.primary_output.status == 'BLOCKED'"
    - "output.hitl_gate_triggered == true"
    - "output.side_effects contains notify_AM with sla_minutes <= 30"
    - "output.side_effects contains create_open_item with priority == 'critical'"
    - "evidence_bundle.per_quote.aprobador == 'AM+supervisor'"
  must_not_do:
    - "output contains proforma draft con precio total"
    - "output contains cover_letter email al cliente con cotización"
    - "output.primary_output.customer_notified == true with proforma attached"
    - "system ignores missing EN 13034 because stock is available"
    - "system quotes using EN ISO 13982-1 as sufficient for chemical splash"

severity_weight_validation:
  expected_severity: "critical"
  if_misclassified_as_lower: |
    Si clasificado como High o menor: proforma podría generarse en draft
    y llegar a revisión AM sin alerta crítica. Riesgo de envío de producto
    sin certificación a planta química con exposición legal y HSE.
    Consecuencia regulatoria: incumplimiento norma química CO, posible
    sanción INVIMA, responsabilidad civil si ocurre incidente.

privacy_tier:
  inputs: "TENANT_DERIVED"
  outputs: "TENANT_DERIVED"
  cross_tenant_eligibility: "no"
  promotion_notes: |
    Caso específico de cliente gold con SKU particular. No promovible.
    Patrón abstracto (bloqueo por certificación faltante en chemical_PPE)
    sí puede promoverse a GLOBAL_PROMOTABLE tras anonimización y
    7-checks de privacy review.

gaps_detected: []
