input:
  channel: email
  from:
    name: "Ing. Javier Castellanos"
    email: "j.castellanos@emca.gt"
    role: "Gerente de Proyectos"
  to: "cotizaciones@mwt-faberloom.co"
  subject: "Cotización tablero bomba 30HP — entrega Guatemala"
  body_text: |
    Buenos días,

    Necesitamos cotizar un tablero eléctrico para bomba industrial de 30HP.
    Entrega en Ciudad de Guatemala, DDP.

    Es para una bomba centrifuga en planta de agua residual.
    Plazo: 3 semanas.

    Favor enviar proforma lo antes posible.

    Ing. Javier Castellanos
    Gerente de Proyectos
    Electromontajes Centroamérica S.A.
  attachments: []
  thread_id: null
  timestamp: "2025-04-30T10:00:00-06:00"
  language_detected: "es"

expected_pipeline:
  - step: 1
    sub_agent: "AG_SUB_EMAIL_CLASSIFIER"
    inputs: ["input.email.body_text", "input.email.subject"]
    expected_output:
      primary_intent: "quote_request"
      secondary_intents: ["electrical_panel", "industrial_equipment"]
      urgency: "medium"
      sentiment: "neutral"
      requires_human: false
      confidence: 0.90
      language_detected: "es"
      entities_extracted:
        - type: "product"
          value: "tablero eléctrico para bomba 30HP"
        - type: "power_rating"
          value: "30HP"
        - type: "equipment_type"
          value: "bomba centrifuga"
        - type: "application"
          value: "planta agua residual"
        - type: "delivery_location"
          value: "Ciudad de Guatemala"
        - type: "incoterm"
          value: "DDP"
    latency_ms_max: 1200
    triggered: true

  - step: 2
    sub_agent: "AG_SUB_SAP_QUERY"
    inputs: ["customer_id: CLI-006", "parsed_items"]
    expected_output:
      account_credit_status: "ok"
      payment_history: "clean"
      pricing_master_access: true
      customer_terms_ref: "TERMS-EMCA-2025-Q1"
      country_rules: "GT_voltage_120_208V_60Hz"
      freshness: "2025-04-30T09:55:00-06:00"
    latency_ms_max: 2000
    triggered: true
    parallel_group: "A"

  - step: 3
    sub_agent: "AG_SUB_INVENTORY_FETCHER"
    inputs: ["sku: ELEC-SKU-001", "qty: 1"]
    expected_output:
      items:
        - sku: "ELEC-SKU-001"
          warehouse: "Bogotá Principal"
          available: 8
          reserved: 2
          in_transit: 0
          fulfillable_qty: 6
      total_fulfillable: 10
      freshness: "2025-04-30T09:58:00-06:00"
    latency_ms_max: 1500
    triggered: true
    parallel_group: "A"

  - step: 4
    sub_agent: "AG_SUB_COMPLIANCE_CHECKER"
    inputs:
      profile: "electrical_technical"
      items: ["ELEC-SKU-001"]
      customer_country: "GT"
      application: "bomba centrifuga 30HP planta agua residual"
      specs_provided:
        - "potencia: 30HP"
      specs_missing:
        - "tensión nominal"
        - "número de fases"
        - "corriente nominal / factor de servicio"
        - "tipo de protección (breaker/ fusible)"
        - "curva de disparo"
        - "kAIC requerido"
        - "método de montaje"
        - "condiciones ambientales (IP/NEMA)"
        - "arrancador directo o variador de frecuencia"
    expected_output:
      pass: false
      warnings:
        - code: "ASTM_AMBIGUO"
          severity: "high"
          message: "Especificación eléctrica incompleta para tablero. Potencia conocida (30HP) pero faltan datos críticos de tensión, fases, protección, montaje y ambiente."
      blocking_issues:
        - "Tablero eléctrico requiere especificación completa según NEMA/UL — NO se puede dimensionar con solo HP"
        - "Falta tensión nominal (120V? 208V? 240V? 480V?) — determina breakers, cableado, transformador de control"
        - "Falta número de fases (1F o 3F) — 30HP típicamente 3F pero debe confirmarse"
        - "Falta método de arranque (DOL, Y-D, VFD, soft starter) — afecta componentes y costo"
        - "Falta kAIC — requerido para selección breaker adecuado y seguridad cortocircuito"
        - "Ambiente planta agua residual: requiere confirmar IP/NEMA (humedad/corrosión)"
      pii_detected: false
      policies_violated: ["electrical_panel_specification_mandatory", "GT_NEC_compliance", "safety_first_incomplete_spec"]
    latency_ms_max: 1000
    triggered: true

  - step: 5
    sub_agent: "AG_SUB_ESCALATION_ROUTER"
    inputs:
      trigger_source: "AG_SUB_COMPLIANCE_CHECKER"
      exception_codes: ["ASTM_AMBIGUO"]
      severity: "high"
      customer_tier: "silver"
    expected_output:
      route_to: "AM_MWT"
      recipients: ["a.velasquez@mwt-faberloom.co"]
      channel: "email"
      urgency_override: "high"
      fallback_route: "AM_MWT_SUPERVISOR"
      sla_target_minutes: 240
    latency_ms_max: 100
    triggered: true

  - step: 6
    sub_agent: "AG_SUB_DRAFT_WRITER"
    inputs:
      category: "respond"
      recipient_role: "customer"
      context:
        customer: "Electromontajes Centroamérica S.A."
        rfq_items: "tablero eléctrico bomba 30HP"
        exception: "ASTM_AMBIGUO"
        severity: "high"
        clarification_needed: true
        missing_specs: ["tensión", "fases", "protección", "kAIC", "montaje", "ambiente", "arranque"]
    expected_output:
      draft_type: "customer_clarification"
      subject: "Re: Cotización tablero bomba 30HP — datos técnicos requeridos"
      body: |
        Estimado Ing. Castellanos,

        Gracias por su solicitud. Para cotizar el tablero eléctrico de la
        bomba de 30HP de manera precisa y segura, necesitamos los siguientes
        datos técnicos adicionales:

        1. TENSIÓN NOMINAL: ¿120V, 208V, 240V o 480V? (Guatemala típicamente
           120/208V 60Hz, pero confirmar del motor)
        2. FASES: ¿Monofásico o trifásico?
        3. TIPO DE ARRANQUE: ¿Directo (DOL), estrella-triángulo, variador
           de frecuencia (VFD), o soft starter?
        4. PROTECCIÓN REQUERIDA: ¿Breaker magnetotérmico o fusibles?
           ¿Curva de disparo B, C o D?
        5. CAPACIDAD DE CORTOCIRCUITO (kAIC): ¿Conoce la corriente de
           cortocircuito disponible en el punto de instalación?
        6. MÉTODO DE MONTAJE: ¿Pared, suelo con pedestal, o frente de
           gabinete existente?
        7. CONDICIONES AMBIENTALES: ¿Temperatura ambiente máxima? ¿IP/NEMA
           requerido para planta agua residual (humedad/gases)?
        8. ¿Requiere transformador de control separado o control a tensión
           de línea?

        Con esta información podemos dimensionar correctamente el tablero,
        incluir los componentes apropiados (breakers, contactores, relés,
        bornes, ventilación), y garantizar cumplimiento NEC y normativa
        local de Guatemala.

        Precio orientativo tablero vacío NEMA 4X: $485 USD (stock disponible).
        Precio final dependerá de componentes internos según especificación.

        Plazo fabricación: 2-3 semanas adicionales al lead time de
        componentes.

        Quedo atento a sus comentarios.

        Atentamente,
        Álvaro Velásquez
        MWT — FaberLoom
      internal_note: "Cliente silver GT, primer RFQ tablero. 30HP sin especificación eléctrica es riesgo de mala venta. Tablero vacío en stock pero NO se puede vender sin componentes específicos. Requiere checklist técnico completo antes de proforma."
      tone: "professional_technical"
    latency_ms_max: 4000
    triggered: true

  - step: 7
    sub_agent: "AG_SUB_PROFORMA_BUILDER"
    inputs: ["blocked_by_compliance: true"]
    expected_output:
      status: "NOT_GENERATED"
      reason: "COMPLIANCE_BLOCKING"
    latency_ms_max: 6000
    triggered: false

