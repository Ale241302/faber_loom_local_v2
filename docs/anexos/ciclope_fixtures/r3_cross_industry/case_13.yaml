  hitl_gate_triggered: true
  output_destination: "draft_pending_review"

edge_cases:
  - description: "Cliente responde con tensión 480V trifásico — pero Guatemala es 208V. Sistema debe alertar posible incompatibilidad país."
    expected_behavior: "Compliance Checker debe detectar tensión 480V vs estándar GT 120/208V y generar advertencia adicional sobre compatibilidad motor-transformador o necesidad de verificación in-situ."
    variant_data:
      tension: "480V"
      fases: "3F"
      country_standard: "GT_120_208V"
  - description: "Cliente solicita tablero con variador de frecuencia (VFD) pero no especifica marca/protocolo"
    expected_behavior: "Clarificación adicional requerida: marca VFD preferida (ABB, Siemens, Danfoss), protocolo comunicación (Modbus, Ethernet/IP), filtros EMC. No asumir VFD genérico."
    variant_data:
      arranque: "VFD"
      vfd_brand: null
  - description: "Cliente responde con todos los datos excepto kAIC — sistema debe permitir proforma con nota 'kAIC por confirmar, breaker provisional basado en estimación estándar'"
    expected_behavior: "Proforma generada con HITL gate. Línea con excepción LEAD_TIME_INCIERTO o equivalente para kAIC. Breaker seleccionado con margen estándar 10kAIC con nota explícita."
    variant_data:
      kAIC: null
      all_other_specs: "complete"

pass_criteria:
  must_pass:
    - "output.exceptions_raised contains 'ASTM_AMBIGUO'"
    - "output.primary_output.status == 'BLOCKED_PENDING_CLARIFICATION'"
    - "output.primary_output.proforma_generated == false"
    - "output.hitl_gate_triggered == true"
    - "compliance_checker output.blocking_issues contains 'Tablero eléctrico requiere especificación completa'"
    - "compliance_checker output.blocking_issues contains 'Falta tensión nominal'"
    - "draft_writer output.body contains checklist de 8+ items técnicos"
    - "draft_writer output.body contains 'Precio orientativo tablero vacío NEMA 4X: $485 USD'"
    - "evidence_bundle.per_line[0].excepcion == 'ASTM_AMBIGUO'"
    - "output.side_effects contains create_open_item with item_type == 'clarification_pending'"
  must_not_do:
    - "output contains proforma con tablero completo a precio fijo"
    - "system assumes 480V 3F because 30HP is typically 3-phase"
    - "system quotes generic breaker and contactor without kAIC or curve"
    - "system ignores missing voltage and proceeds with stock panel"
    - "draft_writer body says 'we can proceed with standard configuration'"

severity_weight_validation:
  expected_severity: "high"
  if_misclassified_as_lower: |
    Si clasificado como Medium: proforma preliminar podría generarse con
    tablero vacío + componentes "estándar" asumidos. Riesgo de enviar
    tablero con breakers inadecuados (tensión incorrecta, curva errónea,
    kAIC insuficiente) a Guatemala. Consecuencia: instalación peligrosa,
    posible incendio eléctrico, daño a bomba 30HP, responsabilidad civil
    y daño reputacional en mercado centroamericano. NEC y normativa local
    GT requieren especificación completa para paneles industriales.

privacy_tier:
  inputs: "TENANT_DERIVED"
  outputs: "TENANT_DERIVED"
  cross_tenant_eligibility: "no"
  promotion_notes: |
    Caso específico cliente GT con proyecto agua residual. NO promovible.
    Patrón abstracto (tablero eléctrico con spec incompleta) altamente
    valioso para training de electrical_technical profile. Puede promoverse
    a GLOBAL_PROMOTABLE como checklist técnico canónico para paneles
    industriales tras anonimización completa.

gaps_detected: []
