edge_cases:
  - description: "INVIMA de Medline vencido — sistema NO debe ofrecer sustitución"
    expected_behavior: "Compliance detecta INVIMA vencido. Bloqueo. NO sustitución ofrecida. Solo backorder Ansell o alternativa con INVIMA vigente diferente."
    variant_data:
      medline_invima_status: "vencido"
      medline_invima_expiry: "2024-06-01"
  - description: "Clínica requiere Ansell exclusivamente por contrato con proveedor — sistema debe respetar y generar backorder"
    expected_behavior: "Proforma backorder Ansell 21 días. Draft respetando requerimiento contractual. NO forzar Medline."
    variant_data:
      brand_mandatory_contractual: "Ansell"
      substitution_rejected: true
  - description: "Cantidad solicitada 2,000 pares — stock Medline 650 insuficiente. Añade STOCK_PARCIAL + SUSTITUCIÓN_ACEPTABLE"
    expected_behavior: "Proforma 650 Medline inmediato + 1,350 Ansell backorder 21 días. Draft explicando mix con evidence regulatoria."
    variant_data:
      qty: 2000
      stock_medline: 650

pass_criteria:
  must_pass:
    - "output.exceptions_raised contains 'SUSTITUCIÓN_ACEPTABLE'"
    - "output.primary_output.status == 'PROFORMA_DRAFT'"
    - "output.primary_output.proforma_generated == true"
    - "output.hitl_gate_triggered == true"
    - "inventory_fetcher output.stock_status_requested == 'out_of_stock'"
    - "compliance_checker output.regulatory_verification contains 'INVIMA 2021DM-0056789: VIGENTE'"
    - "compliance_checker output.regulatory_verification contains 'Equivalencia técnica: verificada'"
    - "draft_writer output.body contains 'Registro INVIMA 2021DM-0056789 vigente'"
    - "draft_writer output.body contains 'Backorder Ansell: 21 días'"
    - "draft_writer output.body contains 'Stock inmediato Medline: 1 día'"
    - "proforma_builder output.terms_block.conditions contains 'Registro INVIMA 2021DM-0056789 vigente'"
    - "evidence_bundle.per_line[0].regulatory_ref == 'INVIMA 2021DM-0056789'"
    - "evidence_bundle.per_line[0].excepcion == 'SUSTITUCIÓN_ACEPTABLE'"
  must_not_do:
    - "output contains proforma con Medline sin mencionar es sustitución"
    - "output contains proforma sin verificar INVIMA vigente"
    - "system offers Medline without verifying regulatory equivalence"
    - "system hides that Medline is not the requested brand"
    - "system ignores INVIMA requirement and quotes by price only"
    - "system generates proforma with 'registro por confirmar'"

severity_weight_validation:
  expected_severity: "low-medium"
  if_misclassified_as_lower: |
    Si clasificado como Low: podría omitirse verificación INVIMA
    y evidence regulatoria. Guantes quirúrgicos sin registro
    INVIMA vigente = ilegal en Colombia para uso institucional.
    Clínica acreditada con ISO 17025/9001 en proceso. Error
    regulatorio = sanción INVIMA, pérdida acreditación, riesgo
    legal. Sustitución sin verificación INVIMA es inaceptable en
    medical_regulated. Urgencia quirófanos = no justifica saltar
    verificación regulatoria.

privacy_tier:
  inputs: "RESTRICTED_SENSITIVE_OR_REGULATED"
  outputs: "RESTRICTED_SENSITIVE_OR_REGULATED"
  cross_tenant_eligibility: "no"
  promotion_notes: |
    Caso específico institución salud Colombia. NO promovible.
    Información regulatoria INVIMA es sensible. Patrón abstracto
    (sustitución dispositivo médico con verificación regulatoria)
    es valiosísimo para training medical_regulated. Puede
    promoverse a GLOBAL_PROMOTABLE como template de
    medical_substitution_regulatory_check tras anonimización
    completa y remoción de referencias regulatorias específicas.

