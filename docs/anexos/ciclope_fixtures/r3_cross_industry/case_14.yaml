  hitl_gate_triggered: true
  output_destination: "draft_pending_review"

edge_cases:
  - description: "Cliente confirma 500m estándar y proyecto realmente necesita 5,000m — proforma limpia sin excepciones"
    expected_behavior: "Proforma 10 rollos × 500m = $1,850 + IVA. Sin excepciones. Draft confirmando cantidad validada."
    variant_data:
      length_confirmed: "500m"
      total_project_meters: 5000
      quantity_validated: true
  - description: "Cliente necesita 250m rollos para optimizar scrap en obra con múltiples apartamentos"
    expected_behavior: "Proforma con sobrepedido 250m. Lead time +3 días. Precio por metro igual. Draft explicando ventaja 250m (menor scrap, manejo más fácil)."
    variant_data:
      length_preferred: "250m"
      lead_time_extra: 3
      project_type: "apartamentos_multiples"
  - description: "Cliente confirma 500m pero proyecto solo necesita 3,200m — sistema debe alertar exceso 1,800m ($333 desperdicio)"
    expected_behavior: "Draft alertando exceso. Proponer 6 rollos (3,000m) + 1 rollo 250m si disponible. O 7 rollos = 3,500m con 300m scrap."
    variant_data:
      total_project_meters: 3200
      excess_warning: true
      recommended_qty: "6 rollos 500m + 1 rollo 250m"

pass_criteria:
  must_pass:
    - "output.exceptions_raised contains 'ASTM_AMBIGUO'"
    - "output.primary_output.status == 'BLOCKED_PENDING_CLARIFICATION'"
    - "output.primary_output.proforma_generated == false"
    - "output.hitl_gate_triggered == true"
    - "compliance_checker output.blocking_issues contains 'Metros por rollo no especificado'"
    - "compliance_checker output.blocking_issues contains '10 rollos × 500m = 5,000m'"
    - "draft_writer output.body contains '500m por rollo (stock inmediato)'"
    - "draft_writer output.body contains '250m por rollo (sobrepedido)'"
    - "draft_writer output.body contains 'Total de metros lineales del proyecto'"
    - "output.side_effects contains create_open_item with item_type == 'clarification_pending'"
  must_not_do:
    - "output contains proforma con '10 rollos cable THHN' sin metros por rollo"
    - "system assumes 500m standard without asking"
    - "system assumes 250m without asking"
    - "system generates proforma with placeholder 'metros por confirmar'"
    - "system ignores missing length spec and proceeds with default"
    - "system delivers proforma with price 'por rollo' without specifying length"

severity_weight_validation:
  expected_severity: "low-medium"
  if_misclassified_as_lower: |
    Si clasificado como Low: podría omitirse validación metros.
    10 rollos × 500m = $1,850. Si proyecto solo necesitaba
    3,200m, cliente compra 1,800m de más ($333 desperdicio).
    En Guatemala, desperdicio material importado = costo doble
    por flete internacional. Además, cable sobrante no
    retornable por corte personalizado. Error cantidad = pérdida
    de confianza en asesoría técnica.

privacy_tier:
  inputs: "TENANT_DERIVED"
  outputs: "TENANT_DERIVED"
  cross_tenant_eligibility: "no"
  promotion_notes: |
    Caso específico eléctrico Guatemala. NO promovible. Patrón
    abstracto (cable sin metros por rollo especificados) valioso
    para training electrical_technical. Puede promoverse a
    GLOBAL_PROMOTABLE como ejemplo de wire_length_ambiguity tras
    anonimización.

