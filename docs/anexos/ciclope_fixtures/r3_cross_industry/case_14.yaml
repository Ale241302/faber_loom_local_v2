input:
  channel: email
  from:
    name: "Ing. Carlos Mejía"
    email: "c.mejia@electromontajes.gt"
    role: "Supervisor Eléctrico"
  to: "cotizaciones@mwt-faberloom.co"
  subject: "Cotización 10 rollos cable THHN 12 AWG rojo"
  body_text: |
    Estimados MWT,

    Solicitamos cotización de 10 rollos de cable THHN 12 AWG
    color rojo para proyecto residencial.

    Entrega: Guatemala City, DDP.

    Gracias,

    Ing. Carlos Mejía
    Electromontajes Centroamérica
  attachments: []
  thread_id: "THREAD-CLI006-2025-009"
  timestamp: "2025-04-30T09:00:00-06:00"
  language_detected: "es"

expected_pipeline:
  - step: 1
    sub_agent: "AG_SUB_EMAIL_CLASSIFIER"
    inputs: ["input.email.body_text", "input.email.subject"]
    expected_output:
      primary_intent: "quote_request"
      secondary_intents: ["electrical_wire", "construction_materials"]
      urgency: "medium"
      sentiment: "neutral"
      requires_human: false
      confidence: 0.90
      language_detected: "es"
      entities_extracted:
        - type: "product"
          value: "cable THHN 12 AWG rojo"
          qty: 10
          unit: "rollos"
        - type: "delivery_location"
          value: "Guatemala City"
        - type: "incoterm"
          value: "DDP"
    latency_ms_max: 1200
    triggered: true

  - step: 2
    sub_agent: "AG_SUB_SAP_QUERY"
    inputs: ["customer_id: CLI-006", "parsed_items"]
    expected_output:
      account_credit_status: "ok"
      payment_history: "clean"
      pricing_master_access: true
      customer_terms_ref: "TERMS-EMCA-2025-Q1"
      freshness: "2025-04-30T08:55:00-06:00"
    latency_ms_max: 2000
    triggered: true
    parallel_group: "A"

  - step: 3
    sub_agent: "AG_SUB_INVENTORY_FETCHER"
    inputs: ["sku: ELEC-SKU-004", "qty: 10"]
    expected_output:
      items:
        - sku: "ELEC-SKU-004"
          warehouse: "Bogotá Principal"
          available: 15
          reserved: 3
          in_transit: 0
          fulfillable_qty: 12
        - sku: "ELEC-SKU-004"
          warehouse: "Barranquilla Norte"
          available: 10
          reserved: 2
          in_transit: 0
          fulfillable_qty: 8
      total_fulfillable: 20
      reservation_possible: true
      total_with_reservation: 10
      standard_length_m: 500
      alternative_lengths_available: true
      freshness: "2025-04-30T08:58:00-06:00"
    latency_ms_max: 1500
    triggered: true
    parallel_group: "A"

  - step: 4
    sub_agent: "AG_SUB_COMPLIANCE_CHECKER"
    inputs:
      profile: "electrical_technical"
      items: ["ELEC-SKU-004"]
      customer_country: "GT"
      use_case: "instalación eléctrica residencial"
      specs_provided:
        - "tipo: THHN 12 AWG"
        - "color: rojo"
        - "cantidad: 10 rollos"
      specs_missing:
        - "metros por rollo (estándar 500m vs alternativo 250m)"
        - "total metros lineales requeridos (para validar 10×500m=5,000m es correcto)"
        - "aplicación específica (circuitos derivados, iluminación, tomacorrientes)"
        - "carga ampacity requerida"
    expected_output:
      pass: false
      warnings:
        - code: "ASTM_AMBIGUO"
          severity: "low-medium"
          message: "THHN 12 AWG rojo: cantidad '10 rollos' sin confirmar metros por rollo. Estándar 500m/rollo puede exceder necesidad o ser insuficiente si proyecto requiere 250m rollos."
      blocking_issues:
        - "Metros por rollo no especificado: estándar 500m vs alternativo 250m"
        - "10 rollos × 500m = 5,000m lineales — ¿es la cantidad correcta para el proyecto?"
        - "Sin total metros requeridos no se puede validar que 10 rollos es la cantidad adecuada"
        - "Para Guatemala, NTC 2050 aplica pero instalación residencial puede requerir verificación ampacity"
      pii_detected: false
      policies_violated: ["wire_length_specification_mandatory", "quantity_validation_requires_total_meters"]
    latency_ms_max: 1000
    triggered: true

  - step: 5
    sub_agent: "AG_SUB_ESCALATION_ROUTER"
    inputs:
      trigger_source: "AG_SUB_COMPLIANCE_CHECKER"
      exception_codes: ["ASTM_AMBIGUO"]
      severity: "low-medium"
      customer_tier: "silver"
    expected_output:
      route_to: "AM_MWT"
      recipients: ["a.velasquez@mwt-faberloom.co"]
      channel: "email"
      urgency_override: "low-medium"
      fallback_route: "AM_MWT_SUPERVISOR"
      sla_target_minutes: 240
    latency_ms_max: 100
    triggered: true

  - step: 6
    sub_agent: "AG_SUB_DRAFT_WRITER"
    inputs:
      category: "respond"
      recipient_role: "customer"
      context:
        customer: "Electromontajes Centroamérica S.A."
        rfq_items: "10 rollos cable THHN 12 AWG rojo"
        exception: "ASTM_AMBIGUO"
        severity: "low-medium"
        clarification_needed: true
        standard_length: "500m por rollo"
        alternative_length: "250m por rollo (sobrepedido)"
        total_project_meters_unknown: true
    expected_output:
      draft_type: "customer_clarification"
      subject: "Re: Cotización cable THHN 12 AWG — confirmación metros por rollo"
      body: |
        Estimado Ing. Mejía,

        Gracias por su solicitud. Para cotizar los 10 rollos de
        cable THHN 12 AWG rojo de manera precisa, necesitamos
        confirmar la especificación de longitud:

        DATOS FALTANTES:
        1. ¿Metros por rollo requeridos?
           - Estándar: 500m por rollo (stock inmediato)
           - Alternativo: 250m por rollo (sobrepedido, +3 días)
        2. ¿Total de metros lineales del proyecto?
           - 10 rollos × 500m = 5,000m totales
           - ¿Es esta la cantidad correcta para su instalación?
           - Si el proyecto requiere menos, podemos ofrecer
             rollos parciales o cantidad ajustada
        3. ¿Aplicación específica?
           - Circuitos derivados generales
           - Iluminación
           - Tomacorrientes
           - Circuito dedicado (aire acondicionado, etc.)

        OPCIONES EN STOCK:
        - THHN 12 AWG rojo, 500m/rollo — $185 c/u
        - Stock disponible: 20 rollos (suficiente para 10)
        - Lead time: 2 días Bogotá + flete Guatemala

        Con la confirmación de metros totales del proyecto
        podemos validar que 10 rollos es la cantidad óptima
        o proponer ajuste.

        Quedo atento.

        Atentamente,
        Álvaro Velásquez
        MWT — FaberLoom
      internal_note: "Cliente silver Guatemala. Cable THHN sin metros por rollo confirmados. 10 rollos × 500m = 5,000m puede ser exceso o insuficiente. Sin total proyecto no se puede validar cantidad. Aplicación específica afecta ampacity y derating. Requiere intervención AM."
      tone: "professional_technical"
    latency_ms_max: 4000
    triggered: true

  - step: 7
    sub_agent: "AG_SUB_PROFORMA_BUILDER"
    inputs: ["blocked_by_compliance: true"]
    expected_output:
      status: "NOT_GENERATED"
      reason: "COMPLIANCE_BLOCKING"
    latency_ms_max: 6000
    triggered: false

