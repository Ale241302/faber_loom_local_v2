        due_date: "2025-05-02T17:00:00-06:00"
        note: "Confirmar lead time con fabricante para transformador 75kVA. Cliente pide 4 semanas."
    - type: "create_open_item"
      details:
        item_type: "freight_quote_pending"
        route: "BOG-GUA"
        priority: "medium"
        due_date: "2025-05-02T17:00:00-06:00"
        note: "Cotizar flete internacional para transformador 380kg"
    - type: "persist_audit_event"
      details:
        event_type: "QUOTE_CONDITIONAL_LEAD_TIME_UNCERTAIN"
        severity: "high"
        trace_id: "TRACE-case15-20250430"
        delivery_context: "transformador_75kVA_DDP_Guatemala_4weeks_requested"
  exceptions_raised:
    - "LEAD_TIME_INCIERTO"
    - "STOCK_PARCIAL"
    - "FLETE_NO_COTIZADO"
  hitl_gate_triggered: true
  output_destination: "draft_pending_review"

edge_cases:
  - description: "Lead time confirmado por fabricante como 8 semanas — sistema debe actualizar proforma y rechazar 4 semanas del cliente"
    expected_behavior: "Proforma actualizada con plazo real 8 semanas. NO aceptar 4 semanas del cliente. Draft educativo explicando restricción manufactura."
    variant_data:
      lead_time_confirmed: 8
      lead_time_freshness: "2025-04-30"
  - description: "Cliente acepta 8 semanas pero requiere instalación y puesta en marcha — fuera del wedge"
    expected_behavior: "Proforma aprobada para equipamiento. Instalación/puesta en marcha marcada como 'servicio no incluido, consultar por separado'. No inventar servicio."
    variant_data:
      additional_request: "instalacion_puesta_en_marcha"
      wedge_capability: false
      gap_detected: "installation_service_not_in_wedge"
  - description: "Fabricante confirma 3 semanas (mejor caso) — sistema debe verificar si incluye flete + aduana antes de aceptar 4 semanas totales"
    expected_behavior: "NO prometer 4 semanas totales solo porque fábrica dice 3. Debe sumar flete internacional + aduana GT. Estimado real podría ser 5-6 semanas totales."
    variant_data:
      factory_lead: 3

pass_criteria:
  must_pass:
    - "output.exceptions_raised contains 'LEAD_TIME_INCIERTO'"
    - "output.primary_output.status == 'PROFORMA_DRAFT_CONDITIONAL'"
    - "output.primary_output.proforma_generated == true"
    - "output.primary_output.delivery_commitment == false"
    - "output.hitl_gate_triggered == true"
    - "compliance_checker output.blocking_issues contains 'lead time histórico 6 semanas NO confirmado vigente'"
    - "draft_writer output.body contains '4 semanas está PENDIENTE DE CONFIRMACIÓN'"
    - "draft_writer output.body contains '6-8 semanas estimadas'"
    - "draft_writer output.body contains 'SUJETO A CONFIRMACIÓN FABRICA + FLETE'"
    - "proforma_builder output.terms_block.delivery contains 'SUJETO A CONFIRMACIÓN'"
    - "output.side_effects contains create_open_item with item_type == 'lead_time_confirmation'"
    - "evidence_bundle.per_line[0].excepcion == 'LEAD_TIME_INCIERTO'"
    - "inventory_fetcher output.total_fulfillable == 0"
  must_not_do:
    - "output contains proforma con plazo fijo de 4 semanas"
    - "system accepts customer delivery request without confirming lead time freshness"
    - "system quotes total as final without freight international"
    - "draft_writer body says 'confirmamos entrega en 4 semanas'"
    - "system ignores lead_time.freshness_hours = 720 (stale)"
    - "proforma terms_block says delivery is firm commitment"

severity_weight_validation:
  expected_severity: "high"
  if_misclassified_as_lower: |
    Si clasificado como Medium: proforma podría generarse con plazo
    provisional presentado como "estimado" sin suficiente énfasis en
    NO compromiso. Riesgo de que cliente interprete 6-8 semanas como
    compromiso. Si fábrica demora o flete complica, MWT incumple
    expectativa. Transformador 75kVA es equipo crítico para proyecto
    eléctrico — retraso afecta cronograma completo del cliente.
    Requiere alto énfasis en condicionalidad.

privacy_tier:
  inputs: "TENANT_DERIVED"
  outputs: "TENANT_DERIVED"
  cross_tenant_eligibility: "no"
  promotion_notes: |
    Caso específico cliente GT. NO promovible. Patrón abstracto
    (lead time incierto en equipos bajo pedido) puede promoverse a
    GLOBAL_PROMOTABLE como template de manejo de plazos provisionales.

gaps_detected:
  - description: "Flete internacional (Bogotá → Guatemala) no está en Source of Truth como fuente configurada. Se maneja como excepción FLETE_NO_COTIZADO pero no hay sub-agente dedicado a fletes internacionales."
    severity: "medium"
    component: "flete_internacional"
    workaround: "AG_SUB_PROFORMA_BUILDER marca flete como pendiente y AM gestiona manualmente"
