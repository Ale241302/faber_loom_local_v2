      exception_codes: ["LEAD_TIME_INCIERTO", "STOCK_PARCIAL", "FLETE_NO_COTIZADO"]
  side_effects:
    - type: "notify_AM"
      details:
        recipients: ["a.velasquez@mwt-faberloom.co"]
        channel: "email"
        sla_minutes: 240
    - type: "create_open_item"
