    expected_output:
      draft_type: "customer_response_conditional"
      subject: "Re: Cotización transformador 75kVA — plazo por confirmar"
      body: |
        Estimado Ing. Castellanos,

        Gracias por su solicitud. Confirmamos que contamos con el
        transformador seco 75 kVA con las especificaciones requeridas:
        - 480V primario / 208Y/120V secundario
        - Trifásico, 60Hz, NEMA 3R, clase 220C
        - Cumple IEEE C57.12.01, UL 1562, NEMA ST-20

        PRECIO: $4,850.00 USD
        Total con IVA GT (19%): $5,771.50 USD

        RESPECTO AL PLAZO DE ENTREGA:
        El lead time indicado de 4 semanas está PENDIENTE DE CONFIRMACIÓN.
        Nuestro registro histórico indica 6 semanas para este modelo,
        pero esta información NO ha sido reconfirmada con el fabricante
        en el trimestre actual.

        Para poder comprometernos con una fecha de entrega, necesitamos:
        1. Confirmar disponibilidad de fábrica (hoy en día: bajo pedido)
        2. Cotizar flete internacional Bogotá → Guatemala City
        3. Estimar trámites aduanales (DDP)

        PLAZO ESTIMADO PROVISIONAL: 6-8 semanas DDP Guatemala
        (sujeto a confirmación de fábrica y logística internacional).

        ¿Desea que iniciemos verificación de disponibilidad con el
        fabricante y cotización de flete internacional?

        Atentamente,
        Álvaro Velásquez
        MWT — FaberLoom
      internal_note: "Transformador sin stock, lead time stale (30 días sin confirmar). Cliente pide 4 semanas pero histórico dice 6. Riesgo de promesa incumplida si no confirmamos. Precio vigente. Necesitamos flete internacional GT no cotizado aún."
      tone: "professional_cautious"
    latency_ms_max: 4000
    triggered: true

  - step: 8
    sub_agent: "AG_SUB_PROFORMA_BUILDER"
    inputs: ["conditional: true", "delivery_note: provisional_only"]
    expected_output:
      status: "PROFORMA_DRAFT_CONDITIONAL"
      account_block:
        customer: "Electromontajes Centroamérica S.A."
        customer_id: "CLI-006"
        tax_id: "C/F"
        payment_terms: "Net 30 días"
      items_table:
        - line: 1
          sku: "ELEC-SKU-003"
          description: "Transformador seco 75kVA 480/208Y-120V 3F NEMA 3R"
          qty: 1
          unit_price: 4850.00
          line_total: 4850.00
      totals:
        subtotal: 4850.00
        tax_iva_19pct: 921.50
        total: 5771.50
        currency: "USD"
      terms_block:
