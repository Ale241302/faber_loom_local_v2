edge_cases:
  - description: "Cliente responde 'es para motor 30HP, arranque directo, 480V, no sabemos kAIC' — sistema debe estimar kAIC conservador o pedir datos transformador"
    expected_behavior: "Clarificación adicional sobre transformador alimentador. NO asumir kAIC. Proponer estimación conservadora 10kAIC con nota explícita 'estimado, requiere verificación in-situ'."
    variant_data:
      carga: "motor_30HP_DOL"
      kAIC: "unknown"
  - description: "Cliente insiste 'usamos curva C para todo' — sistema debe alertar que motor 30HP DOL con curva C puede disparar al arranque"
    expected_behavior: "Draft educativo explicando inrush motor vs curva C. Recomendar curva D o K. NO aceptar curva C para motor DOL 30HP sin firma de aceptación de riesgo."
    variant_data:
      curve_requested: "C"
      motor_hp: 30
      starting_method: "DOL"
  - description: "Stock de curva C (13 unidades) es suficiente para 20 unidades si se confirma curva C — pero faltan 7 unidades. Añade STOCK_PARCIAL como excepción adicional."
    expected_behavior: "Si curva C confirmada, proforma con STOCK_PARCIAL (13 disponible, 7 backorder). NO asumir disponibilidad total."
    variant_data:
      curve_confirmed: "C"
      qty: 20
      stock_curve_C: 13

pass_criteria:
  must_pass:
    - "output.exceptions_raised contains 'ASTM_AMBIGUO'"
    - "output.exceptions_raised contains 'SUSTITUCIÓN_ACEPTABLE'"
    - "output.primary_output.status == 'BLOCKED_PENDING_CLARIFICATION'"
    - "output.primary_output.proforma_generated == false"
    - "output.hitl_gate_triggered == true"
    - "compliance_checker output.blocking_issues contains 'Curva de disparo desconocida'"
    - "compliance_checker output.blocking_issues contains 'kAIC desconocido'"
    - "compliance_checker output.blocking_issues contains 'Tipo carga desconocido'"
    - "draft_writer output.body contains 'NO son intercambiables sin validación técnica'"
    - "draft_writer output.body contains checklist de 6+ items técnicos"
    - "inventory_fetcher output.multiple_skus_found == true"
    - "output.side_effects contains create_open_item with item_type == 'clarification_pending'"
    - "evidence_bundle.per_line[0].excepcion == 'SUSTITUCIÓN_ACEPTABLE'"
  must_not_do:
    - "output contains proforma con breaker seleccionado arbitrariamente (C o D)"
    - "system picks ELEC-SKU-004 because it's cheaper ($145 vs $168)"
    - "system picks ELEC-SKU-004 because more stock available (13 vs 8)"
    - "system accepts 'cualquiera compatible' and proceeds with quote"
    - "system recommends mixing C and D curves in same installation without technical justification"
    - "system ignores missing kAIC because 100A is standard"
    - "draft_writer body says 'recomendamos curva C por stock'"

severity_weight_validation:
  expected_severity: "high"
  if_misclassified_as_lower: |
    Si clasificado como Medium: proforma preliminar podría generarse
    seleccionando breaker por precio o stock (curva C 10kAIC más barato
    y más stock). Si tablero alimenta motor 30HP DOL, curva C disparará
    al arranque (inrush 6-10x). Cliente desconecta breaker repetidamente,
    busca "defecto", genera reclamo, posible daño a motor por arranques
    repetidos. Si kAIC real excede 10kAIC, breaker no abre en
    cortocircuito — riesgo de incendio/explosión. Responsabilidad civil
    y daño reputacional severo.

privacy_tier:
  inputs: "TENANT_DERIVED"
  outputs: "TENANT_DERIVED"
  cross_tenant_eligibility: "no"
  promotion_notes: |
    Caso específico cliente gold. NO promovible. Patrón abstracto
    (breaker incompleto + sustitución sin validación) altamente valioso
    para training electrical_technical profile. Puede promoverse a
    GLOBAL_PROMOTABLE como ejemplo canónico de spec incompleta en
    protección eléctrica tras anonimización completa.

