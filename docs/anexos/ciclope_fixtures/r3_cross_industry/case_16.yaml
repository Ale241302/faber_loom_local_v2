        - "corriente: 100A"
      specs_missing:
        - "curva de disparo (B/C/D/K/Z)"
        - "kAIC (capacidad de cortocircuito)"
        - "tensión nominal"
        - "frecuencia"
        - "método de montaje"
        - "tipo de carga (motor, resistencia, iluminación)"
        - "inrush esperado"
      brand_flexibility_requested: true
    expected_output:
      pass: false
      warnings:
        - code: "ASTM_AMBIGUO"
          severity: "high"
          message: "Especificación de breaker incompleta. 'Cualquiera compatible' es inaceptable para seguridad eléctrica. Faltan curva, kAIC, tensión, montaje, tipo carga."
        - code: "SUSTITUCIÓN_ACEPTABLE"
          severity: "medium-high"
          message: "Múltiples breakers 3P 100A en stock con características DIFERENTES (curva C 10kAIC vs curva D 25kAIC). NO son intercambiables sin validación técnica."
      blocking_issues:
        - "Curva de disparo desconocida: C (iluminación/general) ≠ D (motores alta inrush) ≠ K (transformadores). Selección errónea = disparo intempestivo o falta protección."
        - "kAIC desconocido: si cortocircuito disponible > kAIC del breaker, breaker explota sin abrir. Requiere cálculo o estimación conservadora."
        - "Tipo carga desconocido: motor con inrush 6-10x In requiere curva D o K. Curva C dispararía al arranque."
        - "Sustitución 'cualquiera compatible' viola política electrical_technical — cada breaker tiene aplicación específica."
      pii_detected: false
      policies_violated: ["electrical_breaker_specification_mandatory", "substitution_requires_tech_approval", "safety_first_incomplete_spec"]
    latency_ms_max: 1000
    triggered: true

  - step: 5
    sub_agent: "AG_SUB_ESCALATION_ROUTER"
    inputs:
      trigger_source: "AG_SUB_COMPLIANCE_CHECKER"
      exception_codes: ["ASTM_AMBIGUO", "SUSTITUCIÓN_ACEPTABLE"]
      severity: "high"
      customer_tier: "gold"
    expected_output:
      route_to: "AM_MWT"
      recipients: ["a.velasquez@mwt-faberloom.co"]
      channel: "email"
      urgency_override: "high"
      fallback_route: "AM_MWT_SUPERVISOR"
      sla_target_minutes: 180
    latency_ms_max: 100
    triggered: true

  - step: 6
    sub_agent: "AG_SUB_DRAFT_WRITER"
    inputs:
      category: "respond"
      recipient_role: "customer"
      context:
        customer: "Industrias del Norte S.A."
        rfq_items: "20 breakers 3P 100A"
        exception: "ASTM_AMBIGUO + SUSTITUCIÓN_ACEPTABLE"
        severity: "high"
        clarification_needed: true
        missing_specs: ["curva disparo", "kAIC", "tensión", "tipo carga", "montaje"]
    expected_output:
      draft_type: "customer_clarification"
      subject: "Re: Cotización breakers 3P 100A — especificación técnica requerida"
      body: |
        Estimado Ing. Peralta,

        Gracias por su solicitud. Para cotizar los 20 breakers 3P 100A
        de manera segura y correcta, necesitamos completar la
        especificación técnica. No todos los breakers 100A son
        intercambiables — la selección incorrecta puede causar:

        - Disparos intempestivos durante el arranque (si curva inadecuada)
        - Falta de protección en cortocircuito (si kAIC insuficiente)
        - Riesgo de explosión del breaker (si tensión/corriente de
          cortocircuito excede capacidad)

        DATOS REQUERIDOS:
        1. CURVA DE DISPARO: ¿B (cableado), C (iluminación/general),
           D (motores alta inrush), K (transformadores), o Z
           (electrónica sensible)?
        2. kAIC REQUERIDO: ¿Conoce la corriente de cortocircuito
           disponible en el punto de instalación? (Si no, indíquenos
           potencia del transformador alimentador y distancia)
        3. TENSIÓN NOMINAL: ¿208V, 240V, 480V?
        4. TIPO DE CARGA: ¿Motores (HP y cantidad), iluminación,
           calefacción, o mixto?
        5. MÉTODO DE MONTAJE: ¿Riel DIN, tornillos directos, o
           retrofit en tablero existente?
        6. FRECUENCIA: ¿60Hz (CO) o 50Hz?

        En nuestro stock actual tenemos:
        - Siemens 3P 100A curva C, 10kAIC, 480V — 13 unidades
        - ABB 3P 100A curva D, 25kAIC, 480V — 8 unidades

        Estos modelos NO son intercambiables sin validación técnica.
        Con los datos solicitados podemos recomendar el correcto.

        Quedo atento.

        Atentamente,
        Álvaro Velásquez
        MWT — FaberLoom
      internal_note: "Cliente gold, compra recurrente. 'Cualquiera compatible' es frase peligrosa en eléctrico. Tenemos 2 breakers diferentes en stock — curva C vs D, 10kAIC vs 25kAIC. Venta sin especificación = riesgo grave de seguridad. Requiere intervención AM para educar cliente."
      tone: "professional_educational_safety"
    latency_ms_max: 4000
    triggered: true

  - step: 7
    sub_agent: "AG_SUB_PROFORMA_BUILDER"
    inputs: ["blocked_by_compliance: true"]
    expected_output:
      status: "NOT_GENERATED"
      reason: "COMPLIANCE_BLOCKING"
    latency_ms_max: 6000
    triggered: false

