  channel: email
  from:
    name: "Ing. Andrés Peralta"
    email: "a.peralta@industriasdelnorte.co"
    role: "Jefe de Mantenimiento Eléctrico"
  to: "cotizaciones@mwt-faberloom.co"
  subject: "Cotización breakers 3P 100A — 20 unidades, cualquiera compatible"
  body_text: |
    Buenos días,

    Necesitamos cotizar 20 breakers tripolares 100A para tablero de
    distribución. No importa la marca, cualquiera compatible sirve.

    Entrega: Barranquilla, DDP.
    Plazo: esta semana.

    Gracias.

    Ing. Andrés Peralta
    Jefe de Mantenimiento Eléctrico
    Industrias del Norte S.A.
  attachments: []
  thread_id: null
  timestamp: "2025-04-30T08:30:00-05:00"
  language_detected: "es"

