  - step: 4
    sub_agent: "AG_SUB_COMPLIANCE_CHECKER"
    inputs:
      profile: "electrical_technical"
      items: ["ELEC-SKU-004", "ELEC-SKU-004B"]
      customer_country: "CO"
      use_case: "tablero distribución industrial"
      specs_provided_by_customer:
