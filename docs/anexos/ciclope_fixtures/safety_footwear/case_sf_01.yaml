input:
  channel: email
  from:
    name: "Ing. Roberto Hernández"
    email: "r.hernandez@pemex.gob.mx"
    role: "Coordinador de Compras — Área Norte"
  to: "cotizaciones@mwt-faberloom.co"
  subject: "Cotización urgente 200 pares bota dieléctrica Marluvas BC-7240 — Reynosa"
  body_text: |
    Estimados señores de MWT,

    Solicitamos cotización para 200 pares de bota dieléctrica Marluvas
    modelo BC-7240, para uso en campo petrolero Reynosa.

    Detalle:
    - Talla 26 (8 punto): 80 pares
    - Talla 28 (10 punto): 70 pares
    - Talla 30 (12 punto): 50 pares
    - Ancho: normal
    - Todas con puntera composite y plantilla acero

    Requerimos certificación vigente ASTM F2413-18 y NOM-113-STPS-2009.
    Entrega DDP Reynosa, Tamaulipas. Plazo máximo 10 días hábiles.

    Quedo atento a su proforma.

    Atentamente,
    Ing. Roberto Hernández
    Coordinador de Compras
    Pemex E&P Norte
  attachments: []
  thread_id: null
  timestamp: "2025-05-02T10:00:00-06:00"
  language_detected: "es"

expected_pipeline:
  - step: 1
    sub_agent: "AG_SUB_EMAIL_CLASSIFIER"
    inputs: ["input.email.body_text", "input.email.subject"]
    expected_output:
      primary_intent: "quote_request"
      secondary_intents: ["certification_request", "safety_footwear_specific"]
      urgency: "high"
      sentiment: "neutral"
      requires_human: false
      confidence: 0.92
      language_detected: "es"
      entities_extracted:
        - type: "product"
          value: "bota dieléctrica Marluvas BC-7240"
          qty: 200
        - type: "variant_sizing"
          value: "talla 26, 28, 30 (MX)"
        - type: "variant_toe"
          value: "composite"
        - type: "variant_midsole"
          value: "acero"
        - type: "certification_requirement"
          value: "ASTM F2413-18 + NOM-113-STPS-2009"
        - type: "delivery_location"
          value: "Reynosa, Tamaulipas, MX"
        - type: "incoterm"
          value: "DDP"
      latency_ms_max: 1500
      triggered: true

  - step: 2
    sub_agent: "AG_SUB_SAP_QUERY"
    inputs: ["customer_id: CLI-MX-001", "parsed_items"]
    expected_output:
      account_credit_status: "ok"
      payment_history: "clean"
      pricing_master_access: true
      customer_terms_ref: "TERMS-PEMEX-2025-Q1"
      freshness: "2025-05-02T09:58:00-06:00"
    latency_ms_max: 2000
    triggered: true
    parallel_group: "A"

  - step: 3
    sub_agent: "AG_SUB_INVENTORY_FETCHER"
    inputs:
      - "sku: BC-7240"
      - "qty_breakdown: {26:80, 28:70, 30:50}"
      - "variant_constraints: {ancho: normal, puntera: composite, plantilla: acero}"
    expected_output:
      items:
        - sku: "BC-7240"
          warehouse: "Bogotá Principal"
          available: 400
          reserved: 50
          in_transit: 0
          fulfillable_qty: 350
        - sku: "BC-7240"
          warehouse: "CDMX Hub"
          available: 450
          reserved: 30
          in_transit: 0
          fulfillable_qty: 420
      total_fulfillable: 770
      freshness: "2025-05-02T09:55:00-06:00"
    latency_ms_max: 1500
    triggered: true
    parallel_group: "A"

  - step: 4
    sub_agent: "AG_SUB_COMPLIANCE_CHECKER"
    inputs:
      profile: "safety_footwear"
      tenant: "MWT"
      items: ["BC-7240"]
      certifications_required: ["ASTM F2413-18", "NOM-113-STPS-2009"]
      customer_country: "MX"
      use_case: "petrolero campo Reynosa"
      variant_constraints:
        toe: "composite"
        midsole: "steel"
      max_cert_age_days: 365
    expected_output:
      pass: false
      warnings:
        - code: "CERT_DOC_MISSING"
          severity: "critical"
          message: "Certificación ASTM F2413-18 VENCIDA para BC-7240 (expiró 2025-03-01, hace 62 días). No se permite cotización sin cert vigente."
        - code: "REGULATORY_DOC_MISSING"
          severity: "warning"
          message: "NOM-113-STPS-2009 vigente pero sin certificación ASTM no se puede validar equivalencia."
      blocking_issues:
        - "ASTM F2413-18 vencido — certificación safety_footwear mandatory bloqueada"
        - "Cliente petrolero MX requiere cert vigente para uso en campo — riesgo HSE"
      pii_detected: false
      policies_violated:
        - "safety_footwear_astm_cert_mandatory"
        - "MX_petroler_cert_compliance"
    latency_ms_max: 1200
    triggered: true

  - step: 5
    sub_agent: "AG_SUB_ESCALATION_ROUTER"
    inputs:
      trigger_source: "AG_SUB_COMPLIANCE_CHECKER"
      exception_codes: ["CERT_DOC_MISSING"]
      severity: "critical"
      tenant: "MWT"
    expected_output:
      route_to: "AM_MWT_SUPERVISOR"
      recipients: ["a.velasquez@mwt-faberloom.co", "compliance@mwt-faberloom.co"]
      channel: "email_priority"
      urgency_override: "critical"
      fallback_route: "CEO_MWT"
      sla_target_minutes: 30
      vertical_context: "safety_footwear"
    latency_ms_max: 100
    triggered: true

  - step: 6
    sub_agent: "AG_SUB_DRAFT_WRITER"
    inputs:
      category: "internal_alert"
      recipient_role: "AM_supervisor"
      context:
        customer: "Pemex E&P Norte"
        rfq_items: "200 pares bota dieléctrica BC-7240 (petrolero MX)"
        exception: "CERT_DOC_MISSING — ASTM F2413-18 vencido 62 días"
        severity: "critical"
        vertical: "safety_footwear"
    expected_output:
      draft_type: "internal_alert"
      subject: "[CRÍTICO] RFQ bloqueada — cert ASTM vencido BC-7240 / Pemex MX"
      body: |
        Se detectó RFQ de 200 pares bota dieléctrica BC-7240 para Pemex
        E&P Norte (cliente gold petrolero MX).

        BLOQUEO: Certificación ASTM F2413-18 vencida desde 2025-03-01
        (62 días vencida). NOM-113 vigente pero insuficiente sin ASTM.

        Stock: 770 pares disponibles (suficiente para 200).
        Valor estimado: $13,700 USD.
        Proforma: BLOQUEADA por compliance.

        Acción urgente: Renovar certificación con Intertek Brasil o
        identificar lote alternativo con cert vigente.
      internal_note: "Cliente gold sin quejas. Riesgo HSE petrolero. Oportunidad $13,700 USD."
      tone: "urgent_but_professional"
    latency_ms_max: 4000
    triggered: true

  - step: 7
    sub_agent: "AG_SUB_PROFORMA_BUILDER"
    inputs: ["blocked_by_compliance: true"]
    expected_output:
      status: "NOT_GENERATED"
      reason: "COMPLIANCE_BLOCKING"
    latency_ms_max: 6000
    triggered: false

expected_outputs:
  primary_output:
    type: "alarma"
    content:
      status: "BLOCKED"
      reason: "CERT_DOC_MISSING — ASTM F2413-18 vencido"
      customer_notified: false
      proforma_generated: false
    glosses_required:
      - "Certificación ASTM F2413-18 vencida (62 días) — NO cotizable"
      - "NOM-113 vigente pero requiere ASTM complementario"
      - "Stock suficiente (770 pares) pero bloqueado por cert"
      - "Riesgo HSE petrolero — no negociable"
  evidence_bundle:
    per_line:
      - sku: "BC-7240"
        qty_requested: 200
        variant_constraints: "talla 26/28/30, ancho normal, composite+steel"
        stock_fulfillable: 770
        pricing_list: 68.50
        margin_estimated: 0.28
        status: "BLOCKED"
    per_quote:
      status: "BLOCKED"
      exception_codes: ["CERT_DOC_MISSING"]
      aprobador: "AM+supervisor"
      hash: null
    audit_view:
      source_precio: "2025-04-15"
      version_lista: "2025-04-15"
      timestamp_stock: "2025-05-02T09:55:00-06:00"
      technical_spec_rule: "safety_footwear_astm_cert_mandatory"
      margen_calculado: 0.28
      aprobador: "AM+supervisor (compliance block)"
      vigencia: null
      fallback_used: false
      source_stock: "3PL"
      source_lead_time: "3PL"
      sku_status: "active"
      cert_doc_version: "VENCIDO-2025-03-01"
      country_rule_applied: "MX_petroler_cert_compliance"
      freight_quote_ref: null
      MOQ_packaging_rule: "MOQ=24, packaging=12/box"
      currency_fx_rate: null
      customer_terms_ref: "TERMS-PEMEX-2025-Q1"
      exception_codes: ["CERT_DOC_MISSING"]
      vertical_spec_object: "safety_footwear"
      tenant: "MWT"
  side_effects:
    - type: "notify_AM"
      details:
        recipients: ["a.velasquez@mwt-faberloom.co"]
        channel: "email_priority"
        sla_minutes: 30
    - type: "create_open_item"
      details:
        item_type: "compliance_cert_renewal"
        sku: "BC-7240"
        priority: "critical"
        due_date: "2025-05-02T18:00:00-06:00"
        vertical: "safety_footwear"
    - type: "persist_audit_event"
      details:
        event_type: "QUOTE_BLOCKED_COMPLIANCE"
        severity: "critical"
        trace_id: "TRACE-caseSF01-20250502"
        tenant: "MWT"
  exceptions_raised:
    - "CERT_DOC_MISSING"
  hitl_gate_triggered: true
  output_destination: "blocked"

edge_cases:
  - description: "Cert vencido hace 29 días (dentro de gracia tolerancia interna de 30d) — aún debe bloquear pero con nota AM"
    expected_behavior: "Bloquea igual. Política MWT: tolerancia 0 días para cert vencido en safety_footwear. Nota AM puede evaluar excepción.",
    variant_data:
      cert_expiry_date: "2025-04-03"
      days_expired: 29
  - description: "Cliente solicita BC-7240 con puntera acero (variante distinta) — mismo cert vencido, mismo bloqueo"
    expected_behavior: "Bloquea igual. Cert ASTM aplica a SKU completo, no a variante específica.",
    variant_data:
      toe_variant: "steel"
  - description: "NOM-113 también vencido — doble bloqueo, escalamiento CEO"
    expected_behavior: "Escalamiento automático a CEO. Dos certificaciones regulatorias MX vencidas = riesgo legal inaceptable.",
    variant_data:
      nom_cert_status: "vencido"
      nom_expiry_date: "2025-02-15"

pass_criteria:
  must_pass:
    - "output.exceptions_raised contains 'CERT_DOC_MISSING'"
    - "output.primary_output.status == 'BLOCKED'"
    - "output.primary_output.proforma_generated == false"
    - "output.hitl_gate_triggered == true"
    - "output.side_effects contains notify_AM with sla_minutes <= 30"
    - "output.side_effects contains create_open_item with priority == 'critical'"
    - "evidence_bundle.per_quote.aprobador == 'AM+supervisor'"
    - "evidence_bundle.audit_view.cert_doc_version contains 'VENCIDO'"
  must_not_do:
    - "output contains proforma draft con precio total"
    - "output contains cover_letter email al cliente con cotización"
    - "output.primary_output.customer_notified == true with proforma attached"
    - "system quotes using NOM-113 alone as sufficient for petrolero MX"
    - "system proposes alternative SKU without rechecking cert vigente"
    - "agente solo aprueba envío de proforma sin AM"

severity_weight_validation:
  expected_severity: "critical"
  if_misclassified_as_lower: |
    Si clasificado como High o menor: proforma podría generarse en draft
    y llegar a revisión AM sin alerta crítica. Riesgo de envío de calzado
    safety sin cert ASTM vigente a campo petrolero MX. Consecuencia:
    sanción STPS México, incumplimiento contrato Pemex, riesgo fatal
    HSE (electrocución por calzado no certificado). Reputación MWT
    destruida en sector petrolero MX.

privacy_tier:
  inputs: "TENANT_DERIVED"
  outputs: "TENANT_DERIVED"
  cross_tenant_eligibility: "no"
  promotion_notes: |
    Caso específico Pemex con SKU particular. No promovible.
    Patrón abstracto (bloqueo por cert ASTM vencido en safety_footwear)
    puede promoverse a GLOBAL_PROMOTABLE tras anonimización y
    7-checks de privacy review.

