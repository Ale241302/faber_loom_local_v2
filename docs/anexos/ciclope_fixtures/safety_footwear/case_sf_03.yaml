    name: "Industrias del Norte S.A. de C.V."
    country: "MX"
    city: "Monterrey"
    tier: "gold"
    credit_status: "ok"
    payment_terms: "Net 30 días"
    incoterm_default: "DDP"
    tax_id: "INN-1234567890"
