    historical_data:
      last_order_date: "2025-04-10"
      avg_order_value_usd: 8500
      orders_ytd: 8
      complaints_12m: 0
      preferred_delivery: "CDMX Hub"
    regulatory_context:
      requires_astm_f2413: true
