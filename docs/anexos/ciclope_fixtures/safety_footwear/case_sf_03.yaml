case_id: case_sf_03
industry: safety_footwear
severity: high
description: |
  Cliente pide 150 pares "calzado certificado para mi planta" — no especifica
  versión norma ASTM. Planta industrial implica F2413-18 más estricto.
  Sistema debe pedir clarificación, NO asumir.

