edge_cases:
  - description: "Cliente rechaza sustitución y espera BC-7240 — backorder 5 días, proforma parcial"
    expected_behavior: "Genera proforma para 65 pares inmediatos + 135 backorder. Nota clara de entrega parcial.",
    variant_data:
      customer_choice: "rechaza_sustitución"
      expected_proforma: "PARCIAL_CON_BACKORDER"
  - description: "Cliente pide muestra BC-3120A antes de decidir — sistema gestiona muestra gratis"
    expected_behavior: "Crea orden muestra 2 pares gratis (costo MWT). Bloquea proforma hasta feedback cliente.",
    variant_data:
      sample_request: true
      expected_action: "SAMPLE_ORDER_CREATED"
  - description: "BC-3120A también agotado — sistema debe buscar tercer SKU o escalación completa"
    expected_behavior: "Escalamiento a AM+supervisor. Sistema NO propone SKU sin stock ni cert.",
    variant_data:
      bc3120a_stock: 0
      expected_behavior: "ESCALATION_AM_SUPERVISOR"

pass_criteria:
  must_pass:
    - "output.exceptions_raised contains 'SUSTITUCIÓN_ACEPTABLE'"
    - "output.exceptions_raised contains 'STOCK_PARCIAL'"
    - "output.proforma contains substitution_note with plantilla change documented"
    - "output.proforma contains both options (original + substitute)"
    - "output.primary_output.status == 'GENERATED'"
    - "output.hitl_gate_triggered == true"
    - "evidence_bundle.per_line contains substitution_evidence with midsole_change documented"
    - "pricing_calculator.savings_vs_original > 0"
  must_not_do:
    - "system sends proforma without AM approval"
    - "system hides plantilla change from customer"
    - "system proposes BC-3120A without ASTM cert check"
    - "system ignores stock parcial and promises full delivery BC-7240"
    - "agente solo approves substitution without AM"

severity_weight_validation:
  expected_severity: "medium"
  if_misclassified_as_lower: |
    Si clasificado como Low: sustitución cross-brand con cambio
    plantilla podría enviarse sin escalación AM. Cliente gold
    podría recibir producto con plantilla distinta sin saberlo,
    generando reclamo y pérdida de confianza. Error de transparencia
    = daño relación cliente recurrente.
  if_misclassified_as_higher: |
    Si clasificado como High o Critical: bloqueo innecesario de
    sustitución comercial válida con stock y cert OK. Pérdida de
    oportunidad $11,810 USD y cliente insatisfecho por rigidez.

privacy_tier:
  inputs: "TENANT_DERIVED"
  outputs: "TENANT_DERIVED"
  cross_tenant_eligibility: "no"
  promotion_notes: |
    Caso específico cliente automotriz MX. Patrón de sustitución
    cross-brand puede promoverse a GLOBAL_PROMOTABLE como
    "substitution_evidence_pattern" tras anonimización.

