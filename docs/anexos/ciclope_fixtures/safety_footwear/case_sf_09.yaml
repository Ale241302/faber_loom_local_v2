input:
  channel: email
  from:
    name: "Ing. María Elena Vázquez"
    email: "m.vazquez@industriasnorte.mx"
    role: "Directora de Compras"
  to: "cotizaciones@mwt-faberloom.co"
  subject: "Cotización calzado seguridad — mismo modelo que abril"
  body_text: |
    Estimados,

    Quiero las mismas botas que pedí el mes pasado pero necesito que
    me den un precio más competitivo. El mes pasado fueron 120 pares
    Marluvas y ahora necesito 200 pares.

    Si tienen algo equivalente más barato me interesa, pero debe tener
    la misma protección (puntera composite, suela antideslizante).

    Entrega DDP Saltillo. Plazo 7 días.

    Saludos,
    María Elena Vázquez
    Directora de Compras
    Industrias del Norte SA de CV
  attachments: []
  thread_id: null
  timestamp: "2025-05-02T16:00:00-06:00"
  language_detected: "es"

