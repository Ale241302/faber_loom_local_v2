edge_cases:
  - description: "Cliente pide 60 pares talla 25 pero solo 50 disponibles — stock parcial leve"
    expected_behavior: "Genera proforma para 50 inmediatos + 10 backorder 2 días. Nota clara. Sin escalación.",
    variant_data:
      stock_talla_25: 50
      expected_action: "PROFORMA_PARCIAL_SIN_ESCALACION"
  - description: "Cliente solicita entrega urgente 2 días (vs 5 standard) — flete express"
    expected_behavior: "Calcula flete express con costo adicional. Proforma con 2 opciones: standard $180 vs express $320.",
    variant_data:
      urgency: "2_dias"
      expected_freight_standard: 180.00
      expected_freight_express: 320.00
  - description: "Lista de precios vencida hoy mismo — sistema debe detectar y usar nueva lista"
    expected_behavior: "Detecta versión vencida, consulta curator, usa nueva lista si disponible. Si no, escalación leve.",
    variant_data:
      pricing_version_date: "2025-05-02"
      expected_behavior: "VERSION_CHECK_AND_ROLL"

pass_criteria:
  must_pass:
    - "output.exceptions_raised is empty"
    - "output.primary_output.status == 'GENERATED'"
    - "output.primary_output.proforma_generated == true"
    - "output.hitl_gate_triggered == false"
    - "output.proforma contains pedido mensual confirmation"
    - "evidence_bundle.audit_view.margin_calculado >= 0.22"
    - "compliance_checker.pass == true"
    - "inventory_fulfillable >= 60"
  must_not_do:
    - "system blocks proforma without reason"
    - "system escalates unnecessarily for standard order"
    - "system uses outdated pricing without version check"
    - "system ignores customer tier discount (gold)"
    - "agente solo sends proforma without AM review"

severity_weight_validation:
  expected_severity: "low"
  if_misclassified_as_higher: |
    Si clasificado como Medium o mayor: escalación innecesaria,
    delay en proforma de pedido mensual habitual, cliente gold
    insatisfecho por burocracia excesiva. Pérdida de eficiencia
    operativa y confianza.
  if_misclassified_as_critical: |
    Bloqueo absoluto de pedido limpio = cliente cancela y busca
    proveedor alternativo. Pérdida de ingreso recurrente $4,080
    mensuales.

privacy_tier:
  inputs: "TENANT_DERIVED"
  outputs: "GLOBAL_PROMOTABLE"
  cross_tenant_eligibility: "yes"
  promotion_notes: |
    Pedido standard recurrente sin datos sensibles. Ideal para
    training dataset y benchmarking. Puede promoverse a
    GLOBAL_PROMOTABLE inmediatamente.

gaps_detected: []
