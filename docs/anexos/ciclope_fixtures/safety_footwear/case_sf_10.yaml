    Favor confirmar disponibilidad y enviar proforma.

    Gracias,
    Fernando Torres
    Gerente de Compras
    Grupo Industrial Querétaro
  attachments: []
  thread_id: null
  timestamp: "2025-05-02T09:00:00-06:00"
  language_detected: "es"

