      language: "es_MX"
      formality: "semi_formal_tu"
    routing:
      layer_1: "inactivo"
      layer_2: "activo"
      layer_3a_pins: ["AG_SUB_COMPLIANCE_CHECKER:safety_footwear"]
      layer_3b_metadata: ["compliance_profile:safety_footwear", "tenant:MWT"]
    curator:
      last_freeze: "2025-04-25"
      pending_items: 0
    authority_matrix_level: "AM"
    glossary_overrides:
      - term: "punto"
        meaning: "talla_numérica_regional"
        mapping:
          - raw: "6 punto"
            resolved: "talla_24"
          - raw: "8 punto"
            resolved: "talla_26"
          - raw: "10 punto"
            resolved: "talla_28"
          - raw: "12 punto"
            resolved: "talla_30"
        applies_to: ["MX"]
        context_trigger: "calzado|bota|zapato|punto"
      - term: "bota dieléctrica"
        meaning: "clase_electrical_hazard_EH"
        applies_to: ["MX", "CO"]
      - term: "calzado seguridad"
        meaning: "zapato_trabajo_normado"
        applies_to: ["MX", "CO", "CR"]

input:
  channel: email
  from:
    name: "Luis Martínez"
    email: "l.martinez@constructoranorte.mx"
    role: "Auxiliar de Compras"
  to: "cotizaciones@mwt-faberloom.co"
  subject: "Cotización calzado seguridad — 200 pares"
  body_text: |
    Hola buenas tardes,

    Me pidieron cotizar calzado de seguridad para la obra nueva en
    Apodaca. El encargado me dijo que necesitamos:

    - 80 pares 6 punto
    - 70 pares 8 punto
    - 50 pares 10 punto

    Todas normales, puntera de acero. Es para albañiles y electricistas.
    Necesitamos entrega en Monterrey, DDP. Plazo 7 días.

    Gracias,
    Luis
  attachments: []
  thread_id: null
  timestamp: "2025-05-02T14:30:00-06:00"
  language_detected: "es"

