      secondary_intents: ["vocabulary_regional_resolution"]
      urgency: "medium"
      sentiment: "neutral"
      requires_human: false
      confidence: 0.88
      language_detected: "es"
      entities_extracted:
        - type: "product"
          value: "calzado seguridad"
          qty: 200
        - type: "variant_sizing_regional"
          value: "6 punto, 8 punto, 10 punto"
          resolved: "talla 24, 26, 28 (MX)"
        - type: "variant_toe"
          value: "acero"
        - type: "variant_width"
          value: "normal"
        - type: "delivery_location"
          value: "Monterrey, MX"
        - type: "incoterm"
          value: "DDP"
      glossary_hits:
        - term: "punto"
          matched: true
          resolution: "talla_numérica_regional"
          mappings_applied: 3
      latency_ms_max: 1500
      triggered: true

  - step: 2
    sub_agent: "AG_SUB_SAP_QUERY"
    inputs: ["customer_id: CLI-MX-003", "parsed_items"]
    expected_output:
      account_credit_status: "ok"
      payment_history: "clean"
      pricing_master_access: true
      customer_terms_ref: "TERMS-CONSN-2025-Q1"
      freshness: "2025-05-02T14:28:00-06:00"
