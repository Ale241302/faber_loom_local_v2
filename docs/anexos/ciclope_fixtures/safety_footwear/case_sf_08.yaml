        - Talla 24 (6 punto): 80 pares
        - Talla 26 (8 punto): 70 pares
        - Talla 28 (10 punto): 50 pares

        Especificaciones: ancho normal, puntera acero, plantilla acero,
        certificación ASTM F2413-18 y NOM-113 vigentes.

        Total DDP Monterrey: $14,120.00 USD
        Plazo entrega: 5 días hábiles

        Quedamos atentos a su confirmación.
      tone: "professional_b2b_latam"
      internal_note: "Cliente silver, primer RFQ por email. Vocabulario regional detectado y resuelto."
    latency_ms_max: 4000
    triggered: true

  - step: 7
    sub_agent: "AG_SUB_PROFORMA_BUILDER"
    inputs:
      - "draft_proforma"
      - "pricing_data"
      - "compliance_pass"
    expected_output:
      status: "GENERATED"
      format: "PDF_proforma"
      proforma_id: "PROF-MWT-2025-0502-008"
      items:
        - sku: "BC-7240"
          qty: 200
          unit_price: 68.50
          total_line: 13700.00
      total: 14120.00
      currency: "USD"
      incoterm: "DDP"
      delivery: "Monterrey, MX"
      lead_time_days: 5
      validity_days: 15
      terms: "Net 30 días"
      customer_id: "CLI-MX-003"
    latency_ms_max: 6000
    triggered: true

