    expected_output:
      items:
        - sku: "BC-7240"
          warehouse: "CDMX Hub"
          available: 350
          reserved: 40
          in_transit: 0
          fulfillable_qty: 310
        - sku: "BC-7240"
          warehouse: "Bogotá Principal"
          available: 250
          reserved: 30
          in_transit: 0
          fulfillable_qty: 220
      total_fulfillable: 530
      freshness: "2025-05-02T14:25:00-06:00"
    latency_ms_max: 1500
    triggered: true
    parallel_group: "A"

  - step: 4
    sub_agent: "AG_SUB_COMPLIANCE_CHECKER"
    inputs:
      profile: "safety_footwear"
      tenant: "MWT"
      items: ["BC-7240"]
      certifications_required: ["ASTM F2413-18", "NOM-113-STPS-2009"]
      customer_country: "MX"
      use_case: "construcción Monterrey — albañiles y electricistas"
      variant_constraints:
        toe: "steel"
        midsole: "steel"
    expected_output:
      pass: true
      warnings: []
      blocking_issues: []
      pii_detected: false
      policies_violated: []
    latency_ms_max: 1200
    triggered: true

  - step: 5
    sub_agent: "AG_SUB_PRICING_CALCULATOR"
    inputs:
      sku: "BC-7240"
      qty: 200
      list_price: 68.50
      customer_tier: "silver"
      terms: "Net 30 días"
      currency: "USD"
      fx_volatility: "medium"
    expected_output:
      unit_price: 68.50
      subtotal: 13700.00
      discount_pct: 0
      discount_amount: 0
      tax_pct: 0
      tax_amount: 0
      freight_estimate: 420.00
      total: 14120.00
      margin_calculated: 0.28
      margin_floor: 0.22
      margin_status: "OK"
      currency_fx_rate: 1.0
      version: "2025-04-20"
    latency_ms_max: 500
    triggered: true

  - step: 6
    sub_agent: "AG_SUB_DRAFT_WRITER"
    inputs:
      category: "proforma_draft"
      recipient_role: "customer"
      context:
        customer: "Construcciones del Norte SA de CV"
        rfq_items: "200 pares calzado seguridad BC-7240 (tallas 24, 26, 28)"
        incoterm: "DDP Monterrey"
        total: 14120.00
        currency: "USD"
        variant_constraints: "ancho normal, puntera acero"
    expected_output:
      draft_type: "proforma_draft"
      subject: "Proforma 200 pares calzado seguridad BC-7240 — Construcciones del Norte"
      body: |
        Estimado Luis,

        Agradecemos su solicitud. Adjuntamos proforma para 200 pares de
