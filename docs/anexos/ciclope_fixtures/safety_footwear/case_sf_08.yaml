    country: "MX"
    city: "Monterrey"
    tier: "silver"
    credit_status: "ok"
    payment_terms: "Net 30 días"
    incoterm_default: "DDP"
    tax_id: "CN-123456789"
    vertical: "construccion_mexicana"
