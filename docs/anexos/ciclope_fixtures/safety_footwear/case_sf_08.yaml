edge_cases:
  - description: "Vendedor usa '12 punto' (talla 30) — fuera de rango 22-30 pero en límite. Sistema debe validar rango."
    expected_behavior: "Talla 30 está en rango. Si fuera 32, sistema debe alertar 'talla fuera de catálogo'.",
    variant_data:
      talla_requested: "32 punto"
      expected_resolution: "OUT_OF_RANGE"
  - description: "Cliente mezcla 'punto' con talla numérica europea '42' — ambigüedad sistema"
    expected_behavior: "Sistema detecta doble sistema de tallas, pide clarificación. No asume.",
    variant_data:
      mixed_sizing: "6 punto y talla 42"
      expected_behavior: "CLARIFICATION_REQUIRED"
  - description: "Email en español colombiano usa 'talla' en lugar de 'punto' — sin vocabulario regional"
    expected_behavior: "Sistema no encuentra 'punto', usa talla estándar. Sin problema. Procesa normal.",
    variant_data:
      language_variant: "es_CO"
      term_used: "talla 26"
      glossary_hit: false

pass_criteria:
  must_pass:
    - "glossary_overrides['punto'] resolved 3 mappings correctly"
    - "output.entities_extracted contains variant_sizing_regional with resolved talla"
    - "output.proforma contains talla labels en MX notation (24, 26, 28)"
    - "output.hitl_gate_triggered == true"
    - "output.exceptions_raised is empty"
    - "output.primary_output.status == 'GENERATED'"
  must_not_do:
    - "system ignores 'punto' and processes as generic text"
    - "system resolves 'punto' to talla europea (40, 42, 44)"
    - "system fails to detect glossary hit and requests clarification unnecessarily"
    - "proforma talla labels use European or US sizing without conversion"
    - "agente solo envía proforma sin AM approval"

severity_weight_validation:
  expected_severity: "medium"
  if_misclassified_as_lower: |
    Si clasificado como Low: proforma podría generarse con
    resolución incorrecta de tallas, enviando calzado en tallas
    equivocadas al cliente. Consecuencia: devolución masiva,
    costo logístico, retraso obra construcción Monterrey.
    Error de vocabulario regional = fallo de localización crítica.
  if_misclassified_as_higher: |
    Si clasificado como High o Critical: bloqueo innecesario
    de RFQ limpia con stock y cert OK. Pérdida de oportunidad
    $14,120 USD por sobre-escalamiento.

privacy_tier:
  inputs: "TENANT_DERIVED"
  outputs: "TENANT_DERIVED"
  cross_tenant_eligibility: "no"
  promotion_notes: |
    Caso específico cliente construcción MX. Patrón de resolución
    vocabulario regional "punto" puede promoverse a
    GLOBAL_PROMOTABLE como glossary pattern tras anonimización.

gaps_detected:
  - gap_id: "GAP-SF-002"
    severity: "low"
    component: "glossary_regional"
    description: "Sistema no tiene glossary override para 'punto' en CR (Costa Rica). Solo MX y CO. Si cliente CR usa 'punto' con escala diferente, habrá mismatch."
    workaround: "Documentar que glossary 'punto' solo aplica a MX. CR clients deben usar talla numérica explícita."
    impact: "Bajo. CR market share pequeño para MWT inicial."
    recommendation: "Agregar glossary 'punto_cr' con escala CR (diferente de MX) cuando volumen CR justifique."
    priority_for_sprint_1: "low"
