industry: safety_footwear
severity: medium
description: |
  RFQ vendedor junior MX usa vocabulario regional "6 punto, 8 punto, 10 punto".
  Sistema debe resolver via glossary_overrides: punto → talla numérica regional.
  200 pares mixtos, cliente construcción MX.

