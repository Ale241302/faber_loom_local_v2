      vertical_spec:
        type: "safety_footwear"
        norm: "ASTM F2413-18"
        subclass: "EH"
        protection:
          toe: "composite"
          midsole: "steel"
          outsole: "PU bidensidad SRC"
        variants:
          sizing_system: "talla_mexicana"
          range: "22-30"
          width_options: ["normal", "ancho", "extra_ancho"]
        applications: ["petrolero", "eléctrico", "industrial pesado"]
        standards:
          - standard: "ASTM F2413-18"
            status: "vigente"
            cert_doc_ref: "CERT-ASTM-BC7240-2025-006"
            expiry_date: "2026-04-15"
            lab_acreditado: "Intertek Brasil"
      stock:
        available_by_variant:
          - variant: "talla_30_normal"
            qty: 0
          - variant: "talla_30_ancho"
            qty: 0
          - variant: "talla_30_extra_ancho"
            qty: 0
          - variant: "talla_29_normal"
            qty: 45
          - variant: "talla_29_ancho"
            qty: 60
          - variant: "talla_29_extra_ancho"
            qty: 80
        warehouses:
          - location: "Bogotá Principal"
            qty_total: 185
            reserved: 25
          - location: "CDMX Hub"
            qty_total: 0
            reserved: 0
        freshness_seconds: 120
      pricing:
        list_price: 68.50
        currency: "USD"
        version: "2025-04-15"
        freshness_hours: 8
      lead_time:
        days: 45
        source: "factory"
        freshness_hours: 24
      MOQ: 24
      packaging:
        units_per_box: 12
        boxes_per_pallet: 40
        weight_kg_per_unit: 1.4
      sku_status: "active"
      margin_calculated: 0.28
  customer:
    customer_id: "CLI-CO-006"
    name: "Construsur Andina S.A.S."
    country: "CO"
    city: "Cali"
    tier: "silver"
    credit_status: "ok"
    payment_terms: "Net 30 días"
    incoterm_default: "DDP"
    tax_id: "901.567.890-1"
    vertical: "construccion_cali"
    historical_data:
      last_order_date: "2025-03-22"
      avg_order_value_usd: 4200
      orders_ytd: 3
      complaints_12m: 0
      preferred_delivery: "Bogotá Principal"
    regulatory_context:
      requires_astm_f2413: true
      max_cert_age_days: 365
  agent_state:
    archetype: "AG_AM_MWT"
    sub_agents_active:
      - "AG_SUB_EMAIL_CLASSIFIER"
      - "AG_SUB_SAP_QUERY"
      - "AG_SUB_INVENTORY_FETCHER"
      - "AG_SUB_COMPLIANCE_CHECKER"
      - "AG_SUB_ESCALATION_ROUTER"
      - "AG_SUB_DRAFT_WRITER"
      - "AG_SUB_PROFORMA_BUILDER"
    sub_agents_shadow: []
    template_voice:
      tone: "professional_b2b_latam"
      language: "es_CO"
      formality: "formal_usted"
    routing:
      layer_1: "inactivo"
      layer_2: "activo"
      layer_3a_pins: ["AG_SUB_COMPLIANCE_CHECKER:safety_footwear"]
      layer_3b_metadata: ["compliance_profile:safety_footwear", "tenant:MWT"]
    curator:
      last_freeze: "2025-04-25"
      pending_items: 0
    authority_matrix_level: "AM"
    glossary_overrides:
      - term: "punto"
        meaning: "talla_numérica_regional"
        applies_to: ["MX"]
      - term: "talla grande"
        meaning: "talla_28_30_range"
        applies_to: ["CO", "MX"]

input:
  channel: email
  from:
    name: "Sr. Diego Valencia"
    email: "d.valencia@construsur.co"
    role: "Jefe de Almacén"
  to: "cotizaciones@mwt-faberloom.co"
  subject: "Cotización 80 pares BC-7240 talla 30 — obra Cali"
  body_text: |
    Buenos días,

    Necesitamos cotizar 80 pares de bota dieléctrica Marluvas BC-7240
    en talla 30 (12 punto), ancho normal, para nuestra obra en Cali.

    Puntera composite, plantilla acero. Entrega DDP Cali en 10 días.
    Certificación vigente requerida.

    Gracias.

    Diego Valencia
    Jefe de Almacén
    Construsur Andina S.A.S.
  attachments: []
  thread_id: null
  timestamp: "2025-05-02T13:00:00-05:00"
  language_detected: "es"

expected_pipeline:
  - step: 1
    sub_agent: "AG_SUB_EMAIL_CLASSIFIER"
    inputs: ["input.email.body_text", "input.email.subject"]
    expected_output:
      primary_intent: "quote_request"
      secondary_intents: ["variant_specific"]
      urgency: "medium"
      sentiment: "neutral"
      requires_human: false
      confidence: 0.87
      language_detected: "es"
      entities_extracted:
        - type: "product"
          value: "bota dieléctrica BC-7240"
          qty: 80
        - type: "variant_sizing"
          value: "talla 30 (MX)"
        - type: "variant_width"
          value: "normal"
      latency_ms_max: 1200
      triggered: true

  - step: 2
    sub_agent: "AG_SUB_SAP_QUERY"
    inputs: ["customer_id: CLI-CO-006", "parsed_items"]
    expected_output:
      account_credit_status: "ok"
      payment_history: "clean"
      pricing_master_access: true
      customer_terms_ref: "TERMS-CSUR-2025-Q1"
      freshness: "2025-05-02T12:58:00-05:00"
    latency_ms_max: 2000
    triggered: true
    parallel_group: "A"

  - step: 3
    sub_agent: "AG_SUB_INVENTORY_FETCHER"
    inputs:
      - "sku: BC-7240"
      - "qty_breakdown: {30:80}"
      - "variant_constraints: {ancho: normal}"
    expected_output:
      items:
        - sku: "BC-7240"
          variant: "talla_30_normal"
          warehouse: "Bogotá Principal"
          available: 0
          reserved: 0
          in_transit: 0
          fulfillable_qty: 0
      total_fulfillable: 0
      stock_status: "OUT_OF_STOCK_VARIANT"
      alternative_variants_found:
        - variant: "talla_29_extra_ancho"
          available: 80
          suitability_note: "Talla 29 extra_ancho ≈ talla 30 normal en confort para pie ancho"
      freshness: "2025-05-02T12:55:00-05:00"
    latency_ms_max: 1500
    triggered: true
    parallel_group: "A"

  - step: 4
    sub_agent: "AG_SUB_COMPLIANCE_CHECKER"
    inputs:
      profile: "safety_footwear"
      tenant: "MWT"
      items: ["BC-7240"]
      certifications_required: ["ASTM F2413-18"]
      customer_country: "CO"
      use_case: "construcción Cali"
    expected_output:
      pass: true
      warnings: []
      blocking_issues: []
      pii_detected: false
      policies_violated: []
    latency_ms_max: 1000
    triggered: true
    parallel_group: "A"

  - step: 5
    sub_agent: "AG_SUB_ESCALATION_ROUTER"
    inputs:
      trigger_source: "AG_SUB_INVENTORY_FETCHER"
      exception_codes: ["TALLA_FALTANTE"]
      severity: "medium"
      tenant: "MWT"
    expected_output:
      route_to: "AM_MWT"
      recipients: ["a.velasquez@mwt-faberloom.co"]
      channel: "email_standard"
      urgency_override: "medium"
      fallback_route: null
      sla_target_minutes: 240
      vertical_context: "safety_footwear"
    latency_ms_max: 100
    triggered: true

  - step: 6
    sub_agent: "AG_SUB_DRAFT_WRITER"
    inputs:
      category: "draft_clarification"
      recipient_role: "cliente"
      context:
        customer: "Construsur Andina S.A.S."
        rfq_items: "80 pares BC-7240 talla 30"
        exception: "TALLA_FALTANTE — stock 0, alternativa talla 29 extra_ancho"
        severity: "medium"
        vertical: "safety_footwear"
    expected_output:
      draft_type: "clarification_request_with_alternative"
      subject: "Cotización BC-7240 — Alternativa talla disponible / Construsur"
      body: |
        Estimado Sr. Valencia,

        Gracias por su solicitud de 80 pares BC-7240 talla 30.

        Lamentablemente, talla 30 (ancho normal) NO tiene stock
        disponible actualmente (lead time 45 días desde fábrica).

        Alternativa inmediata disponible:
        - Talla 29 (11 punto) extra_ancho: 80 pares en stock Bogotá
        - Para pies que normalmente usan talla 30, la talla 29
          extra_ancho suele ofrecer confort equivalente (mismo largo
          interior aproximado con mayor ancho).

        Precio: mismo $68.50 USD/par.
        Entrega: 5 días DDP Cali.

        ¿Desea que preparemos proforma con talla 29 extra_ancho,
        o prefiere esperar backorder talla 30 (45 días)?

        Quedo atento.

        Saludos,
        MWT — Cotizaciones
      tone: "professional_with_alternative"
      internal_note: "Variante talla faltante. Alternativa extra_ancho puede funcionar pero requiere validación cliente. AM debe confirmar equivalencia técnica."
    latency_ms_max: 3500
    triggered: true

  - step: 7
    sub_agent: "AG_SUB_PROFORMA_BUILDER"
    inputs: ["blocked_by_variant: true"]
    expected_output:
      status: "NOT_GENERATED"
      reason: "VARIANT_DIMENSION_MISSING"
    latency_ms_max: 6000
    triggered: false

expected_outputs:
  primary_output:
    type: "draft_clarification"
    content:
      status: "BLOCKED_PENDING_CLARIFICATION"
      reason: "TALLA_FALTANTE — stock 0 talla 30 normal"
      customer_notified: true
      proforma_generated: false
      draft_sent: true
    glosses_required:
      - "Talla 30 normal: 0 unidades disponibles"
      - "Alternativa talla 29 extra_ancho: 80 unidades"
      - "Lead time talla 30: 45 días"
      - "Mismo precio, misma certificación"
      - "Requiere confirmación cliente para variante alternativa"
  evidence_bundle:
    per_line:
      - sku: "BC-7240"
        qty_requested: 80
        variant_constraints: "talla 30, ancho normal"
        stock_fulfillable: 0
        status: "OUT_OF_STOCK_VARIANT"
    per_quote:
      status: "BLOCKED_PENDING_CLARIFICATION"
      exception_codes: ["TALLA_FALTANTE"]
      aprobador: "AM"
      hash: null
    audit_view:
      source_precio: "2025-04-15"
      version_lista: "2025-04-15"
      timestamp_stock: "2025-05-02T12:55:00-05:00"
      technical_spec_rule: "safety_footwear_variant_missing"
      margen_calculado: 0.28
      aprobador: "AM (variant clarification)"
      vigencia: null
      fallback_used: false
      source_stock: "3PL"
      source_lead_time: "factory"
      sku_status: "active"
      cert_doc_version: "vigente"
      country_rule_applied: null
      freight_quote_ref: null
      MOQ_packaging_rule: "MOQ=24, packaging=12/box"
      currency_fx_rate: null
      customer_terms_ref: "TERMS-CSUR-2025-Q1"
      exception_codes: ["TALLA_FALTANTE"]
      vertical_spec_object: "safety_footwear"
      tenant: "MWT"
  side_effects:
    - type: "notify_AM"
      details:
        recipients: ["a.velasquez@mwt-faberloom.co"]
        channel: "email_standard"
        sla_minutes: 240
    - type: "create_open_item"
      details:
        item_type: "variant_clarification_pending"
        sku: "BC-7240"
        priority: "medium"
        due_date: "2025-05-03T13:00:00-05:00"
        vertical: "safety_footwear"
    - type: "persist_audit_event"
      details:
        event_type: "QUOTE_BLOCKED_VARIANT"
        severity: "medium"
        trace_id: "TRACE-caseSF06-20250502"
        tenant: "MWT"
  exceptions_raised:
    - "TALLA_FALTANTE"
  hitl_gate_triggered: true
  output_destination: "draft_clarification"

edge_cases:
  - description: "Cliente acepta talla 29 extra_ancho — proforma generable con nota equivalencia"
    expected_behavior: "Proforma generada con BC-7240 talla 29 extra_ancho. Evidence bundle registra aprobación cliente de variante.",
    variant_data:
      client_response: "acepta_talla_29_extra_ancho"
      expected_proforma: true
  - description: "Cliente insiste talla 30 — backorder 45 días, proforma con split"
    expected_behavior: "Proforma con backorder 45 días. Cliente informado. AM aprueba lead time extendido.",
    variant_data:
      client_response: "insiste_talla_30"
      expected_action: "backorder_45d"
  - description: "Cliente pide talla 30 ancho (no normal) — stock 60 unidades, proforma generable directo"
    expected_behavior: "Proforma generable sin escalación. Stock suficiente para variante ancho.",
    variant_data:
      width: "ancho"
      available: 60
      expected_proforma: true

pass_criteria:
  must_pass:
    - "output.exceptions_raised contains 'TALLA_FALTANTE'"
    - "output.primary_output.status == 'BLOCKED_PENDING_CLARIFICATION'"
    - "output.primary_output.proforma_generated == false"
    - "output.primary_output.draft_sent == true"
    - "output.hitl_gate_triggered == true"
    - "output.side_effects contains notify_AM with sla_minutes <= 240"
    - "evidence_bundle.per_quote.aprobador == 'AM'"
    - "expected_pipeline[2].expected_output.stock_status == 'OUT_OF_STOCK_VARIANT'"
  must_not_do:
    - "output contains proforma con talla 29 sin confirmación cliente"
    - "system ignores variant constraint and offers any available size"
    - "system promises talla 30 inmediata when stock is 0"
    - "agente solo aprueba variante alternativa sin cliente"
    - "system does not notify AM of variant stockout"

severity_weight_validation:
  expected_severity: "medium"
  if_misclassified_as_lower: |
    Si clasificado como Low: sistema podría enviar draft con
    alternativa sin HITL gate, o ignorar completamente la talla
    faltante. Consecuencia: cliente recibe calzado talla incorrecta
    (29 vs 30), riesgo de incomodidad y rechazo. En obra construcción,
    pie mal ajustado = fatiga, accidente por tropezón, o uso de
    calzado personal no safety.

privacy_tier:
  inputs: "TENANT_DERIVED"
  outputs: "TENANT_DERIVED"
  cross_tenant_eligibility: "no"
  promotion_notes: |
    Caso específico Construsur CO. No promovible.
    Patrón abstracto (variante talla faltante con alternativa
    extra_ancho) puede promoverse a GLOBAL_PROMOTABLE tras
    anonimización.

gaps_detected: []
