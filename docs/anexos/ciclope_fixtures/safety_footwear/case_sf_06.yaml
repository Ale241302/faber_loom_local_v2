case_id: case_sf_06
industry: safety_footwear
severity: medium
description: |
  RFQ por 80 pares talla 30 (extra grande) · sin stock · alternativas
  talla 29 con punto extra_ancho podría servir. Sistema debe propuesta +
  escalación AM con variantes.

