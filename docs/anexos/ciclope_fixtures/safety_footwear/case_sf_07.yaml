input:
  channel: email
  from:
    name: "C.P. Ana López"
    email: "a.lopez@agronorte.mx"
    role: "Gerente de Compras"
  to: "cotizaciones@mwt-faberloom.co"
  subject: "Cotización mixta calzado safety — 180 pares split Saltillo/Querétaro"
  body_text: |
    Estimados,

    Solicitamos cotización para pedido mixto de calzado safety:

    - 100 pares bota dieléctrica Marluvas BC-7240 talla 26 (8 punto),
      ancho normal, puntera composite, plantilla acero
    - 50 pares calzado agro Tecmater BC-3120 talla 28 (10 punto),
      ancho normal, puntera acero, plantilla kevlar
    - 30 pares zapato seguridad TC-5500 talla 24 (6 punto),
      ancho normal, puntera acero, plantilla kevlar

    Split de entrega:
    - Saltillo (planta principal): 120 pares total
    - Querétaro (sucursal): 60 pares total

    Detalle split no definido — ustedes sugieran distribución óptima.

    Entrega DDP. Plazo 7 días. Certificaciones vigentes.

    Quedo atenta.

    C.P. Ana López
    Gerente de Compras
    Agroindustrias del Norte
  attachments: []
  thread_id: null
  timestamp: "2025-05-02T10:30:00-06:00"
  language_detected: "es"

