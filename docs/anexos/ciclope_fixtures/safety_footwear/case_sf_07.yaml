edge_cases:
  - description: "Cliente redefine split 150/30 en vez de 120/60 — proforma re-calcula sin costo"
    expected_behavior: "Proforma ajustada. Split flexible sin costo adicional.",
    variant_data:
      client_split: "Saltillo:150, Querétaro:30"
      expected_action: "recalculate_split"
  - description: "Stock TC-5500 solo 20 unidades (10 faltan) — stock parcial en pedido mixto"
    expected_behavior: "Escalamiento High. TC-5500 shortfall 33%. Backorder 3 días o sustitución BC-3120.",
    variant_data:
      tc5500_stock: 20
      tc5500_shortfall: 10
      expected_escalation: "High"
  - description: "Cliente pide split en 3 sitios (add Monterrey) — sistema verifica cobertura flete"
    expected_behavior: "Proforma con 3 splits. Si flete Monterrey no cotizado → FLETE_NO_COTIZADO.",
    variant_data:
      additional_site: "Monterrey"
      expected_exception: "FLETE_NO_COTIZADO"

pass_criteria:
  must_pass:
    - "output.exceptions_raised contains 'PEDIDO_MIXTO'"
    - "output.primary_output.status == 'DRAFT_GENERATED'"
    - "output.primary_output.proforma_generated == true"
    - "output.hitl_gate_triggered == true"
    - "output.side_effects contains notify_AM with sla_minutes <= 240"
    - "evidence_bundle.per_quote.aprobador == 'AM'"
    - "expected_pipeline[4].expected_output.delivery_split_analysis exists"
    - "expected_pipeline[6].expected_output.delivery_split contains Saltillo and Querétaro"
  must_not_do:
    - "output contains proforma sin split detail"
    - "system charges extra for split delivery"
    - "system ignores mixed SKU categories and bundles as single item"
    - "agente solo envía proforma sin AM review"
    - "system promises all items from same warehouse when split by geography"

severity_weight_validation:
  expected_severity: "medium"
  if_misclassified_as_lower: |
    Si clasificado como Low: pedido mixto podría procesarse sin
    split detail ni AM review. Consecuencia: 180 pares enviados a
    un solo destino, obligando al cliente a re-distribuir internamente.
    Costo logístico adicional para cliente = insatisfacción y posible
    pérdida de cuenta. Además, mezcla de EH + I/75 requiere nota de
    uso específico por site que AM debe validar.

