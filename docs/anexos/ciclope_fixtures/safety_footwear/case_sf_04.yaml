edge_cases:
  - description: "Cliente rechaza sustitución por peso (+180g) — sistema debe buscar otra alternativa o backorder original"
    expected_behavior: "Si cliente rechaza, sistema ofrece backorder BC-7240 composite 45 días o busca alternativa de otro proveedor con composite.",
    variant_data:
      client_response: "rechaza_por_peso"
      expected_action: "backorder_or_alternative_search"
  - description: "Cliente acepta sustitución verbal por teléfono — sistema exige confirmación por escrito"
    expected_behavior: "NO procesar aprobación verbal. Requiere email firmado o documento escaneado. AM registra aprobación documentada.",
    variant_data:
      client_approval_channel: "telefono"
      expected_action: "request_written_confirmation"
  - description: "Sustitución implica cambio de norma (composite cert F2413-18 vs acero cert F2413-11 legacy) — rechazo automático"
    expected_behavior: "Rechazo automático de sustitución si cambia versión norma. Evidence bundle muestra incompatibilidad normativa.",
    variant_data:
      substitute_sku: "BC-7240-LEGACY-STEEL"
      substitute_norm: "ASTM F2413-11"
      expected_action: "rejection_automatic"

pass_criteria:
  must_pass:
    - "output.exceptions_raised contains 'SUSTITUCIÓN_ACEPTABLE'"
    - "output.primary_output.status == 'DRAFT_PENDING_APPROVAL'"
    - "output.primary_output.proforma_generated == true"
    - "output.primary_output.approval_pending == true"
    - "output.hitl_gate_triggered == true"
    - "output.side_effects contains notify_AM with sla_minutes <= 60"
    - "evidence_bundle.per_quote.aprobador == 'AM+supervisor + cliente'"
    - "evidence_bundle.audit_view.fallback_used == true"
    - "expected_pipeline[4].expected_output.evidence contains toe_resistance_impact equivalent"
    - "expected_pipeline[4].expected_output.requires_approval == true"
  must_not_do:
    - "output contains proforma final sin nota de sustitución"
    - "system auto-aproba sustitución composite→acero sin cliente"
    - "agente solo envía proforma sin AM+supervisor firma"
    - "system ignores weight difference (+180g) as irrelevant"
    - "system processes verbal approval as sufficient"
    - "output.primary_output.customer_notified == false (debe notificar con draft)"

severity_weight_validation:
  expected_severity: "high"
  if_misclassified_as_lower: |
    Si clasificado como Medium: sustitución podría auto-aprobarse o
    enviarse como "nota menor" sin escalamiento AM+supervisor.
    Consecuencia: cliente recibe calzado con puntera diferente a la
    solicitada sin aprobación explícita. En campo petrolero, +180g
    por par × 12h turno = fatiga acumulada, riesgo HSE. Además,
    viola política MWT "sustitución técnica no idéntica requiere
    aprobación AM+supervisor + cliente".

