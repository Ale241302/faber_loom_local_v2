      body: |
        Estimado Dr. Peña,

        Agradecemos su solicitud de 80 pares BC-7240 con puntera composite.

        **IMPORTANTE — Sustitución técnica detectada:**
        El modelo BC-7240 con puntera composite NO tiene stock disponible
        (lead time 45 días desde fábrica Brasil).

        Alternativa inmediata disponible:
