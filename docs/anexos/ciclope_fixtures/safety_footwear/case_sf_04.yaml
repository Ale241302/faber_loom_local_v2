        - Única diferencia: puntera de **acero** en lugar de composite.
          Peso adicional: +180g por par (1.5 kg vs 1.4 kg).

        Evidence técnica verificada:
        - Resistencia impacto: 75 (ambos)
        - Resistencia compresión: 2,500 lbf (ambos)
        - Clase eléctrica: EH (ambos)
        - Certificación: ASTM F2413-18 vigente + NOM-113 vigente

        Precio BC-7240-STEEL: $62.00 USD/par (vs $68.50 composite).
        Ahorro total: $520 USD.

        **Esta sustitución requiere su aprobación explícita por escrito**
        antes de confirmar pedido, dado el cambio de material puntera.

        Quedo atento a su confirmación.
      tone: "professional_with_technical_detail"
      internal_note: "Sustitución puntera composite→acero = NEVER agente solo. Requiere aprobación cliente + AM+supervisor."
    latency_ms_max: 4000
    triggered: true

  - step: 8
