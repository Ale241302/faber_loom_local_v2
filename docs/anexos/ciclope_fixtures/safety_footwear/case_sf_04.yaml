  subject: "Urgente: 80 pares bota dieléctrica BC-7240 puntera composite — Campo Casabe"
  body_text: |
    Buenos días,

    Solicitamos con urgencia 80 pares de bota dieléctrica Marluvas
    modelo BC-7240 con puntera composite para nuestro personal de campo
    en Casabe, Barrancabermeja.

    Detalle:
    - BC-7240 talla 26 (8 punto): 30 pares
    - BC-7240 talla 28 (10 punto): 30 pares
    - BC-7240 talla 30 (12 punto): 20 pares
    - Ancho normal
    - Puntera composite (NO acero — peso ligero para caminatas largas)
    - Plantilla acero

    Requerimos entrega DDP Barrancabermeja en máximo 8 días.
    Certificación vigente obligatoria.

    Quedo atento.

    Dr. Andrés Peña
    Director de HSE
    Petrolera Andina S.A.
