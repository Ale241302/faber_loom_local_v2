edge_cases:
  - description: "Cliente acepta entrega única en 45 días — proforma confirma backorder completo"
    expected_behavior: "Proforma final con backorder 45 días. AM aprueba. Cliente notificado con confirmación.",
    variant_data:
      client_choice: "entrega_unica_45d"
      expected_proforma: true
  - description: "Cliente cancela pedido al ver stock parcial — sistema registra lost opportunity"
    expected_behavior: "Audit event 'QUOTE_CANCELLED_CLIENT'. AM notificado. Oportunidad $34,250 perdida. SKU flagged para reabastecimiento.",
    variant_data:
      client_choice: "cancela"
      expected_action: "lost_opportunity"
  - description: "Cliente pide 500 pares talla 27 pero ancho extra_ancho — stock extra_ancho solo 50 unidades (90% faltante)"
    expected_behavior: "Escalamiento a CEO. Shortfall 90% = no viable logísticamente. Alternativa: ofrecer talla 26 extra_ancho o backorder completo.",
    variant_data:
      width: "extra_ancho"
      available: 50
      shortfall_pct: 90
      expected_escalation: "CEO"

pass_criteria:
  must_pass:
    - "output.exceptions_raised contains 'STOCK_PARCIAL'"
    - "output.primary_output.status == 'DRAFT_GENERATED'"
    - "output.primary_output.proforma_generated == true"
    - "output.hitl_gate_triggered == true"
    - "output.side_effects contains notify_AM with sla_minutes <= 60"
    - "evidence_bundle.per_line[0].shortfall_pct == 70"
    - "evidence_bundle.per_quote.aprobador == 'AM+supervisor'"
    - "expected_pipeline[2].expected_output.shortfall == 350"
    - "expected_pipeline[2].expected_output.shortfall_pct == 70"
  must_not_do:
    - "output contains proforma sin nota de stock parcial"
    - "system promises 500 pares inmediatos when only 150 available"
    - "system ignores 70% shortfall as 'normal'"
    - "agente solo confirma backorder 45 días sin AM approval"
    - "system auto-splits delivery without client confirmation"
    - "output.primary_output.customer_notified == false"

severity_weight_validation:
  expected_severity: "high"
  if_misclassified_as_lower: |
    Si clasificado como Medium: stock parcial podría enviarse como
    "nota menor" en proforma sin escalamiento AM+supervisor.
    Consecuencia: cliente minera recibe 150 pares cuando pidió 500,
    sin clarificación de entrega parcial. Disrupción operativa en
    mina subterránea = parada producción, riesgo HSE por trabajadores
    sin calzado safety. Además, 70% shortfall indica problema de
    supply chain que AM debe resolver estratégicamente.

