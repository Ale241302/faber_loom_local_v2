    name: "Ing. Luis Torres"
    email: "l.torres@mineranorte.mx"
    role: "Superintendente de Compras"
  to: "cotizaciones@mwt-faberloom.co"
  subject: "Cotización urgente 500 pares BC-7240 talla 27 — Mina La Colorada"
  body_text: |
    Estimados,

    Solicitamos cotización urgente para 500 pares de bota dieléctrica
    Marluvas BC-7240, talla 27 (9 punto), ancho normal, puntera
    composite, plantilla acero.

    Uso: mina subterránea La Colorada, Chihuahua. Requerimos entrega
    DDP en máximo 15 días hábiles.

    Certificación ASTM F2413-18 y NOM-113 obligatorias.

    Este es nuestro pedido anual de calzado safety. Agradecemos su
    pronta respuesta.

    Ing. Luis Torres
    Superintendente de Compras
    Minera del Norte S.A. de C.V.
