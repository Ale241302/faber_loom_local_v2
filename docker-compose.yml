# ════════════════════════════════════════════════════════════════════
# FaberLoom · VPS docker-compose
# Replaces the old FastAPI + Next.js + Postgres stack with the new
# FastAPI + static React (UMD) + SQLite stack.
#
# The mwt nginx proxy routes app.faberloom.ai to the faberloom-api
# container on the shared mwt_default network.
#
# E2-0: a PostgreSQL service is included for migration rehearsal and the
# eventual E2-1 Postgres runtime. SQLite remains the active runtime until
# E2-1 is explicitly enabled via DATABASE_URL.
# ════════════════════════════════════════════════════════════════════

services:
  postgres:
    image: postgres:16-alpine
    container_name: faberloom-postgres
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-faberloom}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-faberloom}
      POSTGRES_DB: ${POSTGRES_DB:-faberloom}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    networks:
      - mwt_default
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-faberloom} -d $${POSTGRES_DB:-faberloom}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: faberloom-api
    env_file:
      - .env
    environment:
      FABERLOOM_HOST: 0.0.0.0
      FABERLOOM_PORT: 8000
      FABERLOOM_CONFIG_DIR: /data
      FABERLOOM_DB_PATH: /data/faberloom.sqlite3
      FABERLOOM_PUBLIC_HOST: app.faberloom.ai
      FL_STORAGE_BACKEND: minio
      FL_MINIO_ENDPOINT: faberloom-minio:9000
      FL_MINIO_ACCESS_KEY: ${FL_MINIO_SERVICE_USER:-faberloom-api}
      FL_MINIO_SECRET_KEY: ${FL_MINIO_SERVICE_PASSWORD:-faberloom-api-secret}
      FL_MINIO_SECURE: "false"
    volumes:
      - ./data:/data
      - ./.env:/data/.env:ro
    ports:
      - "8200:8000"
    networks:
      - mwt_default
    depends_on:
      postgres:
        condition: service_healthy
      faberloom-minio:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health', timeout=5)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  faberloom-minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: faberloom-minio
    command: server /data --console-address ":9001"
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${FL_MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${FL_MINIO_ROOT_PASSWORD:-minioadmin-secret}
      MINIO_SERVER_URL: ${FL_MINIO_SERVER_URL:-https://minio.faberloom.ai}
      MINIO_BROWSER_REDIRECT_URL: ${FL_MINIO_BROWSER_REDIRECT_URL:-https://console.minio.faberloom.ai}
    volumes:
      - faberloom_minio_data:/data
    ports:
      - "9100:9000"
      - "9101:9001"
    networks:
      - mwt_default
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
  faberloom_minio_data:

networks:
  mwt_default:
    external: true
